<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>فاتورة إلكترونية</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
@page { size: A4; margin: 0; }

body { background:#eef2f5; font-family:Cairo; }

.page {
  width:210mm;
  height:297mm;
  padding:20mm 15mm 25mm 15mm;
  background:#fff;
  position:relative;
  page-break-after:always;
}

.product-table { width:100%; border-collapse:collapse; font-size:12px; }
.product-table th,.product-table td { border:1px solid #ccc; padding:6px; }

.page-number {
  position:absolute;
  bottom:10mm;
  right:15mm;
  font-size:12px;
}
</style>
</head>

<body>

<div id="invoiceContainer"></div>

<div style="position:fixed;bottom:20px;width:100%;text-align:center;">
  <button onclick="window.print()">طباعة</button>
  <button onclick="exportPDF()">PDF</button>
  <button onclick="exportPNG()">PNG</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
});

const db = getFirestore(app);

// =====================
// أدوات
// =====================
function mmToPx(mm){ return mm * 3.78 }

function getUsableHeight(){
  return mmToPx(297 - (20 + 25));
}

// =====================
// إنشاء صف
// =====================
function createRow(item){
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${item.name}</td>
    <td>${item.quantity}</td>
    <td>${item.price}</td>
    <td>${(item.price * item.quantity).toFixed(2)}</td>
  `;
  return tr;
}

// =====================
// قياس الصفوف
// =====================
async function measureRows(rows){

  const box = document.createElement('div');
  box.style.position='absolute';
  box.style.visibility='hidden';
  box.style.top='-9999px';
  box.style.width='794px';

  document.body.appendChild(box);

  const table=document.createElement('table');
  table.className='product-table';
  const tbody=document.createElement('tbody');
  table.appendChild(tbody);
  box.appendChild(table);

  const heights=[];

  for(let r of rows){
    tbody.innerHTML='';
    const c=r.cloneNode(true);
    tbody.appendChild(c);

    await new Promise(x=>setTimeout(x,30));

    heights.push(c.getBoundingClientRect().height);
  }

  document.body.removeChild(box);
  return heights;
}

// =====================
// تقسيم الصفحات
// =====================
async function splitPages(items){

  const rows = items.map(i=>createRow(i));
  const heights = await measureRows(rows);

  const usable = getUsableHeight();
  const BUFFER = 60;

  const pages=[];
  let current=[];
  let h=0;

  for(let i=0;i<rows.length;i++){

    if(current.length && h + heights[i] > usable - BUFFER){
      pages.push(current);
      current=[];
      h=0;
    }

    current.push(rows[i]);
    h += heights[i];
  }

  if(current.length) pages.push(current);

  return pages;
}

// =====================
// إنشاء صفحة
// =====================
function createPage(rows, pageNum, total){

  const page=document.createElement('div');
  page.className='page';

  page.innerHTML = `
    <h2>فاتورة</h2>
  `;

  const table=document.createElement('table');
  table.className='product-table';

  table.innerHTML=`
    <thead>
      <tr>
        <th>المنتج</th>
        <th>الكمية</th>
        <th>السعر</th>
        <th>الإجمالي</th>
      </tr>
    </thead>
  `;

  const tbody=document.createElement('tbody');
  rows.forEach(r=>tbody.appendChild(r.cloneNode(true)));

  table.appendChild(tbody);
  page.appendChild(table);

  const num=document.createElement('div');
  num.className='page-number';
  num.textContent=`${pageNum} / ${total}`;

  page.appendChild(num);

  return page;
}

// =====================
// تحميل الفاتورة
// =====================
async function render(){

  const orderId = new URLSearchParams(location.search).get('id');

  const docSnap = await getDoc(doc(db,'orders',orderId));
  const order = docSnap.data();

  const pages = await splitPages(order.items || []);

  const container=document.getElementById('invoiceContainer');

  pages.forEach((p,i)=>{
    container.appendChild(createPage(p,i+1,pages.length));
  });

}

render();

// =====================
// PDF
// =====================
async function exportPDF(){
  const el=document.getElementById('invoiceContainer');
  await html2pdf().from(el).save("invoice.pdf");
}

// =====================
// PNG
// =====================
async function exportPNG(){
  const canvas = await html2canvas(document.getElementById('invoiceContainer'),{scale:3});
  const link=document.createElement('a');
  link.download="invoice.png";
  link.href=canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
