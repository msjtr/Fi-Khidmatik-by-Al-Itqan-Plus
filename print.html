    function formatDate(d) {
        if (!d) return '';
        let parts = d.split('-');
        return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : d;
    }

    function formatTime(time24) {
        if (!time24) return '';
        let [h, m] = time24.split(':');
        let hour = parseInt(h);
        let ap = hour >= 12 ? 'مساءً' : 'صباحاً';
        hour = hour % 12 || 12;
        return `${hour}:${m} ${ap}`;
    }

    function escapeHtml(str) {

            if (m === '>') return '&gt;';
            return m;
        });

    async function fetchOrder(orderId) {
        console.log('جاري جلب الطلب:', orderId);
        
        const orderDoc = await db.collection('orders').doc(orderId).get();
        if (!orderDoc.exists) throw new Error('الطلب غير موجود');
        
        const order = { id: orderDoc.id, ...orderDoc.data() };
        
        let customer = { name: 'غير معروف', phone: '', email: '', address: '' };
        if (order.customerId) {
            try {
                const customerDoc = await db.collection('customers').doc(order.customerId).get();
                if (customerDoc.exists) customer = customerDoc.data();
            } catch(e) { console.warn(e); }
        }
        
        const items = [];
        for (const item of (order.items || [])) {
            let productImage = item.image || '';
            let productName = item.name || 'منتج';
            let productDesc = item.description || '';
            
            if (item.productId && item.productId !== 'null' && !item.productId.startsWith('temp_')) {
                try {
                    const productDoc = await db.collection('products').doc(item.productId).get();

                        productImage = product.image || productImage;
                        productName = product.name || productName;
                        productDesc = product.description || productDesc;
                    }
                } catch(e) { console.warn(e); }
            }
            
            items.push({
                ...item,
                productName: productName,
                description: productDesc,
                image: productImage,
                price: item.price || 0
            });
        }
        
        return {
            ...order,
            customerName: customer.name,
            customerPhone: customer.phone,
            customerEmail: customer.email,
            customerAddress: customer.address || '',
            items: items,
            paymentMethodName: getPaymentName(order.paymentMethod)
        };
    }

    function generateZATCAQRData(order) {
        const timestamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');
        const total = (order.total || 0).toFixed(2);
        const tax = (order.tax || ((order.subtotal || 0) * 0.15)).toFixed(2);
        
        let tlvData = '';
        tlvData += String.fromCharCode(1) + String.fromCharCode(1) + '1';
        tlvData += String.fromCharCode(2) + String.fromCharCode(15) + sellerData.taxNumber;
        tlvData += String.fromCharCode(3) + String.fromCharCode(timestamp.length) + timestamp;
        tlvData += String.fromCharCode(4) + String.fromCharCode(total.length) + total;
        tlvData += String.fromCharCode(5) + String.fromCharCode(tax.length) + tax;
        
        return btoa(tlvData);
    }

    async function generatePDF() {
        const pages = document.querySelectorAll('.invoice-page, .terms-page');
        if (!pages.length) { showToast('لا توجد فاتورة للتصدير', true); return; }
        
        showLoading();
        
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 2, useCORS: false, backgroundColor: '#ffffff', logging: false, allowTaint: true });
                if (i !== 0) pdf.addPage();
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            }
            
            pdf.save(`فاتورة_${currentOrder?.orderNumber || 'invoice'}.pdf`);
            showToast('تم حفظ PDF بنجاح');
        } catch(error) {
            showToast('خطأ في إنشاء PDF: ' + error.message, true);
        } finally {
            hideLoading();
        }
    }

    async function downloadInvoice() {
        if (!currentOrder) { showToast('لا توجد فاتورة للتحميل', true); return; }
        
        showLoading();
        
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pages = document.querySelectorAll('.invoice-page, .terms-page');
            
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 2, useCORS: false, backgroundColor: '#ffffff', logging: false });
                if (i !== 0) pdf.addPage();
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            }
            
            pdf.save(`فاتورة_${currentOrder.orderNumber}.pdf`);
            showToast('تم تحميل الفاتورة بنجاح');
        } catch(error) {
            showToast('خطأ في التحميل: ' + error.message, true);
        } finally {
            hideLoading();
        }
    }

    document.getElementById('pdfBtn').onclick = generatePDF;
    document.getElementById('downloadBtn').onclick = downloadInvoice;
    loadInvoice();
</script>
</body>
</html>
