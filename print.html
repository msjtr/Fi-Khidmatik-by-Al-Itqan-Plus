<!DOCTYPE html>

<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاتورة إلكترونية احترافية</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
    background:#e2e8f0;
    font-family:'Cairo',sans-serif;
}

/* الصفحة */
.page {
    width:210mm;
    min-height:297mm;
    background:#fff;
    margin:auto;
    display:flex;
    flex-direction:column;
}

/* الهوامش (حل المشكلة بالكامل) */
.page-content-wrapper {
    padding:20mm 15mm 30mm;
    flex:1;
}

/* منع تقطيع الجدول */
table { page-break-inside:auto; }
tr {
    page-break-inside:avoid;
    break-inside:avoid;
}

/* الفوتر */
.footer-static {
    margin-top:auto;
    border-top:2px solid #1e293b;
    padding-top:10px;
    text-align:center;
    font-size:12px;
}

/* الصور */
.product-img {
    width:50px;
    height:50px;
    object-fit:contain;
}
</style>

</head>

<body>

<div id="invoiceContainer"></div>

<div style="position:fixed;bottom:20px;left:0;right:0;text-align:center;">
    <button onclick="window.print()">طباعة</button>
    <button onclick="exportPDF()">PDF</button>
    <button onclick="exportPNG()">PNG</button>
</div>

<script>

let currentFileName = "invoice";

/* PDF دقة عالية */
async function exportPDF() {
    const element = document.getElementById('invoiceContainer');

    const opt = {
        margin:0,
        filename:`${currentFileName}.pdf`,
        image:{ type:'jpeg', quality:1 },
        html2canvas:{
            scale:4,
            dpi:300,
            useCORS:true
        },
        jsPDF:{
            unit:'mm',
            format:'a4',
            orientation:'portrait'
        }
    };

    await html2pdf().set(opt).from(element).save();
}

/* PNG دقة عالية */
async function exportPNG() {
    const element = document.getElementById('invoiceContainer');

    const canvas = await html2canvas(element,{
        scale:4,
        backgroundColor:'#fff'
    });

    const link=document.createElement('a');
    link.download=`${currentFileName}.png`;
    link.href=canvas.toDataURL('image/png',1);
    link.click();
}

/* محتوى الفاتورة */
document.getElementById('invoiceContainer').innerHTML = `
<div class="page">
<div class="page-content-wrapper">

<h1 style="font-size:22px;font-weight:bold;margin-bottom:10px;">فاتورة إلكترونية</h1>

<div style="margin-bottom:10px;">
<strong>رقم الفاتورة:</strong> INV-001 <br>
<strong>التاريخ:</strong> ${new Date().toLocaleDateString()}
</div>

<table border="1" width="100%" style="font-size:12px;text-align:center;border-collapse:collapse;">
<thead style="background:#1e293b;color:#fff;">
<tr>
<th>المنتج</th>
<th>الوصف</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>
</thead>

<tbody>
<tr>
<td>خدمة تصميم</td>
<td>تصميم متجر إلكتروني كامل + لوحة تحكم</td>
<td>1</td>
<td>2000</td>
<td>2000</td>
</tr>

<tr>
<td>إدارة محتوى</td>
<td>إضافة منتجات وربط بوابات الدفع</td>
<td>1</td>
<td>1500</td>
<td>1500</td>
</tr>
</tbody>
</table>

<div style="margin-top:15px;font-size:14px;">
<strong>الإجمالي:</strong> 3500 ريال
</div>

<div class="footer-static">
هذه الفاتورة إلكترونية ومعتمدة
</div>

</div>
</div>
`;

</script>

</body>
</html>
