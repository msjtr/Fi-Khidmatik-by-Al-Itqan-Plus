<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الطباعة الذكي | في خدمتك</title>

    <link rel="icon" href="data:,">

    <link rel="stylesheet" href="css/invoice.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>

    <script src="js/firebase.js"></script>

    <script src="js/invoice.js"></script>

    <script src="js/order.js"></script>

    <script type="module" src="js/print.js"></script>

    <style>
        /* تنسيق بسيط لمنطقة التحميل والزر */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Tajawal', sans-serif;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3a5f;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .print-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 12px 25px;
            background-color: #1e3a5f;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 9999;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .print-btn:hover { background-color: #2a5282; }
        
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="loader" class="no-print">
        <div class="spinner"></div>
        <h2 style="color: #1e3a5f;">جاري تحضير مستندات "في خدمتك"...</h2>
        <p style="color: #64748b;">يتم جلب بيانات الفاتورة والبنود الـ 57</p>
    </div>

    <div id="print-app"></div>

    <button class="print-btn no-print" onclick="window.print()">
        <span>🖨️</span>
        طباعة المستند
    </button>

</body>
</html>
