<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>فاتورة إلكترونية - في خدمتك</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #1e3a5f; --gray: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9ecef; font-family: 'Tajawal', sans-serif; }
        
        .page { 
            width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 20px auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }

        /* الهيدر حسب المتطلبات */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .platform-data h1 { color: var(--primary); font-size: 24px; font-weight: 800; }
        .platform-data p { font-size: 12px; color: #555; margin-top: 3px; }
        
        .invoice-type { background: var(--primary); color: white; padding: 8px 20px; border-radius: 20px; font-weight: bold; }

        /* معلومات الفاتورة */
        .info-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--gray); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .info-cell label { display: block; font-size: 11px; color: #777; }
        .info-cell span { font-weight: 700; color: var(--primary); font-size: 13px; }

        /* مصدرة من / إلى */
        .address-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .addr-card { border: 1px solid #eee; padding: 15px; border-radius: 8px; }
        .addr-card h4 { color: var(--primary); margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .addr-card p { font-size: 12px; line-height: 1.6; }

        /* الجدول */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background: var(--primary); color: white; padding: 12px; font-size: 13px; }
        td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 12px; }

        /* الإجماليات */
        .final-box { width: 280px; margin-right: auto; }
        .row-calc { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
        .grand-total { border-top: 2px solid var(--primary); margin-top: 5px; padding-top: 10px; font-weight: 800; color: var(--primary); font-size: 16px; }

        /* التذييل */
        .footer { margin-top: auto; border-top: 1px dashed #ccc; padding-top: 20px; }
        .footer-note { text-align: center; font-size: 11px; color: #666; margin-bottom: 15px; }
        .qr-area { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .qr-box { text-align: center; font-size: 10px; }
        .contact-strip { background: var(--primary); color: white; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; font-size: 10px; }

        .btn-zone { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        button { padding: 12px 25px; border: none; border-radius: 25px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; }
        .p-btn { background: var(--primary); color: white; }

        @media print { .no-print { display: none; } .page { margin: 0; box-shadow: none; width: 100%; } }
    </style>
</head>
<body>

    <div id="app"></div>

    <div class="btn-zone no-print">
        <button class="p-btn" onclick="window.print()">🖨️ طباعة الفاتورة</button>
    </div>

    <script>
        // تكوين Firebase 
        const firebaseConfig = {
            apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
            authDomain: "msjt301-974bb.firebaseapp.com",
            projectId: "msjt301-974bb",
            storageBucket: "msjt301-974bb.firebasestorage.app",
            messagingSenderId: "186209858482",
            appId: "1:186209858482:web:186ca610780799ef562aab"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // بيانات المنصة الثابتة [cite: 1, 4, 8]
        const PLATFORM = {
            name: "منصة في خدمتك",
            license: "FL-765735204",
            taxId: "312495447600003",
            address: "حائل : حي النقرة : شارع سعد المشاط",
            building: "3085",
            zip: "55431",
            contact: "966534051317 | info@fi-khidmatik.com"
        };

        function makeQR(id, text) {
            new QRCode(document.getElementById(id), {
                text: text,
                width: 100,
                height: 100,
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('id');
            if (!docId) return;

            try {
                const doc = await db.collection("orders").doc(docId).get();
                if (doc.exists) {
                    const data = doc.data();
                    render(data);
                }
            } catch (e) { console.error(e); }
        }

        function render(order) {
            const html = `
                <div class="page">
                    <div class="header">
                        <div class="platform-data">
                            <h1>${PLATFORM.name}</h1>
                            <p>شهادة العمل الحر: ${PLATFORM.license}</p>
                            <p>الرقم الضريبي: ${PLATFORM.taxId}</p>
                        </div>
                        <div class="invoice-type">فاتورة إلكترونية</div>
                    </div>

                    <div class="info-strip">
                        <div class="info-cell"><label>رقم الفاتورة</label><span>${order.orderNumber || 'KF-2603290287'}</span></div>
                        <div class="info-cell"><label>التاريخ والوقت</label><span>${order.orderDate || '29/03/2026 - 03:21 ص'}</span></div>
                        <div class="info-cell"><label>حالة الطلب</label><span>${order.status || 'تم التنفيذ'}</span></div>
                    </div>

                    <div class="address-box">
                        <div class="addr-card">
                            <h4>مصدرة من</h4>
                            <p><strong>${PLATFORM.name}</strong><br>${PLATFORM.address}<br>مبنى: ${PLATFORM.building} | الرمز البريدي: ${PLATFORM.zip}</p>
                        </div>
                        <div class="addr-card">
                            <h4>مصدرة إلى</h4>
                            <p>العميل: ${order.customerName || '---'}<br>الهاتف: ${order.customerPhone || '---'}<br>الدولة: المملكة العربية السعودية</p>
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr><th>الوصف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
                        </thead>
                        <tbody>
                            ${(order.items || []).map(i => `
                                <tr>
                                    <td>${i.name}</td>
                                    <td>${i.quantity || 1}</td>
                                    <td>${Number(i.price).toFixed(2)} ريال</td>
                                    <td>${(i.quantity * i.price).toFixed(2)} ريال</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <div class="final-box">
                        <div class="row-calc"><span>المجموع الفرعي:</span><span>${Number(order.subtotal || 0).toFixed(2)} ريال</span></div>
                        <div class="row-calc"><span>الضريبة (15%):</span><span>${Number(order.tax || 0).toFixed(2)} ريال</span></div>
                        <div class="row-calc grand-total"><span>الإجمالي النهائي:</span><span>${Number(order.total || 0).toFixed(2)} ريال</span></div>
                    </div>

                    <div class="footer">
                        <div class="footer-note">تخضع هذه الفاتورة لكامل الشروط والأحكام المرفقة </div>
                        <div class="qr-area">
                            <div class="qr-box"><div id="q1"></div><br>الزكاة والدخل</div>
                            <div class="qr-box"><div id="q2"></div><br>التحقق</div>
                        </div>
                        <div class="contact-strip">
                            <span>📞 ${PLATFORM.contact}</span>
                            <span>🌐 www.khidmatik.com</span>
                            <span>هذه فاتورة معتمدة قانونياً </span>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            
            // توليد الباركودات 
            makeQR("q1", `Seller:${PLATFORM.name}|VAT:${PLATFORM.taxId}|Total:${order.total}`);
            makeQR("q2", window.location.href);
        }

        window.onload = init;
    </script>
</body>
</html>
