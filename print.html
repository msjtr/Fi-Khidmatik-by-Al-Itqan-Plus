<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>في خدمتك - فاتورة إلكترونية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <!-- فقط الملفات الموجودة لديك -->
    <script src="js/zatca.js"></script>
    <script src="js/terms.js"></script>
    <script src="js/invoice.js"></script>
    <script src="js/print.js"></script>
    
    <style>
        /* جميع الأنماط هنا - انسخ من ردودي السابقة */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* ... باقي الأنماط ... */
    </style>
</head>
<body>

<div id="invoiceRoot" class="invoice-wrapper"></div>

<div class="action-buttons no-print">
    <button class="btn btn-primary" id="printBtn">🖨️ طباعة</button>
    <button class="btn btn-purple" id="pdfBtn">📄 PDF</button>
    <button class="btn btn-danger" id="closeBtn">✖️ إغلاق</button>
</div>

<script>
    // تهيئة Firebase مباشرة هنا
    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    
    // ربط الأزرار
    document.getElementById('printBtn').onclick = function() { window.print(); };
    document.getElementById('pdfBtn').onclick = function() { if (typeof exportToPDF === 'function') exportToPDF(); };
    document.getElementById('closeBtn').onclick = function() { window.close(); };
    
    // تحميل الفاتورة
    if (typeof loadInvoice === 'function') {
        loadInvoice(db);
    } else {
        console.error('loadInvoice not defined');
        document.getElementById('invoiceRoot').innerHTML = '<div class="page"><h2>خطأ</h2><p>لم يتم تحميل ملف invoice.js بشكل صحيح</p></div>';
    }
</script>
</body>
</html>
