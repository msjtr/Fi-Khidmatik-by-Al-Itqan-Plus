<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>في خدمتك - فاتورة إلكترونية</title>
    <link rel="stylesheet" href="css/print.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* تنسيقات إضافية للشروط */
        .terms-main-container {
            width: 100%;
        }
        .main-title {
            color: #1e3a5f;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #1e3a5f;
            padding-bottom: 10px;
        }
        .legal-intro {
            background: #fef3c7;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-right: 5px solid #f59e0b;
            font-size: 12px;
            line-height: 1.8;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        .col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .terms-block {
            background: #fafafa;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .terms-block h3 {
            background: #1e3a5f;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 14px;
            display: inline-block;
        }
        .terms-block p {
            font-size: 11px;
            line-height: 1.85;
            color: #2d3a4a;
            margin-bottom: 8px;
        }
        .declaration {
            background: #f0f4f9;
            padding: 20px;
            border-radius: 14px;
            text-align: center;
            margin: 20px 0;
        }
        .declaration p {
            font-size: 13px;
            font-weight: bold;
        }
        .signature {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #cbd5e1;
        }
        
        @media print {
            .action-buttons {
                display: none !important;
            }
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
        }
    </style>
</head>
<body>
<div class="invoice-wrapper" id="invoiceRoot">
    <div class="loading-placeholder" style="text-align:center;padding:50px;">
        <div style="border:4px solid #f3f3f3;border-top:4px solid #1e3a5f;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;margin:0 auto 20px;"></div>
        <p>جاري تحميل الفاتورة...</p>
    </div>
</div>
<div class="action-buttons">
    <button class="btn btn-primary" id="printBtn">🖨️ طباعة</button>
    <button class="btn btn-secondary" id="pdfBtn">📄 PDF</button>
    <button class="btn btn-danger" id="backBtn" onclick="window.close()">✖️ إغلاق</button>
</div>

<script type="module">
    import { 
        loadAndDisplayInvoice, 
        showToast, 
        showLoading, 
        hideLoading 
    } from './js/print.js';

    let currentOrder = null;

    // إنشاء PDF
    async function generatePDF() {
        const root = document.getElementById('invoiceRoot');
        const pages = root.querySelectorAll('.invoice-page, .terms-section-page');
        
        if (!pages.length) {
            showToast('لا توجد فاتورة للتصدير', true);
            return;
        }
        
        showLoading('جاري إنشاء PDF...');
        
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { 
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: '#ffffff',
                    logging: false
                });
                
                if (i !== 0) pdf.addPage();
                
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            }
            
            pdf.save(`فاتورة_${currentOrder?.orderNumber || 'invoice'}.pdf`);
            showToast('تم حفظ PDF بنجاح');
            
        } catch(error) {
            console.error('PDF Error:', error);
            showToast('خطأ في إنشاء PDF: ' + error.message, true);
        } finally {
            hideLoading();
        }
    }

    // الحصول على رقم الطلب من URL
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id');
    
    if (!orderId || orderId === 'null' || orderId === 'undefined') {
        document.getElementById('invoiceRoot').innerHTML = `
            <div class="invoice-page" style="text-align:center;display:flex;align-items:center;justify-content:center;min-height:297mm;">
                <div>
                    <h2 style="color:#ef4444;">⚠️ خطأ</h2>
                    <p>لم يتم تحديد رقم الطلب</p>
                    <p style="font-size:12px;margin-top:20px;">الرجاء استخدام الرابط: print.html?id=معرف_الطلب</p>
                </div>
            </div>
        `;
    } else {
        loadAndDisplayInvoice(orderId, 'invoiceRoot')
            .then(order => {
                currentOrder = order;
            })
            .catch(error => {
                document.getElementById('invoiceRoot').innerHTML = `
                    <div class="invoice-page" style="text-align:center;display:flex;align-items:center;justify-content:center;min-height:297mm;">
                        <div>
                            <h2 style="color:#ef4444;">⚠️ حدث خطأ</h2>
                            <p>${error.message}</p>
                            <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#1e3a5f;color:white;border:none;border-radius:8px;cursor:pointer;">إعادة المحاولة</button>
                        </div>
                    </div>
                `;
            });
    }
    
    document.getElementById('printBtn').onclick = () => window.print();
    document.getElementById('pdfBtn').onclick = generatePDF;
</script>
</body>
</html>
