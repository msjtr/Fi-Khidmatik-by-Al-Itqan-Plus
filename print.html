<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>طباعة الفاتورة</title>
<link rel="stylesheet" href="css/invoice.css">
</head>

<body>

<button class="no-print" onclick="window.print()">🖨️ طباعة</button>
<button class="no-print" onclick="downloadPDF()">📄 PDF</button>

<!-- 🧾 صفحة الفاتورة -->
<div class="page" id="invoice">

<div class="header">
  <div>
    <h2 id="invoiceNumber"></h2>
    <div id="date"></div>
  </div>

  <div>
    منصة في خدمتك<br>
    الرقم الضريبي: 312495447600003
  </div>
</div>

<div class="info">
  <div>
    العميل: <span id="clientName"></span><br>
    المدينة: <span id="city"></span>
  </div>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>المنتج</th>
<th>الكمية</th>
<th>السعر</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<div class="totals">
  <div>المجموع: <span id="subtotal"></span></div>
  <div>الضريبة: <span id="tax"></span></div>
  <div><strong>الإجمالي: <span id="total"></span></strong></div>
</div>

<div id="qr"></div>

</div>

<!-- 📄 صفحة الشروط -->
<div class="page">
<h2>الشروط والأحكام</h2>
<div id="termsContent"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module" src="js/print.js"></script>

<script>
async function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const canvas = await html2canvas(document.body, {scale:2});
  const img = canvas.toDataURL("image/png");

  const pdf = new jsPDF('p','mm','a4');
  pdf.addImage(img,'PNG',0,0,210,297);
  pdf.save("invoice.pdf");
}
</script>

</body>
</html>
