    function escapeHtml(str) {
        if (!str) return '';

    async function fetchCustomerData(customerId) {
        if (!customerId) return null;
        try {

            if (customerSnap.exists()) {
                return { id: customerSnap.id, ...customerSnap.data() };
            }
            return null;
        } catch (error) {
            console.error('خطأ في جلب العميل:', error);
            return null;
        }
    }

    // إنشاء باركود ZATCA
    function generateZATCAQRData(order) {
        const seller = order.seller?.name || "منصة في خدمتك";
        const taxNumber = order.seller?.taxNumber || "312495447600003";
        const timestamp = new Date().toISOString();
        const total = order.total || 0;
        const taxAmount = order.tax || 0;
        
        function encodeTLV(tag, value) {
            return String.fromCharCode(tag) + String.fromCharCode(value.length) + value;
        }
        
        let tlvData = '';
        tlvData += encodeTLV(1, seller);
        tlvData += encodeTLV(2, taxNumber);
        tlvData += encodeTLV(3, timestamp);
        tlvData += encodeTLV(4, total.toFixed(2));
        tlvData += encodeTLV(5, taxAmount.toFixed(2));
        
        return btoa(tlvData);
    }

    function renderProductRows(items) {

                <td style="text-align:center">

                </td>

                <td style="text-align:center">${((item.price || 0) * item.quantity).toFixed(2)} ريال</td>
            </tr>
        `).join('');
    }

                    </p>
                    <p style="font-size:12px; line-height:1.6; margin-top:15px;">
                        <strong>🛡️ ثاني عشر: الحماية القانونية</strong><br>
                        51. التنازل عن المطالبات: يتنازل العميل عن أي مطالبات تتجاوز قيمة الفاتورة.<br>
                        52. حدود المسؤولية: لا تتجاوز مسؤولية مقدم الخدمة إجمالي المبلغ المدفوع.<br>
                        53. الاستخدام غير المشروع: لا يتحمل مقدم الخدمة أي مسؤولية عن استخدام العميل للمخرجات بشكل مخالف.<br>
                        54. الملكية الفكرية: تبقى جميع حقوق الملكية الفكرية محفوظة لمقدم الخدمة.<br>
                        55. تحديث الشروط: يحق لمقدم الخدمة تحديث هذه الشروط مستقبلاً.<br>
                        56. استقلالية البنود: يتم تفسير كل بند بشكل مستقل.<br>
                        57. الشروط الإضافية: توثق حصراً في ملحق اتفاق مستقل.
                    </p>
                </div>
                
                <div class="declaration-box" style="margin-top:15px;">
                    <p style="font-size:13px; font-weight:bold; text-align:center;">
                        أقر أنا العميل بالاطلاع على جميع الشروط والأحكام أعلاه وأوافق عليها بالكامل وأتعهد بالالتزام بها دون أي استثناء.
                    </p>
                </div>
                
                <div class="signature-line">
                    <div><strong>👤 الاسم:</strong> ${escapeHtml(orderData?.customerName || '_________________')}</div>
                    <div><strong>📅 التاريخ:</strong> ${new Date().toLocaleDateString('ar-SA')}</div>
                </div>
                <div style="margin-top:15px;"><strong>✍️ التوقيع:</strong> _________________</div>
                
                <div class="page-number" style="margin-top:30px;">📄 صفحة ${pageNum} من ${totalPages}</div>
            </div>
        `;
    }

    // عرض الفاتورة كاملة
    async function renderFullInvoice() {
        await fetchOrderData();
        
        if (!orderData) {
            document.getElementById('invoiceRoot').innerHTML = `
                <div class="loading-box" style="text-align:center;padding:50px;">
                    <p style="color:red;">❌ حدث خطأ في تحميل الفاتورة</p>
                    <button onclick="window.close()" style="margin-top:20px;padding:10px20px;">إغلاق</button>
                </div>`;
            hideLoading();
            return;
        }
        
        const page1 = buildInvoicePage(orderData, 1, 3);
        const page2 = buildTermsPage(2, 3);
        const page3 = buildDeclarationPage(3, 3);
        document.getElementById('invoiceRoot').innerHTML = page1 + page2 + page3;
        
        setTimeout(() => {
            const qrDiv = document.getElementById('zatcaQR');
            if (qrDiv && typeof QRCode !== 'undefined') {
                try {
                    new QRCode(qrDiv, {
                        text: generateZATCAQRData(orderData),
                        width: 90,
                        height: 90,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } catch(e) { console.warn(e); }
            }
        }, 100);
        
        hideLoading();
    }

    // طباعة مباشرة
    function printInvoice() {
        const printWindow = window.open('', '_blank');
        if (!printWindow) {
            showToast('الرجاء السماح للنوافذ المنبثقة', 'error');
            return;
        }
        
        const styles = document.querySelector('link[href="css/print.css"]')?.outerHTML || '';
        const content = document.getElementById('invoiceRoot').innerHTML;
        
        printWindow.document.write(`
            <!DOCTYPE html>
            <html dir="rtl">
            <head>
                <meta charset="UTF-8">
                <title>فاتورة ${orderData.orderNumber}</title>
                ${styles}
                <style>
                    body { padding:0; margin:0; background:white; }
                    .action-buttons, .no-print, button { display:none !important; }
                    @page { size: A4; margin: 0; }
                    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
                </style>
            </head>
            <body>${content}</body>
            </html>
        `);
        printWindow.document.close();
        printWindow.focus();
        printWindow.print();
        showToast('تم إرسال الفاتورة للطباعة', 'success');
    }

    // تصدير PDF
    async function generatePDF() {
        const element = document.getElementById('invoiceRoot');
        const pages = element.querySelectorAll('.invoice-page, .terms-page, .declaration-page');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        showLoading('جاري إنشاء PDF...');
        try {
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 3, useCORS: true, logging: false, backgroundColor: '#ffffff' });
                if (i !== 0) pdf.addPage();
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
            }
            pdf.save(`invoice_${orderData.orderNumber}.pdf`);
            showToast('تم حفظ PDF', 'success');
        } catch (error) { showToast('خطأ في PDF', 'error'); }
        finally { hideLoading(); }
    }

    // تصدير PNG
    async function generatePNG() {
        const element = document.getElementById('invoiceRoot');
        showLoading('جاري إنشاء PNG...');
        try {
            const canvas = await html2canvas(element, { scale: 3, backgroundColor: '#ffffff', useCORS: true });
            const link = document.createElement('a');
            link.download = `invoice_${orderData.orderNumber}.png`;
            link.href = canvas.toDataURL();
            link.click();
            showToast('تم حفظ PNG', 'success');
        } catch (error) { showToast('خطأ في PNG', 'error'); }
        finally { hideLoading(); }
    }

    // تصدير ZIP
    async function generateZIP() {
        const element = document.getElementById('invoiceRoot');
        const zip = new JSZip();
        const { jsPDF } = window.jspdf;
        const pages = element.querySelectorAll('.invoice-page, .terms-page, .declaration-page');
        const pdf = new jsPDF('p', 'mm', 'a4');
        showLoading('جاري إنشاء ZIP...');
        try {
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 3, useCORS: true });
                if (i !== 0) pdf.addPage();
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
            }
            zip.file(`invoice_${orderData.orderNumber}.pdf`, pdf.output('blob'));
            const fullCanvas = await html2canvas(element, { scale: 2.5, useCORS: true });
            const pngBlob = await new Promise(resolve => fullCanvas.toBlob(resolve, 'image/png'));
            zip.file(`invoice_${orderData.orderNumber}.png`, pngBlob);
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `invoice_${orderData.orderNumber}.zip`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('تم حفظ ZIP', 'success');
        } catch (error) { showToast('خطأ في ZIP', 'error'); }
        finally { hideLoading(); }
    }

    // ربط الأحداث
    document.getElementById('printBtn')?.addEventListener('click', printInvoice);
    document.getElementById('pdfBtn')?.addEventListener('click', generatePDF);
    document.getElementById('pngBtn')?.addEventListener('click', generatePNG);
    document.getElementById('zipBtn')?.addEventListener('click', generateZIP);

    // بدء التشغيل
    renderFullInvoice();
</script>
</body>
</html>
