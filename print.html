<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>في خدمتك - فاتورة إلكترونية</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .page { page-break-after: always; }
            .page:last-child { page-break-after: auto; }
        }
        
        body {
            background: #e9ecef;
            font-family: 'Segoe UI', 'Cairo', 'Tahoma', 'Helvetica Neue', sans-serif;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* حاوية الفاتورة */
        .invoice-wrapper {
            max-width: 210mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        /* الصفحات */
        .page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            padding: 15mm 12mm;
            page-break-after: always;
            position: relative;
        }
        .page:last-child { page-break-after: auto; }
        
        /* رأس الصفحة الموحد */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #1e3a5f;
            padding-bottom: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-placeholder {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #1e3a5f, #2d4a7a);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        .platform-name { font-size: 20px; font-weight: bold; color: #1e3a5f; }
        .platform-slogan { font-size: 10px; color: #6c757d; }
        .page-title { font-size: 24px; font-weight: bold; color: #1e3a5f; }
        .legal-numbers { text-align: left; font-size: 10px; color: #4a5568; line-height: 1.5; }
        
        /* تذييل الصفحة الموحد */
        .page-footer {
            position: absolute;
            bottom: 15mm;
            left: 12mm;
            right: 12mm;
            font-size: 10px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 12px;
        }
        .contact-info {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .contact-info span { display: inline-flex; align-items: center; gap: 5px; }
        .page-number { text-align: left; direction: ltr; margin-top: 8px; font-size: 9px; color: #94a3b8; }
        
        /* معلومات الفاتورة */
        .invoice-info {
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            padding: 12px 18px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #e2e8f0;
        }
        .status-badge {
            background: #10b981;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            display: inline-block;
        }
        
        /* العناوين */
        .addresses {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .address-card {
            flex: 1;
            background: #f9fafb;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            font-size: 11px;
            line-height: 1.7;
        }
        .address-card strong {
            display: block;
            margin-bottom: 8px;
            color: #1e3a5f;
            font-size: 12px;
            border-right: 3px solid #1e3a5f;
            padding-right: 8px;
        }
        
        /* معلومات الدفع والشحن */
        .info-cards {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .info-card {
            flex: 1;
            background: #f1f5f9;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 11px;
        }
        .info-card strong { display: block; margin-bottom: 5px; color: #1e3a5f; font-size: 12px; }
        
        /* جدول المنتجات */
        .products-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 11px;
        }
        .products-table th {
            background: #1e3a5f;
            color: white;
            padding: 10px 8px;
            border: 1px solid #2d4a7a;
            text-align: center;
            font-weight: 600;
        }
        .products-table td {
            border: 1px solid #cbd5e1;
            padding: 10px 8px;
            vertical-align: middle;
        }
        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            background: #f1f5f9;
        }
        
        /* الإجماليات */
        .totals {
            width: 280px;
            margin-right: auto;
            margin-top: 20px;
            border-top: 2px solid #e2e8f0;
            padding-top: 12px;
        }
        .totals-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
        }
        .grand-total {
            font-weight: bold;
            font-size: 16px;
            color: #1e3a5f;
            border-top: 2px solid #1e3a5f;
            margin-top: 6px;
            padding-top: 10px;
        }
        
        /* الباركودات */
        .barcodes {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 25px 0;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        .barcode-item { text-align: center; }
        .barcode-item p { font-size: 10px; margin-top: 8px; color: #666; }
        .qr-code { width: 90px; height: 90px; margin: 0 auto; }
        
        /* الشروط والأحكام */
        .terms-container { width: 100%; }
        .terms-title {
            font-size: 22px;
            font-weight: bold;
            color: #1e3a5f;
            text-align: center;
            margin: 15px 0 20px;
            border-bottom: 2px solid #1e3a5f;
            padding-bottom: 10px;
        }
        .legal-notice {
            background: #fef3c7;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-right: 4px solid #f59e0b;
            font-size: 12px;
            line-height: 1.8;
        }
        .terms-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .terms-card {
            background: #fafafa;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .terms-card h4 {
            background: #1e3a5f;
            color: white;
            padding: 5px 14px;
            border-radius: 25px;
            font-size: 13px;
            margin-bottom: 12px;
            display: inline-block;
        }
        .terms-card p {
            font-size: 10.5px;
            line-height: 1.75;
            color: #2d3a4a;
            margin-bottom: 8px;
        }
        .terms-card strong { color: #1e3a5f; }
        
        /* إقرار العميل */
        .declaration {
            background: #f0f4f9;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
        .signature-area {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #cbd5e1;
        }
        
        /* أزرار التحكم */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px auto;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn:hover { transform: scale(1.02); }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-secondary { background: #334155; color: white; }
        .btn-purple { background: #6b21a5; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        
        /* تحميل وتنبيهات */
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); display: flex;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .loading-box { background: white; padding: 25px; border-radius: 16px; text-align: center; }
        .loading-spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #1e3a5f;
            border-radius: 50%; width: 45px; height: 45px;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast-message {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; border-radius: 8px; z-index: 10000;
            font-size: 13px; color: white;
        }
        
        @media (max-width: 768px) {
            .page { padding: 10mm 8mm; }
            .terms-grid { grid-template-columns: 1fr; }
            .addresses, .info-cards { flex-direction: column; }
            .action-buttons { gap: 8px; padding: 6px 15px; }
            .btn { padding: 6px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>

<div id="invoiceRoot" class="invoice-wrapper"></div>

<div class="action-buttons no-print">
    <button class="btn btn-primary" id="printBtn"><i class="fas fa-print"></i> طباعة</button>
    <button class="btn btn-secondary" id="pdfBtn"><i class="fas fa-file-pdf"></i> PDF</button>
    <button class="btn btn-purple" id="downloadBtn"><i class="fas fa-download"></i> تحميل</button>
    <button class="btn btn-danger" id="closeBtn"><i class="fas fa-times"></i> إغلاق</button>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let currentOrder = null;

    const sellerData = {
        name: "منصة في خدمتك",
        taxNumber: "312495447600003",
        licenseNumber: "FL-765735204",
        address: "حائل - حي النقرة - شارع سعد المشاط - مبنى 3085 - الرمز البريدي 55431",
        phone: "+966 534051317",
        whatsapp: "+966 545312021",
        email: "info@fi-khidmatik.com",
        website: "www.khidmatik.com"
    };

    // تنظيف النص من الرموز والأحرف الإنجليزية
    function cleanText(text) {
        if (!text) return '';
        // إزالة الرموز الخاصة والأحرف الإنجليزية الزائدة
        let cleaned = text.replace(/[^\u0600-\u06FF\s\u0621-\u064A\u0660-\u0669\.\,\-\+\#\@\&\*\(\)]/g, '');
        // إزالة المسافات الزائدة
        cleaned = cleaned.replace(/\s+/g, ' ').trim();
        return cleaned || text;
    }

    function formatNumber(num) {
        return num.toFixed(2).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
    }

    function formatDate(d) {
        if (!d) return '';
        let parts = d.split('-');
        if (parts.length === 3) {
            return `${parseInt(parts[2])}/${parseInt(parts[1])}/${parseInt(parts[0])}`;
        }
        return d;
    }

    function formatTime(time24) {
        if (!time24) return '';
        let [h, m] = time24.split(':');
        let hour = parseInt(h);
        let ap = hour >= 12 ? 'مساءً' : 'صباحاً';
        hour = hour % 12 || 12;
        return `${hour}:${m} ${ap}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function getStatusText(status) {
        const statusMap = {
            'جديد': 'جديد', 'تحت التنفيذ': 'قيد التنفيذ',
            'تم التنفيذ': 'مكتمل', 'ملغي': 'ملغي'
        };
        return statusMap[status] || status || 'مكتمل';
    }

    function getShippingText(method) {
        if (method === 'delivery') return 'شحن منزلي';
        if (method === 'noship') return 'لا يتطلب شحن';
        return 'استلام من المقر';
    }

    function getPaymentName(method) {
        const names = {
            'mada': 'مدى', 'mastercard': 'ماستركارد', 'visa': 'فيزا',
            'stcpay': 'STCPay', 'tamara': 'تمارا', 'tabby': 'تابي'
        };
        return names[method] || method || 'مدى';
    }

    function showLoading(msg) {
        let ov = document.getElementById('loadingOverlay');
        if (!ov) {
            ov = document.createElement('div');
            ov.id = 'loadingOverlay';
            ov.className = 'loading-overlay';
            ov.innerHTML = `<div class="loading-box"><div class="loading-spinner"></div><p>${msg}</p></div>`;
            document.body.appendChild(ov);
        }
        ov.style.display = 'flex';
    }

    function hideLoading() {
        let ov = document.getElementById('loadingOverlay');
        if (ov) ov.style.display = 'none';
    }

    function showToast(msg, isError = false) {
        let t = document.createElement('div');
        t.className = 'toast-message';
        t.style.background = isError ? '#ef4444' : '#10b981';
        t.innerHTML = (isError ? '❌ ' : '✅ ') + msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    async function fetchOrder(orderId) {
        const orderDoc = await db.collection('orders').doc(orderId).get();
        if (!orderDoc.exists) throw new Error('الطلب غير موجود');
        const order = { id: orderDoc.id, ...orderDoc.data() };
        
        let customer = { name: 'غير معروف', phone: '', email: '', address: '' };
        if (order.customerId) {
            try {
                const customerDoc = await db.collection('customers').doc(order.customerId).get();
                if (customerDoc.exists) customer = customerDoc.data();
            } catch(e) {}
        }
        
        const items = [];
        for (const item of (order.items || [])) {
            let productImage = item.image || '';
            let productName = cleanText(item.name) || 'منتج';
            let productDesc = cleanText(item.description) || '';
            
            if (item.productId && item.productId !== 'null' && !item.productId.startsWith('temp_')) {
                try {
                    const productDoc = await db.collection('products').doc(item.productId).get();
                    if (productDoc.exists) {
                        const product = productDoc.data();
                        productImage = product.image || productImage;
                        productName = cleanText(product.name) || productName;
                        productDesc = cleanText(product.description) || productDesc;
                    }
                } catch(e) {}
            }
            
            items.push({
                ...item,
                productName: productName,
                description: productDesc,
                image: productImage,
                price: item.price || 0
            });
        }
        
        return {
            ...order,
            customerName: customer.name,
            customerPhone: customer.phone,
            customerEmail: customer.email,
            customerAddress: customer.address || '',
            items: items,
            paymentMethodName: getPaymentName(order.paymentMethod)
        };
    }

    // بناء رأس الصفحة
    function buildHeader(title) {
        return `
            <div class="page-header">
                <div class="logo-area">
                    <div class="logo-placeholder">${sellerData.name.charAt(0)}</div>
                    <div>
                        <div class="platform-name">${sellerData.name}</div>
                        <div class="platform-slogan">خدمات تقنية متكاملة</div>
                    </div>
                </div>
                <div class="page-title">${title}</div>
                <div class="legal-numbers">
                    <div>شهادة العمل الحر: ${sellerData.licenseNumber}</div>
                    <div>الرقم الضريبي: ${sellerData.taxNumber}</div>
                </div>
            </div>
        `;
    }

    // بناء تذييل الصفحة
    function buildFooter(pageNum, totalPages) {
        return `
            <div class="page-footer">
                <div class="contact-info">
                    <span><i class="fas fa-phone"></i> ${sellerData.phone}</span>
                    <span><i class="fab fa-whatsapp"></i> ${sellerData.whatsapp}</span>
                    <span><i class="fas fa-envelope"></i> ${sellerData.email}</span>
                    <span><i class="fas fa-globe"></i> ${sellerData.website}</span>
                </div>
                <div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
                <div class="page-number">صفحة ${pageNum} من ${totalPages}</div>
            </div>
        `;
    }

    // صفحة الفاتورة
    function buildInvoicePage(order, pageNum, totalPages) {
        const itemsHtml = (order.items || []).map((item, i) => `
            <tr>
                <td style="text-align:center">${i+1}</td>
                <td style="text-align:center">
                    ${item.image ? `<img src="${item.image}" class="product-img" onerror="this.style.display='none'">` : '<div style="width:50px;height:50px;background:#e2e8f0;border-radius:8px;"></div>'}
                </td>
                <td style="text-align:right"><strong>${escapeHtml(item.productName)}</strong><br><small style="color:#666;">${escapeHtml(item.description)}</small></td>
                <td style="text-align:center">${item.quantity}</td>
                <td style="text-align:center">${item.price.toFixed(2)} ريال</td>
                <td style="text-align:center">${(item.price * item.quantity).toFixed(2)} ريال</td>
            </tr>
        `).join('');
        
        const subtotal = order.subtotal || order.items?.reduce((s, i) => s + ((i.price || 0) * i.quantity), 0) || 0;
        const discount = order.discount || 0;
        const tax = order.tax || ((subtotal - discount) * 0.15);
        const total = order.total || (subtotal - discount + tax);
        
        return `
            <div class="page">
                ${buildHeader("فاتورة إلكترونية")}
                
                <div class="invoice-info">
                    <div><strong>رقم الفاتورة:</strong> ${order.orderNumber}</div>
                    <div><strong>التاريخ:</strong> ${formatDate(order.orderDate)} - ${formatTime(order.orderTime)}</div>
                    <div><span class="status-badge">${getStatusText(order.status)}</span></div>
                </div>
                
                <div class="addresses">
                    <div class="address-card">
                        <strong>مصدرة من</strong>
                        ${sellerData.name}<br>
                        المملكة العربية السعودية<br>
                        ${sellerData.address}<br>
                        ${sellerData.phone}
                    </div>
                    <div class="address-card">
                        <strong>مصدرة إلى</strong>
                        ${escapeHtml(order.customerName)}<br>
                        ${escapeHtml(order.customerAddress)}<br>
                        ${escapeHtml(order.customerPhone)}<br>
                        ${escapeHtml(order.customerEmail)}
                    </div>
                </div>
                
                <div class="info-cards">
                    <div class="info-card"><strong>طريقة الدفع</strong>${order.paymentMethodName}</div>
                    <div class="info-card"><strong>طريقة الاستلام</strong>${getShippingText(order.shippingMethod)}</div>
                    <div class="info-card"><strong>رمز الموافقة</strong>${order.approvalCode || 'غير مطلوب'}</div>
                </div>
                
                <table class="products-table">
                    <thead>
                        <tr><th>#</th><th>الصورة</th><th>المنتج / الخدمة</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
                    </thead>
                    <tbody>${itemsHtml}</tbody>
                </table>
                
                <div class="totals">
                    <div class="totals-row"><span>المجموع الفرعي</span><span>${subtotal.toFixed(2)} ريال</span></div>
                    ${discount > 0 ? `<div class="totals-row"><span>الخصم</span><span>- ${discount.toFixed(2)} ريال</span></div>` : ''}
                    <div class="totals-row"><span>ضريبة القيمة المضافة 15%</span><span>${tax.toFixed(2)} ريال</span></div>
                    <div class="totals-row grand-total"><span>الإجمالي النهائي</span><span>${total.toFixed(2)} ريال</span></div>
                </div>
                
                <div class="barcodes">
                    <div class="barcode-item"><div id="zatcaQR" class="qr-code"></div><p>باركود هيئة الزكاة</p></div>
                    <div class="barcode-item"><div id="orderQR" class="qr-code"></div><p>باركود الطلب</p></div>
                    <div class="barcode-item"><div id="downloadQR" class="qr-code"></div><p>باركود التحميل</p></div>
                </div>
                
                ${buildFooter(pageNum, totalPages)}
            </div>
        `;
    }

    // محتوى الشروط والأحكام كاملاً (57 بنداً)

    function buildTermsPage(pageNum, totalPages, pageContent, order = null) {
        let content = pageContent;
        if (order && pageNum === totalPages) {
            content = content.replace('customer-name-field', 'customer-name-field')
                           .replace('customer-sign-field', 'customer-sign-field')
                           .replace('date-sign-field', 'date-sign-field');
        }
        return `
            <div class="page">
                ${buildHeader("الشروط والأحكام")}
                ${content}
                ${buildFooter(pageNum, totalPages)}
            </div>
        `;
    }

    function generateZATCAQRData(order) {
        const timestamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');
        const total = (order.total || 0).toFixed(2);
        const tax = (order.tax || ((order.subtotal || 0) * 0.15)).toFixed(2);
        
        let tlvData = '';
        tlvData += String.fromCharCode(1) + String.fromCharCode(1) + '1';
        tlvData += String.fromCharCode(2) + String.fromCharCode(15) + sellerData.taxNumber;
        tlvData += String.fromCharCode(3) + String.fromCharCode(timestamp.length) + timestamp;
        tlvData += String.fromCharCode(4) + String.fromCharCode(total.length) + total;
        tlvData += String.fromCharCode(5) + String.fromCharCode(tax.length) + tax;
        
        return btoa(tlvData);
    }

    async function loadInvoice() {
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        
        if (!orderId || orderId === 'null') {
            document.getElementById('invoiceRoot').innerHTML = `<div class="page" style="text-align:center;display:flex;align-items:center;justify-content:center;"><div><h2 style="color:#ef4444;">خطأ</h2><p>لم يتم تحديد رقم الطلب</p></div></div>`;
            return;
        }
        
        showLoading('جاري تحميل الفاتورة...');
        
        try {
            const order = await fetchOrder(orderId);
            currentOrder = order;
            
            // بناء الصفحات الأربع
            let html = buildInvoicePage(order, 1, 4);
            html += buildTermsPage(2, 4, termsContent.page1, order);
            html += buildTermsPage(3, 4, termsContent.page2, order);
            html += buildTermsPage(4, 4, termsContent.page3, order);
            
            document.getElementById('invoiceRoot').innerHTML = html;
            
            // تحديث أسماء العملاء والتواريخ
            const nameFields = document.querySelectorAll('.customer-name-field, .customer-sign-field');
            const dateFields = document.querySelectorAll('.date-sign-field');
            nameFields.forEach(el => { if(el) el.textContent = order.customerName; });
            dateFields.forEach(el => { if(el) el.textContent = `${formatDate(order.orderDate)} - ${formatTime(order.orderTime)}`; });
            
            // إنشاء QR Codes
            setTimeout(() => {
                const zatcaDiv = document.getElementById('zatcaQR');
                if (zatcaDiv && typeof QRCode !== 'undefined') {
                    try { new QRCode(zatcaDiv, { text: generateZATCAQRData(order), width: 90, height: 90 }); } catch(e) {}
                }
                const orderDiv = document.getElementById('orderQR');
                if (orderDiv && typeof QRCode !== 'undefined') {
                    try { new QRCode(orderDiv, { text: window.location.href, width: 90, height: 90 }); } catch(e) {}
                }
                const downloadDiv = document.getElementById('downloadQR');
                if (downloadDiv && typeof QRCode !== 'undefined') {
                    try { 
                        const downloadUrl = `${window.location.origin}/api/download/${order.orderNumber}`;
                        new QRCode(downloadDiv, { text: downloadUrl, width: 90, height: 90 }); 
                    } catch(e) {}
                }
            }, 100);
            
            showToast('تم تحميل الفاتورة بنجاح');
        } catch (error) {
            document.getElementById('invoiceRoot').innerHTML = `<div class="page" style="text-align:center;display:flex;align-items:center;justify-content:center;"><div><h2 style="color:#ef4444;">خطأ</h2><p>${error.message}</p><button onclick="location.reload()" style="margin-top:20px;padding:8px 16px;background:#1e3a5f;color:white;border:none;border-radius:8px;">إعادة المحاولة</button></div></div>`;
            showToast(error.message, true);
        } finally {
            hideLoading();
        }
    }

    async function generatePDF() {
        const pages = document.querySelectorAll('.page');
        if (!pages.length) { showToast('لا توجد فاتورة للتصدير', true); return; }
        
        showLoading('جاري إنشاء PDF...');
        
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 2, useCORS: false, backgroundColor: '#ffffff', logging: false, allowTaint: true });
                if (i !== 0) pdf.addPage();
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            }
            
            pdf.save(`فاتورة_${currentOrder?.orderNumber || 'invoice'}.pdf`);
            showToast('تم حفظ PDF بنجاح');
        } catch(error) {
            showToast('خطأ في إنشاء PDF', true);
        } finally {
            hideLoading();
        }
    }

    async function downloadInvoice() {
        if (!currentOrder) { showToast('لا توجد فاتورة للتحميل', true); return; }
        await generatePDF();
    }

    // ربط الأزرار
    document.getElementById('printBtn').onclick = () => window.print();
    document.getElementById('pdfBtn').onclick = generatePDF;
    document.getElementById('downloadBtn').onclick = downloadInvoice;
    document.getElementById('closeBtn').onclick = () => window.close();
    
    loadInvoice();
</script>
