<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الطباعة المتكامل - منصة في خدمتك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #1e3a5f; --secondary: #f8fafc; --border: #cbd5e1; --accent: #d4af37; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; font-family: 'Tajawal', sans-serif; color: #1e293b; line-height: 1.4; }
        
        .page { 
            width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 10px auto; background: white; position: relative;
            display: flex; flex-direction: column; page-break-after: always;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
        .logo img { height: 60px; }
        .header-meta { text-align: left; font-size: 10px; color: #64748b; font-weight: bold; }
        .doc-label { background: var(--primary); color: white; padding: 5px 15px; border-radius: 4px; font-weight: 800; }

        /* الجداول والبيانات */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .card { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .card-h { background: var(--secondary); padding: 6px 10px; font-weight: 800; font-size: 12px; border-bottom: 1px solid var(--border); color: var(--primary); }
        .card-b { padding: 10px; font-size: 11px; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { background: var(--primary); color: white; padding: 8px; font-size: 11px; }
        td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; font-size: 11px; }

        /* تنسيق الشروط الكاملة */
        .terms-section { font-size: 10px; color: #334155; text-align: justify; }
        .section-h { background: #f1f5f9; padding: 4px 8px; border-right: 4px solid var(--primary); margin: 10px 0 5px; font-weight: 800; font-size: 11px; color: var(--primary); }
        .clause { margin-bottom: 4px; display: flex; gap: 8px; align-items: flex-start; }
        .c-num { font-weight: bold; color: var(--accent); min-width: 20px; }

        .footer { position: absolute; bottom: 10mm; left: 15mm; right: 15mm; border-top: 1px solid #eee; padding-top: 5px; display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; }
        .page-counter { color: var(--primary); }

        .btn-print { position: fixed; top: 20px; left: 20px; padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; z-index: 100; font-family: 'Tajawal'; font-weight: 800; }

        @media print { .no-print { display: none; } .page { margin: 0; box-shadow: none; width: 100%; } }
    </style>
</head>
<body>

<button class="btn-print no-print" onclick="window.print()">طباعة الفاتورة والشروط</button>
<div id="loader" style="text-align:center; padding:100px;">جاري معالجة الـ 57 بنداً وتوليد الأكواد...</div>
<div id="app"></div>

<script type="module">
    // بيانات الربط والمنصة
    const SOURCE = {
        name: "منصة في خدمتك",
        taxId: "312495447600003",
        license: "FL-765735204",
        address: "حائل، حي النقرة، شارع سعد المشاط",
        building: "3085",
        postal: "55431",
        website: "https://khidmatik.com"
    };

    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function init() {
        const id = new URLSearchParams(window.location.search).get('id');
        if (!id) return;
        try {
            const orderDoc = await db.collection("orders").doc(id).get();
            const order = orderDoc.data();
            const customerDoc = await db.collection("customers").doc(order.customerId).get();
            const customer = customerDoc.data();
            render(order, customer, id);
        } catch (e) { console.error(e); }
    }

    function render(order, customer, docId) {
        document.getElementById('loader').style.display = 'none';
        const app = document.getElementById('app');

        // --- الصفحة 1: الفاتورة ---
        let p1 = `
        <div class="page">
            <div class="header">
                <div class="logo"><img src="images/logo.svg" onerror="this.src='https://via.placeholder.com/150?text=LOGO'"></div>
                <div class="doc-label">فاتورة إلكترونية</div>
                <div class="header-meta">الرقم الضريبي: ${SOURCE.taxId}<br>العمل الحر: ${SOURCE.license}</div>
            </div>
            <div class="grid-2">
                <div class="card">
                    <div class="card-h">مصدرة من:</div>
                    <div class="card-b"><b>${SOURCE.name}</b><br>${SOURCE.address}<br>مبنى: ${SOURCE.building} | بريد: ${SOURCE.postal}</div>
                </div>
                <div class="card">
                    <div class="card-h">مصدرة إلى:</div>
                    <div class="card-b"><b>${customer.name}</b><br>العنوان: ${customer.address || '---'}<br>الجوال: ${customer.phone || '---'}</div>
                </div>
            </div>
            <table>
                <thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
                <tbody>
                    ${(order.items || []).map(item => `
                    <tr><td style="text-align:right"><b>${item.name}</b></td><td>${item.quantity || item.qty}</td><td>${item.price} ر.س</td><td>${((item.quantity || item.qty) * item.price).toFixed(2)} ر.س</td></tr>
                    `).join('')}
                </tbody>
            </table>
            <div style="margin-right:auto; width:250px; border:2px solid var(--primary); padding:10px; border-radius:6px; background:var(--secondary); text-align:center;">
                <span style="font-size:14px; font-weight:800; color:var(--primary);">الإجمالي: ${order.total} ر.س</span>
            </div>
            <div style="display:flex; justify-content:space-around; margin-top:auto; padding-bottom:40px;">
                <div id="zatca-qr"></div>
                <div id="site-qr" style="text-align:center;"><div id="web-qr"></div><small style="font-size:8px;">رابط الموقع</small></div>
            </div>
            <div class="footer"><span>${SOURCE.website}</span><span class="page-counter">صفحة 1 من 4</span></div>
        </div>`;

        // --- الصفحة 2: الشروط والأحكام (1-22) ---
        let p2 = `
        <div class="page">
            <div class="header"><div class="logo"><img src="images/logo.svg"></div><div class="doc-label">الشروط والأحكام (1/3)</div></div>
            <div class="terms-section">
                <div style="background:#fffbeb; padding:8px; border-right:4px solid #f59e0b; margin-bottom:10px; font-weight:bold;">إقرار مسؤولية البيانات: يقر العميل بصحة كافة البيانات والمستندات المقدمة ويتحمل وحده كامل المسؤولية القانونية عنها.</div>
                <div class="section-h">أولاً: صلاحية العرض والتنفيذ</div>
                <div class="clause"><span class="c-num">1.</span>صلاحية العرض: 3 أيام عمل فقط من تاريخ الإصدار.</div>
                <div class="clause"><span class="c-num">2.</span>بدء التنفيذ: بعد استلام الدفعة المقدمة والمتطلبات كاملة.</div>
                <div class="clause"><span class="c-num">3.</span>مدة التنفيذ: تُحتسب من تاريخ اكتمال استلام المتطلبات.</div>
                <div class="clause"><span class="c-num">4.</span>التأخير: لا يتحمل مقدم الخدمة تأخير ناتج عن العميل.</div>
                <div class="clause"><span class="c-num">5.</span>توقف العمل: يحق للمنصة التوقف في حال عدم تجاوب العميل لـ 7 أيام.</div>
                <div class="section-h">ثانياً: المسؤوليات المالية والضريبية</div>
                <div class="clause"><span class="c-num">6.</span>الرسوم الخارجية: لا تشمل الفاتورة رسوم السيرفرات أو التراخيص الحكومية.</div>
                <div class="clause"><span class="c-num">7.</span>طرق الدفع: يتم عبر القنوات الرسمية المعتمدة في الفاتورة.</div>
                <div class="clause"><span class="c-num">8.</span>الدفعات المتأخرة: يحق للمنصة إيقاف الخدمة عند تأخر الدفع.</div>
                <div class="clause"><span class="c-num">9.</span>تعديل الأسعار: تسري الأسعار المعتمدة في هذه الفاتورة فقط.</div>
                <div class="clause"><span class="c-num">10.</span>الضريبة: تضاف ضريبة القيمة المضافة 15% وفق الأنظمة.</div>
                <div class="section-h">ثالثاً: حقوق الملكية والتسليم</div>
                <div class="clause"><span class="c-num">11.</span>حقوق النشر: تعود ملكية المخرجات النهائية للعميل بعد السداد الكامل.</div>
                <div class="clause"><span class="c-num">12.</span>الملفات المفتوحة: التسليم للمخرج النهائي ولا يشمل الملفات المفتوحة.</div>
                <div class="clause"><span class="c-num">13.</span>الكود المصدري: يبقى ملكاً للمنصة ما لم يتم الاتفاق كتابياً.</div>
                <div class="clause"><span class="c-num">14.</span>توقيع المطور: يحق للمنصة وضع شعار "تطوير منصة في خدمتك".</div>
                <div class="clause"><span class="c-num">15.</span>الاستخدام في المعرض: يحق للمنصة عرض العمل في سابقة أعمالها.</div>
                <div class="section-h">رابعاً: سياسة الإلغاء والاسترجاع</div>
                <div class="clause"><span class="c-num">16.</span>إلغاء العميل: في حال الإلغاء قبل البدء يتم خصم 15% رسوم إدارية.</div>
                <div class="clause"><span class="c-num">17.</span>إلغاء المنصة: في حال تعذر التنفيذ يتم استعادة المبلغ كاملاً.</div>
                <div class="clause"><span class="c-num">18.</span>تعديلات النطاق: أي تعديل جذري يتطلب فاتورة جديدة.</div>
                <div class="clause"><span class="c-num">19.</span>عدم الاسترجاع: لا يحق الاسترجاع بعد بدء التنفيذ الفعلي.</div>
                <div class="clause"><span class="c-num">20.</span>التعويض: يقتصر التعويض على قيمة الخدمة المدفوعة فقط.</div>
                <div class="clause"><span class="c-num">21.</span>القوة القاهرة: لا مسؤولية في ظروف القوة القاهرة الخارجة عن الإرادة.</div>
                <div class="clause"><span class="c-num">22.</span>الرسوم الإدارية: تُضاف 20% عند طلب إيقاف المشروع مؤقتاً.</div>
            </div>
            <div class="footer"><span>${SOURCE.website}</span><span class="page-counter">صفحة 2 من 4</span></div>
        </div>`;

        // --- الصفحة 3: الشروط والأحكام (23-45) ---
        let p3 = `
        <div class="page">
            <div class="header"><div class="logo"><img src="images/logo.svg"></div><div class="doc-label">الشروط والأحكام (2/3)</div></div>
            <div class="terms-section">
                <div class="section-h">خامساً: الضمان والدعم الفني</div>
                <div class="clause"><span class="c-num">23.</span>مدة الدعم: تشمل الفاتورة دعماً فنياً للمدة الموضحة بالوصف.</div>
                <div class="clause"><span class="c-num">24.</span>نطاق الضمان: يقتصر على الأخطاء البرمجية الناتجة عن العمل.</div>
                <div class="clause"><span class="c-num">25.</span>فقدان الضمان: ينتهي الضمان عند تدخل طرف ثالث في الكود.</div>
                <div class="clause"><span class="c-num">26.</span>تحديثات الأنظمة: المنصة غير مسؤولة عن تحديثات المتصفحات المستقبلية.</div>
                <div class="section-h">سادساً: السرية والخصوصية</div>
                <div class="clause"><span class="c-num">27.</span>سرية البيانات: يلتزم الطرفان بعدم إفشاء بيانات الطرف الآخر.</div>
                <div class="clause"><span class="c-num">28.</span>البيانات الشخصية: تُستخدم فقط لغرض تنفيذ الخدمة.</div>
                <div class="clause"><span class="c-num">29.</span>النسخ الاحتياطي: مسؤولية العميل الحفاظ على بياناته بعد التسليم.</div>
                <div class="section-h">سابعاً: التواصل الرسمي</div>
                <div class="clause"><span class="c-num">30.</span>قنوات التواصل: المعتمدة هي البريد الإلكتروني والواتساب الرسمي.</div>
                <div class="clause"><span class="c-num">31.</span>أوقات العمل: من الأحد إلى الخميس من 9 ص حتى 5 م.</div>
                <div class="clause"><span class="c-num">32.</span>الإشعارات: تُعتبر الإشعارات عبر الوسائل الرسمية نافذة قانوناً.</div>
                <div class="section-h">ثامناً: التزامات العميل</div>
                <div class="clause"><span class="c-num">33.</span>توفير المحتوى: العميل مسؤول عن توفير الصور والنصوص.</div>
                <div class="clause"><span class="c-num">34.</span>التراخيص: العميل مسؤول عن قانونية المحتوى المستخدم.</div>
                <div class="clause"><span class="c-num">35.</span>المراجعة: يلتزم العميل بمراجعة العمل خلال 3 أيام من كل مرحلة.</div>
                <div class="section-h">تاسعاً: النزاعات والقانون الواجب التطبيق</div>
                <div class="clause"><span class="c-num">36.</span>حل النزاعات: يتم الحل ودياً خلال 15 يوماً قبل اللجوء للقضاء.</div>
                <div class="clause"><span class="c-num">37.</span>الاختصاص القضائي: تختص المحاكم في مدينة حائل بالنظر في النزاعات.</div>
                <div class="clause"><span class="c-num">38.</span>القانون الحاكم: تخضع الاتفاقية لأنظمة المملكة العربية السعودية.</div>
                <div class="section-h">عاشراً: بنود عامة إضافية</div>
                <div class="clause"><span class="c-num">39.</span>التنازل: لا يحق للعميل التنازل عن الاتفاقية دون موافقة المنصة.</div>
                <div class="clause"><span class="c-num">40.</span>الطرف الثالث: المنصة قد تستعين بخبراء لتنفيذ أجزاء فنية.</div>
                <div class="clause"><span class="c-num">41.</span>التعديلات: أي تعديل يجب أن يكون مكتوباً وموقعاً.</div>
                <div class="clause"><span class="c-num">42.</span>اللغة: اللغة العربية هي اللغة المعتمدة في التفسير.</div>
                <div class="clause"><span class="c-num">43.</span>العنوان القانوني: العناوين المسجلة هي العناوين المعتمدة.</div>
                <div class="clause"><span class="c-num">44.</span>بطلان بند: لا يؤدي بطلان بند إلى بطلان كامل الاتفاقية.</div>
                <div class="clause"><span class="c-num">45.</span>الاستلام الحكمي: يُعتبر العمل مقبولاً بعد 7 أيام من التسليم دون اعتراض.</div>
            </div>
            <div class="footer"><span>${SOURCE.website}</span><span class="page-counter">صفحة 3 من 4</span></div>
        </div>`;

        // --- الصفحة 4: بقية الشروط (46-57) والإقرار النهائي ---
        let p4 = `
        <div class="page">
            <div class="header"><div class="logo"><img src="images/logo.svg"></div><div class="doc-label">الشروط والأحكام (3/3)</div></div>
            <div class="terms-section">
                <div class="section-h">حادي عشر: التفويض والصلاحيات</div>
                <div class="clause"><span class="c-num">46.</span>التفويض التقني: يفوض العميل المنصة للتعامل مع الاستضافات.</div>
                <div class="clause"><span class="c-num">47.</span>الموافقة على التصاميم: الاعتماد النهائي يُنهي مرحلة التعديلات المجانية.</div>
                <div class="clause"><span class="c-num">48.</span>إساءة الاستخدام: المنصة تخلي مسؤوليتها عن أي استخدام غير قانوني للمنتج.</div>
                <div class="clause"><span class="c-num">49.</span>الأطراف الخارجية: المنصة غير مسؤولة عن أعطال شركات الاستضافة.</div>
                <div class="clause"><span class="c-num">50.</span>حق الرفض: تحتفظ المنصة بحق رفض الخدمة لأي سبب مع احتساب ما نُفذ.</div>
                <div class="section-h">ثاني عشر: الحماية القانونية النهائية</div>
                <div class="clause"><span class="c-num">51.</span>التنازل عن المطالبات: يتنازل العميل عن أي مطالبات تتجاوز قيمة الفاتورة.</div>
                <div class="clause"><span class="c-num">52.</span>حدود المسؤولية: لا تتجاوز مسؤولية المنصة إجمالي المبلغ المدفوع.</div>
                <div class="clause"><span class="c-num">53.</span>الاستخدام غير المشروع: العميل وحده المسؤول عن مخالفة الأنظمة.</div>
                <div class="clause"><span class="c-num">54.</span>الملكية الفكرية: تبقى حقوق الابتكار للمنصة ما لم ينص خلافه.</div>
                <div class="clause"><span class="c-num">55.</span>تحديث الشروط: يحق للمنصة تحديث الشروط وتسري على الأعمال الجديدة.</div>
                <div class="clause"><span class="c-num">56.</span>استقلالية البنود: يُفسر كل بند بشكل مستقل.</div>
                <div class="clause"><span class="c-num">57.</span>الملحقات: أي طلبات إضافية تُوثق في ملحق اتفاق مستقل ورسمي.</div>

                <div style="margin-top:40px; border:2px solid var(--primary); padding:20px; border-radius:10px; background:#fffcf5;">
                    <h4 style="text-align:center; color:var(--primary); margin-bottom:15px;">إقرار وموافقة العميل النهائية</h4>
                    <p style="font-size:11px;">أقر أنا العميل (<b>${customer.name}</b>) بالاطلاع على جميع الشروط والأحكام الـ 57 المذكورة في هذه الصفحات والموافقة عليها جملة وتفصيلاً، ويُعد سداد أي مبلغ بمثابة توقيع إلكتروني ملزم ونهائي.</p>
                    <div style="display:flex; justify-content:space-between; margin-top:30px; font-weight:800; font-size:12px;">
                        <span>توقيع العميل: ...........................</span>
                        <span>التاريخ: ${new Date().toLocaleDateString('ar-SA')}</span>
                    </div>
                </div>
            </div>
            <div class="footer"><span>${SOURCE.website}</span><span class="page-counter">صفحة 4 من 4</span></div>
        </div>`;

        app.innerHTML = p1 + p2 + p3 + p4;

        // توليد الأكواد
        new QRCode(document.getElementById("zatca-qr"), { text: `Seller:${SOURCE.name}|VAT:${SOURCE.taxId}|Total:${order.total}`, width: 90, height: 90 });
        new QRCode(document.getElementById("web-qr"), { text: SOURCE.website, width: 70, height: 70 });
    }

    init();
</script>
</body>
</html>
