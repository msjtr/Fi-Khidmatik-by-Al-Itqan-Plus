<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة الفاتورة</title>
    
    <!-- أيقونة الموقع -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='85'%3E🖨️%3C/text%3E%3C/svg%3E">
    
    <!-- المكتبات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/invoice.css">
    
    <!-- مكتبات PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* أنماط إضافية */
        .action-buttons {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-secondary { background: #334155; color: white; }
        .btn-purple { background: #6b21a5; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .loading { text-align: center; padding: 50px; font-size: 18px; color: #666; }
        .error { text-align: center; padding: 50px; color: red; }
    </style>
</head>
<body>
    <div id="printContent" class="loading">جاري تحميل الفاتورة...</div>
    
    <div class="action-buttons no-print">
        <button class="btn btn-primary" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
        <button class="btn btn-danger" onclick="window.close()"><i class="fas fa-times"></i> إغلاق</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
            authDomain: "msjt301-974bb.firebaseapp.com",
            projectId: "msjt301-974bb",
            storageBucket: "msjt301-974bb.firebasestorage.app",
            messagingSenderId: "186209858482",
            appId: "1:186209858482:web:186ca610780799ef562aab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth()+1).toString().padStart(2, '0')}/${d.getFullYear()}`;
        }

        function formatTime(time24) {
            if (!time24) return '';
            let [h, m] = time24.split(':');
            let hour = parseInt(h);
            let ampm = hour >= 12 ? 'مساءً' : 'صباحاً';
            hour = hour % 12 || 12;
            return `${hour.toString().padStart(2, '0')}:${m} ${ampm}`;
        }

        async function loadOrder(orderId) {
            const orderRef = doc(db, "orders", orderId);
            const orderSnap = await getDoc(orderRef);
            if (orderSnap.exists()) return { id: orderSnap.id, ...orderSnap.data() };
            return null;
        }

        async function loadCustomers() {
            const snapshot = await getDocs(collection(db, "customers"));
            return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        }

        // دوال بناء الصفحات (مختصرة ولكنها كافية)
        function buildPage1(pageNum, totalPages, order, customerName) {
            return `
            <div class="page">
                <div class="page-header">
                    <div class="header-right"></div>
                    <div class="header-center"><div class="page-title">فاتورة رسمية</div></div>
                    <div class="header-left"></div>
                </div>
                <div class="terms-container">
                    <div class="terms-title">الشروط والأحكام والتعليمات</div>
                    <div class="legal-notice">
                        <strong>إقرار مسؤولية البيانات والمعلومات:</strong><br>
                        <span>يقر العميل ويوافق على أن جميع المعلومات والبيانات والمستندات التي قام بتزويد مقدم الخدمة بها أو تم إدراجها في هذا المستند صحيحة ودقيقة ومكتملة، ويتحمل وحده كامل المسؤولية عنها...</span><br><br>
                        <span>يُعد هذا المستند (عرض سعر / فاتورة) اتفاقًا ملزمًا قانونيًا...</span>
                    </div>
                    <!-- باقي البنود مختصرة للاختصار، يمكنك إضافتها كاملة -->
                    <div class="terms-section terms-section-1">
                        <div class="terms-section-header"><span class="terms-section-icon">📋</span><h4>أولاً: صلاحية العرض والتنفيذ</h4></div>
                        <div class="terms-section-content"><p><strong>1.</strong> مدة صلاحية العرض: ثلاثة أيام عمل...</p></div>
                    </div>
                </div>
                <div class="page-footer"><div class="page-number">الصفحة ${pageNum} من ${totalPages}</div></div>
            </div>`;
        }

        function buildPage2(pageNum, totalPages) {
            return `<div class="page"><div class="page-header">...</div><div class="terms-container">...</div><div class="page-footer"><div class="page-number">الصفحة ${pageNum} من ${totalPages}</div></div></div>`;
        }

        function buildPage3(pageNum, totalPages, order, customerName, dateStr, timeStr) {
            return `
            <div class="page">
                <div class="page-header">...</div>
                <div class="terms-container">
                    <div class="declaration"><div class="declaration-header"><span class="declaration-icon">📝</span><p>الإقرار</p></div><p class="declaration-text">أقر أنا العميل بالاطلاع على جميع الشروط والأحكام أعلاه وأوافق عليها بالكامل...</p></div>
                    <div class="signature-area">
                        <div class="signature-row"><span class="signature-icon">👤</span><span class="signature-label">اسم العميل:</span><span class="signature-value">${customerName}</span></div>
                        <div class="signature-row"><span class="signature-icon">📅</span><span class="signature-label">التاريخ:</span><span class="signature-value">${dateStr} - ${timeStr}</span></div>
                        <div class="signature-line"><span class="signature-icon">✍️</span><span class="signature-label">التوقيع:</span><span class="signature-placeholder"></span></div>
                    </div>
                </div>
                <div class="page-footer"><div class="page-number">الصفحة ${pageNum} من ${totalPages}</div></div>
            </div>`;
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');
            
            if (!orderId) {
                document.getElementById('printContent').innerHTML = '<div class="error"><i class="fas fa-exclamation-triangle"></i> لم يتم تحديد رقم الطلب</div>';
                return;
            }
            
            try {
                const [order, customers] = await Promise.all([loadOrder(orderId), loadCustomers()]);
                if (!order) {
                    document.getElementById('printContent').innerHTML = '<div class="error"><i class="fas fa-search"></i> الطلب غير موجود</div>';
                    return;
                }
                
                const customer = customers.find(c => c.id === order.customerId);
                const customerName = customer ? customer.name : 'غير معروف';
                const dateStr = formatDate(order.orderDate);
                const timeStr = formatTime(order.orderTime);
                
                let html = '';
                html += buildPage1(1, 3, order, customerName);
                html += buildPage2(2, 3);
                html += buildPage3(3, 3, order, customerName, dateStr, timeStr);
                
                document.getElementById('printContent').innerHTML = html;
                
                // طباعة تلقائية إذا وُجد auto=print
                if (urlParams.get('auto') === 'print') {
                    setTimeout(() => window.print(), 500);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('printContent').innerHTML = '<div class="error">خطأ في تحميل البيانات: ' + err.message + '</div>';
            }
        }
        
        init();
    </script>
</body>
</html>
