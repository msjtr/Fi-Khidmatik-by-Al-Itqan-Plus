<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة الفاتورة - في خدمتك</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link rel="stylesheet" href="css/invoice.css">

    <style>
        /* تنسيقات إضافية لزر التحميل والتحكم */
        .no-print-zone {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            gap: 10px;
        }

        .btn-download {
            background-color: #1a1a1a;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-download:hover {
            background-color: #d4af37; /* لون ذهبي عند التحويم */
            transform: translateY(-2px);
        }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            font-family: 'Tajawal', sans-serif;
        }

        @media print {
            .no-print-zone { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner">جاري تجهيز الفاتورة...</div>
    </div>

    <div class="no-print-zone">
        <button class="btn-download" onclick="window.downloadPDF()">
            <span>📥</span> تحميل PDF عالي الجودة
        </button>
        <button class="btn-download" style="background-color: #444;" onclick="window.print()">
            <span>🖨️</span> طباعة فورية
        </button>
    </div>

    <div id="print-app"></div>

    <script type="module" src="js/terms.js"></script>
    <script type="module" src="js/order.js"></script>
    <script type="module" src="js/zatca.js"></script>
    <script type="module" src="js/print.js"></script>

</body>
</html>
