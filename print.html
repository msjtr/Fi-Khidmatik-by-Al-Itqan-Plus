<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>في خدمتك - فاتورة إلكترونية</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <link rel="stylesheet" href="css/print.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="invoice-wrapper" id="invoiceRoot"></div>
<div class="action-buttons">
    <button class="btn btn-primary" id="printBtn">🖨️ طباعة</button>
    <button class="btn btn-secondary" id="pdfBtn">📄 PDF</button>
    <button class="btn btn-danger" id="backBtn" onclick="window.close()">✖️ إغلاق</button>
</div>

<script type="module">
    // استيراد دوال Firebase من الملفات الصحيحة
    import { 
        getOrderFull, 
        loadCustomersAndProducts,
        customersMap,
        productsMap
    } from './js/order.js';
    
    import { termsContent, termsPage2Content } from './js/terms.js';
    
    let orderData = null;

    const sellerData = {
        name: "منصة في خدمتك",
        taxNumber: "312495447600003",
        licenseNumber: "FL-765735204",
        address: "حائل - حي النقرة - شارع سعد المشاط - مبنى 3085 - الرمز البريدي 55431",
        phone: "966534051317",
        whatsapp: "966545312021",
        email: "info@fi-khidmatik.com",
        website: "www.khidmatik.com"
    };

    // ================= دوال مساعدة =================
    function showLoading(msg) {
        let ov = document.getElementById('loadingOverlay');
        if (!ov) {
            ov = document.createElement('div');
            ov.id = 'loadingOverlay';
            ov.className = 'loading-overlay';
            ov.innerHTML = `<div class="loading-box"><div class="loading-spinner"></div><p id="loadingMsg">${msg}</p></div>`;
            document.body.appendChild(ov);
        }
        const msgEl = document.getElementById('loadingMsg');
        if (msgEl) msgEl.textContent = msg;
        ov.style.display = 'flex';
    }
    
    function hideLoading() { 
        let ov = document.getElementById('loadingOverlay'); 
        if(ov) ov.style.display = 'none'; 
    }
    
    function showToast(msg, isError = false) { 
        let t = document.createElement('div'); 
        t.className = 'toast-message'; 
        t.textContent = (isError ? '❌ ' : '✅ ') + msg; 
        t.style.background = isError ? '#ef4444' : '#10b981';
        document.body.appendChild(t); 
        setTimeout(() => t.remove(), 3000); 
    }

    function formatTime12(t) { 
        if(!t) return ''; 
        let [h, m] = t.split(':'); 
        let hour = parseInt(h); 
        let ap = hour >= 12 ? 'مساءً' : 'صباحاً'; 
        hour = hour % 12 || 12; 
        return `${hour}:${m} ${ap}`; 
    }
    
    function formatDateYMD(d) { 
        if(!d) return ''; 
        let p = d.split('-'); 
        return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d; 
    }
    
    function escapeHtml(str) { 
        if(!str) return ''; 
        return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
    }
    
    function getShippingMethodText(method) {
        if (method === 'delivery') return '🚚 شحن منزلي';
        if (method === 'pickup') return '🏪 استلام من المقر';
        if (method === 'noship') return '📥 لا يحتاج شحن (منتج رقمي)';
        return method || 'غير محدد';
    }

    function getDemoData() {
        return {
            orderNumber: "DEMO-001",
            orderDate: new Date().toISOString().split('T')[0],
            orderTime: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' }),
            status: "مكتمل",
            customerName: "عميل تجريبي",
            customerPhone: "+966500000000",
            customerEmail: "demo@example.com",
            customerAddress: "الرياض - المملكة العربية السعودية",
            subtotal: 15000,
            discount: 0,
            tax: 2250,
            total: 17250,
            paymentMethodName: "تحويل بنكي",
            shippingMethod: "delivery",
            approvalCode: "DEMO-001",
            items: [
                { productName: "منتج تجريبي 1", description: "وصف تجريبي للمنتج الأول", image: "", quantity: 1, price: 10000 },
                { productName: "منتج تجريبي 2", description: "وصف تجريبي للمنتج الثاني", image: "", quantity: 1, price: 5000 }
            ]
        };
    }

    // ================= بناء HTML الفاتورة =================
    function buildHeader(title = "فاتورة إلكترونية") {
        return `<div class="header-top">
            <div class="logo-area">
                <img src="images/logo.svg" class="logo-img" alt="شعار المنصة" onerror="this.src='https://placehold.co/65x65/1e3a5f/white?text=في+خدمتك'">
                <div>
                    <div class="platform-name">${sellerData.name}</div>
                    <div class="platform-slogan">خدمات تقنية متكاملة</div>
                </div>
            </div>
            <div class="invoice-title">${title}</div>
            <div class="legal-numbers">
                <div>رقم شهادة العمل الحر: ${sellerData.licenseNumber}</div>
                <div>الرقم الضريبي: ${sellerData.taxNumber}</div>
            </div>
        </div>`;
    }

    function buildFooter(pageNum, totalPages) {
        return `<div class="footer-note">
            <div class="contact-info">
                <span>📞 ${sellerData.phone}</span>
                <span>💬 ${sellerData.whatsapp}</span>
                <span>✉️ ${sellerData.email}</span>
                <span>🌐 ${sellerData.website}</span>
            </div>
            <div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
            <div class="page-number">صفحة ${pageNum} من ${totalPages}</div>
        </div>`;
    }

    function buildInvoicePage(order) {
        const itemsHtml = (order.items || []).map((item, idx) => `
            <tr>
                <td style="text-align:center">${idx + 1}</td>
                <td style="text-align:center">
                    ${item.image ? `<img src="${item.image}" class="product-img" crossorigin="anonymous" onerror="this.style.display='none'">` : '<div style="width:50px;height:50px;background:#e2e8f0;border-radius:8px;"></div>'}
                </td>
                <td style="text-align:right">
                    <strong>${escapeHtml(item.productName || item.name)}</strong><br>
                    <small>${escapeHtml(item.description || '')}</small>
                </td>
                <td style="text-align:center">${item.quantity}</td>
                <td style="text-align:center">${(item.price || 0).toFixed(2)} ريال</td>
                <td style="text-align:center">${((item.price || 0) * item.quantity).toFixed(2)} ريال</td>
             </tr>
        `).join('');
        
        const subtotal = order.subtotal || order.items?.reduce((s, i) => s + ((i.price || 0) * i.quantity), 0) || 0;
        const discount = order.discount || 0;
        const tax = order.tax || ((subtotal - discount) * 0.15);
        const total = order.total || (subtotal - discount + tax);
        const shipText = getShippingMethodText(order.shippingMethod);
        
        return `<div class="invoice-page">
            ${buildHeader("فاتورة إلكترونية")}
            
            <div class="info-row">
                <div><strong>رقم الفاتورة:</strong> ${order.orderNumber}</div>
                <div><strong>التاريخ:</strong> ${formatDateYMD(order.orderDate)} - ${formatTime12(order.orderTime)}</div>
                <div><span class="status-badge ${order.status === 'مكتمل' ? 'status-completed' : ''}">${order.status || 'مكتمل'}</span></div>
            </div>
            
            <div class="addresses">
                <div class="address-box">
                    <strong>🏢 مصدرة من</strong>
                    ${sellerData.name}<br>
                    المملكة العربية السعودية<br>
                    ${sellerData.address}<br>
                    📞 ${sellerData.phone}<br>
                    ✉️ ${sellerData.email}
                </div>
                <div class="address-box">
                    <strong>👤 مصدرة إلى</strong>
                    ${escapeHtml(order.customerName)}<br>
                    ${escapeHtml(order.customerAddress)}<br>
                    📞 ${escapeHtml(order.customerPhone)}<br>
                    ✉️ ${escapeHtml(order.customerEmail)}
                </div>
            </div>
            
            <div class="payment-approval">
                <div class="payment-box"><strong>💰 طريقة الدفع:</strong> ${order.paymentMethodName || 'غير محدد'}</div>
                <div class="payment-box"><strong>🚚 طريقة الاستلام:</strong> ${shipText}</div>
                <div class="approval-box"><strong>✅ رمز الموافقة:</strong> ${order.approvalCode || 'غير مطلوب'}</div>
            </div>
            
            <table class="invoice-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الصورة</th>
                        <th>المنتج / الوصف</th>
                        <th>الكمية</th>
                        <th>سعر الوحدة</th>
                        <th>الإجمالي</th>
                    </tr>
                </thead>
                <tbody>${itemsHtml}</tbody>
            </table>
            
            <div class="totals">
                <div><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                ${discount > 0 ? `<div><span>الخصم:</span><span>- ${discount.toFixed(2)} ريال</span></div>` : ''}
                <div><span>ضريبة القيمة المضافة 15%:</span><span>${tax.toFixed(2)} ريال</span></div>
                <div class="grand-total"><span>الإجمالي النهائي:</span><span>${total.toFixed(2)} ريال</span></div>
            </div>
            
            <div class="barcodes-container">
                <div class="barcode-item">
                    <div id="zatcaQR" class="qr-placeholder"></div>
                </div>
            </div>
            
            ${buildFooter(1, 2)}
        </div>`;
    }

    function buildTermsPage() {
        return `<div class="terms-section-page">
            ${buildHeader("الشروط والأحكام")}
            <div class="terms-main-container">
                <h1 class="main-title">📜 الشروط والأحكام</h1>
                ${termsContent || '<p>محتوى الشروط والأحكام...</p>'}
            </div>
            ${buildFooter(2, 2)}
        </div>`;
    }

    // ================= إنشاء QR Code حسب معيار ZATCA =================
    function generateZATCAQR(order) {
        const sellerName = sellerData.name;
        const vatNumber = sellerData.taxNumber;
        const timestamp = new Date().toISOString();
        const totalWithVAT = order.total || 0;
        const vatAmount = order.tax || ((order.subtotal || 0) * 0.15);
        
        // تشفير TLV
        function encodeTLV(tag, value) {
            const tagHex = String.fromCharCode(tag);
            const lengthHex = String.fromCharCode(value.length);
            return tagHex + lengthHex + value;
        }
        
        let tlvData = '';
        tlvData += encodeTLV(1, sellerName);
        tlvData += encodeTLV(2, vatNumber);
        tlvData += encodeTLV(3, timestamp);
        tlvData += encodeTLV(4, totalWithVAT.toFixed(2));
        tlvData += encodeTLV(5, vatAmount.toFixed(2));
        
        return btoa(tlvData);
    }

    // ================= العرض الرئيسي =================
    async function renderCompleteInvoice() {
        showLoading('جاري تحميل الفاتورة...');
        
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        
        let order = null;
        
        if (orderId && orderId !== 'null' && orderId !== 'undefined') {
            try {
                console.log('🔄 جاري تحميل الطلب:', orderId);
                
                // تحميل العملاء والمنتجات
                await loadCustomersAndProducts();
                console.log('✅ تم تحميل البيانات، عدد المنتجات:', productsMap.size);
                
                // جلب الطلب
                order = await getOrderFull(orderId);
                
                if (!order) {
                    console.warn('⚠️ لم يتم العثور على الطلب');
                    showToast('لم يتم العثور على الطلب، سيتم عرض بيانات تجريبية', true);
                    order = getDemoData();
                } else {
                    console.log('✅ تم تحميل الطلب بنجاح:', order.orderNumber);
                    showToast('تم تحميل بيانات الطلب بنجاح');
                }
            } catch (error) {
                console.error('❌ خطأ:', error);
                showToast('خطأ في تحميل البيانات: ' + error.message, true);
                order = getDemoData();
            }
        } else {
            order = getDemoData();
            showToast('عرض بيانات تجريبية (لم يتم تحديد طلب)');
        }
        
        orderData = order;
        
        // بناء الفاتورة
        const finalHtml = buildInvoicePage(order) + buildTermsPage();
        document.getElementById('invoiceRoot').innerHTML = finalHtml;
        
        // إنشاء QR Code
        setTimeout(() => {
            const qrDiv = document.getElementById('zatcaQR');
            if (qrDiv && typeof QRCode !== 'undefined') {
                try {
                    const qrData = generateZATCAQR(order);
                    new QRCode(qrDiv, {
                        text: qrData,
                        width: 100,
                        height: 100,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    console.log('✅ تم إنشاء QR Code بنجاح');
                } catch(e) {
                    console.error('❌ خطأ في إنشاء QR Code:', e);
                }
            }
        }, 100);
        
        hideLoading();
    }

    // ================= إنشاء PDF =================
    async function generatePDF() {
        const root = document.getElementById('invoiceRoot');
        const pages = root.querySelectorAll('.invoice-page, .terms-section-page');
        const { jsPDF } = window.jspdf;
        
        if (!pages.length) {
            showToast('لا توجد صفحات للتصدير', true);
            return;
        }
        
        showLoading('جاري إنشاء PDF...');
        
        try {
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            for (let i = 0; i < pages.length; i++) {
                console.log(`📄 معالجة الصفحة ${i + 1} من ${pages.length}`);
                
                const canvas = await html2canvas(pages[i], { 
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: '#ffffff',
                    logging: false,
                    allowTaint: false
                });
                
                if (i !== 0) pdf.addPage();
                
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            }
            
            const orderId = orderData?.orderNumber || new URLSearchParams(window.location.search).get('id') || 'demo';
            pdf.save(`فاتورة_${orderId}.pdf`);
            showToast('تم حفظ PDF بنجاح');
            
        } catch(error) {
            console.error('❌ خطأ في PDF:', error);
            showToast('خطأ في إنشاء PDF: ' + error.message, true);
        } finally {
            hideLoading();
        }
    }

    // ================= ربط الأزرار =================
    document.getElementById('printBtn').onclick = () => window.print();
    document.getElementById('pdfBtn').onclick = generatePDF;
    
    // بدء التشغيل
    renderCompleteInvoice();
</script>
</body>
</html>
