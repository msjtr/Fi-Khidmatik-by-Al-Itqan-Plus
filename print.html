<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>الفاتورة الإلكترونية - في خدمتك</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9ecef; padding: 20px; font-family: 'Tajawal', sans-serif; }
        
        .page { 
            width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 0 auto 20px; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; position: relative;
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #1e3a5f; padding-bottom: 15px; margin-bottom: 20px; }
        .logo-text .name { font-size: 24px; font-weight: 800; color: #1e3a5f; }
        .invoice-title { background: #1e3a5f; color: white; padding: 5px 20px; border-radius: 20px; font-size: 18px; }

        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .info-item label { display: block; font-size: 12px; color: #666; }
        .info-item span { font-weight: 700; color: #1e3a5f; }

        .address-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 10px; background: #fff; }
        .card h4 { margin-bottom: 10px; color: #1e3a5f; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .card p { font-size: 13px; line-height: 1.6; color: #444; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background: #1e3a5f; color: white; padding: 10px; font-size: 14px; }
        td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 13px; }

        .totals { width: 250px; margin-right: auto; }
        .total-row { display: flex; justify-content: space-between; padding: 5px 0; }
        .grand-total { border-top: 2px solid #1e3a5f; margin-top: 5px; padding-top: 10px; font-weight: 800; color: #1e3a5f; font-size: 16px; }

        .barcodes { display: flex; justify-content: space-around; margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ccc; }
        .qr-item { text-align: center; font-size: 10px; color: #777; width: 120px; }
        .qr-code { width: 110px; height: 110px; margin: 0 auto 5px; }

        .footer { margin-top: auto; background: #1e3a5f; color: white; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; font-size: 11px; }

        .preview-buttons { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1000; }
        button { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-print { background: #1e3a5f; color: white; }
        .btn-pdf { background: #dc2626; color: white; }

        @media print { .no-print { display: none !important; } body { padding: 0; background: white; } .page { box-shadow: none; margin: 0; width: 100%; } }
    </style>
</head>
<body>

    <div id="printContent">
        <div style="text-align:center; padding: 50px;">جاري تحميل بيانات الفاتورة...</div>
    </div>

    <div class="preview-buttons no-print">
        <button class="btn-print" onclick="window.print()">🖨️ طباعة الفاتورة</button>
        <button class="btn-pdf" onclick="exportToPDF()">📄 حفظ كـ PDF</button>
    </div>

    <script>
        // --- 1. إعدادات Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
            authDomain: "msjt301-974bb.firebaseapp.com",
            projectId: "msjt301-974bb",
            storageBucket: "msjt301-974bb.firebasestorage.app",
            messagingSenderId: "186209858482",
            appId: "1:186209858482:web:186ca610780799ef562aab"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const sellerData = {
            name: "في خدمتك",
            taxNumber: "312495447600003",
            address: "حائل - حي النقرة - شارع سعد المشاط",
            phone: "+966 534051317"
        };

        // --- 2. دالة توليد الـ QR المحدثة لحل مشكلة الـ Overflow ---
        function generateQR(id, text) {
            const container = document.getElementById(id);
            if (!container) return;
            container.innerHTML = "";
            
            try {
                new QRCode(container, {
                    text: text,
                    width: 110,
                    height: 110,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    // تقليل مستوى التصحيح لزيادة سعة البيانات
                    correctLevel: QRCode.CorrectLevel.L, 
                    // رفع النسخة (Version) لدعم البيانات الكبيرة (1000+ حرف)
                    version: 15 
                });
            } catch (e) {
                console.error("خطأ في الباركود:", e);
                container.innerHTML = "<small style='color:red'>خطأ في البيانات</small>";
            }
        }

        // --- 3. بناء واجهة الفاتورة ---
        function renderInvoice(order) {
            const subtotal = Number(order.subtotal) || 0;
            const tax = Number(order.tax) || (subtotal * 0.15);
            const total = Number(order.total) || (subtotal + tax);

            const html = `
                <div class="page">
                    <div class="header">
                        <div class="logo-text">
                            <div class="name">${sellerData.name}</div>
                            <div style="font-size:12px; color:#666">من الإتقان بلس</div>
                        </div>
                        <div class="invoice-title">فاتورة ضريبية مبسطة</div>
                    </div>

                    <div class="info-grid">
                        <div class="info-item"><label>رقم الفاتورة</label><span>${order.orderNumber || order.id.substring(0,8)}</span></div>
                        <div class="info-item"><label>التاريخ</label><span>${order.orderDate || new Date().toLocaleDateString('ar-SA')}</span></div>
                        <div class="info-item"><label>الحالة</label><span>${order.status || 'مكتمل'}</span></div>
                    </div>

                    <div class="address-box">
                        <div class="card">
                            <h4>المنشأة (المورد)</h4>
                            <p><strong>${sellerData.name}</strong><br>الرقم الضريبي: ${sellerData.taxNumber}<br>${sellerData.address}<br>الهاتف: ${sellerData.phone}</p>
                        </div>
                        <div class="card">
                            <h4>العميل</h4>
                            <p><strong>${order.customerName || 'عميل نقدي'}</strong><br>الهاتف: ${order.customerPhone || '---'}<br>العنوان: ${order.customerAddress || '---'}</p>
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr><th>وصف الخدمة/المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
                        </thead>
                        <tbody>
                            ${(order.items || []).map(item => `
                                <tr>
                                    <td>${item.name}</td>
                                    <td>${item.quantity || 1}</td>
                                    <td>${Number(item.price).toFixed(2)} ريال</td>
                                    <td>${(item.quantity * item.price).toFixed(2)} ريال</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <div class="totals">
                        <div class="total-row"><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                        <div class="total-row"><span>الضريبة (15%):</span><span>${tax.toFixed(2)} ريال</span></div>
                        <div class="total-row grand-total"><span>الإجمالي النهائي:</span><span>${total.toFixed(2)} ريال</span></div>
                    </div>

                    <div class="barcodes">
                        <div class="qr-item"><div id="zatcaQR" class="qr-code"></div>باركود الزكاة</div>
                        <div class="qr-item"><div id="verifyQR" class="qr-code"></div>رابط الفاتورة</div>
                    </div>

                    <div class="footer">
                        <span>صدرت إلكترونياً - في خدمتك</span>
                        <span>www.fi-khidmatik.com.sa</span>
                    </div>
                </div>
            `;

            document.getElementById('printContent').innerHTML = html;

            // توليد الباركودات ببيانات مختصرة لتجنب أي تعليق
            const shortDate = order.orderDate || new Date().toISOString();
            const qrZatca = `S:${sellerData.name}|V:${sellerData.taxNumber}|D:${shortDate}|T:${total.toFixed(2)}`;
            
            generateQR("zatcaQR", qrZatca);
            generateQR("verifyQR", window.location.href);
        }

        // --- 4. جلب البيانات من Firebase ---
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('id');

            if (!docId) {
                document.getElementById('printContent').innerHTML = "<div style='color:red; text-align:center; padding:50px;'>يرجى تزويد ID الفاتورة</div>";
                return;
            }

            try {
                const doc = await db.collection("orders").doc(docId).get();
                if (doc.exists) {
                    renderInvoice({ id: doc.id, ...doc.data() });
                } else {
                    document.getElementById('printContent').innerHTML = "<div style='text-align:center; padding:50px;'>المستند غير موجود.</div>";
                }
            } catch (error) {
                console.error("Firebase Error:", error);
                document.getElementById('printContent').innerHTML = "خطأ في الاتصال بقاعدة البيانات.";
            }
        }

        // --- 5. تصدير PDF ---
        async function exportToPDF() {
            const element = document.querySelector(".page");
            const canvas = await html2canvas(element, { scale: 2 });
            const imgData = canvas.toDataURL("image/png");
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF("p", "mm", "a4");
            const width = pdf.internal.pageSize.getWidth();
            const height = (canvas.height * width) / canvas.width;
            pdf.addImage(imgData, "PNG", 0, 0, width, height);
            pdf.save(`Invoice_${new Date().getTime()}.pdf`);
        }

        window.onload = init;
    </script>
</body>
</html>
