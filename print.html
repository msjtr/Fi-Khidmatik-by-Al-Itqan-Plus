<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>في خدمتك - فاتورة إلكترونية</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK (الطريقة الصحيحة) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .invoice-page { page-break-after: avoid; }
        }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-new { background: #dbeafe; color: #1e40af; }
        .status-processing { background: #fef3c7; color: #b45309; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #b91c1c; }
        .loading-overlay { 
            position: fixed; top:0; left:0; right:0; bottom:0; 
            background: rgba(0,0,0,0.7); display: flex; 
            align-items: center; justify-content: center; z-index: 9999; 
        }
        .loading-spinner { 
            border: 4px solid #f3f3f3; border-top: 4px solid #1e3a5f; 
            border-radius: 50%; width: 50px; height: 50px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            padding: 10px 20px; border-radius: 8px; z-index: 10000; font-size: 14px; 
            color: white; 
        }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .invoice-page {
            max-width: 210mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-100 p-4 font-sans">

<div id="invoiceRoot" class="max-w-4xl mx-auto"></div>

<div class="fixed bottom-4 left-1/2 transform -translate-x-1/2 flex gap-3 no-print z-50">
    <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded-full shadow-lg hover:bg-blue-700 transition flex items-center gap-2">
        <i class="fas fa-print"></i> طباعة
    </button>
    <button id="pdfBtn" class="bg-green-600 text-white px-6 py-2 rounded-full shadow-lg hover:bg-green-700 transition flex items-center gap-2">
        <i class="fas fa-file-pdf"></i> PDF
    </button>
    <button onclick="window.close()" class="bg-gray-600 text-white px-6 py-2 rounded-full shadow-lg hover:bg-gray-700 transition flex items-center gap-2">
        <i class="fas fa-times"></i> إغلاق
    </button>
</div>

<script>
    // ================= Firebase Config =================
    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let currentOrder = null;

    // ================= بيانات البائع =================
    const sellerData = {
        name: "منصة في خدمتك",
        taxNumber: "312495447600003",
        licenseNumber: "FL-765735204",
        address: "حائل - حي النقرة - شارع سعد المشاط - مبنى 3085 - الرمز البريدي 55431",
        phone: "966534051317",
        whatsapp: "966545312021",
        email: "info@fi-khidmatik.com",
        website: "www.khidmatik.com"
    };

    // ================= دوال مساعدة =================
    function showLoading() {
        let ov = document.getElementById('loadingOverlay');
        if (!ov) {
            ov = document.createElement('div');
            ov.id = 'loadingOverlay';
            ov.className = 'loading-overlay';
            ov.innerHTML = `
                <div class="bg-white p-6 rounded-xl text-center">
                    <div class="loading-spinner mx-auto mb-4"></div>
                    <p>جاري تحميل الفاتورة...</p>
                </div>
            `;
            document.body.appendChild(ov);
        }
        ov.style.display = 'flex';
    }

    function hideLoading() {
        let ov = document.getElementById('loadingOverlay');
        if (ov) ov.style.display = 'none';
    }

    function showToast(msg, isError = false) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isError ? '#ef4444' : '#10b981';
        t.innerHTML = (isError ? '❌ ' : '✅ ') + msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function formatDate(d) {
        if (!d) return '';
        let parts = d.split('-');
        return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : d;
    }

    function formatTime(time24) {
        if (!time24) return '';
        let [h, m] = time24.split(':');
        let hour = parseInt(h);
        let ap = hour >= 12 ? 'مساءً' : 'صباحاً';
        hour = hour % 12 || 12;
        return `${hour}:${m} ${ap}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getStatusClass(status) {
        const classes = {
            'جديد': 'status-new',
            'تحت التنفيذ': 'status-processing',
            'تم التنفيذ': 'status-completed',
            'ملغي': 'status-cancelled'
        };
        return classes[status] || 'status-new';
    }

    function getShippingText(method) {
        if (method === 'delivery') return '🚚 شحن منزلي';
        if (method === 'noship') return '📥 لا يتطلب شحن';
        return '🏪 استلام من المقر';
    }

    function getPaymentName(method) {
        const names = {
            'mada': 'مدى', 'mastercard': 'ماستركارد', 'visa': 'فيزا',
            'stcpay': 'STCPay', 'tamara': 'تمارا', 'tabby': 'تابي'
        };
        return names[method] || method || 'مدى';
    }

    // ================= جلب الطلب من Firebase =================
    async function fetchOrder(orderId) {
        console.log('جاري جلب الطلب:', orderId);
        
        // جلب الطلب
        const orderDoc = await db.collection('orders').doc(orderId).get();
        if (!orderDoc.exists) {
            throw new Error('الطلب غير موجود');
        }
        
        const order = { id: orderDoc.id, ...orderDoc.data() };
        console.log('تم جلب الطلب بنجاح');
        
        // جلب بيانات العميل
        let customer = { name: 'غير معروف', phone: '', email: '', address: '' };
        if (order.customerId) {
            try {
                const customerDoc = await db.collection('customers').doc(order.customerId).get();
                if (customerDoc.exists) {
                    customer = customerDoc.data();
                }
            } catch(e) {
                console.warn('خطأ في جلب العميل:', e);
            }
        }
        
        // جلب بيانات المنتجات مع الصور
        const items = [];
        for (const item of (order.items || [])) {
            let productImage = item.image || '';
            let productName = item.name || 'منتج';
            let productDesc = item.description || '';
            
            if (item.productId && item.productId !== 'null' && !item.productId.startsWith('temp_')) {
                try {
                    const productDoc = await db.collection('products').doc(item.productId).get();
                    if (productDoc.exists) {
                        const product = productDoc.data();
                        productImage = product.image || productImage;
                        productName = product.name || productName;
                        productDesc = product.description || productDesc;
                    }
                } catch(e) {
                    console.warn('خطأ في جلب المنتج:', e);
                }
            }
            
            items.push({
                ...item,
                productName: productName,
                description: productDesc,
                image: productImage,
                price: item.price || 0
            });
        }
        
        return {
            ...order,
            customerName: customer.name,
            customerPhone: customer.phone,
            customerEmail: customer.email,
            customerAddress: customer.address || '',
            items: items,
            paymentMethodName: getPaymentName(order.paymentMethod)
        };
    }

    // ================= بناء HTML الفاتورة =================
    function buildInvoiceHTML(order) {
        const itemsHtml = (order.items || []).map((item, i) => `
            <tr class="border-b hover:bg-gray-50">
                <td class="p-3 text-center">${i+1}</td>
                <td class="p-3 text-center">
                    ${item.image ? 
                        `<img src="${item.image}" class="product-img mx-auto" onerror="this.style.display='none'">` : 
                        '<div class="w-14 h-14 bg-gray-100 rounded-lg mx-auto flex items-center justify-center"><i class="fas fa-image text-gray-400 text-xl"></i></div>'
                    }
                </td>
                <td class="p-3">
                    <strong class="text-gray-800">${escapeHtml(item.productName)}</strong><br>
                    <small class="text-gray-500 text-xs">${escapeHtml(item.description)}</small>
                </td>
                <td class="p-3 text-center">${item.quantity}</td>
                <td class="p-3 text-center">${(item.price || 0).toFixed(2)} ريال</td>
                <td class="p-3 text-center font-semibold">${((item.price || 0) * item.quantity).toFixed(2)} ريال</td>
            </tr>
        `).join('');
        
        const subtotal = order.subtotal || order.items?.reduce((s, i) => s + ((i.price || 0) * i.quantity), 0) || 0;
        const discount = order.discount || 0;
        const tax = order.tax || ((subtotal - discount) * 0.15);
        const total = order.total || (subtotal - discount + tax);
        
        return `
            <div class="invoice-page bg-white rounded-2xl shadow-xl overflow-hidden">
                <!-- Header -->
                <div class="bg-gradient-to-r from-blue-700 to-blue-800 text-white p-6">
                    <div class="flex justify-between items-center flex-wrap gap-4">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
                                <i class="fas fa-store text-2xl"></i>
                            </div>
                            <div>
                                <div class="text-xl font-bold">${sellerData.name}</div>
                                <div class="text-xs opacity-90">خدمات تقنية متكاملة</div>
                            </div>
                        </div>
                        <div class="text-center">
                            <div class="text-2xl font-bold">فاتورة إلكترونية</div>
                            <div class="text-xs">رقم شهادة العمل الحر: ${sellerData.licenseNumber}</div>
                            <div class="text-xs">الرقم الضريبي: ${sellerData.taxNumber}</div>
                        </div>
                    </div>
                </div>
                
                <div class="p-6">
                    <!-- معلومات الطلب -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 p-4 bg-gray-50 rounded-xl">
                        <div>
                            <div class="text-xs text-gray-500 mb-1">رقم الفاتورة</div>
                            <div class="font-bold text-blue-600">${order.orderNumber}</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 mb-1">التاريخ</div>
                            <div class="font-semibold">${formatDate(order.orderDate)}</div>
                            <div class="text-xs text-gray-500">${formatTime(order.orderTime)}</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 mb-1">الحالة</div>
                            <div class="status-badge ${getStatusClass(order.status)}">${order.status || 'مكتمل'}</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 mb-1">طريقة الدفع</div>
                            <div class="font-semibold">${order.paymentMethodName}</div>
                        </div>
                    </div>
                    
                    <!-- العناوين -->
                    <div class="grid md:grid-cols-2 gap-4 mb-6">
                        <div class="border rounded-xl p-4 bg-gray-50">
                            <div class="font-bold text-blue-600 mb-2"><i class="fas fa-building ml-2"></i>مصدرة من</div>
                            <div class="text-sm">${sellerData.name}<br>المملكة العربية السعودية<br>${sellerData.address}<br>📞 ${sellerData.phone}<br>✉️ ${sellerData.email}</div>
                        </div>
                        <div class="border rounded-xl p-4 bg-gray-50">
                            <div class="font-bold text-blue-600 mb-2"><i class="fas fa-user ml-2"></i>مصدرة إلى</div>
                            <div class="text-sm">${escapeHtml(order.customerName)}<br>${escapeHtml(order.customerAddress)}<br>📞 ${escapeHtml(order.customerPhone)}<br>✉️ ${escapeHtml(order.customerEmail)}</div>
                        </div>
                    </div>
                    
                    <!-- طريقة الاستلام -->
                    <div class="mb-6 p-3 bg-gray-100 rounded-lg text-center text-sm">
                        <i class="fas fa-truck ml-2"></i> طريقة الاستلام: ${getShippingText(order.shippingMethod)}
                        ${order.approvalCode ? `<span class="mr-4"><i class="fas fa-check-circle ml-1 text-green-600"></i> رمز الموافقة: ${order.approvalCode}</span>` : ''}
                    </div>
                    
                    <!-- جدول المنتجات -->
                    <div class="overflow-x-auto mb-6">
                        <table class="w-full border-collapse">
                            <thead>
                                <tr class="bg-gray-100">
                                    <th class="p-3 border text-center">#</th>
                                    <th class="p-3 border text-center">الصورة</th>
                                    <th class="p-3 border text-right">المنتج</th>
                                    <th class="p-3 border text-center">الكمية</th>
                                    <th class="p-3 border text-center">السعر</th>
                                    <th class="p-3 border text-center">الإجمالي</th>
                                </tr>
                            </thead>
                            <tbody>${itemsHtml}</tbody>
                        </table>
                    </div>
                    
                    <!-- الإجماليات -->
                    <div class="flex justify-end">
                        <div class="w-80">
                            <div class="flex justify-between py-2 text-sm">
                                <span class="text-gray-600">المجموع الفرعي:</span>
                                <span>${subtotal.toFixed(2)} ريال</span>
                            </div>
                            ${discount > 0 ? `
                            <div class="flex justify-between py-2 text-sm">
                                <span class="text-gray-600">الخصم:</span>
                                <span class="text-red-600">- ${discount.toFixed(2)} ريال</span>
                            </div>` : ''}
                            <div class="flex justify-between py-2 text-sm">
                                <span class="text-gray-600">ضريبة القيمة المضافة 15%:</span>
                                <span>${tax.toFixed(2)} ريال</span>
                            </div>
                            <div class="flex justify-between py-3 border-t-2 border-blue-600 font-bold text-lg">
                                <span>الإجمالي النهائي:</span>
                                <span class="text-green-600">${total.toFixed(2)} ريال</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- الباركود -->
                    <div class="flex justify-center gap-8 mt-8 p-4 bg-gray-50 rounded-xl">
                        <div class="text-center">
                            <div id="zatcaQR" class="w-24 h-24 mx-auto"></div>
                            <p class="text-xs text-gray-500 mt-2">باركود هيئة الزكاة</p>
                        </div>
                        <div class="text-center">
                            <div id="orderQR" class="w-24 h-24 mx-auto"></div>
                            <p class="text-xs text-gray-500 mt-2">باركود الطلب</p>
                        </div>
                    </div>
                    
                    <!-- تذييل -->
                    <div class="text-center text-xs text-gray-500 mt-8 pt-4 border-t">
                        <div class="flex justify-center gap-4 flex-wrap mb-2">
                            <span>📞 ${sellerData.phone}</span>
                            <span>💬 ${sellerData.whatsapp}</span>
                            <span>✉️ ${sellerData.email}</span>
                            <span>🌐 ${sellerData.website}</span>
                        </div>
                        <div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
                    </div>
                </div>
            </div>
        `;
    }

    // ================= إنشاء باركود ZATCA =================
    function generateZATCAQRData(order) {
        const sellerName = sellerData.name;
        const vatNumber = sellerData.taxNumber;
        const timestamp = new Date().toISOString();
        const total = order.total || 0;
        const tax = order.tax || ((order.subtotal || 0) * 0.15);
        
        // تشفير TLV
        let tlvData = '';
        tlvData += String.fromCharCode(1) + String.fromCharCode(sellerName.length) + sellerName;
        tlvData += String.fromCharCode(2) + String.fromCharCode(vatNumber.length) + vatNumber;
        tlvData += String.fromCharCode(3) + String.fromCharCode(timestamp.length) + timestamp;
        tlvData += String.fromCharCode(4) + String.fromCharCode(total.toFixed(2).length) + total.toFixed(2);
        tlvData += String.fromCharCode(5) + String.fromCharCode(tax.toFixed(2).length) + tax.toFixed(2);
        
        return btoa(tlvData);
    }

    // ================= تحميل وعرض الفاتورة =================
    async function loadInvoice() {
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        
        if (!orderId || orderId === 'null') {
            document.getElementById('invoiceRoot').innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl p-12 text-center">
                    <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
                    <h2 class="text-2xl font-bold text-gray-800">خطأ</h2>
                    <p class="text-gray-600 mt-2">لم يتم تحديد رقم الطلب</p>
                    <p class="text-sm text-gray-500 mt-4">الرجاء استخدام الرابط: print.html?id=معرف_الطلب</p>
                </div>
            `;
            return;
        }
        
        showLoading();
        
        try {
            const order = await fetchOrder(orderId);
            currentOrder = order;
            
            const html = buildInvoiceHTML(order);
            document.getElementById('invoiceRoot').innerHTML = html;
            
            // إنشاء الباركود
            setTimeout(() => {
                const zatcaDiv = document.getElementById('zatcaQR');
                if (zatcaDiv && typeof QRCode !== 'undefined') {
                    try {
                        const qrData = generateZATCAQRData(order);
                        new QRCode(zatcaDiv, { text: qrData, width: 100, height: 100 });
                    } catch(e) {
                        console.error('ZATCA QR Error:', e);
                    }
                }
                
                const orderDiv = document.getElementById('orderQR');
                if (orderDiv && typeof QRCode !== 'undefined') {
                    try {
                        new QRCode(orderDiv, { text: window.location.href, width: 100, height: 100 });
                    } catch(e) {
                        console.error('Order QR Error:', e);
                    }
                }
            }, 100);
            
            showToast('تم تحميل الفاتورة بنجاح');
        } catch (error) {
            console.error('خطأ:', error);
            document.getElementById('invoiceRoot').innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl p-12 text-center">
                    <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
                    <h2 class="text-2xl font-bold text-gray-800">حدث خطأ</h2>
                    <p class="text-gray-600 mt-2">${error.message}</p>
                    <button onclick="location.reload()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg">إعادة المحاولة</button>
                </div>
            `;
            showToast(error.message, true);
        } finally {
            hideLoading();
        }
    }

    // ================= إنشاء PDF =================
    async function generatePDF() {
        const element = document.querySelector('.invoice-page');
        if (!element) {
            showToast('لا توجد فاتورة للتصدير', true);
            return;
        }
        
        showLoading();
        
        try {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(element, { 
                scale: 2, 
                useCORS: true, 
                backgroundColor: '#ffffff',
                logging: false
            });
            
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgData = canvas.toDataURL('image/png');
            const imgWidth = 210;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            pdf.save(`فاتورة_${currentOrder?.orderNumber || 'invoice'}.pdf`);
            showToast('تم حفظ PDF بنجاح');
        } catch(error) {
            console.error('PDF Error:', error);
            showToast('خطأ في إنشاء PDF: ' + error.message, true);
        } finally {
            hideLoading();
        }
    }

    // ================= ربط الأزرار =================
    document.getElementById('pdfBtn').onclick = generatePDF;
    
    // بدء التشغيل
    loadInvoice();
</script>
</body>
</html>
