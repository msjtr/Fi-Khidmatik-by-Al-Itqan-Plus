    // ================= دوال مساعدة =================
    function formatTime12(t) { 
        if(!t) return ''; 
        let [h, m] = t.split(':'); 
        let hour = parseInt(h); 
        let ap = hour >= 12 ? 'مساءً' : 'صباحاً'; 
        hour = hour % 12 || 12; 
        return `${hour}:${m} ${ap}`; 
    }
    
    function formatDateYMD(d) { 
        if(!d) return ''; 
        let p = d.split('-'); 
        return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d; 
    }
    
    function escapeHtml(str) { 
        if(!str) return ''; 
        return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
    }
    
    function getShippingMethodText(method) {

        if (method === 'pickup') return '🏪 استلام من المقر';
        if (method === 'noship') return '📥 لا يحتاج شحن';
        return method || 'غير محدد';
    }
    
    function getPaymentMethodName(method) {
        const methods = {
            'mada': 'مدى', 'mastercard': 'ماستركارد', 'visa': 'فيزا',
            'stcpay': 'STCPay', 'tamara': 'تمارا', 'tabby': 'تابي', 'other': 'أخرى'
        };
        return methods[method] || method || 'مدى';
    }

        const msgEl = document.getElementById('loadingMsg');

        ov.style.display = 'flex';
    }

        `;

    // ================= جلب الطلب من Firebase =================
    async function fetchOrder(orderId) {
        console.log('جاري جلب الطلب:', orderId);
        
        // جلب الطلب
        const orderDoc = await db.collection('orders').doc(orderId).get();
        if (!orderDoc.exists) {
            throw new Error('الطلب غير موجود');
        }
        
        const order = { id: orderDoc.id, ...orderDoc.data() };
        console.log('تم جلب الطلب بنجاح');
        
        // جلب بيانات العميل
        let customer = { name: 'غير معروف', phone: '', email: '', address: '' };
        if (order.customerId) {
            try {
                const customerDoc = await db.collection('customers').doc(order.customerId).get();
                if (customerDoc.exists) {
                    customer = customerDoc.data();
                }
            } catch(e) { console.warn('خطأ في جلب العميل:', e); }
        }
        
        // جلب بيانات المنتجات
        const items = [];
        for (const item of (order.items || [])) {
            let productImage = item.image || '';
            let productName = item.name || 'منتج';
            let productDesc = item.description || '';
            
            if (item.productId && item.productId !== 'null' && !item.productId.startsWith('temp_')) {
                try {
                    const productDoc = await db.collection('products').doc(item.productId).get();
                    if (productDoc.exists) {
                        const product = productDoc.data();
                        productImage = product.image || productImage;
                        productName = product.name || productName;
                        productDesc = product.description || productDesc;
                    }
                } catch(e) { console.warn('خطأ في جلب المنتج:', e); }
            }
            
            items.push({
                ...item,
                productName: productName,
                description: productDesc,
                image: productImage,
                price: item.price || 0
            });
        }
        
        return {
            ...order,
            customerName: customer.name,
            customerPhone: customer.phone,
            customerEmail: customer.email,
            customerAddress: customer.address || '',
            items: items
        };
    }

                        ${sellerData.name}<br>
                        المملكة العربية السعودية<br>
                        ${sellerData.address}<br>
                        📞 ${sellerData.phone}<br>
                        ✉️ ${sellerData.email}
                    </div>
                    <div class="address-box">
                        <strong>👤 مصدرة إلى</strong>
                        ${escapeHtml(order.customerName)}<br>
                        ${escapeHtml(order.customerAddress)}<br>
                        📞 ${escapeHtml(order.customerPhone)}<br>
                        ✉️ ${escapeHtml(order.customerEmail)}
                    </div>
                </div>
                
                <div class="payment-approval">
                    <div class="payment-box"><strong>💰 طريقة الدفع:</strong> ${getPaymentMethodName(order.paymentMethod)}</div>
                    <div class="payment-box"><strong>🚚 طريقة الاستلام:</strong> ${shipText}</div>
                    <div class="approval-box"><strong>✅ رمز الموافقة:</strong> ${order.approvalCode || 'غير مطلوب'}</div>
                </div>
                
                <table class="invoice-table">
                    <thead>
                        <tr><th>#</th><th>الصورة</th><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
                    </thead>
                    <tbody>${itemsHtml}</tbody>
                </table>
                
                <div class="totals">
                    <div><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                    ${discount > 0 ? `<div><span>الخصم:</span><span>- ${discount.toFixed(2)} ريال</span></div>` : ''}
                    <div><span>ضريبة القيمة المضافة 15%:</span><span>${tax.toFixed(2)} ريال</span></div>
                    <div class="grand-total"><span>الإجمالي النهائي:</span><span>${total.toFixed(2)} ريال</span></div>
                </div>
                
                <div class="barcodes-container">
                    <div class="barcode-item"><div id="zatcaQR" class="qr-placeholder"></div><p>باركود هيئة الزكاة</p></div>
                    <div class="barcode-item"><div id="orderQR" class="qr-placeholder"></div><p>باركود الطلب</p></div>
                </div>
                
                <div class="footer-note">
                    <div class="contact-info">
                        <span>📞 ${sellerData.phone}</span>
                        <span>💬 ${sellerData.whatsapp}</span>
                        <span>✉️ ${sellerData.email}</span>
                        <span>🌐 ${sellerData.website}</span>
                    </div>
                    <div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
                    <div class="page-number">صفحة 1 من 3</div>
                </div>
            </div>
        `;
    }
    
    function buildTermsPage1() {
        return `
            <div class="terms-section-page">
                <div class="header-top">
                    <div class="logo-area"><div class="logo-img">📄</div><div><div class="platform-name">${sellerData.name}</div></div></div>
                    <div class="invoice-title">الشروط والأحكام</div>
                    <div class="legal-numbers"><div>الرقم الضريبي: ${sellerData.taxNumber}</div></div>
                </div>
                ${termsContent}
                <div class="footer-note">
                    <div class="page-number">صفحة 2 من 3</div>
                </div>
            </div>
        `;
    }
    
    function buildTermsPage2(order) {
        let content = termsPage2Content;
        content = content.replace('customer-name-display', 'customer-name-display-final');
        content = content.replace('customer-date-display', 'customer-date-display-final');
        
        return `
            <div class="terms-section-page">
                <div class="header-top">
                    <div class="logo-area"><div class="logo-img">📄</div><div><div class="platform-name">${sellerData.name}</div></div></div>
                    <div class="invoice-title">الشروط والأحكام (تابع)</div>
                    <div class="legal-numbers"><div>الرقم الضريبي: ${sellerData.taxNumber}</div></div>
                </div>
                ${content}
                <div class="footer-note">
                    <div>آخر تحديث: ${new Date().toLocaleDateString('ar-SA')}</div>
                    <div class="page-number">صفحة 3 من 3</div>
                </div>
            </div>
        `;
    }
    
    function generateZATCAQR(order) {
        const sellerName = sellerData.name;
        const vatNumber = sellerData.taxNumber;
        const timestamp = new Date().toISOString();
        const total = order.total || 0;
        const tax = order.tax || ((order.subtotal || 0) * 0.15);
        
        // تشفير TLV
        const tlvData = String.fromCharCode(1) + String.fromCharCode(sellerName.length) + sellerName +
                       String.fromCharCode(2) + String.fromCharCode(vatNumber.length) + vatNumber +
                       String.fromCharCode(3) + String.fromCharCode(timestamp.length) + timestamp +
                       String.fromCharCode(4) + String.fromCharCode(total.toFixed(2).length) + total.toFixed(2) +
                       String.fromCharCode(5) + String.fromCharCode(tax.toFixed(2).length) + tax.toFixed(2);
        
        return btoa(tlvData);
    }
    
    // ================= تحميل وعرض الفاتورة =================
    async function loadInvoice() {
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        
        if (!orderId || orderId === 'null') {
            document.getElementById('invoiceRoot').innerHTML = `
                <div class="invoice-page" style="text-align:center;display:flex;align-items:center;justify-content:center;min-height:297mm;">
                    <div>
                        <h2 style="color:#ef4444;">⚠️ خطأ</h2>
                        <p>لم يتم تحديد رقم الطلب</p>
                        <p style="font-size:12px;margin-top:20px;">الرجاء استخدام الرابط: print.html?id=معرف_الطلب</p>
                    </div>
                </div>
            `;
            return;
        }
        
        showLoading('جاري تحميل الفاتورة...');
        
        try {
            const order = await fetchOrder(orderId);
            currentOrder = order;
            
            const html = buildInvoiceHTML(order) + buildTermsPage1() + buildTermsPage2(order);
            document.getElementById('invoiceRoot').innerHTML = html;
            
            // تحديث التواقيع
            setTimeout(() => {
                const nameSpans = document.querySelectorAll('.customer-name-display, .customer-name-display-final');
                const dateSpans = document.querySelectorAll('.customer-date-display, .customer-date-display-final');
                
                nameSpans.forEach(span => { if(span) span.textContent = order.customerName; });
                dateSpans.forEach(span => { if(span) span.textContent = `${formatDateYMD(order.orderDate)} - ${formatTime12(order.orderTime)}`; });
                
                // إنشاء QR Codes
                const zatcaDiv = document.getElementById('zatcaQR');
                if (zatcaDiv && typeof QRCode !== 'undefined') {
                    try {
                        const qrData = generateZATCAQR(order);
                        new QRCode(zatcaDiv, { text: qrData, width: 100, height: 100 });
                    } catch(e) { console.error('QR Error:', e); }
                }
                
                const orderDiv = document.getElementById('orderQR');
                if (orderDiv && typeof QRCode !== 'undefined') {
                    try {
                        new QRCode(orderDiv, { text: window.location.href, width: 100, height: 100 });
                    } catch(e) { console.error('QR Error:', e); }
                }
            }, 100);
            
            showToast('تم تحميل الفاتورة بنجاح', false);
            hideLoading();
            
        } catch (error) {
            console.error('خطأ:', error);
            document.getElementById('invoiceRoot').innerHTML = `
                <div class="invoice-page" style="text-align:center;display:flex;align-items:center;justify-content:center;min-height:297mm;">
                    <div>
                        <h2 style="color:#ef4444;">⚠️ حدث خطأ</h2>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#1e3a5f;color:white;border:none;border-radius:8px;cursor:pointer;">إعادة المحاولة</button>
                    </div>
                </div>
            `;
            showToast(error.message, true);
            hideLoading();
        }
    }
    
    // ================= إنشاء PDF =================
    async function generatePDF() {
        const root = document.getElementById('invoiceRoot');
        const pages = root.querySelectorAll('.invoice-page, .terms-section-page');
        
        if (!pages.length) {
            showToast('لا توجد فاتورة للتصدير', true);
            return;
        }
        
        showLoading('جاري إنشاء PDF...');
        
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { 
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: '#ffffff',
                    logging: false
                });
                
                if (i !== 0) pdf.addPage();
                
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            }
            
            pdf.save(`فاتورة_${currentOrder?.orderNumber || 'invoice'}.pdf`);
            showToast('تم حفظ PDF بنجاح', false);
            
        } catch(error) {
            console.error('PDF Error:', error);
            showToast('خطأ في إنشاء PDF: ' + error.message, true);
        } finally {
            hideLoading();
        }
    }
    
    // ================= ربط الأزرار =================
    document.getElementById('printBtn').onclick = () => window.print();
    document.getElementById('pdfBtn').onclick = generatePDF;
    
    // بدء التشغيل
    loadInvoice();
</script>
</body>
</html>
