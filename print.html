<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة الفاتورة - منصة في خدمتك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:;base64,iVBORw0KGgo="> <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="css/invoice.css">

    <style>
        .control-panel { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
        .btn-action { font-family: 'Tajawal'; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-pdf { background: #1a1a1a; color: white; transition: 0.3s; }
        .btn-pdf:hover { background: #d4af37; }
        #loader { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; font-family: 'Tajawal'; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #1a1a1a; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media print { .control-panel { display: none !important; } }
    </style>
</head>
<body>

    <div class="control-panel">
        <button class="btn-action btn-pdf" onclick="window.downloadPDF()">📥 حفظ PDF</button>
        <button class="btn-action" onclick="window.print()">🖨️ طباعة</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-text">جاري الاتصال بقاعدة البيانات...</p>
    </div>

    <div id="print-app"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/invoice.js"></script>

    <script>
        // تعريف الدالة فوراً لتكون متاحة لملف order.js
        window.getDocument = async (col, id) => {
            if (!window.db) return { success: false, error: "Database not initialized" };
            try {
                const snap = await window.db.collection(col).doc(id).get();
                return snap.exists ? { id: snap.id, ...snap.data(), success: true } : { success: false };
            } catch (e) { return { success: false, error: e.message }; }
        };

        window.downloadPDF = function() {
            const element = document.getElementById('print-app');
            html2pdf().set({
                margin: 0, filename: 'invoice.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(element).save();
        };

        function initializeSystem() {
            if (typeof firebase !== 'undefined' && typeof QRCode !== 'undefined') {
                const firebaseConfig = {
                    apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
                    authDomain: "msjt301-974bb.firebaseapp.com",
                    projectId: "msjt301-974bb",
                    storageBucket: "msjt301-974bb.firebasestorage.app",
                    messagingSenderId: "186209858482",
                    appId: "1:186209858482:web:186ca610780799ef562aab"
                };
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                window.db = firebase.firestore();
                
                // تشغيل محرك الطباعة بعد التأكد من وجود db
                const script = document.createElement('script');
                script.type = 'module';
                script.src = 'js/print.js';
                document.body.appendChild(script);
            } else {
                setTimeout(initializeSystem, 100);
            }
        }
        initializeSystem();
    </script>
</body>
</html>
