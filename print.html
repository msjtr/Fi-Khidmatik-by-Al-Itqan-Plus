<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>في خدمتك - فاتورة إلكترونية</title>
    
    <!-- مكتبات خارجية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <style>
        /* ========================================
           الأنماط الأساسية - تصميم احترافي عالي الجودة
           ======================================== */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e9ecef;
            font-family: 'Segoe UI', 'Tahoma', 'Arial', 'Cairo', sans-serif;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .invoice-wrapper {
            max-width: 210mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border-radius: 8px;
            overflow: hidden;
        }

        /* صفحات الفاتورة */
        .invoice-page, .terms-page, .declaration-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            padding: 12mm 10mm;
            position: relative;
            page-break-after: always;
            break-inside: avoid;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* منع انقسام الصفوف */
        .invoice-table tr {
            break-inside: avoid;
            page-break-inside: avoid;
        }

        /* ========== رأس الصفحة (الترويسة) ========== */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #1e3a5f;
            padding-bottom: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 65px;
            height: 65px;
            object-fit: contain;
        }

        .platform-name {
            font-size: 20px;
            font-weight: bold;
            color: #1e3a5f;
        }
        
        .platform-slogan {
            font-size: 10px;
            color: #6c757d;
        }

        .invoice-title {
            font-size: 26px;
            font-weight: bold;
            color: #1e3a5f;
            letter-spacing: -0.5px;
        }

        .legal-numbers {
            text-align: left;
            font-size: 10px;
            color: #4a5568;
            line-height: 1.5;
        }

        /* ========== معلومات الطلب ========== */
        .info-row {
            display: flex;
            justify-content: space-between;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            padding: 12px 15px;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid #e2e8f0;
        }

        .info-item {
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge {
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            display: inline-block;
        }

        /* ========== العناوين ========== */
        .addresses {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .address-box {
            flex: 1;
            background: #f9f9fb;
            padding: 12px 15px;
            border-radius: 14px;
            border: 1px solid #e9ecef;
            font-size: 11px;
            line-height: 1.6;
        }

        .address-box strong {
            display: block;
            margin-bottom: 8px;
            color: #1e3a5f;
            font-size: 13px;
            border-right: 3px solid #1e3a5f;
            padding-right: 8px;
        }

        /* ========== طرق الدفع والاستلام ========== */
        .payment-approval {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .payment-box, .approval-box {
            flex: 1;
            background: #f1f5f9;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 11px;
        }

        .payment-box strong, .approval-box strong {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #1e3a5f;
        }

        /* ========== جدول المنتجات ========== */
        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 11px;
        }

        .invoice-table th {
            background: #1e3a5f;
            color: white;
            padding: 10px 8px;
            border: 1px solid #2d4a7a;
            font-weight: bold;
            text-align: center;
        }

        .invoice-table td {
            border: 1px solid #cbd5e1;
            padding: 10px 8px;
            vertical-align: middle;
        }

        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            background: #f1f5f9;
        }

        /* ========== الإجماليات ========== */
        .totals {
            width: 280px;
            margin-right: auto;
            margin-top: 20px;
            margin-bottom: 25px;
            border-top: 2px solid #e2e8f0;
            padding-top: 12px;
        }

        .totals div {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
        }

        .grand-total {
            font-weight: bold;
            font-size: 16px;
            color: #1e3a5f;
            border-top: 2px solid #1e3a5f;
            margin-top: 6px;
            padding-top: 10px;
        }

        /* ========== الباركودات - فقط باركود المنصة ========== */
        .barcodes-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            padding: 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .barcode-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        .qr-placeholder {
            width: 100px;
            height: 100px;
        }

        .barcode-label {
            font-size: 11px;
            font-weight: bold;
            color: #1e3a5f;
        }

        .barcode-sub {
            font-size: 9px;
            color: #6c757d;
        }

        .barcode-note {
            font-size: 9px;
            color: #1e3a5f;
            margin-top: 5px;
            font-weight: 500;
        }

        /* ========== تذييل الصفحة (التذليل) ========== */
        .footer-note {
            margin-top: auto;
            font-size: 10px;
            text-align: center;
            color: #475569;
            border-top: 1px solid #e2e8f0;
            padding-top: 15px;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 12px 0;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 10px;
        }

        .contact-info span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* ========== ترقيم الصفحات ========== */
        .page-number {
            text-align: left;
            font-size: 10px;
            color: #94a3b8;
            margin-top: 15px;
            direction: ltr;
        }

        /* ========== صفحة الشروط والأحكام ========== */
        .terms-page {
            background: white;
        }

        .terms-page .page-title {
            color: #1e3a5f;
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: bold;
            border-right: 4px solid #1e3a5f;
            padding-right: 12px;
        }

        .terms-intro {
            background: #fef3c7;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 11px;
            line-height: 1.7;
            border-right: 4px solid #f59e0b;
        }

        .terms-content {
            flex: 1;
        }

        .terms-section {
            margin-bottom: 20px;
            background: #fafafa;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .terms-section h4 {
            background: #1e3a5f;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-bottom: 12px;
            display: inline-block;
        }

        .terms-section p {
            font-size: 10.5px;
            line-height: 1.7;
            color: #334155;
        }

        .terms-section p strong {
            color: #1e3a5f;
        }

        /* ========== صفحة الإقرار ========== */
        .declaration-page {
            background: white;
        }

        .declaration-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-top: 15px;
            flex: 1;
        }

        .signature-line {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        /* ========== أزرار التحكم ========== */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px auto;
            flex-wrap: wrap;
            position: sticky;
            bottom: 20px;
            background: white;
            padding: 12px 20px;
            border-radius: 60px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: fit-content;
            z-index: 100;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn-primary { background: #1e3a5f; color: white; }
        .btn-secondary { background: #334155; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }

        /* ========== أنماط الطباعة ========== */
        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            
            .invoice-wrapper {
                box-shadow: none;
                margin: 0;
                max-width: 100%;
            }
            
            .invoice-page, .terms-page, .declaration-page {
                margin: 0;
                padding: 15mm 12mm;
                page-break-after: always;
            }
            
            .action-buttons, .no-print {
                display: none !important;
            }
            
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
        }

        /* ========== أنماط التحميل ========== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-box {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3a5f;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 10000;
            font-size: 14px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media screen and (max-width: 768px) {
            .invoice-page, .terms-page, .declaration-page { padding: 8mm 6mm; }
            .invoice-table th, .invoice-table td { padding: 6px 4px; font-size: 9px; }
            .product-img { width: 40px; height: 40px; }
            .addresses, .payment-approval { flex-direction: column; gap: 10px; }
            .terms-section p { font-size: 9px; }
            .qr-placeholder { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
<div style="display: flex; flex-direction: column; align-items: center;">
    <div class="invoice-wrapper" id="invoiceRoot">
        <div class="loading-box" style="text-align: center; padding: 50px;">
            <div class="loading-spinner"></div>
            <p>جاري تحميل الفاتورة...</p>
        </div>
    </div>
    <div class="action-buttons no-print">
        <button class="btn btn-primary" id="printBtn">🖨️ طباعة مباشرة</button>
        <button class="btn btn-secondary" id="pdfBtn">📄 PDF</button>
        <button class="btn btn-secondary" id="pngBtn">🖼️ PNG</button>
        <button class="btn btn-success" id="zipBtn">📦 تحميل مضغوط</button>
        <button class="btn btn-danger" id="backBtn" onclick="window.close()">✖️ إغلاق</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let orderData = null;
    let customerData = null;

    function showLoading(message = 'جاري التحميل...') {
        let overlay = document.getElementById('loadingOverlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'loadingOverlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = `<div class="loading-box"><div class="loading-spinner"></div><p id="loadingMessage">${message}</p></div>`;
            document.body.appendChild(overlay);
        }
        const msgEl = document.getElementById('loadingMessage');
        if (msgEl) msgEl.textContent = message;
        overlay.style.display = 'flex';
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.style.display = 'none';
    }

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = type === 'success' ? '✅ ' + message : '❌ ' + message;
        toast.style.background = type === 'success' ? '#10b981' : '#ef4444';
        toast.style.color = 'white';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    function generateFileName() {
        const customerName = (orderData?.customerName || orderData?.customer || 'عميل').replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '_');
        const orderNumber = orderData?.orderNumber || 'unknown';
        const orderDate = orderData?.orderDate || new Date().toISOString().split('T')[0];
        return `فاتورة_${customerName}_${orderNumber}_${orderDate}`;
    }

    async function fetchCustomerData(customerId) {
        if (!customerId) return null;
        try {
            const customerRef = doc(db, 'customers', customerId);
            const customerSnap = await getDoc(customerRef);
            if (customerSnap.exists()) {
                return { id: customerSnap.id, ...customerSnap.data() };
            }
            return null;
        } catch (error) {
            console.error('خطأ في جلب العميل:', error);
            return null;
        }
    }

    async function fetchOrderData() {
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        const autoPrint = urlParams.get('print') === 'true' || urlParams.get('auto') === 'print';
        
        if (orderId && orderId !== 'null' && orderId !== 'undefined') {
            try {
                showLoading('جاري تحميل بيانات الطلب...');
                const orderRef = doc(db, 'orders', orderId);
                const orderSnap = await getDoc(orderRef);
                
                if (orderSnap.exists()) {
                    orderData = { id: orderSnap.id, ...orderSnap.data() };
                    
                    if (orderData.customerId) {
                        customerData = await fetchCustomerData(orderData.customerId);
                        if (customerData) {
                            orderData.customerName = customerData.name;
                            orderData.customerPhone = customerData.phone;
                            orderData.customerEmail = customerData.email;
                            const addressParts = [];
                            if (customerData.city) addressParts.push(customerData.city);
                            if (customerData.street) addressParts.push(customerData.street);
                            if (customerData.additionalNo) addressParts.push(`رقم إضافي: ${customerData.additionalNo}`);
                            if (customerData.poBox) addressParts.push(`ص.ب: ${customerData.poBox}`);
                            if (customerData.postalCode) addressParts.push(`الرمز البريدي: ${customerData.postalCode}`);
                            orderData.customerAddress = addressParts.join(' - ') || 'لا يوجد عنوان';
                        }
                    }
                    
                    showToast('تم تحميل الفاتورة بنجاح', 'success');
                    if (autoPrint) setTimeout(() => printInvoice(), 1000);
                    return;
                }
            } catch(e) { 
                console.error(e);
                showToast('خطأ في جلب البيانات', 'error');
            }
        }
        
        // بيانات تجريبية
        orderData = {
            id: "demo_001",
            orderNumber: "KF-2603290287",
            orderDate: "2026-04-06",
            orderTime: "14:30",
            status: "تم التنفيذ",
            customerName: "أحمد محمد السالم",
            customerPhone: "+966551234567",
            customerEmail: "ahmed@example.com",
            customerAddress: "الرياض - حي المروج - شارع الأمير فيصل - رقم 2215",
            subtotal: 19282.00,
            discount: 5784.60,
            tax: 2024.61,
            total: 15522.01,
            paymentMethodName: "تحويل بنكي",
            shippingMethod: "delivery",
            approvalCode: "AP-8821X9",
            items: [
                { id: 1, name: "حزمة تطوير متكامل", description: "تصميم مواقع ويب متكامل + لوحة تحكم", image: "https://picsum.photos/id/48/200/200", quantity: 1, price: 12500.00 },
                { id: 2, name: "استضافة سحابية", description: "استضافة لمدة عام + دعم فني", image: "https://picsum.photos/id/0/200/200", quantity: 2, price: 2391.00 },
                { id: 3, name: "شهادة SSL متقدمة", description: "حماية مواقع", image: "https://picsum.photos/id/91/200/200", quantity: 1, price: 2000.00 }
            ],
            seller: { name: "منصة في خدمتك", taxNumber: "312495447600003" }
        };
    }

    function formatTime12(time24) {
        if (!time24) return '';
        let [h, m] = time24.split(':');
        let hour = parseInt(h);
        let ampm = hour >= 12 ? 'مساءً' : 'صباحاً';
        hour = hour % 12 || 12;
        return `${hour.toString().padStart(2, '0')}:${m} ${ampm}`;
    }

    function formatDateYMD(dateStr) {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        return dateStr;
    }

    function renderProductRows(items) {
        if (!items || items.length === 0) return '<tr><td colspan="7" style="text-align:center;">لا توجد منتجات</td></tr>';
        return items.map((item, idx) => `
            <tr>
                <td style="text-align:center">${idx + 1}</td>
                <td style="text-align:center">
                    ${item.image ? `<img src="${item.image}" class="product-img" onerror="this.style.display='none'">` : 
                      '<div style="width:50px;height:50px;background:#f3f4f6;border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto;">📦</div>'}
                </td>
                <td style="text-align:right"><strong>${escapeHtml(item.name)}</strong><br><small>${escapeHtml(item.description || '')}</small></td>
                <td style="text-align:center">${item.quantity}</td>
                <td style="text-align:center">${(item.price || 0).toFixed(2)} ريال</td>
                <td style="text-align:center">${((item.price || 0) * item.quantity).toFixed(2)} ريال</td>
            </tr>
        `).join('');
    }

    function buildHeader() {
        return `
            <div class="header-top">
                <div class="logo-area">
                    <img src="images/logo.svg" class="logo-img" alt="logo" onerror="this.src='https://placehold.co/65x65/1e3a5f/white?text=في+خدمتك'">
                    <div>
                        <div class="platform-name">منصة في خدمتك</div>
                        <div class="platform-slogan">خدمات تقنية متكاملة</div>
                    </div>
                </div>
                <div class="invoice-title">فاتورة إلكترونية</div>
                <div class="legal-numbers">
                    <div>📜 رقم شهادة العمل الحر: FL-765735204</div>
                    <div>🏢 الرقم الضريبي: 312495447600003</div>
                </div>
            </div>
        `;
    }

    function buildFooter(pageNum, totalPages) {
        return `
            <div class="footer-note">
                <div class="contact-info">
                    <span>📞 <strong>الهاتف:</strong> 966534051317</span>
                    <span>💬 <strong>الواتساب:</strong> 966545312021</span>
                    <span>✉️ <strong>البريد:</strong> info@fi-khidmatik.com</span>
                    <span>🌐 <strong>الموقع:</strong> www.khidmatik.com</span>
                </div>

    function buildInvoicePage(order, pageNumber, totalPages) {
        const itemsHtml = renderProductRows(order.items);

        return `

                        📮 الرمز البريدي: 55431

                    <div class="address-box">

                        <strong>54. الملكية الفكرية:</strong> تبقى جميع حقوق الملكية الفكرية محفوظة لمقدم الخدمة ما لم يتم الاتفاق على نقلها بشكل مكتوب.<br>
                        <strong>55. تحديث الشروط:</strong> يحق لمقدم الخدمة تحديث أو تعديل هذه الشروط مستقبلاً وتسري على الأعمال الجديدة.<br>
                        <strong>56. استقلالية البنود:</strong> يتم تفسير كل بند من بنود هذا المستند بشكل مستقل دون التأثير على بقية البنود.<br>
                        <strong>57. الشروط الإضافية والملحقات:</strong> في حال وجود أي شروط أو طلبات أو متطلبات إضافية من قبل العميل سواء كانت فنية أو تشغيلية أو مالية أو تنظيمية ولم تكن ضمن نطاق هذا عرض السعر / الفاتورة فإنه يتم توثيقها حصراً في ملحق اتفاق مستقل يتم إعداده واعتماده من قبل الطرفين بشكل خطي ورسمي، ولا تُعد تلك الشروط أو الطلبات الإضافية جزءًا من هذا المستند ولا يترتب عليها أي تعديل أو تأثير على أي من بنوده ما لم يتم النص على ذلك صراحةً وبشكل مكتوب في ذلك الملحق، كما لا يُعتد بأي اتفاقات أو تفاهمات أو مراسلات سواء كانت شفهية أو غير موثقة ما لم يتم تضمينها في ملحق رسمي معتمد.</p>
                    </div>
                </div>
                ${buildFooter(pageNum, totalPages)}
            </div>
        `;
    }

    function buildDeclarationPage(pageNum, totalPages) {
        return `
            <div class="declaration-page">
                ${buildHeader()}
                <div class="page-title" style="font-size:20px; margin-bottom:20px;">✍️ الإقرار والتوقيع</div>
                
                <div class="declaration-box">
                    <p style="font-size:13px; font-weight:bold; text-align:center; line-height:1.8;">
                        🤝 أقر أنا العميل بالاطلاع على جميع الشروط والأحكام أعلاه وأوافق عليها بالكامل وأتعهد بالالتزام بها دون أي استثناء.
                    </p>
                </div>
                
                <div class="signature-line">
                    <div><strong>👤 الاسم:</strong> ${escapeHtml(orderData?.customerName || '_________________')}</div>
                    <div><strong>📅 التاريخ:</strong> ${new Date().toLocaleDateString('ar-SA')}</div>
                </div>
                <div style="margin-top:12px;"><strong>✍️ التوقيع:</strong> _________________</div>
                <div style="margin-top:8px; font-size:10px; color:#666;">📌 يعد هذا التوقيع إقراراً نهائياً بالموافقة على جميع البنود والشروط</div>
                
                ${buildFooter(pageNum, totalPages)}
            </div>
        `;
    }

    async function renderFullInvoice() {
        await fetchOrderData();
        
        if (!orderData) {
            document.getElementById('invoiceRoot').innerHTML = `
                <div class="loading-box" style="text-align:center;padding:50px;">
                    <p style="color:red;">❌ حدث خطأ في تحميل الفاتورة</p>
                    <button onclick="window.close()" style="margin-top:20px;padding:10px20px;">إغلاق</button>
                </div>`;
            hideLoading();
            return;
        }
        
        // إجمالي الصفحات: صفحة الفاتورة + 3 صفحات شروط + صفحة الإقرار = 5 صفحات
        const page1 = buildInvoicePage(orderData, 1, 5);
        const page2 = buildTermsPage1(2, 5);
        const page3 = buildTermsPage2(3, 5);
        const page4 = buildTermsPage3(4, 5);
        const page5 = buildDeclarationPage(5, 5);
        
        document.getElementById('invoiceRoot').innerHTML = page1 + page2 + page3 + page4 + page5;
        
        setTimeout(() => {
            // فقط باركود المنصة
            const platformQrDiv = document.getElementById('platformQR');
            if (platformQrDiv && typeof QRCode !== 'undefined') {
                try {
                    new QRCode(platformQrDiv, {
                        text: 'https://www.khidmatik.com',
                        width: 100,
                        height: 100,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } catch(e) { console.warn(e); }
            }
        }, 100);
        
        hideLoading();
    }

    function printInvoice() {
        const printWindow = window.open('', '_blank');
        if (!printWindow) {
            showToast('الرجاء السماح للنوافذ المنبثقة', 'error');
            return;
        }
        
        const styles = document.querySelector('style').innerHTML;
        const content = document.getElementById('invoiceRoot').innerHTML;
        
        printWindow.document.write(`
            <!DOCTYPE html>
            <html dir="rtl">
            <head>
                <meta charset="UTF-8">
                <title>فاتورة ${orderData.orderNumber}</title>
                <style>${styles} body { padding:0; margin:0; background:white; } .action-buttons, .no-print { display:none !important; } @page { size: A4; margin: 0; } * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }</style>
            </head>
            <body>${content}</body>
            </html>
        `);
        printWindow.document.close();
        printWindow.focus();
        printWindow.print();
        showToast('تم إرسال الفاتورة للطباعة', 'success');
    }

    async function generatePDF() {
        const element = document.getElementById('invoiceRoot');
        const pages = element.querySelectorAll('.invoice-page, .terms-page, .declaration-page');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        showLoading('جاري إنشاء PDF بدقة عالية...');
        try {
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 4, useCORS: true, logging: false, backgroundColor: '#ffffff' });
                if (i !== 0) pdf.addPage();
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
            }
            const fileName = generateFileName();
            pdf.save(`${fileName}.pdf`);
            showToast('تم حفظ PDF بدقة عالية', 'success');
        } catch (error) { showToast('خطأ في PDF', 'error'); }
        finally { hideLoading(); }
    }

    async function generatePNG() {
        const element = document.getElementById('invoiceRoot');
        showLoading('جاري إنشاء PNG بدقة عالية...');
        try {
            const canvas = await html2canvas(element, { scale: 4, backgroundColor: '#ffffff', useCORS: true });
            const link = document.createElement('a');
            const fileName = generateFileName();
            link.download = `${fileName}.png`;
            link.href = canvas.toDataURL();
            link.click();
            showToast('تم حفظ PNG بدقة عالية', 'success');
        } catch (error) { showToast('خطأ في PNG', 'error'); }
        finally { hideLoading(); }
    }

    async function generateZIP() {
        const element = document.getElementById('invoiceRoot');
        const zip = new JSZip();
        const { jsPDF } = window.jspdf;
        const pages = element.querySelectorAll('.invoice-page, .terms-page, .declaration-page');
        const pdf = new jsPDF('p', 'mm', 'a4');
        showLoading('جاري إنشاء الملف المضغوط...');
        try {
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 4, useCORS: true });
                if (i !== 0) pdf.addPage();
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
            }
            const fileName = generateFileName();
            zip.file(`${fileName}.pdf`, pdf.output('blob'));
            const fullCanvas = await html2canvas(element, { scale: 4, useCORS: true });
            const pngBlob = await new Promise(resolve => fullCanvas.toBlob(resolve, 'image/png'));
            zip.file(`${fileName}.png`, pngBlob);
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${fileName}.zip`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('تم حفظ الملف المضغوط', 'success');
        } catch (error) { showToast('خطأ في ZIP', 'error'); }
        finally { hideLoading(); }
    }

    document.getElementById('printBtn')?.addEventListener('click', printInvoice);
    document.getElementById('pdfBtn')?.addEventListener('click', generatePDF);
    document.getElementById('pngBtn')?.addEventListener('click', generatePNG);
    document.getElementById('zipBtn')?.addEventListener('click', generateZIP);

    renderFullInvoice();
</script>
</body>
</html>
