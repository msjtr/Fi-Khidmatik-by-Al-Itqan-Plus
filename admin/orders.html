<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الطلبات</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="../js/firebase.js"></script>
    <script src="../js/admin.js"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between mb-4">
            <h2 class="text-2xl font-bold">إدارة الطلبات</h2>
            <button onclick="showAddOrderModal()" class="bg-blue-600 text-white px-4 py-2 rounded">+ طلب جديد</button>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full bg-white">
                <thead class="bg-gray-100">
                    <tr>
                        <th>رقم الطلب</th><th>العميل</th><th>المبلغ</th><th>الحالة</th><th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="orders-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        let orders = [];
        let customers = [];

        async function loadOrders() {
            orders = await getCollection('orders');
            customers = await getCollection('customers');
            renderOrders();
        }

        function renderOrders() {
            const tbody = document.getElementById('orders-list');
            tbody.innerHTML = orders.map(order => {
                const customer = customers.find(c => c.id === order.customerId) || { name: 'غير معروف' };
                let statusClass = '';
                if (order.status === 'مدفوع') statusClass = 'text-green-600 bg-green-100';
                else if (order.status === 'غير مدفوع') statusClass = 'text-red-600 bg-red-100';
                else if (order.status === 'مسترجع') statusClass = 'text-orange-600 bg-orange-100';
                else if (order.status === 'ملغي') statusClass = 'text-gray-600 bg-gray-100';
                return `
                    <tr>
                        <td>${order.id}</td>
                        <td>${customer.name}</td>
                        <td>${order.totalAmount} ريال</td>
                        <td><span class="px-2 py-1 rounded ${statusClass}">${order.status}</span></td>
                        <td>
                            <button onclick="editOrder('${order.id}')" class="text-blue-600"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteOrder('${order.id}')" class="text-red-600 mx-2"><i class="fas fa-trash"></i></button>
                            <button onclick="updateStatus('${order.id}', 'مسترجع')" class="text-orange-600"><i class="fas fa-undo-alt"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.editOrder = async (id) => {
            const order = orders.find(o => o.id === id);
            const newStatus = prompt('تغيير الحالة (مدفوع/غير مدفوع/مسترجع/ملغي):', order.status);
            if (newStatus && ['مدفوع','غير مدفوع','مسترجع','ملغي'].includes(newStatus)) {
                await updateDocument('orders', id, { status: newStatus });
                loadOrders();
            }
        };

        window.deleteOrder = async (id) => {
            if (confirm('هل أنت متأكد من حذف الطلب؟')) {
                await deleteDocument('orders', id);
                loadOrders();
            }
        };

        window.updateStatus = async (id, status) => {
            await updateDocument('orders', id, { status });
            loadOrders();
        };

        window.showAddOrderModal = () => {
            // نموذج مبسط لإضافة طلب
            const customerId = prompt('أدخل معرف العميل (اختر من العملاء):');
            const total = prompt('المبلغ الإجمالي:');
            if (customerId && total) {
                addDocument('orders', {
                    customerId,
                    totalAmount: parseFloat(total),
                    status: 'غير مدفوع',
                    orderDate: new Date().toISOString().slice(0,10),
                    items: []
                }).then(() => loadOrders());
            }
        };

        loadOrders();
    </script>
</body>
</html>
