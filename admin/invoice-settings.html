<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تعليمات الفاتورة</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="../js/firebase.js"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-4">تعليمات الفاتورة</h2>
        <textarea id="invoiceText" rows="6" class="w-full border rounded p-2"></textarea>
        <button onclick="saveInvoiceText()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">حفظ التعليمات</button>
    </div>
    <script>
        async function loadInvoiceText() {
            const doc = await db.collection('settings').doc('invoice').get();
            if (doc.exists) {
                document.getElementById('invoiceText').value = doc.data().text || '';
            } else {
                document.getElementById('invoiceText').value = 'شكراً لتسوقكم معنا. في حال وجود استفسار يرجى التواصل مع الدعم.';
            }
        }
        window.saveInvoiceText = async () => {
            const text = document.getElementById('invoiceText').value;
            await db.collection('settings').doc('invoice').set({ text });
            alert('تم حفظ التعليمات');
        };
        loadInvoiceText();
    </script>
</body>
</html>
