<style>
    :root {
        --tera-orange: #f97316;
        --tera-orange-soft: rgba(249, 115, 22, 0.1);
        --sidebar-bg: #ffffff;
        --sidebar-text: #64748b;
        --sidebar-active-text: #1e293b;
        --sidebar-border: #f1f5f9;
    }

    .app-sidebar {
        display: flex;
        flex-direction: column;
        background: var(--sidebar-bg);
        height: 100vh;
        width: 280px;
        border-left: 1px solid var(--sidebar-border);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .sidebar-header { padding: 35px 25px 20px; }
    .brand-minimal { display: flex; align-items: center; gap: 15px; }

    .logo-dot-tera {
        width: 12px; height: 12px;
        background: var(--tera-orange);
        border-radius: 4px;
        box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
    }

    .menu-label {
        font-size: 0.8rem; font-weight: 900;
        color: #1e293b; text-transform: uppercase;
        letter-spacing: 1px;
    }

    .side-nav { flex: 1; padding: 15px; overflow-y: auto; }
    #admin-menu { list-style: none; padding: 0; }

    .nav-item {
        position: relative; display: flex; align-items: center;
        gap: 15px; padding: 12px 18px; margin-bottom: 6px;
        border-radius: 16px; color: var(--sidebar-text);
        font-weight: 700; font-size: 0.95rem; cursor: pointer;
        transition: all 0.25s ease;
    }

    .nav-icon {
        width: 36px; height: 36px; display: flex;
        align-items: center; justify-content: center;
        border-radius: 12px; background: #f8fafc;
        font-size: 1.1rem; transition: 0.3s;
    }

    /* تأثيرات التفاعل - Hover & Active */
    .nav-item:hover {
        background: #f8fafc;
        color: var(--tera-orange);
        transform: translateX(-5px);
    }

    .nav-item.active {
        background: var(--tera-orange-soft);
        color: var(--tera-orange);
    }

    .nav-item.active .nav-icon {
        background: var(--tera-orange);
        color: #ffffff;
        box-shadow: 0 5px 15px rgba(249, 115, 22, 0.3);
    }

    /* مؤشر النشاط البرتقالي */
    .active-indicator {
        position: absolute; left: -15px; width: 5px; height: 25px;
        background: var(--tera-orange); border-radius: 0 4px 4px 0;
        opacity: 0; transition: 0.3s;
    }
    .nav-item.active .active-indicator { opacity: 1; }

    .nav-divider { margin: 25px 10px 15px; height: 1px; background: var(--sidebar-border); position: relative; }
    .nav-divider span {
        position: absolute; top: -10px; right: 15px;
        background: var(--sidebar-bg); padding: 0 12px;
        font-size: 0.7rem; color: #cbd5e1; font-weight: 900;
    }

    /* فوتر السايدبار المطور */
    .sidebar-footer { padding: 20px; border-top: 1px solid var(--sidebar-border); }

    .status-card {
        background: #f8fafc; padding: 15px; border-radius: 18px;
        display: flex; align-items: center; gap: 12px;
        border: 1px solid var(--sidebar-border);
    }

    .pulse-container { position: relative; width: 10px; height: 10px; }
    .dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; }
    .pulse {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: #10b981; border-radius: 50%; opacity: 0.5;
        animation: status-pulse 2s infinite ease-out;
    }

    .status-info { display: flex; flex-direction: column; }
    .status-title { font-size: 0.75rem; color: #1e293b; font-weight: 800; }
    .status-server { font-size: 0.65rem; color: #64748b; font-weight: 600; }

    @keyframes status-pulse {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(3); opacity: 0; }
    }

    /* حالة الانكماش */
    .app-sidebar.collapsed { width: 88px; }
    .app-sidebar.collapsed .nav-text, 
    .app-sidebar.collapsed .menu-label, 
    .app-sidebar.collapsed .nav-divider span,
    .app-sidebar.collapsed .status-info { display: none; }
    .app-sidebar.collapsed .sidebar-header,
    .app-sidebar.collapsed .status-card { justify-content: center; padding: 15px 0; }
</style>

<script>
    /**
     * تحديث العنصر النشط بناءً على الـ Hash في الرابط
     */
    function syncSidebarWithHash() {
        const hash = window.location.hash || '#dashboard';
        const targetModule = hash.replace('#', '');
        
        document.querySelectorAll('.nav-item').forEach(item => {
            const moduleName = item.getAttribute('data-module');
            if (moduleName === targetModule) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });

        // استدعاء دالة التحميل الرئيسية إذا كانت متوفرة
        if (typeof window.loadModule === 'function') {
            window.loadModule(targetModule);
        }
    }

    window.addEventListener('hashchange', syncSidebarWithHash);
    window.addEventListener('load', syncSidebarWithHash);
</script>
