<!-- 
    Tera Gateway v12.12.13 | Integrated Customer Form
    النسخة المحدثة لربط موديول العملاء - منطقة حائل
-->

<div class="tera-form-container p-4 animate-fade-in" style="background: #ffffff; border-radius: 25px; max-width: 1000px; margin: auto;">
    <!-- رأس النموذج (تفاعلي) -->
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
        <h3 class="fw-bold text-dark mb-0">
            <i class="fas fa-id-card-alt text-orange me-2"></i>
            <span id="form-action-title">إضافة عميل جديد</span>
        </h3>
        <button type="button" class="btn-close shadow-none" onclick="document.getElementById('customer-modal').style.display='none'"></button>
    </div>

    <form id="customer-form" autocomplete="off">
        <!-- المعرف المخفي للتعديل -->
        <input type="hidden" id="cust-id-hidden" name="customerId">
        
        <div class="row overflow-auto" style="max-height: 70vh; padding: 10px;">
            
            <!-- 🧩 القسم الأول: المعلومات الأساسية -->
            <div class="col-12">
                <div class="form-section-title d-flex align-items-center mb-4">
                    <i class="fas fa-user-shield me-2 text-primary"></i> البيانات الائتمانية والأساسية
                </div>
            </div>
            
            <div class="col-md-7">
                <label class="form-label fw-bold small">الاسم الكامل (رباعي)</label>
                <input type="text" id="cust-name" name="name" class="form-control tera-field" placeholder="مثال: محمد صالح الشمري" required>
            </div>
            
            <div class="col-md-5">
                <label class="form-label fw-bold small">رقم الجوال</label>
                <div class="input-group dir-ltr">
                    <select name="country_code" class="form-select border-end-0" style="max-width: 100px; border-radius: 0 12px 12px 0;">
                        <option value="+966" selected>🇸🇦 +966</option>
                    </select>
                    <input type="tel" id="cust-phone" name="phone" class="form-control tera-field border-start-0" placeholder="5xxxxxxxx" style="border-radius: 12px 0 0 12px;" required>
                </div>
            </div>

            <div class="col-md-4 mt-3">
                <label class="form-label fw-bold small text-muted">نوع المستخدم</label>
                <select name="user_type" id="cust-user-type" class="form-select tera-field">
                    <option value="أفراد" selected>أفراد</option>
                    <option value="مؤسسة">مؤسسة</option>
                    <option value="شركة">شركة</option>
                    <option value="متجر إلكتروني">متجر إلكتروني</option>
                </select>
            </div>

            <div class="col-md-4 mt-3">
                <label class="form-label fw-bold small text-muted">تاريخ الميلاد</label>
                <input type="date" name="birth_date" id="cust-birth" class="form-control tera-field">
            </div>

            <div class="col-md-4 mt-3">
                <label class="form-label fw-bold small text-muted">الجنس</label>
                <select name="gender" id="cust-gender" class="form-select tera-field">
                    <option value="ذكر">ذكر</option>
                    <option value="أنثى">أنثى</option>
                </select>
            </div>

            <!-- 📍 القسم الثاني: الربط الجغرافي (حائل) -->
            <div class="col-12 mt-5">
                <div class="form-section-title d-flex align-items-center mb-4 text-blue">
                    <i class="fas fa-map-marked-alt me-2"></i> العنوان الوطني (تحديد آلي)
                </div>
            </div>

            <div class="col-12 mb-3">
                <div class="map-action-box p-4 rounded-4 text-center border-dashed bg-light-soft">
                    <button type="button" class="btn btn-blue-gradient rounded-pill px-5 py-2 shadow-sm" id="btn-open-map">
                        <i class="fas fa-location-arrow me-2"></i> فتح خريطة حائل الذكية
                    </button>
                    <p class="small text-muted mt-2 mb-0">سيتم ملء بيانات الحي والشارع والرمز البريدي تلقائياً عند التحديد</p>
                </div>
            </div>

            <!-- حقول العنوان التفصيلية -->
            <input type="hidden" name="latitude" id="lat-field">
            <input type="hidden" name="longitude" id="lng-field">

            <div class="col-md-3 mt-2">
                <label class="small fw-bold">المدينة</label>
                <input type="text" id="cust-city" name="city" class="form-control tera-field text-center" value="حائل" readonly>
            </div>
            <div class="col-md-3 mt-2">
                <label class="small fw-bold">الحي</label>
                <input type="text" id="cust-district" name="district" class="form-control tera-field" placeholder="مثلاً: النقرة">
            </div>
            <div class="col-md-6 mt-2">
                <label class="small fw-bold">الشارع</label>
                <input type="text" id="cust-street" name="street" class="form-control tera-field" placeholder="اسم الشارع">
            </div>

            <div class="col-md-4 mt-3">
                <label class="small fw-bold">رقم المبنى</label>
                <input type="text" id="cust-buildingNo" name="building_number" class="form-control tera-field text-center font-monospace" placeholder="0000">
            </div>
            <div class="col-md-4 mt-3">
                <label class="small fw-bold">الرمز البريدي</label>
                <input type="text" id="cust-postalCode" name="postal_code" class="form-control tera-field text-center font-monospace" placeholder="00000">
            </div>
            <div class="col-md-4 mt-3">
                <label class="small fw-bold">الرقم الإضافي</label>
                <input type="text" name="additional_number" id="cust-additional" class="form-control tera-field text-center font-monospace" placeholder="0000">
            </div>

            <!-- ⚠️ القسم الثالث: التصنيف الأمني -->
            <div class="col-md-6 mt-5">
                <div class="status-box p-3 rounded-4 border-start border-4 border-orange bg-light">
                    <label class="form-label fw-bold small text-orange">تصنيف العميل</label>
                    <select name="customer_type" id="cust-type-select" class="form-select border-0 bg-transparent fw-bold">
                        <option value="لم يصنف بعد" selected>لم يصنف بعد</option>
                        <option value="عميل عادي">عميل عادي</option>
                        <option value="عميل مميز">عميل مميز</option>
                        <option value="عميل VIP">عميل VIP 💎</option>
                    </select>
                </div>
            </div>
            <div class="col-md-6 mt-5">
                <div class="status-box p-3 rounded-4 border-start border-4 border-danger bg-light">
                    <label class="form-label fw-bold small text-danger">حالة السداد (تنبيه)</label>
                    <select name="customer_status" id="cust-status-select" class="form-select border-0 bg-transparent fw-bold">
                        <option value="طبيعي" selected>طبيعي ✅</option>
                        <option value="متعثر">متعثر ⚠️</option>
                        <option value="محظور">محظور (القائمة السوداء) 🚩</option>
                    </select>
                </div>
            </div>

            <!-- 🖊️ القسم الرابع: الملاحظات والمرفقات -->
            <div class="col-12 mt-5">
                <label class="form-label fw-bold small">ملاحظات السجل الائتماني (Rich Text)</label>
                <div id="editor-container" class="tera-editor shadow-sm"></div>
                <textarea name="customer_notes" id="hidden-notes" style="display:none;"></textarea>
            </div>

            <div class="col-12 mt-4">
                <label class="form-label fw-bold small">رفع الوثائق (الهوية/كشف حساب)</label>
                <div class="upload-zone p-4 rounded-4 text-center border-dashed bg-light">
                    <input type="file" id="file-input" name="attachments" multiple class="d-none">
                    <label for="file-input" style="cursor: pointer;">
                        <i class="fas fa-cloud-upload-alt fa-2x text-primary mb-2"></i>
                        <p class="mb-0 text-muted small">اسحب الملفات هنا أو اضغط للاختيار</p>
                    </label>
                    <div id="file-list" class="mt-2 small text-primary fw-bold"></div>
                </div>
            </div>
        </div>

        <!-- أزرار التحكم السفلى -->
        <div class="footer-actions d-flex gap-3 mt-4 pt-4 border-top">
            <button type="submit" class="btn btn-blue-gradient flex-grow-1 py-3 rounded-4 fw-bold">
                <i class="fas fa-save me-2"></i> حفظ بيانات العميل
            </button>
            <button type="button" class="btn btn-light px-4 rounded-4 fw-bold" onclick="document.getElementById('customer-modal').style.display='none'">
                إلغاء
            </button>
        </div>
    </form>
</div>

<style>
    /* التنسيقات المتوافقة مع v12.12.13 */
    .tera-form-container { border: 1px solid #eef2f6; }
    .form-section-title { font-size: 1rem; font-weight: 800; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
    .text-blue { color: #2563eb !important; }
    .tera-field { border-radius: 12px; background-color: #f8fafc; border: 1.5px solid #e2e8f0; padding: 12px; font-size: 0.95rem; }
    .tera-field:focus { border-color: #f97316; background-color: #fff; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.08); }
    .border-dashed { border: 2px dashed #cbd5e1; }
    .bg-light-soft { background-color: #f8fafc; }
    .btn-blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; transition: 0.3s; }
    .btn-blue-gradient:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }
    .tera-editor { height: 180px; background: #fff; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 10px; }
    .border-orange { border-color: #f97316 !important; }
    .text-orange { color: #f97316 !important; }
    
    /* مخصص للشاشات الصغيرة */
    @media (max-width: 768px) {
        .tera-form-container { border-radius: 0; padding: 15px !important; }
        .row.overflow-auto { max-height: 80vh; }
    }
</style>
