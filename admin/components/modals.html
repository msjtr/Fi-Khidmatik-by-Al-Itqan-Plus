<!-- 
    Tera Gateway v12.12.12 | Final Customer Management Modal
    النسخة الشاملة: (بيانات شخصية + عنوان ذكي + خرائط + محرر نصوص + مرفقات)
-->

<div id="customer-modal" class="tera-modal-overlay">
    <div class="tera-modal-card animate-pop-in shadow-lg" style="max-width: 1100px; width: 95%; border-radius: 30px;">
        
        <!-- الهيدر الاحترافي -->
        <div class="tera-modal-header p-4 d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <div class="tera-modal-icon-bg me-3 shadow-sm" id="cust-avatar-container">
                    <span id="cust-initials">؟</span>
                </div>
                <div>
                    <h3 id="modal-title" class="fw-bold mb-0">إدارة الملف الشخصي الكامل</h3>
                    <div class="d-flex gap-2 align-items-center mt-1">
                        <span class="badge bg-soft-success text-success border-0 px-2 py-1"><i class="fas fa-check-double me-1"></i> جاهز للتنفيذ</span>
                        <span class="text-muted" style="font-size: 0.75rem;"><i class="fas fa-microchip me-1"></i> محرك تيرا V12.12.12</span>
                    </div>
                </div>
            </div>
            <button class="btn-close-custom" onclick="window.closeCustomerModal()"><i class="fas fa-times"></i></button>
        </div>

        <div class="tera-modal-body p-0" style="max-height: 80vh; overflow-y: auto;">
            <form id="customer-form" autocomplete="off">
                <input type="hidden" id="cust-id-hidden" name="customerId">
                
                <!-- 🧩 أولاً: المعلومات الشخصية -->
                <div class="section-container p-4">
                    <div class="d-flex align-items-center mb-4">
                        <div class="section-number">1</div>
                        <h5 class="fw-bold mb-0 ms-2 text-primary">المعلومات الشخصية والأساسية</h5>
                    </div>
                    
                    <div class="row g-4">
                        <div class="col-md-5">
                            <label class="form-label fw-bold">الاسم الرباعي الكامل</label>
                            <input type="text" name="name" id="cust-name" class="form-control tera-input" placeholder="مثال: محمد صالح الشمري" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">رقم الجوال</label>
                            <div class="input-group dir-ltr shadow-none">
                                <select name="country_code" class="form-select border-end-0" style="max-width: 100px; border-radius: 0 15px 15px 0;">
                                    <option value="+966" selected>🇸🇦 +966</option>
                                    <option value="+971">🇦🇪 +971</option>
                                    <option value="+965">🇰🇼 +965</option>
                                </select>
                                <input type="tel" name="phone" id="cust-phone" class="form-control border-start-0" placeholder="5xxxxxxxx" style="border-radius: 15px 0 0 15px;" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">نوع المستخدم</label>
                            <select name="user_type" class="form-select tera-input">
                                <option value="أفراد">أفراد</option>
                                <option value="مؤسسة">مؤسسة</option>
                                <option value="شركة">شركة</option>
                                <option value="متجر إلكتروني">متجر إلكتروني</option>
                                <option value="منصة">منصة</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">البريد الإلكتروني</label>
                            <input type="email" name="email" class="form-control tera-input" placeholder="example@domain.com">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">تاريخ الميلاد</label>
                            <input type="date" name="birth_date" class="form-control tera-input">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">الجنس</label>
                            <select name="gender" class="form-select tera-input">
                                <option value="ذكر">ذكر</option>
                                <option value="أنثى">أنثى</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 📍 ثانياً: العنوان والربط الذكي مع الخريطة -->
                <div class="section-container p-4 bg-light-soft">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="d-flex align-items-center">
                            <div class="section-number bg-blue">2</div>
                            <h5 class="fw-bold mb-0 ms-2 text-blue">العنوان والموقع الجغرافي</h5>
                        </div>
                        <button type="button" class="btn btn-blue-gradient btn-sm rounded-pill px-3" id="btn-open-map">
                            <i class="fas fa-map-marked-alt me-2"></i> تحديد الموقع على الخريطة
                        </button>
                    </div>

                    <div id="map-preview-container" class="mb-4 rounded-4 shadow-sm border overflow-hidden" style="height: 200px; display: none;">
                        <!-- يتم حقن الخريطة هنا برمجياً -->
                    </div>

                    <div class="row g-3">
                        <input type="hidden" name="latitude" id="lat-field">
                        <input type="hidden" name="longitude" id="lng-field">
                        
                        <div class="col-md-3">
                            <label class="small fw-bold">الدولة</label>
                            <input type="text" name="country" id="addr-country" class="form-control tera-input-sm" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="small fw-bold">المدينة</label>
                            <input type="text" name="city" id="addr-city" class="form-control tera-input-sm">
                        </div>
                        <div class="col-md-3">
                            <label class="small fw-bold">الحي</label>
                            <input type="text" name="district" id="addr-district" class="form-control tera-input-sm">
                        </div>
                        <div class="col-md-3">
                            <label class="small fw-bold">الشارع</label>
                            <input type="text" name="street" id="addr-street" class="form-control tera-input-sm">
                        </div>
                        <div class="col-md-3">
                            <label class="small fw-bold">رقم المبنى</label>
                            <input type="text" name="building_number" class="form-control tera-input-sm text-center">
                        </div>
                        <div class="col-md-3">
                            <label class="small fw-bold">الرمز البريدي</label>
                            <input type="text" name="postal_code" class="form-control tera-input-sm text-center">
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold">وصف العنوان (مختصر)</label>
                            <input type="text" name="address_note" maxlength="600" class="form-control tera-input-sm" placeholder="بجوار سوبر ماركت...">
                        </div>
                    </div>
                </div>

                <!-- ⚙️ ثالثاً ورابعاً: التصنيفات وحالة العميل -->
                <div class="section-container p-4">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold"><i class="fas fa-tags me-1 text-orange"></i> تصنيف العميل</label>
                            <select name="customer_type" class="form-select tera-input border-orange">
                                <option value="عميل عادي">عميل عادي</option>
                                <option value="عميل مميز">عميل مميز</option>
                                <option value="عميل VIP">عميل VIP 💎</option>
                                <option value="لم يصنف بعد">لم يصنف بعد</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold"><i class="fas fa-flag me-1 text-danger"></i> حالة العميل (تنبيه أمان)</label>
                            <select name="customer_status" class="form-select tera-input border-danger">
                                <option value="طبيعي">طبيعي ✅</option>
                                <option value="عميل مزعج">عميل مزعج ⚠️</option>
                                <option value="عميل غير جدي">عميل غير جدي ❌</option>
                                <option value="عميل محتال">عميل محتال 🚩</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 🖊️ خامساً: ملاحظات تفصيلية ومرفقات -->
                <div class="section-container p-4 bg-light-soft">
                    <label class="form-label fw-bold mb-3"><i class="fas fa-pen-fancy me-2"></i> السجل الائتماني والملاحظات التفصيلية</label>
                    
                    <!-- منطقة محرر النصوص (Rich Text Editor) -->
                    <div class="editor-wrapper rounded-4 border bg-white overflow-hidden shadow-sm mb-4">
                        <div id="toolbar-container" class="bg-light border-bottom p-2"></div>
                        <div id="editor-container" style="height: 250px;"></div>
                        <textarea name="customer_notes" id="hidden-notes" style="display:none;"></textarea>
                    </div>

                    <!-- رفع المرفقات -->
                    <div class="attachments-area">
                        <label class="form-label fw-bold small"><i class="fas fa-paperclip me-2"></i> المرفقات والوثائق (PDF, صور, DOC)</label>
                        <div class="upload-zone rounded-4 p-4 text-center border-dashed position-relative" id="drop-zone">
                            <input type="file" name="attachments" id="file-input" multiple class="position-absolute w-100 h-100 opacity-0" style="top:0; left:0; cursor:pointer;">
                            <div class="upload-content py-2 text-muted">
                                <i class="fas fa-cloud-upload-alt fa-2x mb-2 text-primary"></i>
                                <p class="mb-0 small">اسحب الملفات هنا أو اضغط لرفع الوثائق</p>
                            </div>
                        </div>
                        <div id="file-preview-list" class="mt-3 d-flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </form>
        </div>

        <!-- الفوتر -->
        <div class="tera-modal-footer p-4 d-flex justify-content-between align-items-center">
            <div class="system-status">
                <span class="badge bg-dark rounded-pill px-3 py-2" style="font-size: 0.7rem;">
                    <span class="status-dot"></span> متصل بـ Firestore | حائل
                </span>
            </div>
            <div class="d-flex gap-3">
                <button type="button" class="btn btn-link text-decoration-none text-secondary" onclick="window.closeCustomerModal()">إلغاء</button>
                <button type="button" class="btn btn-primary-gradient px-5 py-2 rounded-pill fw-bold shadow-sm" id="btn-save-customer" onclick="window.handleCustomerSubmit(event)">
                    <span>حفظ البيانات النهائية</span>
                    <i class="fas fa-save ms-2"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    /* تنسيقات الإصدار V12 الخاصة بالنافذة */
    .tera-modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 9999; display: none; align-items: center; justify-content: center; }
    .tera-modal-card { background: #fff; max-height: 95vh; display: flex; flex-direction: column; }
    .section-container { border-bottom: 1px solid #f1f5f9; }
    .section-number { width: 28px; height: 28px; background: var(--tera-orange); color: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
    .bg-blue { background: #2563eb !important; }
    .text-blue { color: #2563eb !important; }
    .tera-input { border-radius: 15px; background: #f8fafc; border: 1.5px solid #e2e8f0; padding: 10px 15px; }
    .tera-input:focus { border-color: var(--tera-orange); background: #fff; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }
    .tera-input-sm { border-radius: 10px; font-size: 0.85rem; border: 1px solid #cbd5e1; }
    .border-dashed { border: 2px dashed #cbd5e1; transition: 0.3s; }
    .border-dashed:hover { border-color: #2563eb; background: rgba(37, 99, 235, 0.05); }
    .btn-primary-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: #fff; border: none; transition: 0.3s; }
    .btn-primary-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }
    .tera-modal-icon-bg { width: 55px; height: 55px; background: #f1f5f9; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; color: #f97316; border: 2px solid #fff; }
    .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-inline-end: 5px; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
</style>
