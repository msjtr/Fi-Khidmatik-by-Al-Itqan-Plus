<!-- نافذة إضافة/تعديل عميل - إصدار تيرا جيت واي 12.12.6 -->
<div id="customer-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card tera-premium-shadow">
        <div class="modal-header-tera">
            <div class="header-title-wrap">
                <div class="icon-circle shadow-sm"><i class="fas fa-user-plus"></i></div>
                <div>
                    <h3 id="modal-title" class="m-0">إضافة عميل جديد</h3>
                    <p class="subtitle mb-0 text-muted">إدارة قاعدة البيانات السحابية لعملاء حائل</p>
                </div>
            </div>
            <button class="close-btn-tera" onclick="closeCustomerModal()">&times;</button>
        </div>

        <div class="modal-body-tera">
            <form id="customer-form" autocomplete="off">
                <div class="image-profile-upload-tera">
                    <div class="profile-preview-wrapper">
                        <img id="cust-img-preview" src="admin/images/default-avatar.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                        <label for="cust-image-file" class="upload-badge ripple">
                            <i class="fas fa-camera"></i>
                            <input type="file" id="cust-image-file" accept="image/*" style="display: none;" onchange="previewCustomerImage(event)">
                        </label>
                    </div>
                    <div class="upload-info">
                        <span class="main-label">صورة الهوية أو العميل</span>
                        <span class="sub-label d-block text-primary"><i class="fas fa-cloud-upload-alt"></i> التخزين: Firebase Storage</span>
                    </div>
                </div>

                <div class="form-section-tera border-bottom pb-4">
                    <div class="section-title mb-3"><i class="fas fa-id-card text-primary"></i> البيانات الشخصية والاتصال</div>
                    <div class="grid-layout cols-3">
                        <div class="input-group-tera">
                            <label>اسم العميل الكامل</label>
                            <input type="text" id="cust-name" name="name" class="tera-input" placeholder="مثال: محمد صالح الشمري" required>
                        </div>
                        <div class="input-group-tera">
                            <label>رقم الجوال</label>
                            <div class="phone-input-wrap">
                                <input type="tel" id="cust-phone" name="phone" dir="ltr" class="tera-input" placeholder="5XXXXXXXX" required>
                                <span class="country-tag">966+</span>
                            </div>
                        </div>
                        <div class="input-group-tera">
                            <label>تصنيف العميل</label>
                            <select id="cust-tag" name="tag" class="tera-select">
                                <option value="regular">عميل عادي</option>
                                <option value="vip">عميل مميز ✨</option>
                                <option value="blacklisted">قائمة سوداء</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section-tera bg-light-soft rounded-4 p-4 mt-4 border-dashed">
                    <div class="section-title mb-3"><i class="fas fa-map-marked-alt text-primary"></i> العنوان</div>
                    <div class="grid-layout cols-4">
                        <div class="input-group-tera"><label>المدينة</label><input type="text" value="حائل" class="readonly-style" readonly></div>
                        <div class="input-group-tera"><label>الحي</label><input type="text" id="cust-district" name="district" class="tera-input" placeholder="مثال: النقرة"></div>
                        <div class="input-group-tera"><label>الشارع</label><input type="text" id="cust-street" name="street" class="tera-input"></div>
                        <div class="input-group-tera"><label>رقم المبنى</label><input type="text" id="cust-buildingNo" name="buildingNo" maxlength="4" class="tera-input"></div>
                    </div>
                </div>
            </form>
        </div>

        <div class="modal-footer-tera p-4 bg-white border-top">
            <button type="button" class="btn-tera btn-outline-secondary" onclick="closeCustomerModal()">إلغاء</button>
            <button type="button" class="btn-tera btn-primary-gradient" id="btn-save-customer">
                <i class="fas fa-save me-2"></i> حفظ البيانات
            </button>
        </div>
    </div>
</div>
