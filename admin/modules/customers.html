<!-- Tera Gateway - Customers Management Module -->
<div class="customers-module">
    
    <!-- قسم الإحصائيات الذكية -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon" style="background: #eff6ff; color: #3b82f6;"><i class="fas fa-users"></i></div>
            <div class="stat-info">
                <span class="stat-label">إجمالي العملاء</span>
                <h3 id="total-customers">0</h3>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #f0fdf4; color: #22c55e;"><i class="fas fa-user-check"></i></div>
            <div class="stat-info">
                <span class="stat-label">عملاء نشطين</span>
                <h3 id="active-customers">0</h3>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #fff7ed; color: #f97316;"><i class="fas fa-star"></i></div>
            <div class="stat-info">
                <span class="stat-label">عملاء VIP</span>
                <h3 id="vip-customers">0</h3>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #fef2f2; color: #ef4444;"><i class="fas fa-user-slash"></i></div>
            <div class="stat-info">
                <span class="stat-label">موقوفين</span>
                <h3 id="suspended-customers">0</h3>
            </div>
        </div>
    </div>

    <!-- شريط الأدوات (Actions Bar) -->
    <div class="module-actions-bar">
        <div class="right-tools">
            <button class="btn-tera" onclick="openCustomerModal('add')">
                <i class="fas fa-plus"></i> إضافة عميل جديد
            </button>
            <button class="btn-secondary" onclick="exportToExcel()">
                <i class="fas fa-file-export"></i> تصدير (Excel)
            </button>
            <button class="btn-secondary" onclick="document.getElementById('importFile').click()">
                <i class="fas fa-file-import"></i> استيراد
            </button>
            <input type="file" id="importFile" hidden accept=".xlsx, .xls" onchange="handleExcelImport(event)">
        </div>
        <div class="left-tools">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="customerSearch" placeholder="بحث باسم العميل أو الجوال..." onkeyup="filterCustomersTable()">
            </div>
        </div>
    </div>

    <!-- جدول البيانات الرئيسي -->
    <div class="tera-table-container">
        <table class="tera-table" id="customersTable">
            <thead>
                <tr>
                    <th>ت</th>
                    <th>العميل</th>
                    <th>الجوال</th>
                    <th>مفتاح الدولة</th>
                    <th>البريد الإلكتروني</th>
                    <th>المدينة/الحي</th>
                    <th>العنوان بالتفصيل</th>
                    <th>تاريخ الإضافة</th>
                    <th>التصنيف</th>
                    <th>الحالة</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customersList">
                <!-- يتم التحميل ديناميكياً من Firebase -->
            </tbody>
        </table>
    </div>
</div>

<!-- موديل (Modal) الإضافة والتعديل -->
<div id="customerModal" class="tera-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">إضافة عميل جديد</h2>
            <button class="close-btn" onclick="closeCustomerModal()">&times;</button>
        </div>
        <form id="customerForm">
            <input type="hidden" id="customerId">
            
            <div class="form-section">
                <h4><i class="fas fa-user-circle"></i> البيانات الأساسية</h4>
                <div class="image-upload-wrapper">
                    <img id="customerImagePreview" src="images/default-avatar.png" alt="Avatar">
                    <div class="upload-btns">
                        <label for="imgUpload" class="btn-upload">تغيير الصورة</label>
                        <input type="file" id="imgUpload" hidden accept="image/*" onchange="previewImage(event)">
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="input-group">
                        <label>اسم العميل بالكامل</label>
                        <input type="text" id="name" required placeholder="مثال: محمد صالح الشمري">
                    </div>
                    <div class="input-group">
                        <label>رقم الجوال</label>
                        <input type="text" id="phone" required placeholder="59xxxxxxx">
                    </div>
                    <div class="input-group">
                        <label>مفتاح الدولة</label>
                        <input type="text" id="countryCode" value="+966">
                    </div>
                    <div class="input-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="email" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h4><i class="fas fa-map-marker-alt"></i> العنوان الوطني والتفاصيل</h4>
                <div class="form-grid four-cols">
                    <div class="input-group"><label>الدولة</label><input type="text" id="country" value="المملكة العربية السعودية"></div>
                    <div class="input-group"><label>المدينة</label><input type="text" id="city" value="حائل"></div>
                    <div class="input-group"><label>الحي</label><input type="text" id="district"></div>
                    <div class="input-group"><label>الشارع</label><input type="text" id="street"></div>
                    <div class="input-group"><label>رقم المبنى</label><input type="text" id="buildingNo"></div>
                    <div class="input-group"><label>الرقم الإضافي</label><input type="text" id="additionalNo"></div>
                    <div class="input-group"><label>الرمز البريدي</label><input type="text" id="postalCode"></div>
                    <div class="input-group"><label>صندوق البريد</label><input type="text" id="poBox"></div>
                </div>
            </div>

            <div class="form-section">
                <h4><i class="fas fa-tags"></i> التصنيف والملاحظات</h4>
                <div class="form-grid">
                    <div class="input-group">
                        <label>تصنيف العميل</label>
                        <select id="tag">
                            <option value="individual">فرد</option>
                            <option value="company">شركة</option>
                            <option value="vip">VIP</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>حالة العميل</label>
                        <select id="status">
                            <option value="active">نشط</option>
                            <option value="suspended">موقوف</option>
                            <option value="archived">مؤرشف</option>
                        </select>
                    </div>
                    <div class="input-group full-width">
                        <label>ملاحظات إضافية</label>
                        <textarea id="notes" rows="2"></textarea>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeCustomerModal()">إلغاء</button>
                <button type="submit" class="btn-save" id="btnSubmitForm">حفظ البيانات</button>
            </div>
        </form>
    </div>
</div>

<style>
    /* تنسيقات خاصة بموديول العملاء */
    .customers-module { padding: 5px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 18px; display: flex; align-items: center; gap: 15px; box-shadow: var(--shadow-sm); }
    .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    
    .module-actions-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; flex-wrap: wrap; }
    .right-tools { display: flex; gap: 10px; }
    .search-wrapper { position: relative; width: 300px; }
    .search-wrapper i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
    .search-wrapper input { width: 100%; padding: 10px 40px 10px 15px; border-radius: 12px; border: 1px solid #e2e8f0; outline: none; }

    /* الموديل */
    .tera-modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; }
    .modal-content { background: #fff; width: 90%; max-width: 850px; max-height: 90vh; border-radius: 24px; overflow-y: auto; padding: 30px; position: relative; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .form-section { margin-bottom: 25px; border-bottom: 1px dashed #f1f5f9; padding-bottom: 20px; }
    .form-section h4 { margin-bottom: 15px; color: var(--primary-color); display: flex; align-items: center; gap: 8px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .four-cols { grid-template-columns: repeat(4, 1fr); }
    .input-group { display: flex; flex-direction: column; gap: 5px; }
    .input-group label { font-size: 0.8rem; font-weight: 700; color: #64748b; }
    .input-group input, .input-group select, .input-group textarea { padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: 'Tajawal'; }
    
    .image-upload-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
    #customerImagePreview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-soft); }
    .btn-upload { background: #f1f5f9; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }

    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-save { background: var(--primary-color); color: #fff; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .btn-cancel { background: #f1f5f9; color: #64748b; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; }
</style>

<!-- الربط البرمجي الفعلي (JS Logic) -->
<script type="module">
    import { db } from './js/core/config.js';
    import { collection, addDoc, getDocs, updateDoc, doc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // دوال الموديل العالمية
    window.openCustomerModal = (mode, id = null) => {
        const modal = document.getElementById('customerModal');
        const form = document.getElementById('customerForm');
        form.reset();
        document.getElementById('customerImagePreview').src = 'images/default-avatar.png';
        
        if (mode === 'add') {
            document.getElementById('modalTitle').innerText = 'إضافة عميل جديد';
            document.getElementById('customerId').value = '';
        }
        modal.style.display = 'flex';
    };

    window.closeCustomerModal = () => {
        document.getElementById('customerModal').style.display = 'none';
    };

    window.previewImage = (event) => {
        const reader = new FileReader();
        reader.onload = () => { document.getElementById('customerImagePreview').src = reader.result; };
        reader.readAsDataURL(event.target.files[0]);
    };

    // حفظ البيانات الحقيقي
    document.getElementById('customerForm').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('btnSubmitForm');
        submitBtn.disabled = true;
        submitBtn.innerText = 'جاري الحفظ...';

        const customerData = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            countryCode: document.getElementById('countryCode').value,
            email: document.getElementById('email').value,
            country: document.getElementById('country').value,
            city: document.getElementById('city').value,
            district: document.getElementById('district').value,
            street: document.getElementById('street').value,
            buildingNo: document.getElementById('buildingNo').value,
            additionalNo: document.getElementById('additionalNo').value,
            postalCode: document.getElementById('postalCode').value,
            poBox: document.getElementById('poBox').value,
            tag: document.getElementById('tag').value,
            status: document.getElementById('status').value,
            notes: document.getElementById('notes').value,
            updatedAt: serverTimestamp()
        };

        try {
            const id = document.getElementById('customerId').value;
            if (id) {
                // تعديل
                await updateDoc(doc(db, "customers", id), customerData);
            } else {
                // إضافة جديد
                customerData.createdAt = new Date().toISOString();
                await addDoc(collection(db, "customers"), customerData);
            }
            
            alert('تم حفظ بيانات العميل بنجاح');
            closeCustomerModal();
            loadCustomers(); // إعادة تحميل الجدول
        } catch (error) {
            console.error("Error saving customer:", error);
            alert('حدث خطأ أثناء الحفظ');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'حفظ البيانات';
        }
    };

    // تحميل البيانات من Firestore
    async function loadCustomers() {
        const list = document.getElementById('customersList');
        list.innerHTML = '<tr><td colspan="11" style="text-align:center;">جاري جلب البيانات...</td></tr>';
        
        const q = query(collection(db, "customers"), orderBy("updatedAt", "desc"));
        const snapshot = await getDocs(q);
        
        list.innerHTML = '';
        let index = 1;
        snapshot.forEach((docSnap) => {
            const c = docSnap.data();
            const row = `
                <tr>
                    <td>${index++}</td>
                    <td class="user-cell">
                        <img src="${c.photoURL || 'images/default-avatar.png'}" class="table-img">
                        <span>${c.name}</span>
                    </td>
                    <td>${c.phone}</td>
                    <td>${c.countryCode}</td>
                    <td>${c.email}</td>
                    <td>${c.city} / ${c.district}</td>
                    <td>${c.street}, ${c.buildingNo}</td>
                    <td>${c.createdAt ? new Date(c.createdAt).toLocaleDateString('ar-SA') : '-'}</td>
                    <td><span class="badge badge-${c.tag}">${c.tag}</span></td>
                    <td><span class="status-dot dot-${c.status}"></span> ${c.status === 'active' ? 'نشط' : 'موقوف'}</td>
                    <td>
                        <div class="actions">
                            <button onclick="editCustomer('${docSnap.id}')" class="btn-icon edit"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteCustomer('${docSnap.id}')" class="btn-icon delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `;
            list.insertAdjacentHTML('beforeend', row);
        });
        
        // تحديث الإحصائيات (تبسيط للـ UI)
        document.getElementById('total-customers').innerText = snapshot.size;
    }

    // تهيئة الوظائف العالمية للأزرار في الجدول
    window.editCustomer = async (id) => {
        const docRef = doc(db, "customers", id);
        // منطق جلب البيانات وفتح الموديل للتعديل...
        openCustomerModal('edit', id);
    };

    // استدعاء التحميل عند فتح الموديول
    loadCustomers();
</script>
