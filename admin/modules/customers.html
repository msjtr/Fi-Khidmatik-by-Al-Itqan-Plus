<div class="customers-module-wrapper">
    <div class="glass-header">
        <div class="title-zone">
            <div class="icon-box">
                <i class="fas fa-users-cog"></i>
            </div>
            <div class="text-box">
                <h1>قاعدة بيانات العملاء</h1>
                <p>إدارة سجلات مجموعة: <span class="badge-group">customers</span></p>
            </div>
        </div>

        <div class="action-zone">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="customerSearch" placeholder="بحث بالاسم، الجوال، أو المدينة...">
            </div>

            <button class="btn-glass-add" onclick="window.openAddCustomerModal()">
                <i class="fas fa-plus"></i> إضافة عميل جديد
            </button>
        </div>
    </div>

    <div class="glass-table-container">
        <table class="modern-table" id="customersMainTable">
            <thead>
                <tr>
                    <th class="sticky-col">#</th>
                    <th class="sticky-col-name">اسم العميل</th>
                    <th>رقم الجوال</th>
                    <th>المفتاح</th>
                    <th>البريد الإلكتروني</th>
                    <th>الدولة</th>
                    <th>المدينة</th>
                    <th>الحي</th>
                    <th>الشارع</th>
                    <th>رقم المبنى</th>
                    <th>الرقم الإضافي</th>
                    <th>الرمز البريدي</th>
                    <th>صندوق البريد</th>
                    <th>تاريخ الإضافة</th>
                    <th>الحالة</th>
                    <th>التصنيف</th>
                    <th class="sticky-actions-header">الإجراءات</th>
                </tr>
            </thead>
            
            <tbody id="customers-data-rows">
                <tr>
                    <td colspan="17" style="text-align:center; padding:60px;">
                        <div class="table-loader">
                            <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                            <p style="margin-top:15px;">جاري استدعاء البيانات من خادم Firestore...</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
