<div class="module-container anim-fade-in" style="font-family: 'Tajawal', sans-serif; direction: rtl;">
    
    <div class="module-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <div>
            <h2 style="color: #1e293b; margin: 0; font-weight: 800; font-size: 1.8rem;">إدارة العملاء</h2>
            <p style="color: #64748b; margin-top: 5px;">إدارة البيانات الشخصية، العناوين الوطنية، وتصنيفات العملاء</p>
        </div>
        <div class="header-actions">
            <button class="btn-primary-tera" onclick="showAddCustomerModal()" style="background: #2563eb; color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); transition: all 0.3s;">
                <i class="fas fa-user-plus" style="margin-left: 8px;"></i> إضافة عميل جديد
            </button>
        </div>
    </div>

    <div id="customers-module-content">
        </div>

    <div id="customer-modal" class="tera-modal" style="display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <div class="modal-content" style="background: white; width: 90%; max-width: 700px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; animation: slideUp 0.3s ease;">
            
            <div class="modal-header" style="padding: 20px 25px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
                <h3 id="modal-title" style="margin: 0; color: #1e293b;">بيانات العميل</h3>
                <button onclick="closeCustomerModal()" style="background: none; border: none; font-size: 1.5rem; color: #94a3b8; cursor: pointer;">&times;</button>
            </div>

            <form id="customer-form" style="padding: 25px;">
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">اسم العميل بالكامل</label>
                        <input type="text" name="name" required placeholder="مثال: محمد صالح الشمري" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;">
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">رقم الجوال</label>
                        <input type="tel" name="phone" required placeholder="5xxxxxxxx" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; text-align: left;">
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">البريد الإلكتروني</label>
                        <input type="email" name="email" placeholder="name@example.com" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; text-align: left;">
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">تصنيف العميل</label>
                        <select name="tag" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;">
                            <option value="عادي">عميل عادي</option>
                            <option value="vip">عميل VIP</option>
                            <option value="متأخر">متأخر في السداد</option>
                        </select>
                    </div>

                    <div style="grid-column: span 2;">
                        <h4 style="margin: 10px 0; color: #2563eb; font-size: 0.9rem; border-bottom: 1px solid #eff6ff; padding-bottom: 5px;">تفاصيل العنوان الوطني</h4>
                    </div>
                    
                    <div class="form-group">
                        <label style="font-size: 0.85rem; color: #64748b;">المدينة</label>
                        <input type="text" name="city" value="حائل" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;">
                    </div>
                    <div class="form-group">
                        <label style="font-size: 0.85rem; color: #64748b;">الحي</label>
                        <input type="text" name="district" placeholder="مثال: النقرة" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;">
                    </div>
                    <div class="form-group">
                        <label style="font-size: 0.85rem; color: #64748b;">الشارع</label>
                        <input type="text" name="street" placeholder="اسم الشارع" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;">
                    </div>
                    <div class="form-group">
                        <div style="display: flex; gap: 10px;">
                            <div style="flex: 1;">
                                <label style="font-size: 0.85rem; color: #64748b;">رقم المبنى</label>
                                <input type="text" name="buildingNo" placeholder="4 أرقام" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;">
                            </div>
                            <div style="flex: 1;">
                                <label style="font-size: 0.85rem; color: #64748b;">الرمز البريدي</label>
                                <input type="text" name="postalCode" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer" style="margin-top: 30px; display: flex; gap: 15px; justify-content: flex-end;">
                    <button type="button" onclick="closeCustomerModal()" style="background: #f1f5f9; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; color: #475569;">إلغاء</button>
                    <button type="submit" style="background: #2563eb; border: none; padding: 12px 35px; border-radius: 10px; cursor: pointer; color: white; font-weight: bold;">حفظ البيانات</button>
                </div>
            </form>
        </div>
    </div>

</div>

<style>
    @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
    .anim-fade-in { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    input:focus, select:focus {
        border-color: #2563eb !important;
        outline: none;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
</style>

<script>
    // وظائف النافذة المنبثقة
    window.showAddCustomerModal = function() {
        document.getElementById('customer-form').reset();
        document.getElementById('modal-title').innerText = "إضافة عميل جديد لتيرا";
        document.getElementById('customer-modal').style.display = 'flex';
    };

    window.closeCustomerModal = function() {
        document.getElementById('customer-modal').style.display = 'none';
    };
</script>
