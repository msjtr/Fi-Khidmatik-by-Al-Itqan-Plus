<div class="customers-module">
    <div class="stats-grid">
        <div class="stat-card"><h3>العدد الكلي</h3><p id="stat-total-customers">0</p></div>
        <div class="stat-card"><h3>مكتملة البيانات</h3><p id="stat-complete-data">0</p></div>
        <div class="stat-card"><h3>النشطين</h3><p id="stat-active-customers">0</p></div>
        <div class="stat-card"><h3>عملاء VIP</h3><p id="stat-vip-count">0</p></div>
    </div>

    <div class="action-bar">
        <button onclick="openCustomerModal('add')" class="btn-primary">إضافة عميل جديد +</button>
        <button onclick="exportCustomers()" class="btn-secondary">تصدير (Excel/PDF)</button>
        <button onclick="document.getElementById('import-file').click()" class="btn-secondary">استيراد بيانات</button>
        <a href="assets/templates/customers_template.xlsx" class="btn-link">تحميل نموذج استيراد</a>
        <input type="file" id="import-file" hidden onchange="handleImport(this)">
    </div>

    <div class="table-wrapper">
        <table id="main-customers-table">
            <thead>
                <tr>
                    <th>التسلسل</th>
                    <th>اسم العميل</th>
                    <th>رقم الجوال</th>
                    <th>مفتاح الدولة</th>
                    <th>البريد الإلكتروني</th>
                    <th>اسم الدولة</th>
                    <th>المدينة</th>
                    <th>الحي</th>
                    <th>الشارع</th>
                    <th>رقم المبنى</th>
                    <th>الرقم الإضافي</th>
                    <th>الرمز البريدي</th>
                    <th>صندوق البريد</th>
                    <th>تاريخ الإضافة</th>
                    <th>حالة العميل</th>
                    <th>تصنيف العميل</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customers-data-body">
                </tbody>
        </table>
    </div>
</div>
