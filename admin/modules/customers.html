<div class="module-container anim-fade-in" style="font-family: 'Tajawal', sans-serif; direction: rtl;">
    
    <div class="module-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #fff; padding: 20px; border-radius: 18px; box-shadow: var(--shadow-sm);">
        <div>
            <h2 style="color: var(--dark); margin: 0; font-weight: 900; font-size: 1.8rem;">إدارة العملاء</h2>
            <p style="color: var(--text-muted); margin-top: 5px;">سجل العناوين الوطنية وتصنيفات عملاء منصة تيرا في حائل</p>
        </div>
        <div class="header-actions">
            <button class="btn-primary-tera" onclick="showAddCustomerModal()">
                <i class="fas fa-user-plus"></i> إضافة عميل جديد
            </button>
        </div>
    </div>

    <div id="customers-module-content">
        </div>

    <div id="customer-modal" class="tera-modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
        <div class="tera-modal-content" style="background: white; width: 95%; max-width: 850px; border-radius: 28px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.3); overflow: hidden; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);">
            
            <div class="modal-header" style="padding: 20px 30px; background: var(--primary-light); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <h3 id="modal-title" style="margin: 0; color: var(--primary); font-weight: 800; font-size: 1.4rem;">
                    <i class="fas fa-id-card"></i> ملف بيانات العميل
                </h3>
                <button onclick="closeCustomerModal()" style="background: none; border: none; font-size: 2rem; color: var(--text-muted); cursor: pointer;">&times;</button>
            </div>

            <form id="customer-form" style="padding: 30px;" onsubmit="event.preventDefault(); saveCustomerData();">
                <div class="form-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div class="form-group">
                        <label class="form-label">اسم العميل بالكامل</label>
                        <input type="text" id="cust-name" class="form-input" required placeholder="محمد صالح الشمري">
                    </div>
                    <div class="form-group">
                        <label class="form-label">رقم الجوال</label>
                        <input type="tel" id="cust-phone" class="form-input" required placeholder="5xxxxxxxx" style="text-align: left; direction: ltr;">
                    </div>
                    <div class="form-group">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" id="cust-email" class="form-input" placeholder="example@mail.com" style="text-align: left; direction: ltr;">
                    </div>
                    <div class="form-group">
                        <label class="form-label">تصنيف العميل</label>
                        <select id="cust-category" class="form-select">
                            <option value="standard">عميل عادي</option>
                            <option value="vip">عميل VIP (تميز)</option>
                        </select>
                    </div>
                </div>

                <div style="margin: 25px 0 15px; display: flex; align-items: center; gap: 10px;">
                    <span style="background: var(--primary); color: white; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 800;">العنوان الوطني</span>
                    <hr style="flex: 1; border: 0; border-top: 1px solid var(--border-color);">
                </div>

                <div class="form-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;">
                    <div class="form-group">
                        <label class="form-label">المدينة</label>
                        <input type="text" id="cust-city" class="form-input" value="حائل">
                    </div>
                    <div class="form-group">
                        <label class="form-label">الحي</label>
                        <input type="text" id="cust-district" class="form-input" placeholder="النقرة / الجامعيين">
                    </div>
                    <div class="form-group">
                        <label class="form-label">الشارع</label>
                        <input type="text" id="cust-street" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">رقم المبنى</label>
                        <input type="text" id="cust-building" class="form-input" placeholder="4 أرقام">
                    </div>
                    <div class="form-group">
                        <label class="form-label">الرقم الإضافي</label>
                        <input type="text" id="cust-additional" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">الرمز البريدي</label>
                        <input type="text" id="cust-postal" class="form-input">
                    </div>
                </div>

                <div class="modal-footer" style="margin-top: 30px; display: flex; gap: 15px; justify-content: flex-end; border-top: 1px solid var(--border-color); padding-top: 25px;">
                    <button type="button" onclick="closeCustomerModal()" style="background: #f1f5f9; border: none; padding: 12px 30px; border-radius: 12px; cursor: pointer; color: var(--text-muted); font-weight: 700;">إلغاء</button>
                    <button type="submit" class="btn-primary-tera" style="padding: 12px 40px;">حفظ بيانات العميل</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* أنيميشن الدخول */
    @keyframes slideUp {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
    
    .anim-fade-in { animation: fadeIn 0.5s ease-out; }
    
    /* تحسينات الإدخال */
    .form-input, .form-select {
        width: 100%;
        padding: 12px 15px;
        border: 1.5px solid #e2e8f0;
        border-radius: 12px;
        transition: all 0.3s;
        font-family: inherit;
    }

    .form-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-light);
        outline: none;
    }

    .form-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--text-main);
    }
</style>
