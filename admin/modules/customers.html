<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العملاء | تيرا جيت واي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; }

        /* تنسيق المودال الاحترافي */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: var(--white); width: 95%; max-width: 1100px; border-radius: 20px; padding: 0; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .modal-header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .modal-body { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .modal-footer { padding: 15px 30px; border-top: 1px solid var(--border); background: #f8fafc; text-align: left; }

        /* شبكة النموذج لـ 17 حقلاً */
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
        .form-group.full { grid-column: span 4; }
        .form-group.half { grid-column: span 2; }
        
        .form-group label { font-size: 0.85rem; font-weight: 700; color: #475569; }
        .form-group input, .form-group select { padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; }
        .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .section-title { color: var(--primary); font-size: 1rem; border-right: 4px solid var(--primary); padding-right: 10px; margin: 20px 0 15px 0; grid-column: span 4; }

        .btn { padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* تخصيص Select2 ليتناسب مع التصميم */
        .select2-container--default .select2-selection--single { height: 45px; border: 1.5px solid var(--border); border-radius: 10px; }
        .select2-container [dir="rtl"] .select2-selection--single .select2-selection__rendered { line-height: 42px; padding-right: 12px; }
    </style>
</head>
<body>

    <div id="customers-module-container"></div>

    <div id="customer-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="margin:0; color:var(--primary); font-size: 1.2rem;">بيانات العميل التفصيلية</h2>
                <button onclick="closeCustomerModal()" style="background:none; border:none; font-size:1.8rem; cursor:pointer; color:#94a3b8;">&times;</button>
            </div>
            
            <div class="modal-body">
                <form id="customer-form">
                    <div class="form-grid">
                        <div class="section-title">أولاً: المعلومات الشخصية والاتصال</div>
                        
                        <div class="form-group half">
                            <label>اسم العميل الكامل (رباعي)</label>
                            <input type="text" id="cust-name" placeholder="أدخل الاسم الكامل" required>
                        </div>
                        
                        <div class="form-group">
                            <label>الدولة</label>
                            <select id="cust-country" class="select2-search" style="width:100%;">
                                <option value="Saudi Arabia" selected>السعودية</option>
                                <option value="UAE">الإمارات</option>
                                <option value="Kuwait">الكويت</option>
                                <option value="Egypt">مصر</option>
                                <option value="Jordan">الأردن</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>مفتاح الدولة</label>
                            <input type="text" id="cust-key" value="+966" readonly style="background:#f1f5f9;">
                        </div>

                        <div class="form-group half">
                            <label>رقم الجوال</label>
                            <input type="text" id="cust-phone" placeholder="5xxxxxxxx" required>
                        </div>

                        <div class="form-group half">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="cust-email" placeholder="example@mail.com">
                        </div>

                        <div class="section-title">ثانياً: العنوان الوطني والتفاصيل البريدية</div>
                        
                        <div class="form-group">
                            <label>المدينة</label>
                            <input type="text" id="cust-city" placeholder="الرياض">
                        </div>
                        <div class="form-group">
                            <label>الحي</label>
                            <input type="text" id="cust-district" placeholder="حي النرجس">
                        </div>
                        <div class="form-group">
                            <label>الشارع</label>
                            <input type="text" id="cust-street">
                        </div>
                        <div class="form-group">
                            <label>رقم المبنى</label>
                            <input type="text" id="cust-building">
                        </div>
                        <div class="form-group">
                            <label>الرقم الإضافي</label>
                            <input type="text" id="cust-additional">
                        </div>
                        <div class="form-group">
                            <label>الرمز البريدي</label>
                            <input type="text" id="cust-zip">
                        </div>
                        <div class="form-group half">
                            <label>صندوق البريد (P.O Box)</label>
                            <input type="text" id="cust-pobox">
                        </div>

                        <div class="section-title">ثالثاً: التصنيف والحالة النظامية</div>

                        <div class="form-group">
                            <label>حالة العميل</label>
                            <select id="cust-status">
                                <option value="نشط">نشط</option>
                                <option value="معلق">معلق</option>
                                <option value="موقوف">موقوف</option>
                                <option value="مكتمل">مكتمل البيانات</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>تصنيف العميل</label>
                            <select id="cust-type">
                                <option value="فرد">فرد</option>
                                <option value="شركة">شركة</option>
                                <option value="مؤسسة">مؤسسة</option>
                                <option value="VIP">عميل VIP</option>
                                <option value="متعثر">عميل متعثر</option>
                            </select>
                        </div>

                        <div class="section-title">رابعاً: ملاحظات إضافية</div>
                        <div class="form-group full">
                            <div id="notes-editor" style="height:120px;"></div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeCustomerModal()">إلغاء الأمر</button>
                <button type="button" class="btn btn-primary" onclick="saveCustomerData()">
                    <i class="fas fa-save"></i> حفظ البيانات والربط بالقاعدة
                </button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script type="module">
        import { initCustomersUI } from './js/modules/customers-ui.js';

        // تهيئة النظام عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            // تشغيل واجهة الجدول
            const container = document.getElementById('customers-module-container');
            if (container) initCustomersUI(container);

            // تشغيل محرر النصوص Quill
            window.quill = new Quill('#notes-editor', {
                theme: 'snow',
                placeholder: 'اكتب ملاحظات العميل هنا...'
            });

            // تشغيل البحث في الدول Select2
            $('.select2-search').select2({
                dir: "rtl",
                dropdownParent: $('#customer-modal')
            });
        });

        // وظائف النافذة (Global لكي تعمل من أزرار HTML)
        window.openCustomerModal = (title) => {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('customer-modal').style.display = 'flex';
        };

        window.closeCustomerModal = () => {
            document.getElementById('customer-modal').style.display = 'none';
        };
    </script>
</body>
</html>
