<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العملاء | تيرا جيت واي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="js/modules/customers.css">

    <style>
        /* أبقيت فقط المتغيرات الأساسية لضمان عمل العناصر التي تعتمد عليها */
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; }
    </style>
</head>
<body>

    <div id="customers-module-container"></div>

    <div id="customer-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">بيانات العميل</h2>
                <button onclick="closeCustomerModal()" class="close-modal-btn">&times;</button>
            </div>
            
            <div class="modal-body">
                <form id="customer-form">
                    <div class="form-grid">
                        <div class="section-title">المعلومات الشخصية والاتصال</div>
                        <div class="form-group half">
                            <label>الاسم الكامل</label>
                            <input type="text" id="cust-name" required>
                        </div>
                        <div class="form-group">
                            <label>الدولة</label>
                            <select id="cust-country" class="select2-search" style="width:100%;">
                                <option value="السعودية" selected>السعودية</option>
                                <option value="الإمارات">الإمارات</option>
                                <option value="الكويت">الكويت</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>مفتاح الدولة</label>
                            <input type="text" id="cust-key" value="+966">
                        </div>
                        <div class="form-group half">
                            <label>رقم الجوال</label>
                            <input type="text" id="cust-phone" placeholder="5xxxxxxxx" required>
                        </div>
                        <div class="form-group half">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="cust-email">
                        </div>

                        <div class="section-title">العنوان الوطني</div>
                        <div class="form-group"><label>المدينة</label><input type="text" id="cust-city"></div>
                        <div class="form-group"><label>الحي</label><input type="text" id="cust-district"></div>
                        <div class="form-group"><label>الشارع</label><input type="text" id="cust-street"></div>
                        <div class="form-group"><label>رقم المبنى</label><input type="text" id="cust-building"></div>
                        <div class="form-group"><label>الإضافي</label><input type="text" id="cust-additional"></div>
                        <div class="form-group"><label>الرمز البريدي</label><input type="text" id="cust-zip"></div>
                        <div class="form-group half"><label>صندوق البريد</label><input type="text" id="cust-pobox"></div>

                        <div class="section-title">الحالة والتصنيف</div>
                        <div class="form-group">
                            <label>الحالة</label>
                            <select id="cust-status">
                                <option value="نشط">نشط</option>
                                <option value="معلق">معلق</option>
                                <option value="موقوف">موقوف</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>التصنيف</label>
                            <select id="cust-type">
                                <option value="فرد">فرد</option>
                                <option value="شركة">شركة</option>
                                <option value="VIP">VIP</option>
                            </select>
                        </div>

                        <div class="section-title">ملاحظات</div>
                        <div class="form-group full">
                            <div id="notes-editor" style="height:120px;"></div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeCustomerModal()">إلغاء</button>
                <button type="button" class="btn btn-primary" onclick="triggerSave()">
                    <i class="fas fa-save"></i> حفظ البيانات
                </button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script type="module">
        import { initCustomersUI } from './js/modules/customers-ui.js';

        document.addEventListener('DOMContentLoaded', () => {
            initCustomersUI(document.getElementById('customers-module-container'));

            window.quill = new Quill('#notes-editor', {
                theme: 'snow',
                placeholder: 'ملاحظات إضافية...'
            });

            $('.select2-search').select2({
                dir: "rtl",
                dropdownParent: $('#customer-modal')
            });
        });

        window.openCustomerModal = (title) => {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('customer-modal').style.display = 'flex';
        };

        window.closeCustomerModal = () => {
            document.getElementById('customer-modal').style.display = 'none';
        };

        window.triggerSave = () => {
            if (window.saveCustomerData) {
                window.saveCustomerData();
            } else {
                console.error("Error: Save function not loaded.");
            }
        };
    </script>
</body>
</html>
