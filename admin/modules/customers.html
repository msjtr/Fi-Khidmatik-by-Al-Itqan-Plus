<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العملاء | تيرا جيت واي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; }

        /* تنسيق المودال الاحترافي */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: var(--white); width: 95%; max-width: 1100px; border-radius: 20px; padding: 0; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .modal-header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .modal-body { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .modal-footer { padding: 15px 30px; border-top: 1px solid var(--border); background: #f8fafc; text-align: left; }

        /* شبكة النموذج */
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
        .form-group.full { grid-column: span 4; }
        .form-group.half { grid-column: span 2; }
        
        .form-group label { font-size: 0.85rem; font-weight: 700; color: #475569; }
        .form-group input, .form-group select { padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; }
        .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .section-title { color: var(--primary); font-size: 1rem; border-right: 4px solid var(--primary); padding-right: 10px; margin: 20px 0 15px 0; grid-column: span 4; }

        .btn { padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* تعديلات الجداول لتناسب الـ 17 حقل */
        .table-container { overflow-x: auto; background: white; border-radius: 15px; margin: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1500px; } /* عرض كبير للأعمدة */
        th { background: #f1f5f9; padding: 15px; text-align: right; font-size: 0.85rem; color: #64748b; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .sticky-actions { position: sticky; left: 0; background: white; box-shadow: -5px 0 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="customers-module-container"></div>

    <div id="customer-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="margin:0; color:var(--primary); font-size: 1.2rem;">بيانات العميل</h2>
                <button onclick="closeCustomerModal()" style="background:none; border:none; font-size:1.8rem; cursor:pointer; color:#94a3b8;">&times;</button>
            </div>
            
            <div class="modal-body">
                <form id="customer-form">
                    <div class="form-grid">
                        <div class="section-title">المعلومات الشخصية والاتصال</div>
                        <div class="form-group half">
                            <label>الاسم الكامل</label>
                            <input type="text" id="cust-name" required>
                        </div>
                        <div class="form-group">
                            <label>الدولة</label>
                            <select id="cust-country" class="select2-search" style="width:100%;">
                                <option value="السعودية" selected>السعودية</option>
                                <option value="الإمارات">الإمارات</option>
                                <option value="الكويت">الكويت</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>مفتاح الدولة</label>
                            <input type="text" id="cust-key" value="+966">
                        </div>
                        <div class="form-group half">
                            <label>رقم الجوال</label>
                            <input type="text" id="cust-phone" placeholder="5xxxxxxxx" required>
                        </div>
                        <div class="form-group half">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="cust-email">
                        </div>

                        <div class="section-title">العنوان الوطني</div>
                        <div class="form-group"><label>المدينة</label><input type="text" id="cust-city"></div>
                        <div class="form-group"><label>الحي</label><input type="text" id="cust-district"></div>
                        <div class="form-group"><label>الشارع</label><input type="text" id="cust-street"></div>
                        <div class="form-group"><label>رقم المبنى</label><input type="text" id="cust-building"></div>
                        <div class="form-group"><label>الإضافي</label><input type="text" id="cust-additional"></div>
                        <div class="form-group"><label>الرمز البريدي</label><input type="text" id="cust-zip"></div>
                        <div class="form-group half"><label>صندوق البريد</label><input type="text" id="cust-pobox"></div>

                        <div class="section-title">الحالة والتصنيف</div>
                        <div class="form-group">
                            <label>الحالة</label>
                            <select id="cust-status">
                                <option value="نشط">نشط</option>
                                <option value="معلق">معلق</option>
                                <option value="موقوف">موقوف</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>التصنيف</label>
                            <select id="cust-type">
                                <option value="فرد">فرد</option>
                                <option value="شركة">شركة</option>
                                <option value="VIP">VIP</option>
                            </select>
                        </div>

                        <div class="section-title">ملاحظات</div>
                        <div class="form-group full">
                            <div id="notes-editor" style="height:120px;"></div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeCustomerModal()">إلغاء</button>
                <button type="button" class="btn btn-primary" onclick="triggerSave()">
                    <i class="fas fa-save"></i> حفظ البيانات
                </button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script type="module">
        import { initCustomersUI } from './js/modules/customers-ui.js';

        document.addEventListener('DOMContentLoaded', () => {
            // 1. تشغيل الواجهة
            initCustomersUI(document.getElementById('customers-module-container'));

            // 2. تهيئة Quill
            window.quill = new Quill('#notes-editor', {
                theme: 'snow',
                placeholder: 'ملاحظات إضافية...'
            });

            // 3. تهيئة Select2
            $('.select2-search').select2({
                dir: "rtl",
                dropdownParent: $('#customer-modal')
            });
        });

        // دوال التحكم بالنافذة (متاحة عالمياً)
        window.openCustomerModal = (title) => {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('customer-modal').style.display = 'flex';
        };

        window.closeCustomerModal = () => {
            document.getElementById('customer-modal').style.display = 'none';
        };

        // وسيط لتشغيل الحفظ من داخل موديول الـ UI
        window.triggerSave = () => {
            if (window.saveCustomerData) {
                window.saveCustomerData();
            } else {
                console.error("خطأ: دالة الحفظ غير محملة بعد.");
            }
        };
    </script>
</body>
</html>
