<div class="customers-module-wrapper">
    
    <div class="glass-header">
        <div class="title-zone">
            <div class="icon-box"><i class="fas fa-users"></i></div>
            <div class="text-box">
                <h1>مجموعة العملاء</h1>
                <p>إدارة <span class="badge-group">customers</span> ومراقبة النشاط</p>
            </div>
        </div>
        
        <div class="action-zone">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="customerSearch" placeholder="ابحث عن عميل، رقم جوال، أو مدينة...">
            </div>
            <button class="btn-glass-add" onclick="openAddCustomerModal()">
                <i class="fas fa-plus"></i> إضافة عميل
            </button>
        </div>
    </div>

    <div class="quick-stats">
        <div class="stat-item">
            <span class="label">إجمالي المجموعة</span>
            <strong id="count-total">0</strong>
        </div>
        <div class="stat-item">
            <span class="label">نشط حالياً</span>
            <strong id="count-active" class="text-success">0</strong>
        </div>
        <div class="stat-item">
            <span class="label">خارج الخدمة</span>
            <strong id="count-inactive" class="text-danger">0</strong>
        </div>
    </div>

    <div class="glass-table-container">
        <table id="customersTable" class="modern-table">
            <thead>
                <tr>
                    <th class="sticky-col">#</th>
                    <th class="sticky-col-name">اسم العميل</th>
                    <th>رقم الجوال</th>
                    <th>المفتاح</th>
                    <th>البريد</th>
                    <th>الدولة</th>
                    <th>المدينة</th>
                    <th>الحي</th>
                    <th>الشارع</th>
                    <th>المبنى</th>
                    <th>الإضافي</th>
                    <th>الرمز البريدي</th>
                    <th>صندوق البريد</th>
                    <th>تاريخ الإضافة</th>
                    <th>الحالة</th>
                    <th>التصنيف</th>
                    <th class="sticky-actions-header">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customers-data-rows">
                </tbody>
        </table>
    </div>
</div>
