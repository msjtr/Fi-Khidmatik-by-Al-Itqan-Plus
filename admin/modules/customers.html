<script type="module">
import { loadCustomers, addCustomer, updateCustomer, deleteCustomer } from '../../js/common.js';

let customers = [];

async function init() {
    await loadData();
    renderCustomers();
}

async function loadData() {
    customers = await loadCustomers();
}

function renderCustomers() {
    const container = document.getElementById('customers-container');
    container.innerHTML = `
        <div class="bg-white rounded-2xl shadow p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">العملاء</h2>
                <button onclick="window.showAddCustomerModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">عميل جديد</button>
            </div>
            <table class="min-w-full">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الهاتف</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody>
                    ${customers.map(c => `
                        <tr>
                            <td>${c.name}</td>
                            <td>${c.phone || '-'}</td>
                            <td>
                                <button onclick="editCustomer('${c.id}')">تعديل</button>
                                <button onclick="deleteCustomerItem('${c.id}')">حذف</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

window.showAddCustomerModal = async () => {
    const name = prompt('الاسم');
    if (!name) return;
    await addCustomer({ name });
    await init();
};

window.editCustomer = async (id) => {
    const name = prompt('اسم جديد');
    if (!name) return;
    await updateCustomer(id, { name });
    await init();
};

window.deleteCustomerItem = async (id) => {
    if (confirm('حذف؟')) {
        await deleteCustomer(id);
        await init();
    }
};

init();
</script>
