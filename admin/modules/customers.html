<link rel="stylesheet" href="css/customers.css">

<div class="module-content">
    <div class="module-header-tera">
        <div class="header-title">
            <h2><i class="fas fa-users-viewfinder"></i> إدارة قاعدة العملاء</h2>
            <p>إدارة البيانات الشخصية، العناوين الوطنية، وتتبع حالات العملاء</p>
        </div>
    </div>

    <div id="customers-ui-root">
        <div class="loading-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>جاري تحميل محرك البيانات...</p>
        </div>
    </div>
</div>

<div id="customer-modal" class="tera-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title"><i class="fas fa-user-plus"></i> إضافة عميل جديد</h3>
            <button class="close-btn" onclick="closeCustomerModal()">&times;</button>
        </div>
        
        <form id="customer-form" onsubmit="handleCustomerSubmit(event)">
            <div class="modal-body">
                <div class="form-section">
                    <h4><i class="fas fa-address-card"></i> المعلومات الأساسية</h4>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>اسم العميل الكامل</label>
                            <input type="text" id="cust-name" name="name" required placeholder="أدخل الاسم الرباعي">
                        </div>
                        <div class="form-group">
                            <label>البريد الإلكتروني (Email)</label>
                            <input type="email" id="cust-email" name="Email" placeholder="example@mail.com">
                        </div>
                        <div class="form-group phone-group">
                            <label>رقم الجوال</label>
                            <div class="phone-inputs">
                                <select id="cust-country-code" name="countryCode">
                                    <option value="966">🇸🇦 +966</option>
                                    <option value="971">🇦🇪 +971</option>
                                    <option value="965">🇰🇼 +965</option>
                                </select>
                                <input type="tel" id="cust-phone" name="Phone" required placeholder="5xxxxxxxx">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>تصنيف العميل (اختياري)</label>
                            <select id="cust-tag" name="status">
                                <option value="عادي">عميل عادي</option>
                                <option value="مميز">⭐ عميل مميز</option>
                                <option value="غير جدي">⚠️ عميل غير جدي</option>
                                <option value="غير متعاون">🚫 عميل غير متعاون</option>
                                <option value="محتال">💀 عميل محتال</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section highlight">
                    <h4><i class="fas fa-map-location-dot"></i> تفاصيل العنوان الوطني</h4>
                    <div class="form-grid quad">
                        <div class="form-group">
                            <label>الدولة (country)</label>
                            <input type="text" id="cust-country" name="country" value="السعودية">
                        </div>
                        <div class="form-group">
                            <label>المدينة (city)</label>
                            <input type="text" id="cust-city" name="city" required>
                        </div>
                        <div class="form-group">
                            <label>الحي (district)</label>
                            <input type="text" id="cust-district" name="district">
                        </div>
                        <div class="form-group">
                            <label>الشارع (street)</label>
                            <input type="text" id="cust-street" name="street">
                        </div>
                    </div>
                    <div class="form-grid quad">
                        <div class="form-group">
                            <label>رقم المبنى (buildingNo)</label>
                            <input type="text" id="cust-building" name="buildingNo">
                        </div>
                        <div class="form-group">
                            <label>الرقم الإضافي (additionalNo)</label>
                            <input type="text" id="cust-additional" name="additionalNo">
                        </div>
                        <div class="form-group">
                            <label>الرمز البريدي (postalCode)</label>
                            <input type="text" id="cust-postal" name="postalCode">
                        </div>
                        <div class="form-group">
                            <label>صندوق البريد (poBox)</label>
                            <input type="text" id="cust-pobox" name="poBox">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h4><i class="fas fa-pen-nib"></i> ملاحظات العميل</h4>
                    <div class="form-group full-width">
                        <textarea id="cust-notes" name="notes" placeholder="اكتب ملاحظاتك هنا... يدعم هذا المربع التفاصيل الفنية كاملة"></textarea>
                    </div>
                </div>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeCustomerModal()">إلغاء</button>
                <button type="submit" class="btn-save">حفظ بيانات العميل</button>
            </div>
        </form>
    </div>
</div>

<style>
    /* تنسيقات إضافية سريعة للملف */
    .module-header-tera { margin-bottom: 25px; padding: 10px; border-bottom: 2px solid #f1f5f9; }
    .header-title h2 { color: #1e293b; font-size: 1.5rem; margin-bottom: 5px; }
    .header-title p { color: #64748b; font-size: 0.9rem; }
    
    .form-section { margin-bottom: 20px; padding: 15px; background: #fafafa; border-radius: 8px; }
    .form-section.highlight { background: #f0f7ff; border: 1px solid #e0e7ff; }
    .form-section h4 { font-size: 0.95rem; color: #1e293b; margin-bottom: 15px; border-right: 3px solid #3b82f6; padding-right: 10px; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .form-grid.quad { grid-template-columns: repeat(4, 1fr); }
    
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 0.8rem; font-weight: bold; color: #475569; }
    .form-group input, .form-group select, .form-group textarea { 
        padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; font-family: 'Tajawal', sans-serif;
    }
    
    .phone-inputs { display: flex; gap: 5px; }
    .phone-inputs select { width: 90px; }
    .phone-inputs input { flex: 1; }
    
    .full-width { grid-column: span 2; }
    #cust-notes { min-height: 100px; resize: vertical; }
    
    .loading-state { text-align: center; padding: 50px; color: #94a3b8; }
    .loading-state i { font-size: 2rem; margin-bottom: 10px; }
</style>
