<div class="customers-module animate-fade-in">
    <!-- رأس الصفحة: العنوان وأدوات التحكم والإحصائيات السريعة -->
    <div class="module-header" style="background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.3);">
        <div class="header-title">
            <h2><i class="fas fa-users-cog" style="color: var(--tera-orange);"></i> إدارة عملاء تيرا</h2>
            <p>لوحة التحكم المركزية | نظام العناوين الوطنية المتكامل</p>
        </div>
        
        <div class="header-actions" style="display: flex; gap: 12px; align-items: center;">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="customerSearchInput" placeholder="بحث باسم العميل، الجوال، أو الحي..." oninput="handleCustomerSearch(this.value)">
            </div>
            <button class="btn-primary" onclick="window.openCustomerModal()" style="box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);">
                <i class="fas fa-user-plus"></i> إضافة عميل جديد
            </button>
            <button class="btn-secondary" onclick="window.exportCustomersExcel()" title="تصدير إلى إكسل">
                <i class="fas fa-file-excel"></i>
            </button>
        </div>
    </div>

    <!-- قسم الإحصائيات (ظهرت بناءً على طلبك) -->
    <div id="customersStatsRow" class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px;">
        <!-- يتم تعبئتها ديناميكياً -->
    </div>

    <!-- جدول عرض البيانات - تصميم Glassmorphism -->
    <div class="table-container shadow-neumorphic" style="background: rgba(255, 255, 255, 0.5); border-radius: 15px; overflow-x: auto;">
        <table style="min-width: 1400px;">
            <thead>
                <tr>
                    <th>ت</th>
                    <th>العميل</th>
                    <th>الجوال</th>
                    <th>البريد الإلكتروني</th>
                    <th>المدينة/الحي</th>
                    <th>الشارع</th>
                    <th>رقم المبنى</th>
                    <th>الرمز البريدي</th>
                    <th>تاريخ الإضافة</th>
                    <th>التصنيف</th>
                    <th style="text-align: center;">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customersListContainer">
                <tr>
                    <td colspan="11" style="text-align:center; padding: 80px;">
                        <div class="tera-loader-inline">
                            <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--tera-orange);"></i>
                            <p style="margin-top: 15px; color: #64748b; font-weight: 500;">جاري مزامنة بيانات عملاء حائل من السحابة...</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- النافذة المنبثقة (Modal) لإضافة وتعديل العملاء - شاملة كل الحقول -->
    <div id="customerModal" class="tera-modal" style="display: none; align-items: flex-start; padding-top: 30px;">
        <div class="modal-content animate-slide-up" style="width: 95%; max-width: 900px; background: #fff; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);">
            <div class="modal-header-flex" style="padding: 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center;">
                <h3 id="modalTitle"><i class="fas fa-id-card" style="color: var(--tera-orange);"></i> ملف بيانات العميل</h3>
                <button onclick="window.closeCustomerModal()" class="close-x" style="background: #f1f5f9; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer;">&times;</button>
            </div>

            <form id="customerForm" onsubmit="window.handleCustomerSubmit(event)" style="padding: 25px;">
                <input type="hidden" name="id" id="cust_id">
                
                <div class="form-sections-wrapper" style="display: grid; grid-template-columns: 200px 1fr; gap: 30px;">
                    <!-- قسم الصورة الشخصية -->
                    <div class="avatar-column" style="text-align: center;">
                        <div id="imagePreview" class="image-preview shadow-inner" style="width: 150px; height: 150px; margin: 0 auto 15px; border-radius: 20px; background: #f8fafc; display: flex; align-items: center; justify-content: center; border: 2px dashed #cbd5e1; overflow: hidden; cursor: pointer;" onclick="document.getElementById('cust_image_input').click()">
                            <i id="defaultAvatarIcon" class="fas fa-user-tie fa-4x" style="color: #cbd5e1;"></i>
                            <img id="profileImageDisplay" style="display:none; width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <input type="file" id="cust_image_input" accept="image/*" style="display: none;" onchange="window.previewCustomerImage(this)">
                        <button type="button" class="btn-small" onclick="document.getElementById('cust_image_input').click()" style="font-size: 0.8rem; background: #f1f5f9; border: 1px solid #ddd; padding: 5px 10px; border-radius: 5px;">تغيير الصورة</button>
                    </div>

                    <!-- شبكة الحقول (14 حقل مطابق لـ Customers) -->
                    <div class="fields-column">
                        <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>اسم العميل الكامل</label>
                                <input type="text" name="name" id="cust_name" placeholder="الاسم الرباعي" required>
                            </div>

                            <div class="form-group">
                                <label>رقم الجوال</label>
                                <div style="display: flex; gap: 5px; direction: ltr;">
                                    <input type="tel" name="phone" id="cust_phone" placeholder="5xxxxxxxx" required style="flex: 1;">
                                    <span style="background: #f8fafc; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">+966</span>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>البريد الإلكتروني</label>
                                <input type="email" name="email" id="cust_email" placeholder="example@mail.com">
                            </div>

                            <div class="form-group">
                                <label>تصنيف العميل</label>
                                <select name="tag" id="cust_tag">
                                    <option value="أفراد">أفراد</option>
                                    <option value="vip">عميل VIP 💎</option>
                                    <option value="شركات">شركات / مؤسسات</option>
                                </select>
                            </div>

                            <!-- حقول العنوان الوطني -->
                            <div class="form-group">
                                <label>المدينة</label>
                                <input type="text" name="city" id="cust_city" value="حائل">
                            </div>

                            <div class="form-group">
                                <label>الحي</label>
                                <input type="text" name="district" id="cust_district" placeholder="النقرة، صديان..">
                            </div>

                            <div class="form-group">
                                <label>اسم الشارع</label>
                                <input type="text" name="street" id="cust_street">
                            </div>

                            <div class="form-group">
                                <label>رقم المبنى</label>
                                <input type="text" name="buildingNo" id="cust_buildingNo" placeholder="4 أرقام">
                            </div>

                            <div class="form-group">
                                <label>الرقم الإضافي</label>
                                <input type="text" name="additionalNo" id="cust_additionalNo" placeholder="4 أرقام">
                            </div>

                            <div class="form-group">
                                <label>الرمز البريدي</label>
                                <input type="text" name="postalCode" id="cust_postalCode" placeholder="5 أرقام">
                            </div>

                            <div class="form-group">
                                <label>صندوق البريد</label>
                                <input type="text" name="poBox" id="cust_poBox">
                            </div>

                            <div class="form-group">
                                <label>مفتاح الدولة</label>
                                <input type="text" name="countryCode" id="cust_countryCode" value="+966">
                            </div>
                        </div>

                        <div class="form-group full-width" style="margin-top: 15px;">
                            <label>ملاحظات إضافية</label>
                            <textarea name="notes" id="cust_notes" rows="2" style="width: 100%; border-radius: 8px; border: 1px solid #ddd; padding: 10px;"></textarea>
                        </div>
                    </div>
                </div>

                <div class="modal-footer" style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn-close" onclick="window.closeCustomerModal()" style="background: #f1f5f9; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer;">إغلاق النافذة</button>
                    <button type="submit" id="saveBtn" class="btn-primary" style="background: var(--tera-orange); color: #fff; border: none; padding: 12px 40px; border-radius: 10px; font-weight: bold; cursor: pointer;">
                        <i class="fas fa-save"></i> حفظ البيانات فعلياً
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // ربط البحث الفوري بالدالة البرمجية
    function handleCustomerSearch(val) {
        if (typeof window.filterCustomers === 'function') {
            window.filterCustomers(val);
        }
    }
</script>
