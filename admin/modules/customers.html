<div class="form-grid">
    <div class="input-group">
        <label>اسم العميل الكامل</label>
        <input type="text" id="cust-name" placeholder="أدخل الاسم">
    </div>
    
    <div class="input-group">
        <label>مفتاح الدولة</label>
        <input type="text" id="cust-countryCode" placeholder="+966">
    </div>

    <div class="input-group full-width image-upload-section">
        <label>صورة العميل</label>
        <div class="upload-controls">
            <img id="cust-image-preview" src="assets/default-avatar.png" width="80">
            <input type="file" id="cust-image-input" onchange="previewImage(this)">
            <input type="hidden" id="cust-image-url">
        </div>
    </div>

    <div class="input-group full-width">
        <label>الملاحظات الاحترافية</label>
        <div id="editor-container"></div>
    </div>
</div>
