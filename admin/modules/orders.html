<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات - نظام متكامل</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Quill -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        * { transition: all 0.2s ease; }
        .modal { transition: opacity 0.3s ease; background-color: rgba(0,0,0,0.5); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-new { background: #dbeafe; color: #1e40af; }
        .status-processing { background: #fef3c7; color: #b45309; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-review { background: #e9d5ff; color: #6b21a5; }
        .status-refund { background: #fed7aa; color: #9a3412; }
        .status-cancelled { background: #fee2e2; color: #b91c1c; }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1rem;
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            z-index: 1000;
            display: none;
        }
    </style>
</head>

<body class="bg-gray-50 p-6 font-sans">

<div id="toast"></div>

<div class="max-w-7xl mx-auto">

    <!-- العنوان -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">
                <i class="fas fa-shopping-cart text-blue-600 ml-2"></i>
                إدارة الطلبات
            </h1>
        </div>
    </div>

    <!-- الطلبات -->
    <div id="ordersContainer" class="space-y-4"></div>

</div>

<script type="module">

/* ================================
   🔥 الربط مع النظام المركزي
================================ */
import { printManager } from '../../js/print/print.manager.js';

/* ================================
   بيانات تجريبية
================================ */
let orders = [
    {
        id: "1",
        orderNumber: "KF-1001",
        orderDate: "2026-01-01",
        orderTime: "14:30",
        paymentMethodName: "مدى",
        customer: {
            name: "محمد الشمري",
            phone: "0500000000"
        },
        items: [
            { name: "منتج 1", price: 100, quantity: 1 },
            { name: "منتج 2", price: 50, quantity: 2 }
        ],
        total: 200,
        status: "جديد"
    }
];

/* ================================
   عرض الطلبات
================================ */
function renderOrders() {

    const html = orders.map(order => `
        <div class="bg-white rounded-xl shadow-md p-4 border">

            <div class="flex justify-between">

                <div>
                    <h3 class="font-bold text-blue-600">${order.orderNumber}</h3>
                    <p class="text-sm">${order.customer.name}</p>
                    <p class="text-green-600 font-bold">${order.total} ريال</p>
                </div>

                <div class="flex gap-2">

                    <button onclick="printInvoiceHandler('${order.id}')" class="text-blue-600">
                        🖨️
                    </button>

                    <button onclick="exportAsPDF('${order.id}')" class="text-red-600">
                        PDF
                    </button>

                    <button onclick="exportAsPNG('${order.id}')" class="text-green-600">
                        PNG
                    </button>

                </div>

            </div>

        </div>
    `).join('');

    document.getElementById('ordersContainer').innerHTML = html;
}

/* ================================
   أوامر الطباعة (الجديدة)
================================ */
window.printInvoiceHandler = async (orderId) => {
    const order = orders.find(o => o.id === orderId);
    if (order) await printManager('print', order);
};

window.exportAsPDF = async (orderId) => {
    const order = orders.find(o => o.id === orderId);
    if (order) await printManager('pdf', order);
};

window.exportAsPNG = async (orderId) => {
    const order = orders.find(o => o.id === orderId);
    if (order) await printManager('image', order);
};

/* ================================
   تشغيل الصفحة
================================ */
renderOrders();

</script>

</body>
</html>
