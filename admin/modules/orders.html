<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { loadOrders, deleteOrder } from '../../js/common.js';

let orders = [];

async function init() {
    orders = await loadOrders();
    render();
}

function render() {
    document.body.innerHTML = `
    <div class="p-6">
        <h2 class="text-xl font-bold mb-4">الطلبات</h2>

        <table class="w-full bg-white rounded shadow">
            <thead class="bg-gray-100">
                <tr>
                    <th class="p-2">رقم</th>
                    <th class="p-2">العميل</th>
                    <th class="p-2">الإجمالي</th>
                    <th class="p-2">الإجراء</th>
                </tr>
            </thead>

            <tbody>
                ${orders.map(o => `
                    <tr class="border-b">
                        <td class="p-2">${o.id}</td>
                        <td class="p-2">${o.customer || '-'}</td>
                        <td class="p-2">${o.totalAmount || 0}</td>
                        <td class="p-2">
                            <button onclick="del('${o.id}')" class="text-red-600">حذف</button>
                        </td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    </div>
    `;
}

window.del = async (id) => {
    if (confirm('حذف الطلب؟')) {
        await deleteOrder(id);
        init();
    }
};

init();
</script>
</head>
<body></body>
</html>
