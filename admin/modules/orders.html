<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>إدارة الطلبات</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>

<style>
body {background:#f3f4f6;font-family:Tajawal}
.card {background:#fff;padding:15px;border-radius:12px;margin-bottom:10px}
</style>
</head>

<body class="p-6">

<h1 class="text-2xl font-bold mb-6">إدارة الطلبات</h1>

<button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded mb-4">
+ طلب جديد
</button>

<div id="ordersContainer"></div>

<script type="module">

import {
    loadOrders,
    loadCustomersAndProducts,
    customersMap,
    addOrder,
    updateOrder,
    deleteOrder
} from "./js/firebase.js";

let orders = [];
let currentOrderId = null;

// INIT
async function init(){
    await loadCustomersAndProducts();
    orders = await loadOrders();
    renderOrders();
}
init();

// RENDER
function renderOrders(){
    const el = document.getElementById('ordersContainer');

    el.innerHTML = orders.map(o=>{
        const customer = customersMap.get(o.customerId)||{};
        return `
        <div class="card">
            <b>${o.orderNumber}</b>
            <div>${customer.name||'-'}</div>
            <div>${(o.total||0).toFixed(2)} ريال</div>

            <div class="flex gap-2 mt-2">
                <button onclick="printOrder('${o.id}')">🖨</button>
                <button onclick="editOrder('${o.id}')">✏️</button>
                <button onclick="deleteOrderHandler('${o.id}')">🗑</button>
            </div>
        </div>
        `;
    }).join('');
}

// PRINT
window.printOrder = id=>{
    window.open(`print.html?id=${id}&auto=print`);
};

// DELETE
window.deleteOrderHandler = async id=>{
    await deleteOrder(id);
    orders = orders.filter(o=>o.id!==id);
    renderOrders();
};

</script>

</body>
</html>
