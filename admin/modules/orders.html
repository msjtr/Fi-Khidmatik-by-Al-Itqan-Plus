<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { loadOrders, deleteOrder } from '../../js/common.js';

let orders = [];

async function init() {
    orders = await loadOrders();
    render();
}

function render() {
    document.body.innerHTML = `
    <div class="p-6">

        <h2 class="text-xl font-bold mb-4">الطلبات</h2>

        ${orders.length === 0 ? `
            <p class="text-center text-gray-500">لا يوجد طلبات</p>
        ` : `

        <table class="w-full bg-white rounded shadow text-center">
            <thead class="bg-gray-100">
                <tr>
                    <th>رقم الطلب</th>
                    <th>الجوال</th>
                    <th>طريقة الدفع</th>
                    <th>الحالة</th>
                    <th>التاريخ</th>
                    <th>الإجراء</th>
                </tr>
            </thead>

            <tbody>
                ${orders.map(o => `
                    <tr class="border-b">

                        <!-- رقم الطلب -->
                        <td class="font-bold text-blue-600">
                            ${o.orderNumber || o.id}
                        </td>

                        <!-- الجوال -->
                        <td>
                            ${o.phone || '-'}
                        </td>

                        <!-- الدفع -->
                        <td>
                            ${o.payment || '-'}
                        </td>

                        <!-- الحالة -->
                        <td class="${o.status === 'مدفوع' ? 'text-green-600' : 'text-red-600'}">
                            ${o.status || '-'}
                        </td>

                        <!-- التاريخ -->
                        <td>
                            ${o.date || '-'}
                        </td>

                        <!-- حذف -->
                        <td>
                            <button onclick="del('${o.id}')" class="text-red-600">
                                حذف
                            </button>
                        </td>

                    </tr>
                `).join('')}
            </tbody>
        </table>
        `}
    </div>
    `;
}

window.del = async (id) => {
    if (confirm('حذف الطلب؟')) {
        await deleteOrder(id);
        init();
    }
};

init();
</script>
</head>
<body></body>
</html>
