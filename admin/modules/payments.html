<!DOCTYPE html>
<html dir="rtl">
<head>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { getSettings, setSettings } from '../../js/common.js';

let methods = [];

async function init() {
    const data = await getSettings('paymentMethods');
    methods = data?.methods || [];
    render();
}

function render() {
    document.body.innerHTML = `
    <div class="p-6">
        <h2 class="font-bold mb-4">طرق الدفع</h2>

        ${methods.map((m,i)=>`
        <div>
            ${m}
            <button onclick="del(${i})">حذف</button>
        </div>`).join('')}

        <button onclick="add()">إضافة</button>
    </div>`;
}

window.add = async () => {
    const m = prompt('طريقة الدفع');
    if (!m) return;
    methods.push(m);
    await setSettings('paymentMethods', { methods });
    init();
};

window.del = async (i) => {
    methods.splice(i, 1);
    await setSettings('paymentMethods', { methods });
    init();
};

init();
</script>
</head>
<body></body>
</html>
