<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - متجرك الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">⚙️ إعدادات المتجر</h1>

    <div class="bg-white rounded-lg shadow p-6">
        <form id="settingsForm">
            <!-- معلومات المتجر -->
            <div class="mb-6">
                <h2 class="text-lg font-semibold border-b pb-2 mb-4">معلومات المتجر</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">اسم المتجر</label>
                        <input type="text" id="storeName" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">البريد الإلكتروني</label>
                        <input type="email" id="storeEmail" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">رقم الجوال</label>
                        <input type="tel" id="storePhone" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">العنوان</label>
                        <input type="text" id="storeAddress" class="w-full border rounded-lg px-3 py-2">
                    </div>
                </div>
            </div>

            <!-- إعدادات الضرائب -->
            <div class="mb-6">
                <h2 class="text-lg font-semibold border-b pb-2 mb-4">إعدادات الضرائب</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">نسبة الضريبة (%)</label>
                        <input type="number" id="taxRate" step="0.01" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">تفعيل الضريبة</label>
                        <select id="taxEnabled" class="w-full border rounded-lg px-3 py-2">
                            <option value="true">نشط</option>
                            <option value="false">غير نشط</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- إعدادات الشحن -->
            <div class="mb-6">
                <h2 class="text-lg font-semibold border-b pb-2 mb-4">إعدادات الشحن</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">رسوم الشحن</label>
                        <input type="number" id="shippingFee" step="0.01" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">الحد الأدنى للشحن المجاني</label>
                        <input type="number" id="freeShippingMin" step="0.01" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">مدة التوصيل (أيام)</label>
                        <input type="number" id="deliveryDays" class="w-full border rounded-lg px-3 py-2">
                    </div>
                </div>
            </div>

            <!-- إعدادات الإشعارات -->
            <div class="mb-6">
                <h2 class="text-lg font-semibold border-b pb-2 mb-4">إعدادات الإشعارات</h2>
                <div class="space-y-2">
                    <label class="flex items-center">
                        <input type="checkbox" id="notifyNewOrder" class="ml-2">
                        <span>إشعار عند الطلبات الجديدة</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" id="notifyLowStock" class="ml-2">
                        <span>إشعار عند انخفاض المخزون</span>
                    </label>
                </div>
            </div>

            <div class="flex justify-end gap-2">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">حفظ الإعدادات</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { getSettings, setSettings } from '../../js/common.js';

    const SETTINGS_ID = 'general_settings';

    async function loadSettings() {
        const settings = await getSettings(SETTINGS_ID);
        if (settings) {
            document.getElementById('storeName').value = settings.storeName || '';
            document.getElementById('storeEmail').value = settings.storeEmail || '';
            document.getElementById('storePhone').value = settings.storePhone || '';
            document.getElementById('storeAddress').value = settings.storeAddress || '';
            document.getElementById('taxRate').value = settings.taxRate || 0;
            document.getElementById('taxEnabled').value = settings.taxEnabled ? 'true' : 'false';
            document.getElementById('shippingFee').value = settings.shippingFee || 0;
            document.getElementById('freeShippingMin').value = settings.freeShippingMin || 0;
            document.getElementById('deliveryDays').value = settings.deliveryDays || 3;
            document.getElementById('notifyNewOrder').checked = settings.notifyNewOrder || false;
            document.getElementById('notifyLowStock').checked = settings.notifyLowStock || false;
        }
    }

    async function saveSettings(event) {
        event.preventDefault();
        const settings = {
            storeName: document.getElementById('storeName').value,
            storeEmail: document.getElementById('storeEmail').value,
            storePhone: document.getElementById('storePhone').value,
            storeAddress: document.getElementById('storeAddress').value,
            taxRate: parseFloat(document.getElementById('taxRate').value),
            taxEnabled: document.getElementById('taxEnabled').value === 'true',
            shippingFee: parseFloat(document.getElementById('shippingFee').value),
            freeShippingMin: parseFloat(document.getElementById('freeShippingMin').value),
            deliveryDays: parseInt(document.getElementById('deliveryDays').value),
            notifyNewOrder: document.getElementById('notifyNewOrder').checked,
            notifyLowStock: document.getElementById('notifyLowStock').checked,
            updatedAt: new Date().toISOString()
        };
        try {
            await setSettings(SETTINGS_ID, settings);
            alert('تم حفظ الإعدادات بنجاح');
        } catch (err) {
            console.error(err);
            alert('حدث خطأ أثناء حفظ الإعدادات');
        }
    }

    document.getElementById('settingsForm').onsubmit = saveSettings;
    loadSettings();
</script>
</body>
</html>
