<div class="module-container">
    <h2><i class="fas fa-sliders-h"></i> إعدادات النظام</h2>
    <form id="settings-form">
        <div class="form-group">
            <label>اسم الشركة / المتجر</label>
            <input type="text" id="shop-name" class="form-control">
        </div>
        <div class="form-group">
            <label>نسبة الضريبة (%)</label>
            <input type="number" id="tax-percent" step="0.1" class="form-control">
        </div>
        <div class="form-group">
            <label>العملة</label>
            <input type="text" id="currency" class="form-control" placeholder="ريال">
        </div>
        <button type="submit" class="btn-success">حفظ الإعدادات</button>
    </form>
</div>
