<div style="padding: 25px;">
    <h2><i class="fas fa-database" style="color: #e67e22;"></i> النسخ الاحتياطي</h2>
    <div style="background: white; border-radius: 12px; padding: 20px; margin-top: 20px;">
        <div style="text-align: center; padding: 20px;">
            <i class="fas fa-cloud-upload-alt fa-3x" style="color: #e67e22;"></i>
            <p style="margin: 15px 0;">قم بعمل نسخة احتياطية من جميع بيانات النظام</p>
            <button id="create-backup" style="background: #e67e22; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer;">
                <i class="fas fa-download"></i> إنشاء نسخة احتياطية
            </button>
        </div>
        <hr>
        <div style="text-align: center; padding: 20px;">
            <i class="fas fa-cloud-upload-alt fa-3x" style="color: #27ae60;"></i>
            <p style="margin: 15px 0;">استعادة بيانات من نسخة احتياطية سابقة</p>
            <input type="file" id="restore-file-input" accept=".json" style="display: none;">
            <button id="restore-backup" style="background: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer;">
                <i class="fas fa-upload"></i> استعادة نسخة احتياطية
            </button>
        </div>
    </div>
</div>
