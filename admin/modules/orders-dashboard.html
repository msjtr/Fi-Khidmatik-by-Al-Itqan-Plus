<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة إدارة الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-6 font-sans">

    <div class="max-w-7xl mx-auto space-y-8">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-200">
            <h2 class="text-2xl font-black text-gray-800 mb-6 border-r-4 border-blue-600 pr-4">إنشاء طلب جديد</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-2 space-y-6">
                    <div class="grid grid-cols-3 gap-4 bg-gray-50 p-4 rounded-2xl">
                        <div><label class="block text-xs font-bold mb-1">رقم الطلب</label><input id="orderNo" readonly class="w-full p-2 border rounded-lg bg-white font-bold text-blue-600"></div>
                        <div><label class="block text-xs font-bold mb-1">التاريخ</label><input type="date" id="orderDate" class="w-full p-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-bold mb-1">الوقت</label><input type="time" id="orderTime" class="w-full p-2 border rounded-lg"></div>
                    </div>

                    <div class="border p-6 rounded-2xl space-y-4">
                        <select id="customerSelect" onchange="fillCustomer(this.value)" class="w-full p-3 bg-blue-50 border-none rounded-xl font-bold"></select>
                        <div class="grid grid-cols-2 gap-4">
                            <input id="cName" placeholder="اسم العميل" class="p-3 border rounded-xl">
                            <input id="cPhone" placeholder="رقم الهاتف" class="p-3 border rounded-xl">
                        </div>
                        <input id="cEmail" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-xl">
                    </div>

                    <div class="space-y-2">
                        <h4 class="font-bold text-sm text-gray-600">تفاصيل الخدمة/المنتج</h4>
                        <div id="editor" class="h-40 bg-white"></div>
                    </div>
                </div>

                <div class="bg-blue-600 text-white p-8 rounded-3xl space-y-6 shadow-lg">
                    <h3 class="font-bold text-xl border-b border-blue-400 pb-2">الملخص النهائي</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between"><span>المجموع:</span><span id="subLabel">0.00</span></div>
                        <div class="flex justify-between font-black text-2xl border-t pt-4"><span>الإجمالي:</span><span id="totalLabel">0.00</span></div>
                    </div>
                    <button onclick="submitNewOrder()" class="w-full bg-white text-blue-600 py-4 rounded-2xl font-black text-lg shadow-xl hover:scale-95 transition">حفظ الطلب والطباعة</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-lg p-8">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fas fa-history text-blue-600"></i> سجل الطلبات السابقة
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm uppercase">
                            <th class="p-3">رقم الطلب</th>
                            <th class="p-3">العميل</th>
                            <th class="p-3">التاريخ</th>
                            <th class="p-3">المبلغ</th>
                            <th class="p-3">الحالة</th>
                            <th class="p-3 text-center">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module" src="../../js/orders-app.js"></script>
</body>
</html>
