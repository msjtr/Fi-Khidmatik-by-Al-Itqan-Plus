<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - تيرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8 text-right">

    <div class="max-w-7xl mx-auto space-y-10">
        <div class="glass-card rounded-[2.5rem] shadow-sm p-8 md:p-12">
            <h2 class="text-3xl font-black text-gray-800 mb-10 border-r-8 border-blue-600 pr-4">إنشاء طلب جديد</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div class="lg:col-span-2 space-y-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <label class="block text-sm font-bold text-gray-500">رقم الطلب (تلقائي)</label>
                            <input id="orderNo" readonly class="w-full p-4 bg-blue-50 text-blue-700 font-black rounded-2xl border-none">
                        </div>
                        <div class="space-y-4">
                            <label class="block text-sm font-bold text-gray-500">التاريخ</label>
                            <input type="date" id="orderDate" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                        </div>
                        <div class="space-y-4">
                            <input id="cName" placeholder="اسم العميل" class="w-full p-4 border border-gray-100 rounded-2xl">
                        </div>
                        <div class="space-y-4">
                            <input id="cPhone" placeholder="رقم الجوال" class="w-full p-4 border border-gray-100 rounded-2xl">
                        </div>
                    </div>

                    <div class="space-y-4">
                        <input id="pName" placeholder="اسم المنتج / الخدمة" class="w-full p-4 border border-gray-100 rounded-2xl font-bold">
                        <div id="editor" class="h-44 bg-white rounded-2xl"></div>
                        <label class="flex items-center gap-3 text-sm text-gray-500">
                            <input type="checkbox" id="saveToStock" class="w-5 h-5 rounded-lg"> حفظ هذا المنتج في المخزون الدائم؟
                        </label>
                    </div>
                </div>

                <div class="bg-blue-600 rounded-[3rem] p-10 text-white flex flex-col justify-between shadow-2xl shadow-blue-200">
                    <div class="space-y-8">
                        <h3 class="text-xl font-bold border-b border-blue-400 pb-4">تفاصيل الاعتماد</h3>
                        <div>
                            <label class="block text-xs mb-2 opacity-70">طريقة الدفع</label>
                            <select id="payMethod" class="w-full p-4 bg-blue-700 rounded-2xl border-none text-white font-bold">
                                <option>تمارا</option><option>تابي</option><option>إمكان</option><option>نقدي</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs mb-2 opacity-70">الإجمالي النهائي</label>
                            <input type="number" id="finalTotal" placeholder="0.00" class="w-full p-4 bg-white text-blue-700 rounded-2xl border-none font-black text-2xl">
                        </div>
                    </div>
                    <button onclick="submitOrder()" class="mt-10 w-full bg-white text-blue-600 py-5 rounded-2xl font-black text-xl hover:bg-gray-100 transition shadow-xl">اعتماد وحفظ</button>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] shadow-sm p-8 md:p-12 overflow-hidden">
            <h2 class="text-2xl font-black mb-8 text-gray-700 flex items-center gap-3">
                <span class="w-3 h-10 bg-blue-600 rounded-full"></span> سجل العمليات السابقة
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-gray-50 text-gray-400 text-xs font-bold uppercase">
                        <tr>
                            <th class="p-5">رقم العملية</th><th class="p-5">العميل</th>
                            <th class="p-5">التاريخ</th><th class="p-5">المبلغ</th>
                            <th class="p-5">الحالة</th><th class="p-5 text-center">إدارة</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module" src="../../js/orders-app.js"></script>
</body>
</html>
