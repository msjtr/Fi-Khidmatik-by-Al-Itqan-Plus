<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات - منصة في خدمتك</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="css/orders-style.css">
    
    <style>
        /* إضافة التنسيقات الخاصة بالخلفية المتدرجة والتحسينات السريعة */
        body { background: radial-gradient(circle at top right, #f8fafc, #f1f5f9); min-height: 100vh; }
        .form-section { background: #ffffff; border: 1px solid #eef2f6; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .form-section-title { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 15px; border-right: 4px solid #2563eb; padding-right: 12px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="toast" style="display: none;"></div>

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-200">
                    <i class="fas fa-file-invoice text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-slate-800">إدارة الطلبات</h1>
                    <p class="text-slate-500 font-medium">نظام "في خدمتك" المتكامل للعمليات</p>
                </div>
            </div>
            <button id="newOrderBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3.5 rounded-2xl shadow-lg shadow-blue-100 flex items-center gap-3 transition-all transform hover:scale-105 active:scale-95 font-bold">
                <i class="fas fa-plus-circle"></i> طلب جديد
            </button>
        </div>

        <div class="bg-white/80 backdrop-blur-md rounded-3xl border border-white shadow-sm p-6 mb-8">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 block">حالة الطلب</label>
                    <select id="filterStatus" class="w-full bg-slate-50 border-none rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500">
                        <option value="">الكل</option>
                        <option value="جديد">جديد</option>
                        <option value="تحت التنفيذ">تحت التنفيذ</option>
                        <option value="تم التنفيذ">تم التنفيذ</option>
                        <option value="ملغي">ملغي</option>
                    </select>
                </div>
                <div class="col-span-1 md:col-span-2">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 block">البحث عن عميل</label>
                    <input type="text" id="filterCustomer" placeholder="ادخل اسم العميل..." class="w-full bg-slate-50 border-none rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex items-end gap-2 col-span-2 md:col-span-2">
                    <button id="applyFilters" class="flex-1 bg-slate-800 text-white rounded-xl py-2.5 hover:bg-slate-900 transition font-bold text-sm">تطبيق الفلتر</button>
                    <button id="resetFilters" class="px-4 bg-slate-100 text-slate-500 rounded-xl py-2.5 hover:bg-slate-200 transition"><i class="fas fa-undo"></i></button>
                </div>
            </div>
        </div>

        <div id="ordersContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center">
                <div class="loading-spinner mb-4"></div>
                <p class="text-slate-400">جاري تحميل البيانات من السحابة...</p>
            </div>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-[2rem] shadow-2xl max-w-5xl w-full max-h-[90vh] overflow-y-auto animate-fade-in">
            <div class="sticky top-0 bg-white/90 backdrop-blur px-8 py-6 border-b border-slate-100 flex justify-between items-center z-20">
                <h2 id="modalTitle" class="text-2xl font-black text-slate-800">إضافة طلب جديد</h2>
                <button id="closeModalBtn" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all">&times;</button>
            </div>

            <form id="orderForm" class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="form-section">
                        <div class="form-section-title">بيانات السجل</div>
                        <div class="space-y-4">
                            <div>
                                <label class="text-xs font-bold text-slate-400 mb-1 block">رقم الطلب</label>
                                <input type="text" id="orderNumber" readonly class="w-full bg-slate-50 border-none rounded-xl px-4 py-2 font-mono text-blue-600">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 mb-1 block">تاريخ العملية</label>
                                <input type="date" id="orderDate" class="w-full bg-slate-50 border-none rounded-xl px-4 py-2">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 mb-1 block">حالة المعاملة</label>
                                <select id="orderStatus" class="w-full bg-slate-50 border-none rounded-xl px-4 py-2">
                                    <option value="جديد">جديد</option>
                                    <option value="تحت التنفيذ">تحت التنفيذ</option>
                                    <option value="تم التنفيذ">تم التنفيذ</option>
                                    <option value="ملغي">ملغي</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section col-span-2">
                        <div class="form-section-title">بيانات العميل والتوريد</div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="col-span-2">
                                <label class="text-xs font-bold text-slate-400 mb-1 block">اختيار العميل</label>
                                <select id="customerSelect" class="w-full bg-slate-50 border-none rounded-xl px-4 py-2">
                                    <option value="">تحميل العملاء...</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 mb-1 block">طريقة التسليم</label>
                                <div class="flex gap-2">
                                    <label class="flex-1 text-center py-2 bg-slate-50 rounded-xl cursor-pointer border-2 border-transparent transition has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                                        <input type="radio" name="shippingMethod" value="pickup" class="hidden" checked> 
                                        <span class="text-sm font-bold text-slate-600">استلام</span>
                                    </label>
                                    <label class="flex-1 text-center py-2 bg-slate-50 rounded-xl cursor-pointer border-2 border-transparent transition has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                                        <input type="radio" name="shippingMethod" value="delivery" class="hidden"> 
                                        <span class="text-sm font-bold text-slate-600">شحن</span>
                                    </label>
                                </div>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 mb-1 block">وسيلة الدفع</label>
                                <div class="flex gap-2">
                                    <button type="button" class="payment-btn active flex-1 py-2 bg-slate-50 rounded-xl text-sm font-bold" data-payment="mada">مدى</button>
                                    <button type="button" class="payment-btn flex-1 py-2 bg-slate-50 rounded-xl text-sm font-bold" data-payment="cash">كاش</button>
                                    <input type="hidden" id="paymentMethod" value="mada">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-section mb-8">
                    <div class="flex justify-between items-center mb-6">
                        <div class="form-section-title mb-0">قائمة البضائع / الخدمات</div>
                        <button type="button" id="addNewProductBtn" class="bg-slate-100 hover:bg-blue-600 hover:text-white text-blue-600 px-4 py-2 rounded-xl text-xs font-bold transition-all">
                            <i class="fas fa-plus ml-1"></i> إضافة منتج
                        </button>
                    </div>
                    
                    <div id="productsContainer" class="space-y-4 min-h-[100px]">
                        </div>
                </div>

                <div class="bg-slate-900 rounded-[2rem] p-8 text-white flex flex-col md:flex-row justify-between items-center gap-6 shadow-2xl">
                    <div class="grid grid-cols-3 gap-8 w-full md:w-auto text-center md:text-right">
                        <div>
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">المجموع الصافي</p>
                            <p id="subtotalDisplay" class="text-xl font-bold">0.00 ريال</p>
                        </div>
                        <div>
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">الضريبة (15%)</p>
                            <p id="taxDisplay" class="text-xl font-bold">0.00 ريال</p>
                        </div>
                        <div>
                            <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-1">الخصم الإضافي</p>
                            <input type="number" id="discountValue" value="0" class="bg-slate-800 border-none rounded-lg w-20 px-2 py-1 text-center font-bold text-white focus:ring-1 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="bg-white/10 w-full md:w-px h-px md:h-12"></div>
                    <div class="text-center md:text-left">
                        <p class="text-blue-400 text-[11px] font-black uppercase tracking-[0.2em] mb-1">الإجمالي المستحق</p>
                        <p id="totalDisplay" class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">0.00 ريال</p>
                    </div>
                </div>

                <div class="flex justify-end gap-4 mt-10">
                    <button type="button" id="cancelOrderBtn" class="px-8 py-3 text-slate-400 font-bold hover:text-slate-600 transition">إلغاء</button>
                    <button type="submit" class="px-10 py-3 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all transform hover:scale-105 active:scale-95">
                        حفظ ومعالجة الطلب
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/orders-logic.js"></script>
    <script type="module" src="js/orders-firebase-db.js"></script>
    <script type="module" src="js/orders-app.js"></script>

</body>
</html>
