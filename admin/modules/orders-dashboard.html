<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات - نظام متكامل</title>
    
    <link rel="stylesheet" href="../../css/orders-style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* إضافة بعض التنسيقات السريعة للحالات */
        .status-executed { background-color: #d1fae5; color: #065f46; } /* تم التنفيذ */
        .status-pending { background-color: #fef3c7; color: #92400e; }  /* معلق */
        .order-card { transition: transform 0.2s; }
        .order-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 p-6 font-sans">

    <div id="toast"></div>

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">إدارة الطلبات</h1>
            <button id="newOrderBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl shadow-lg transition">إضافة طلب</button>
        </div>
        
        <div id="ordersContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script type="module">
        import { loadOrders, db } from '../../js/orders-logic.js';

        async function init() {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '<div class="col-span-full text-center py-10"><i class="fas fa-spinner fa-spin text-3xl text-blue-600"></i><p class="mt-2">جاري تحميل البيانات...</p></div>';
            
            try {
                const orders = await loadOrders();
                container.innerHTML = orders.length === 0 ? '<p class="col-span-full text-center">لا توجد طلبات حالياً</p>' : '';
                
                orders.forEach(order => {
                    // تصحيح المسميات بناءً على بياناتك الفعلية:
                    const orderNo = order.orderNumber || 'بدون رقم';
                    const status = order.status || 'غير محدد';
                    const total = order.total || 0;
                    const payment = order.paymentMethodName || 'غير محدد';
                    
                    // استخراج أسماء المنتجات من المصفوفة items
                    const itemsNames = order.items ? order.items.map(i => i.name).join('، ') : 'لا توجد منتجات';
                    
                    // تحديد كلاس الحالة
                    const statusClass = status === 'تم التنفيذ' ? 'status-executed' : 'status-pending';

                    container.innerHTML += `
                        <div class="order-card p-5 border border-gray-100 rounded-2xl bg-white shadow-sm hover:shadow-md">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="block text-xs text-gray-400 mb-1">رقم الطلب</span>
                                    <span class="font-bold text-lg text-gray-700">#${orderNo}</span>
                                </div>
                                <span class="px-3 py-1 rounded-full text-xs font-medium ${statusClass}">
                                    ${status}
                                </span>
                            </div>
                            
                            <div class="mb-4">
                                <span class="block text-xs text-gray-400 mb-1">المنتجات</span>
                                <p class="text-sm text-gray-600 line-clamp-2">${itemsNames}</p>
                            </div>

                            <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                                <div>
                                    <span class="block text-xs text-gray-400">الإجمالي</span>
                                    <span class="text-blue-600 font-bold">${total} ريال</span>
                                </div>
                                <div class="text-left">
                                    <span class="block text-xs text-gray-400">الدفع</span>
                                    <span class="text-gray-600 text-sm italic">${payment}</span>
                                </div>
                            </div>

                            ${order.approvalCode ? `
                            <div class="mt-3 bg-gray-50 p-2 rounded-lg text-[10px] font-mono text-gray-400 break-all">
                                ID: ${order.approvalCode}
                            </div>` : ''}
                        </div>`;
                });
            } catch (e) {
                console.error(e);
                container.innerHTML = '<p class="col-span-full text-center text-red-500 font-bold">حدث خطأ أثناء جلب البيانات من الفايربيز</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
