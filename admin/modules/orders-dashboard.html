<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تيرا المتكامل</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div id="toast" class="fixed bottom-6 left-6 z-50 hidden shadow-2xl px-6 py-3 rounded-xl text-white font-bold"></div>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-4 rounded-2xl shadow-xl text-white"><i class="fas fa-server text-2xl"></i></div>
                <div>
                    <h1 class="text-3xl font-extrabold">إدارة منصة تيرا</h1>
                    <p class="text-gray-500 font-medium">نظام الطلبات الرقمية والشحن</p>
                </div>
            </div>
            <button id="newOrderBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl shadow-lg flex items-center gap-2">
                <i class="fas fa-plus-circle"></i> <span>طلب جديد</span>
            </button>
        </div>

        <div id="ordersContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl flex flex-col text-right my-auto">
            <div class="p-4 border-b flex justify-between items-center bg-blue-600 text-white">
                <h2 id="modalTitle" class="text-xl font-bold">إنشاء طلب جديد</h2>
                <button id="closeModalBtn"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="orderForm" class="p-6 space-y-4 overflow-y-auto max-h-[75vh]">
                <input type="hidden" id="editOrderId">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-2xl border">
                    <div>
                        <label class="block text-xs font-bold mb-1">رقم الطلب</label>
                        <div class="flex gap-2">
                            <input type="text" id="orderNumber" class="flex-1 p-2 border rounded-lg text-blue-600 font-mono font-bold" value="KF-000-P">
                            <button type="button" id="genNumBtn" class="bg-gray-200 px-3 rounded-lg text-xs">توليد تلقائي</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1">التاريخ والوقت</label>
                        <input type="datetime-local" id="orderDateTime" class="w-full p-2 border rounded-lg text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-3">
                        <label class="block text-sm font-bold border-r-4 border-blue-600 pr-2">بيانات العميل</label>
                        <select id="customerSource" class="w-full p-2 bg-blue-50 border rounded-lg text-sm">
                            <option value="manual">إضافة عميل يدوياً</option>
                            <option value="db">جلب من قاعدة البيانات</option>
                        </select>
                        <div id="dbCustomerSection" class="hidden">
                            <select id="dbCustomerSelect" class="w-full p-2 border rounded-lg text-sm"></select>
                        </div>
                        <input type="text" id="custName" placeholder="اسم العميل" class="w-full p-2 border rounded-lg">
                        <input type="tel" id="custPhone" placeholder="رقم الجوال" class="w-full p-2 border rounded-lg">
                    </div>

                    <div class="space-y-3 text-sm">
                        <label class="block font-bold border-r-4 border-blue-600 pr-2">العنوان</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="region" placeholder="المنطقة" class="p-2 border rounded-lg">
                            <input type="text" id="city" placeholder="المدينة" class="p-2 border rounded-lg">
                        </div>
                        <input type="text" id="district" placeholder="الحي والشارع" class="w-full p-2 border rounded-lg">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t pt-4">
                    <div>
                        <label class="block text-sm font-bold mb-2">المنتج / الباقة</label>
                        <select id="stockSelect" class="w-full p-2 border rounded-lg"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">طريقة الدفع</label>
                        <select id="paymentMethod" class="w-full p-2 border rounded-lg">
                            <option value="مدى">مدى</option>
                            <option value="تمارا">تمارا</option>
                            <option value="تابي">تابي</option>
                            <option value="نقدي">نقدي</option>
                        </select>
                    </div>
                </div>
            </form>

            <div class="p-4 border-t bg-gray-50 flex justify-end gap-3">
                <button id="cancelModalBtn" class="px-6 py-2 font-bold text-gray-400">إلغاء</button>
                <button type="submit" form="orderForm" class="bg-blue-600 text-white px-10 py-2 rounded-xl font-bold shadow-lg">تثبيت الطلب</button>
            </div>
        </div>
    </div>

    <div id="previewModal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-[100] p-4">
        <div class="bg-white w-full max-w-2xl rounded-2xl flex flex-col">
            <div id="printArea" class="p-8"></div>
            <div class="p-4 flex gap-2">
                <button id="downloadPdfBtn" class="flex-1 bg-green-600 text-white p-3 rounded-lg font-bold">حفظ PDF</button>
                <button onclick="window.print()" class="flex-1 bg-blue-600 text-white p-3 rounded-lg font-bold">طباعة</button>
                <button id="closePreviewBtn" class="bg-gray-200 p-3 rounded-lg">إغلاق</button>
            </div>
        </div>
    </div>

    <script type="module" src="/fi-khidmatik/js/orders-app.js"></script>
</body>
</html>
