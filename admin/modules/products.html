<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنتجات - متجرك الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">📦 المنتجات</h1>
        <button id="addProductBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow">
            + إضافة منتج
        </button>
    </div>

    <div id="productsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="col-span-full text-center text-gray-500">جاري التحميل...</div>
    </div>
</div>

<!-- مودال إضافة/تعديل منتج -->
<div id="productModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-xl font-bold">إضافة منتج</h2>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <form id="productForm">
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">اسم المنتج *</label>
                    <input type="text" id="productName" required class="w-full border rounded-lg px-3 py-2">
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">السعر *</label>
                    <input type="number" id="productPrice" required step="0.01" class="w-full border rounded-lg px-3 py-2">
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">الوصف</label>
                    <textarea id="productDesc" rows="3" class="w-full border rounded-lg px-3 py-2"></textarea>
                </div>
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" id="cancelModalBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100">إلغاء</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">حفظ</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { loadProducts, addProduct, updateProduct, deleteProduct } from '../../js/common.js';

    let products = [];
    let currentEditId = null;

    async function init() {
        products = await loadProducts();
        render();
    }

    function render() {
        const container = document.getElementById('productsList');
        if (products.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">لا يوجد منتجات</div>';
            return;
        }
        container.innerHTML = products.map(p => `
            <div class="bg-white rounded-lg shadow p-4 hover:shadow-md transition">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold text-lg">${escapeHtml(p.name)}</h3>
                        <p class="text-blue-600 font-semibold">${p.price} ر.س</p>
                        <p class="text-sm text-gray-500 mt-2">${escapeHtml(p.desc || '')}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editProduct('${p.id}')" class="text-blue-600 hover:text-blue-800">✏️ تعديل</button>
                        <button onclick="deleteProductHandler('${p.id}')" class="text-red-600 hover:text-red-800">🗑️ حذف</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function openModal(editId = null) {
        currentEditId = editId;
        if (editId) {
            const product = products.find(p => p.id === editId);
            if (product) {
                document.getElementById('modalTitle').innerText = 'تعديل منتج';
                document.getElementById('productName').value = product.name || '';
                document.getElementById('productPrice').value = product.price || '';
                document.getElementById('productDesc').value = product.desc || '';
            }
        } else {
            document.getElementById('modalTitle').innerText = 'إضافة منتج جديد';
            document.getElementById('productForm').reset();
        }
        document.getElementById('productModal').classList.remove('hidden');
        document.getElementById('productModal').classList.add('flex');
    }

    function closeModal() {
        document.getElementById('productModal').classList.add('hidden');
        document.getElementById('productModal').classList.remove('flex');
        currentEditId = null;
    }

    async function saveProduct(event) {
        event.preventDefault();
        const data = {
            name: document.getElementById('productName').value.trim(),
            price: parseFloat(document.getElementById('productPrice').value),
            desc: document.getElementById('productDesc').value.trim(),
            updatedAt: new Date().toISOString()
        };
        if (!data.name || !data.price) {
            alert('اسم المنتج والسعر مطلوبان');
            return;
        }
        try {
            if (currentEditId) {
                await updateProduct(currentEditId, data);
            } else {
                data.createdAt = new Date().toISOString();
                await addProduct(data);
            }
            closeModal();
            await init();
        } catch (err) {
            console.error(err);
            alert('حدث خطأ أثناء الحفظ');
        }
    }

    window.editProduct = (id) => openModal(id);
    window.deleteProductHandler = async (id) => {
        if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
            try {
                await deleteProduct(id);
                await init();
            } catch (err) {
                console.error(err);
                alert('حدث خطأ أثناء الحذف');
            }
        }
    };

    document.getElementById('addProductBtn').onclick = () => openModal();
    document.getElementById('closeModalBtn').onclick = closeModal;
    document.getElementById('cancelModalBtn').onclick = closeModal;
    document.getElementById('productForm').onsubmit = saveProduct;

    init();
</script>
</body>
</html>
