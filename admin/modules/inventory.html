<div style="padding: 25px;">

    <div style="background: white; border-radius: 12px; padding: 20px; margin-top: 20px;">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;">
            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center;">
                <div id="total-products-count">0</div>
                <div>إجمالي المنتجات</div>
            </div>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center;">
                <div id="low-stock-count">0</div>
                <div>منتجات منخفضة</div>
            </div>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center;">
                <div id="out-stock-count">0</div>
                <div>منتجات نفدت</div>
            </div>
        </div>
        <div id="inventory-table-container"></div>
    </div>
</div>
