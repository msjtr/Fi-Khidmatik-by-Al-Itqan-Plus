<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طرق الدفع</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="../js/firebase.js"></script>
    <script src="../js/admin.js"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between mb-4">
            <h2 class="text-2xl font-bold">طرق الدفع</h2>
            <button onclick="addPaymentMethod()" class="bg-blue-600 text-white px-4 py-2 rounded">+ إضافة طريقة</button>
        </div>
        <ul id="payment-methods-list" class="space-y-2"></ul>
    </div>

    <script>
        let paymentMethods = [];
        async function loadPaymentMethods() {
            const doc = await db.collection('settings').doc('paymentMethods').get();
            if (doc.exists) paymentMethods = doc.data().methods || [];
            else paymentMethods = ['نقدي', 'بطاقة ائتمان', 'تحويل بنكي'];
            renderMethods();
        }
        function renderMethods() {
            const list = document.getElementById('payment-methods-list');
            list.innerHTML = paymentMethods.map((method, index) => `
                <li class="flex justify-between items-center border p-2 rounded">
                    ${method}
                    <button onclick="deleteMethod(${index})" class="text-red-600"><i class="fas fa-trash"></i></button>
                </li>
            `).join('');
        }
        window.addPaymentMethod = () => {
            const newMethod = prompt('أدخل طريقة الدفع الجديدة:');
            if (newMethod) {
                paymentMethods.push(newMethod);
                saveMethods();
            }
        };
        window.deleteMethod = (index) => {
            paymentMethods.splice(index, 1);
            saveMethods();
        };
        async function saveMethods() {
            await db.collection('settings').doc('paymentMethods').set({ methods: paymentMethods });
            renderMethods();
        }
        loadPaymentMethods();
    </script>
</body>
</html>
