<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الطلبات</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { getOrders, getCustomers, updateOrderStatus, deleteOrder, addOrder } from '../js/admin.js';
        
        let orders = [];
        let customers = [];

        async function loadData() {
            orders = await getOrders();
            customers = await getCustomers();
            renderOrders();
        }

        function getStatusClass(status) {
            const classes = {
                'مدفوع': 'bg-green-100 text-green-700',
                'غير مدفوع': 'bg-red-100 text-red-700',
                'مسترجع': 'bg-orange-100 text-orange-700',
                'ملغي': 'bg-gray-100 text-gray-700'
            };
            return classes[status] || 'bg-gray-100 text-gray-700';
        }

        function renderOrders() {
            const tbody = document.getElementById('orders-list');
            if (!tbody) return;
            
            tbody.innerHTML = orders.map(order => {
                const customer = customers.find(c => c.id === order.customerId) || { name: 'غير معروف', phone: '' };
                const statusClass = getStatusClass(order.status);
                return `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 font-mono text-sm">${order.id.slice(-6)}</td>
                        <td class="p-3">
                            <div class="font-semibold">${customer.name}</div>
                            <div class="text-xs text-gray-500">${customer.phone}</div>
                        </td>
                        <td class="p-3 font-bold">${order.totalAmount} ريال</td>
                        <td class="p-3"><span class="px-2 py-1 rounded-full text-xs ${statusClass}">${order.status}</span></td>
                        <td class="p-3">${order.orderDate}</td>
                        <td class="p-3">
                            <button onclick="window.editOrder('${order.id}')" class="text-blue-600 hover:text-blue-800 ml-2"><i class="fas fa-edit"></i></button>
                            <button onclick="window.deleteOrderItem('${order.id}')" class="text-red-600 hover:text-red-800 ml-2"><i class="fas fa-trash"></i></button>
                            ${order.status !== 'مسترجع' ? `<button onclick="window.refundOrder('${order.id}')" class="text-orange-600 hover:text-orange-800"><i class="fas fa-undo-alt"></i></button>` : ''}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.editOrder = async (id) => {
            const order = orders.find(o => o.id === id);
            const statuses = ['مدفوع', 'غير مدفوع', 'مسترجع', 'ملغي'];
            const newStatus = prompt(`تغيير الحالة (${statuses.join('/')}):`, order.status);
            if (newStatus && statuses.includes(newStatus)) {
                await updateOrderStatus(id, newStatus);
                loadData();
            }
        };

        window.deleteOrderItem = async (id) => {
            if (confirm('هل أنت متأكد من حذف هذا الطلب؟')) {
                await deleteOrder(id);
                loadData();
            }
        };

        window.refundOrder = async (id) => {
            if (confirm('هل تريد استرداد هذا الطلب؟')) {
                await updateOrderStatus(id, 'مسترجع');
                loadData();
            }
        };

        window.showAddOrder = async () => {
            if (customers.length === 0) {
                alert('لا يوجد عملاء. أضف عميلاً أولاً.');
                return;
            }
            const customerList = customers.map(c => `${c.id}|${c.name}`).join('\n');
            const customerId = prompt(`أدخل معرف العميل:\n${customerList}`);
            const total = prompt('المبلغ الإجمالي:');
            if (customerId && total) {
                await addOrder({
                    customerId,
                    totalAmount: parseFloat(total),
                    status: 'غير مدفوع',
                    items: []
                });
                loadData();
            }
        };

        loadData();
        
        // جعل الدوال عامة للوصول من onclick
        window.editOrder = editOrder;
        window.deleteOrderItem = deleteOrderItem;
        window.refundOrder = refundOrder;
        window.showAddOrder = showAddOrder;
    </script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
            <h2 class="text-2xl font-bold"><i class="fas fa-truck-fast ml-2"></i>إدارة الطلبات</h2>
            <button onclick="showAddOrder()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
                <i class="fas fa-plus ml-1"></i>طلب جديد
            </button>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-3 text-right">رقم الطلب</th>
                        <th class="p-3 text-right">العميل</th>
                        <th class="p-3 text-right">المبلغ</th>
                        <th class="p-3 text-right">الحالة</th>
                        <th class="p-3 text-right">التاريخ</th>
                        <th class="p-3 text-right">الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="orders-list">
                    <tr><td colspan="6" class="text-center p-6 text-gray-500">جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
