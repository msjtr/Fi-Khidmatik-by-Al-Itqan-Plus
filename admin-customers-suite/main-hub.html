<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>في خدمتك | الإتقان بلس</title>
    
    <!-- 1. ربط الشعار كأيقونة للمتصفح (Favicon) -->
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

    <!-- 2. ربط ملفات التنسيق الـ 11 (css-styles) بالمسارات الصحيحة -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/sidebar-style.css">
    <link rel="stylesheet" href="css-styles/header-style.css">
    <link rel="stylesheet" href="css-styles/footer-style.css">
    <link rel="stylesheet" href="css-styles/buttons-theme.css">
    <link rel="stylesheet" href="css-styles/clock-style.css">
    <link rel="stylesheet" href="css-styles/auth-style.css">
    <link rel="stylesheet" href="css-styles/add-cust-style.css">
    <link rel="stylesheet" href="css-styles/list-table-style.css">
    <link rel="stylesheet" href="css-styles/stats-visuals.css">
    <link rel="stylesheet" href="css-styles/print-layout.css">

    <style>
        /* تنسيقات أساسية لضبط توزيع الشاشة في حائل */
        body { margin: 0; display: flex; height: 100vh; background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .app-container { display: flex; width: 100%; height: 100%; }
        #sidebar-area { width: 280px; flex-shrink: 0; z-index: 100; }
        .content-area { flex-grow: 1; display: flex; flex-direction: column; }
        #header-area { height: 70px; background: #fff; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .page-display { flex-grow: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        .main-logo { height: 45px; margin-left: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- منطقة القائمة الجانبية -->
        <aside id="sidebar-area"></aside>

        <section class="content-area">
            <!-- الهيدر مع شعار الإتقان بلس -->
            <header id="header-area">
                <img src="../images/logo.svg" alt="الإتقان بلس" class="main-logo">
                <div id="header-content" style="flex-grow: 1;"></div>
            </header>

            <!-- عرض الصفحات (مثل جدول العملاء) -->
            <main class="page-display">
                <iframe name="main-viewport" src="pages/customers-list.html" id="frame-engine"></iframe>
            </main>

            <!-- التذييل -->
            <footer id="footer-area"></footer>
        </section>
    </div>

    <!-- 3. المحرك البرمجي الرئيسي -->
    <script type="module">
        import { initApp } from './js-logic/main.js';

        // وظيفة جلب المكونات الفرعية (Header, Sidebar, Footer)
        async function loadComponent(id, path) {
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`Missing: ${path}`);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
            } catch (err) {
                console.error("خطأ في تحميل المكون:", err);
            }
        }

        // تشغيل المنصة
        document.addEventListener('DOMContentLoaded', () => {
            loadComponent('sidebar-area', 'mm/sidebar.html');
            loadComponent('header-content', 'mm/header.html');
            loadComponent('footer-area', 'mm/footer.html');
            
            // تشغيل محرك Tera V12.12.12
            initApp(); 
        });
    </script>
</body>
</html>
