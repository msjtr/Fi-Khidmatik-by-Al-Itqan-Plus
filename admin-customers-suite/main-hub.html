<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام Tera | مؤسسة الإتقان بلس</title>

    <!-- 🖼️ التبويمة -->
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

    <!-- 🎨 ربط ملفات التنسيق (11 ملف) -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/buttons-theme.css">
    <link rel="stylesheet" href="css-styles/header-style.css">
    <link rel="stylesheet" href="css-styles/sidebar-style.css">
    <link rel="stylesheet" href="css-styles/footer-style.css">
    <link rel="stylesheet" href="css-styles/clock-style.css">
    <link rel="stylesheet" href="css-styles/add-cust-style.css">
    <link rel="stylesheet" href="css-styles/list-table-style.css">
    <link rel="stylesheet" href="css-styles/stats-visuals.css">
    <link rel="stylesheet" href="css-styles/auth-style.css">
    <link rel="stylesheet" href="css-styles/print-layout.css">

    <style>
        /* 🛠️ تنسيق الطوارئ لضمان استقرار الواجهة الظاهرة في الصورة */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .tera-admin-layout { display: flex; flex-direction: column; height: 100vh; }
        
        #header-mount { min-height: 70px; background: #1a237e; width: 100%; }
        
        .tera-main-content { display: flex; flex: 1; overflow: hidden; }
        
        #sidebar-mount { width: 260px; min-width: 260px; background: #283593; height: 100%; }
        
        .tera-view-window { flex: 1; height: 100%; background: #fff; position: relative; }
        
        #tera-iframe { width: 100%; height: 100%; border: none; }
        
        #footer-mount { min-height: 40px; background: #f1f1f1; width: 100%; }
    </style>
</head>
<body>

    <div class="tera-admin-layout">
        <!-- 1. الهيدر (يظهر في الأعلى دائماً) -->
        <header id="header-mount"></header>

        <!-- 2. المحتوى الأوسط (سايدبار بجانب الصفحة) -->
        <div class="tera-main-content">
            <aside id="sidebar-mount"></aside>

            <main class="tera-view-window">
                <iframe id="tera-iframe" name="tera-iframe" src="pages/customers-list.html"></iframe>
            </main>
        </div>

        <!-- 3. الفوتر (في الأسفل) -->
        <footer id="footer-mount"></footer>
    </div>

    <!-- 🧠 الربط البرمجي بنظام Modules -->
    <script src="js-logic/firebase.js" type="module"></script> 
    <script src="js-logic/api-connector.js" type="module"></script>
    <script src="js-logic/auth-logic.js" type="module"></script>
    <script src="js-logic/main.js" type="module"></script>
    <script src="js-logic/header-logic.js" type="module"></script>
    <script src="js-logic/sidebar-logic.js" type="module"></script>
    <script src="js-logic/clock-logic.js" type="module"></script>
    <script src="js-logic/add-cust-logic.js" type="module"></script>
    <script src="js-logic/list-table-logic.js" type="module"></script>
    <script src="js-logic/btn-actions-controller.js" type="module"></script>
    <script src="js-logic/stats-engine.js" type="module"></script>
    <script src="js-logic/log-tracker.js" type="module"></script>
    <script src="js-logic/pdf-generator.js" type="module"></script>
    <script src="js-logic/map-logic.js" type="module"></script>

    <script>
        async function initTeraSystem() {
            const components = [
                { id: 'header-mount', url: 'mm/header.html' },
                { id: 'sidebar-mount', url: 'mm/sidebar.html' },
                { id: 'footer-mount', url: 'mm/footer.html' }
            ];

            for (const item of components) {
                try {
                    const response = await fetch(item.url);
                    if (response.ok) {
                        const html = await response.text();
                        const target = document.getElementById(item.id);
                        if (target) target.innerHTML = html;
                    }
                } catch (err) { 
                    console.error(`خطأ في تحميل مكونات حائل: ${item.url}`); 
                }
            }
            
            // إرسال إشارة جاهزية الواجهة لتشغيل الساعة واسم المستخدم
            document.dispatchEvent(new Event('TeraLayoutReady'));
        }

        window.teraNavigate = function(targetPage) {
            const frame = document.getElementById('tera-iframe');
            if (frame) {
                frame.style.opacity = '0.5';
                frame.src = `pages/${targetPage}.html`;
                frame.onload = () => frame.style.opacity = '1';
            }
        };

        window.addEventListener('load', initTeraSystem);
    </script>
</body>
</html>
