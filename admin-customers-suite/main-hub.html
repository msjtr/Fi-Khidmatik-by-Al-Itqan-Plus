<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. تبويبة المتصفح والشعار (Favicon) -->
    <title>في خدمتك | مؤسسة الإتقان بلس</title>
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

    <!-- 2. ربط كافة ملفات التنسيق (CSS) من مجلد css-styles -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/sidebar-style.css">
    <link rel="stylesheet" href="css-styles/header-style.css">
    <link rel="stylesheet" href="css-styles/footer-style.css">
    <link rel="stylesheet" href="css-styles/buttons-theme.css">
    <link rel="stylesheet" href="css-styles/list-table-style.css">
    <link rel="stylesheet" href="css-styles/stats-visuals.css">

    <style>
        /* تنظيم الواجهة لضمان ثبات الهيدر والسايدبار */
        body { margin: 0; display: flex; background-color: #f4f7f6; height: 100vh; overflow: hidden; }
        .main-wrapper { display: flex; width: 100%; height: 100%; }
        .page-container { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; }
        .dynamic-view { flex-grow: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <!-- 3. القائمة الجانبية (Sidebar) مسحوبة من مجلد mm -->
        <div id="sidebar-target"></div>

        <div class="page-container">
            
            <!-- 4. الرأس (Header) مسحوب من مجلد mm -->
            <div id="header-target"></div>

            <!-- 5. منطقة عرض المحتوى (Pages) -->
            <main class="dynamic-view">
                <iframe name="content-view" id="main-frame" src="pages/customers-list.html"></iframe>
            </main>

            <!-- 6. التذييل (Footer) مسحوب من مجلد mm -->
            <div id="footer-target"></div>

        </div>
    </div>

    <!-- 7. الأوامر البرمجية (JS) والربط المركزي -->
    
    <!-- تهيئة Firebase الأساسية -->
    <script type="module" src="js-logic/firebase.js"></script>
    
    <!-- محرك التشغيل الرئيسي -->
    <script type="module">
        import { initApp } from './js-logic/main.js';

        // وظيفة التحميل الديناميكي للمكونات من مجلد mm
        async function injectComponent(elementId, filePath) {
            try {
                const response = await fetch(filePath);
                const html = await response.text();
                const container = document.getElementById(elementId);
                container.innerHTML = html;

                // إعادة تفعيل السكريبتات (للساعة والتنقل)
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    }
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            } catch (err) {
                console.error("خطأ في ربط المكون:", filePath, err);
            }
        }

        // تنفيذ الربط عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            injectComponent('sidebar-target', 'mm/sidebar.html');
            injectComponent('header-target', 'mm/header.html');
            injectComponent('footer-target', 'mm/footer.html');
            
            // تشغيل محرك النظام الأساسي
            initApp(); 
        });
    </script>

</body>
</html>
