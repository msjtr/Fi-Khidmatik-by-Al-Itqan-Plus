<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera V12 | مؤسسة الإتقان بلس</title>
    
    <!-- 🖼️ تصحيح مسار الشعار بناءً على طلبك -->
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">

    <!-- 🎨 ربط التنسيق الموحد (تم إزالة التكرار من المسار) -->
    <link rel="stylesheet" href="admin-customers-suite/css-styles/hub-style.css">

    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
            --main-bg: #f4f7f9;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--main-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        .tera-container {
            display: grid;
            grid-template-areas: 
                "sidebar header"
                "sidebar main"
                "sidebar footer";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr auto;
            height: 100vh;
        }

        #sidebar-mount { grid-area: sidebar; z-index: 100; }
        #header-mount { grid-area: header; z-index: 90; }
        #main-viewport { 
            grid-area: main; 
            overflow-y: auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        #footer-mount { grid-area: footer; z-index: 80; }

        .loader-hub {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #001f3f;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="tera-container">
        <aside id="sidebar-mount"></aside>
        <header id="header-mount"></header>
        <main id="main-viewport">
            <div id="dynamic-content-area" class="loader-hub">
                جاري مزامنة بيانات "الإتقان بلس" عبر Tera V12...
            </div>
        </main>
        <footer id="footer-mount"></footer>
    </div>

    <script>
        /**
         * 🛠️ تم تصحيح الدالة لإزالة تكرار المجلد في المسار
         */
        async function injectComponent(elementId, fileName) {
            try {
                // ✅ المسار المصلح ليتوافق مع هيكلية GitHub
                const response = await fetch(`admin-customers-suite/mm/${fileName}`);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                const htmlContent = await response.text();
                document.getElementById(elementId).innerHTML = htmlContent;
                console.log(`✅ تم تحميل المكون: ${fileName}`);
            } catch (error) {
                console.error(`❌ خطأ في تحميل المكون ${fileName}:`, error);
                document.getElementById(elementId).innerHTML = `<p style="color:red; padding:10px;">فشل تحميل ${fileName}</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            // استدعاء المكونات بالمسارات المصلحة
            injectComponent('sidebar-mount', 'sidebar.html');
            injectComponent('header-mount', 'header.html');
            injectComponent('footer-mount', 'footer.html');
            
            setTimeout(() => {
                injectComponent('dynamic-content-area', 'clock-view.html');
            }, 500);
        });
    </script>
</body>
</html>
