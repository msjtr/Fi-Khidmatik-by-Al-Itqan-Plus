<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera V12 | الإتقان بلس</title>

    <!-- ربط شعار التبويب (Favicon) -->
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

    <!-- 
       إصلاح خطأ 404: 
       تم الإبقاء فقط على الملفات الـ 7 الموجودة فعلياً في المستودع 
    -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/auth-style.css">
    <link rel="stylesheet" href="css-styles/buttons-theme.css">
    <link rel="stylesheet" href="css-styles/add-cust-style.css">
    <link rel="stylesheet" href="css-styles/list-table-style.css">
    <link rel="stylesheet" href="css-styles/stats-visuals.css">
    <link rel="stylesheet" href="css-styles/print-layout.css">
</head>
<body>

    <div class="tera-main-wrapper">
        <!-- منطقة الشعار الأساسي داخل النظام -->
        <div class="brand-container" style="display: none;">
            <img src="../images/logo.svg" alt="شعار الإتقان بلس" id="main-brand-logo">
        </div>

        <!-- هيكل النظام سيتم تحميله هنا -->
        <header id="header-mount"></header>
        <aside id="sidebar-mount"></aside>
        <main id="main-view"></main>
    </div>

    <!-- 
       إصلاح خطأ SyntaxError: 
       تم إضافة type="module" لجميع الملفات لكي يتعرف المتصفح على أوامر import/export 
    -->
    
    <!-- أوامر التهيئة وقواعد البيانات (Firebase & API) -->
    <script type="module" src="js-logic/firebase.js"></script>
    <script type="module" src="js-logic/api-connector.js"></script>
    
    <!-- أوامر المصادقة والتحكم الرئيسي -->
    <script type="module" src="js-logic/auth-logic.js"></script>
    <script type="module" src="js-logic/main.js"></script>
    
    <!-- أوامر الواجهة (الهيدر، السايدبار، الأزرار، والساعة) -->
    <script type="module" src="js-logic/header-logic.js"></script>
    <script type="module" src="js-logic/sidebar-logic.js"></script>
    <script type="module" src="js-logic/btn-actions-controller.js"></script>
    <script type="module" src="js-logic/clock-logic.js"></script>
    
    <!-- أوامر العمليات (العملاء، الجداول، الإحصائيات) -->
    <script type="module" src="js-logic/add-cust-logic.js"></script>
    <script type="module" src="js-logic/list-table-logic.js"></script>
    <script type="module" src="js-logic/stats-engine.js"></script>
    
    <!-- أوامر الميزات الإضافية (الخرائط، الطباعة، وتتبع السجلات) -->
    <script type="module" src="js-logic/map-logic.js"></script>
    <script type="module" src="js-logic/pdf-generator.js"></script>
    <script type="module" src="js-logic/log-tracker.js"></script>

</body>
</html>
