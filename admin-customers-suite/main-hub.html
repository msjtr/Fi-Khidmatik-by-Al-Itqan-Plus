<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- الاسم الرسمي للمنصة في التبويب بالعربي والإنجليزي -->
    <title>في خدمتك من الإتقان بلس | Fi Khidmatik by Al-Itqan Plus</title>
    
    <!-- أيقونة التبويب (Favicon) من مسار الصور المعتمد -->
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">
    
    <!-- ربط ملفات التنسيق CSS -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/buttons-theme.css">
    
    <!-- مكتبة الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .brand-section {
            text-align: center;
            padding: 25px 15px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }
        .app-logo {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #003366;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: #c5a059; font-family: 'Tajawal', sans-serif;
        }
        .platform-name-ar { color: #c5a059; margin: 5px 0 0 0; font-size: 1.3rem; font-weight: 900; }
        .platform-name-en { color: #fff; margin: 0; font-size: 0.8rem; opacity: 0.9; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <!-- شاشة التحميل الذكية -->
    <div id="loader" class="loading-overlay">
        <img src="../images/logo.svg" alt="Logo" class="app-logo animate-pulse">
        <div class="spinner-border text-warning mb-3"></div>
        <h2 class="platform-name-ar">في خدمتك من الإتقان بلس</h2>
        <p class="platform-name-en">Fi Khidmatik by Al-Itqan Plus</p>
    </div>

    <div class="hub-container">
        <!-- القائمة الجانبية (Sidebar) -->
        <aside class="sidebar" id="sidebarMenu">
            <div class="brand-section">
                <!-- الشعار الرسمي -->
                <img src="../images/logo.svg" alt="Logo" class="app-logo">
                
                <!-- مسمى المنصة المعتمد -->
                <h1 class="platform-name-ar">في خدمتك</h1>
                <p class="platform-name-en">Al-Itqan Plus</p>
                <small style="color: rgba(255,255,255,0.5); font-size: 0.6rem; display: block; margin-top: 5px;">Fi Khidmatik by Al-Itqan Plus</small>
                
                <hr style="border: 0; border-top: 1px solid rgba(197, 160, 89, 0.2); margin: 15px 0;">
            </div>

            <nav class="nav-menu">
                <button class="nav-link active" onclick="handleSidebarClick(this, 'dashboard')">
                    <i class="fas fa-chart-pie me-2"></i> لوحة التحكم
                </button>
                <button class="nav-link" onclick="handleSidebarClick(this, 'customers')">
                    <i class="fas fa-user-friends me-2"></i> إدارة العملاء
                </button>
                <button class="nav-link" onclick="handleSidebarClick(this, 'orders')">
                    <i class="fas fa-file-contract me-2"></i> محرك العقود
                </button>
                <button class="nav-link" onclick="handleSidebarClick(this, 'map-bridge')">
                    <i class="fas fa-map-marker-alt me-2"></i> تتبع المواقع
                </button>
            </nav>

            <div class="sidebar-footer" style="position: absolute; bottom: 20px; width: 100%; text-align: center;">
                <small style="color: #c5a059; font-size: 0.7rem;">فرع حائل | V12.12.12</small>
            </div>
        </aside>

        <!-- منطقة العرض الرئيسية -->
        <main class="main-viewport">
            <div id="main-content-area">
                <!-- المحتوى يتم حقنه عبر main.js -->
            </div>
        </main>
    </div>

    <!-- ربط محركات النظام -->
    <script type="module" src="js-logic/main.js"></script>
    <script src="js-logic/btn-actions-controller.js"></script>

    <script>
        // إخفاء شاشة التحميل بعد استقرار النظام
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if(loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }
            }, 1000);
        });
    </script>
</body>
</html>
