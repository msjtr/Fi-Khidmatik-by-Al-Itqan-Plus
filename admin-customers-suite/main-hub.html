        <span>مرحباً بك: أبا صالح الشمري</span>
    </div>
    <div class="live-meta">
        <span id="h-clock" class="digital-clock">00:00:00</span>

<!-- 2. تشغيل سكريبت الساعة الذكي مع تصحيح المسار النسبي -->
<script type="module">
    /**
     * الحل النهائي: إضافة ./ لتعريف المسار كمرجع نسبي
     * هذا سيحل خطأ (Uncaught TypeError: Failed to resolve module specifier)
     */
    import { initClock } from './js-logic/header-logic.js';
    
    try {
        if (typeof initClock === 'function') {
            initClock();
        }
    } catch (error) {
        console.error("خطأ في تشغيل ساعة الإتقان بلس:", error);
    }
</script>
