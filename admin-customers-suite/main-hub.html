<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام Tera | مؤسسة الإتقان بلس</title>

    <!-- 🖼️ التبويمة -->
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

    <!-- 🎨 ربط كافة ملفات التنسيق (11 ملف) -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/buttons-theme.css">
    <link rel="stylesheet" href="css-styles/header-style.css">
    <link rel="stylesheet" href="css-styles/sidebar-style.css">
    <link rel="stylesheet" href="css-styles/footer-style.css">
    <link rel="stylesheet" href="css-styles/clock-style.css">
    <link rel="stylesheet" href="css-styles/add-cust-style.css">
    <link rel="stylesheet" href="css-styles/list-table-style.css">
    <link rel="stylesheet" href="css-styles/stats-visuals.css">
    <link rel="stylesheet" href="css-styles/auth-style.css">
    <link rel="stylesheet" href="css-styles/print-layout.css">
</head>
<body>

    <div class="tera-admin-layout">
        <header id="header-mount"></header>

        <div class="tera-main-content">
            <aside id="sidebar-mount"></aside>

            <main class="tera-view-window">
                <iframe id="tera-iframe" name="tera-iframe" src="pages/customers-list.html"></iframe>
            </main>
        </div>

        <footer id="footer-mount"></footer>
    </div>

    <!-- 🧠 الربط البرمجي المصلح (14 ملف) -->
    <!-- الترتيب والنوع "defer" يضمنان تحميل الملفات في الخلفية وتشغيلها بعد الـ HTML -->
    <script src="js-logic/firebase.js" defer></script> 
    <script src="js-logic/api-connector.js" defer></script>
    <script src="js-logic/auth-logic.js" defer></script>
    <script src="js-logic/main.js" defer></script>
    <script src="js-logic/header-logic.js" defer></script>
    <script src="js-logic/sidebar-logic.js" defer></script>
    <script src="js-logic/clock-logic.js" defer></script>
    <script src="js-logic/add-cust-logic.js" defer></script>
    <script src="js-logic/list-table-logic.js" defer></script>
    <script src="js-logic/btn-actions-controller.js" defer></script>
    <script src="js-logic/stats-engine.js" defer></script>
    <script src="js-logic/log-tracker.js" defer></script>
    <script src="js-logic/pdf-generator.js" defer></script>
    
    <!-- تم تغيير النوع إلى module لحل خطأ Unexpected token 'export' -->
    <script src="js-logic/map-logic.js" type="module"></script>

    <script>
        /**
         * محرك تحميل المكونات مع حماية الأوامر البرمجية
         */
        async function initTeraSystem() {
            const components = [
                { id: 'header-mount', url: 'mm/header.html' },
                { id: 'sidebar-mount', url: 'mm/sidebar.html' },
                { id: 'footer-mount', url: 'mm/footer.html' }
            ];

            for (const item of components) {
                try {
                    const response = await fetch(item.url);
                    if (response.ok) {
                        const html = await response.text();
                        document.getElementById(item.id).innerHTML = html;
                    }
                } catch (err) { 
                    console.error("تعذر تحميل المكون:", item.url); 
                }
            }
            
            // تنبيه النظام بأن الواجهة جاهزة لتشغيل الساعة وغيرها
            document.dispatchEvent(new Event('TeraLayoutReady'));
        }

        function teraNavigate(targetPage) {
            const frame = document.getElementById('tera-iframe');
            if (frame) frame.src = `pages/${targetPage}.html`;
        }

        window.onload = initTeraSystem;
    </script>
</body>
</html>
