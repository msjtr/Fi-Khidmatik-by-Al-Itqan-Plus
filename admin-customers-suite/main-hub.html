<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام Tera | مؤسسة الإتقان بلس</title>

    <!-- 🖼️ الربط مع شعار النظام (images/logo.svg) -->
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

    <!-- 🎨 ربط كافة ملفات التنسيق (11 ملف CSS) -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/buttons-theme.css">
    <link rel="stylesheet" href="css-styles/header-style.css">
    <link rel="stylesheet" href="css-styles/sidebar-style.css">
    <link rel="stylesheet" href="css-styles/footer-style.css">
    <link rel="stylesheet" href="css-styles/clock-style.css">
    <link rel="stylesheet" href="css-styles/add-cust-style.css">
    <link rel="stylesheet" href="css-styles/list-table-style.css">
    <link rel="stylesheet" href="css-styles/stats-visuals.css">
    <link rel="stylesheet" href="css-styles/auth-style.css">
    <link rel="stylesheet" href="css-styles/print-layout.css">
</head>
<body>

    <div class="tera-admin-layout">
        <!-- 🧩 المكونات الثابتة (يتم حقنها من مجلد mm) -->
        <header id="header-mount"></header>

        <div class="tera-main-content">
            <aside id="sidebar-mount"></aside>

            <!-- 📄 محرك عرض الصفحات (12 صفحة من مجلد pages) -->
            <main class="tera-view-window">
                <iframe id="tera-iframe" name="tera-iframe" src="pages/customers-list.html"></iframe>
            </main>
        </div>

        <footer id="footer-mount"></footer>
    </div>

    <!-- 🧠 ربط كافة ملفات العمليات (14 ملف JS Logic) -->
    <!-- الترتيب هنا حرج جداً: Firebase أولاً لضمان الاتصال -->
    <script src="js-logic/firebase.js"></script> 
    <script src="js-logic/api-connector.js"></script>
    <script src="js-logic/auth-logic.js"></script>
    <script src="js-logic/main.js"></script>
    <script src="js-logic/header-logic.js"></script>
    <script src="js-logic/sidebar-logic.js"></script>
    <script src="js-logic/clock-logic.js"></script>
    <script src="js-logic/add-cust-logic.js"></script>
    <script src="js-logic/list-table-logic.js"></script>
    <script src="js-logic/btn-actions-controller.js"></script>
    <script src="js-logic/stats-engine.js"></script>
    <script src="js-logic/log-tracker.js"></script>
    <script src="js-logic/pdf-generator.js"></script>
    <script src="js-logic/map-logic.js"></script>

    <script>
        /**
         * محرك تحميل مكونات mm (5 ملفات)
         */
        async function loadMMComponents() {
            const components = [
                { id: 'header-mount', url: 'mm/header.html' },
                { id: 'sidebar-mount', url: 'mm/sidebar.html' },
                { id: 'footer-mount', url: 'mm/footer.html' }
                // ملحوظة: login.html و clock-view.html يتم استدعاؤهما عند الحاجة
            ];

            for (const item of components) {
                try {
                    const response = await fetch(item.url);
                    document.getElementById(item.id).innerHTML = await response.text();
                } catch (err) { console.error("خطأ في ربط مكون:", item.url); }
            }
        }

        /**
         * وظيفة التنقل العالمي بين الـ 12 صفحة
         */
        function teraNavigate(targetPage) {
            document.getElementById('tera-iframe').src = `pages/${targetPage}.html`;
        }

        window.onload = loadMMComponents;
    </script>
</body>
</html>
