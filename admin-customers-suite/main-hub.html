<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة في خدمتك | الإتقان بلس</title>
    
    <!-- 1. الأيقونة (Favicon) - المسار الصحيح للخروج للمجلد الرئيسي -->
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

    <!-- 2. ربط ملفات التنسيق الـ 11 من مجلد css-styles -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/sidebar-style.css">
    <link rel="stylesheet" href="css-styles/header-style.css">
    <link rel="stylesheet" href="css-styles/footer-style.css">
    <link rel="stylesheet" href="css-styles/buttons-theme.css">
    <link rel="stylesheet" href="css-styles/clock-style.css">
    <link rel="stylesheet" href="css-styles/auth-style.css">
    <link rel="stylesheet" href="css-styles/add-cust-style.css">
    <link rel="stylesheet" href="css-styles/list-table-style.css">
    <link rel="stylesheet" href="css-styles/stats-visuals.css">
    <link rel="stylesheet" href="css-styles/print-layout.css">

    <style>
        /* تنسيق هيكلي سريع لضمان استقرار الواجهة */
        body { margin: 0; padding: 0; display: flex; height: 100vh; background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        .app-container { display: flex; width: 100%; height: 100%; }
        #sidebar-area { width: 260px; flex-shrink: 0; background: #001f3f; }
        .content-area { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        #header-area { height: 70px; background: #fff; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #ddd; }
        .page-display { flex-grow: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        .main-logo { height: 45px; margin-left: 15px; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside id="sidebar-area"></aside>
        <section class="content-area">
            <header id="header-area">
                <img src="../images/logo.svg" alt="الإتقان بلس" class="main-logo">
                <div id="header-content" style="flex-grow: 1;"></div>
            </header>
            <main class="page-display">
                <iframe name="main-viewport" src="pages/customers-list.html" id="frame-engine"></iframe>
            </main>
            <footer id="footer-area"></footer>
        </section>
    </div>

    <!-- 3. المحرك البرمجي لإدارة منصة Tera -->
    <script type="module">
        import { initApp } from './js-logic/main.js';

        // وظيفة التنقل العالمي بين الـ 12 صفحة
        window.handleSidebarClick = function(page) {
            const frame = document.getElementById('frame-engine');
            if (frame) frame.src = `pages/${page}.html`;
        };

        // المصحح الآلي للمسارات لمنع خطأ 404
        async function loadPart(id, file) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error("404");
                let html = await res.text();
                
                // تنظيف الروابط من ../ لضمان بقائها داخل admin-customers-suite
                html = html.replace(/href="\.\.\//g, 'href="');
                html = html.replace(/src="\.\.\//g, 'src="');

                const target = document.getElementById(id);
                target.innerHTML = html;

                // تفعيل السكريبتات الملحقة بالمكونات (مثل ساعة الهيدر)
                target.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => {
                        let val = attr.value;
                        if (attr.name === 'src') val = val.replace('../', '');
                        newScript.setAttribute(attr.name, val);
                    });
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            } catch (e) {
                console.error("فشل في ربط المكون:", file);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // تحميل أجزاء النظام من مجلد mm
            await loadPart('sidebar-area', 'mm/sidebar.html');
            await loadPart('header-content', 'mm/header.html');
            await loadPart('footer-area', 'mm/footer.html');
            
            // تشغيل تهيئة Firebase والمنصة
            if (typeof initApp === 'function') initApp();
        });
    </script>
</body>
</html>
