<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera V12 | لوحة تحكم الإتقان بلس</title>

    <!-- الربط بملف التنسيق الموحد الجديد -->
    <link rel="stylesheet" href="css-styles/tera-master.css">
</head>
<body>

    <div class="tera-main-wrapper">
        
        <!-- 1. الهيدر (Header Area) -->
        <header id="header-mount">
            <!-- سيتم تحميل محتوى header.html هنا عبر JS -->
        </header>

        <!-- 2. القائمة الجانبية (Sidebar Area) -->
        <aside id="sidebar-mount">
            <!-- سيتم تحميل محتوى sidebar.html هنا عبر JS -->
        </aside>

        <!-- 3. منطقة العرض الرئيسية (Main Content Area) -->
        <main class="tera-view-window">
            <iframe id="tera-iframe" src="dashboard-home.html" name="tera-frame"></iframe>
        </main>

        <!-- 4. التذييل (Footer Area) -->
        <footer id="footer-mount">
            <!-- سيتم تحميل محتوى footer.html هنا عبر JS -->
        </footer>

    </div>

    <!-- 🧠 ملف البرمجة الموحد لربط العمليات -->
    <script src="js-logic/master-logic.js"></script>
    
    <script>
        // دالة بسيطة لتحميل الملفات الفرعية في الهب الرئيسي
        async function loadComponent(id, file) {
            try {
                const response = await fetch(`mm/${file}`);
                const data = await response.text();
                document.getElementById(id).innerHTML = data;
            } catch (err) {
                console.error(`خطأ في تحميل ${file}:`, err);
            }
        }

        // تشغيل التحميل عند فتح الصفحة
        window.onload = () => {
            loadComponent('header-mount', 'header.html');
            loadComponent('sidebar-mount', 'sidebar.html');
            loadComponent('footer-mount', 'footer.html');
        };
    </script>
</body>
</html>
