<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول النظام | Tera الإتقان بلس</title>
    
    <!-- الربط المباشر مع ملف التنسيق المعتمد -->
    <link rel="stylesheet" href="css-styles/auth-style.css">
    
    <!-- أيقونة منصة Tera الرسمية -->
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
</head>
<body class="itqan-auth-bg">
    <div class="login-container">
        <div class="login-header">
            <!-- الشعار الرسمي لنظام Tera -->
            <img src="images/logo.svg" alt="Tera Logo" class="auth-logo">
            <h1>دخول الإدارة</h1>
            <p>مؤسسة الإتقان بلس - حائل</p>
        </div>
        
        <div class="login-fields">
            <div class="auth-input-group">
                <input type="email" id="userEmail" placeholder="البريد الإلكتروني للإدارة" required autocomplete="email">
            </div>
            <div class="auth-input-group">
                <input type="password" id="userPass" placeholder="كلمة المرور" required autocomplete="current-password">
            </div>
            <!-- زر الدخول الذهبي -->
            <button id="loginBtn" class="btn-auth">دخول النظام</button>
        </div>

        <!-- منطقة عرض رسائل الخطأ أو التنبيهات -->
        <div id="auth-message" class="auth-msg-area"></div>
    </div>

    <!-- استدعاء المنطق البرمجي بنظام Module لضمان أمان البيانات -->
    <script type="module" src="js-logic/auth-logic.js"></script>
</body>
</html>
