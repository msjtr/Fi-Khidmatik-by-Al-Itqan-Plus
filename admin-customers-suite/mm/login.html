<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام Tera V12</title>

    <!-- 🖼️ الأيقونة - تم تصحيح المسار للرجوع لمجلد الصور الرئيسي -->
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

    <!-- 🎨 ملفات التنسيق - تم ربطها من مجلد css-styles المخصص -->
    <link rel="stylesheet" href="../css-styles/auth-style.css">
    <link rel="stylesheet" href="../css-styles/buttons-theme.css">

    <style>
        /* 🛠️ التنسيق الفاخر الخاص بمؤسسة الإتقان بلس */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #001f3f 0%, #001529 100%); 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(197, 160, 89, 0.3); /* إطار ذهبي يمثل هوية حائل */
            text-align: center;
        }

        .login-logo img {
            width: 120px;
            margin-bottom: 20px;
        }

        .login-header h2 {
            color: #001f3f;
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .login-header h2 span { color: #c5a059; }

        .login-header p {
            color: #c5a059;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            font-family: inherit;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: #c5a059;
            box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #001f3f;
            color: #c5a059;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #c5a059;
            color: #001f3f;
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #888;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(197, 160, 89, 0.05);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="bg-circle" style="width: 400px; height: 400px; top: -100px; right: -100px;"></div>
    <div class="bg-circle" style="width: 300px; height: 300px; bottom: -50px; left: -50px;"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <!-- تصحيح مسار الشعار للوصول للمجلد الرئيسي -->
                <img src="../images/logo.svg" alt="Tera Logo" onerror="this.src='https://ui-avatars.com/api/?name=Tera+V12&background=001f3f&color=c5a059'">
            </div>

            <div class="login-header">
                <h2>TERA <span>V12</span></h2>
                <p>مؤسسة الإتقان بلس - حائل</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="user-email" placeholder="example@itqan.sa" required>
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="user-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">دخول النظام</button>
            </form>

            <div class="footer-text">
                نظام إدارة الأقساط والاتصالات المطور
            </div>
        </div>
    </div>

    <!-- 🧠 الربط مع منطق الجافاسكربت الخاص بالنظام -->
    <script type="module">
        import { auth } from "../js-logic/firebase.js"; // استخدام ملف الإعدادات الخاص بك
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const loginForm = document.getElementById('login-form');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-password').value;
            
            try {
                // محاولة تسجيل الدخول عبر Firebase
                await signInWithEmailAndPassword(auth, email, pass);
                console.log("تم تسجيل الدخول بنجاح للمستخدم:", email);
                // التوجه للهب الرئيسي (main-hub.html موجود في المجلد الأعلى)
                window.location.href = '../main-hub.html';
            } catch (error) {
                console.error("خطأ في الدخول:", error.message);
                alert("خطأ في البيانات: " + error.message);
            }
        });
    </script>
</body>
</html>
