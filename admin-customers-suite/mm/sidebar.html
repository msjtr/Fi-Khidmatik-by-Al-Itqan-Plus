<!-- ربط التنسيقات من مجلد css-styles المخصص (الرجوع خطوة للخلف من مجلد mm) -->
<link rel="stylesheet" href="../css-styles/hub-style.css">
<link rel="stylesheet" href="../css-styles/sidebar-style.css">

<div class="itqan-sidebar">
    <!-- قسم الشعار والهوية -->
    <div class="sidebar-brand">
        <!-- تصحيح مسار الشعار للوصول للمجلد الرئيسي -->
        <img src="../images/logo.svg" alt="Tera Logo" class="brand-logo" 
             onerror="this.src='https://ui-avatars.com/api/?name=Tera+V12&background=001f3f&color=c5a059'">
        <h2>TERA <span>V12</span></h2>
    </div>

    <!-- قائمة التنقل الرئيسية -->
    <nav class="sidebar-nav">
        <div class="nav-section-title">الإدارة العامة</div>
        
        <!-- أزرار التنقل مرتبطة بـ sidebar-logic.js و main.js -->
        <button class="nav-btn active" id="btn-customers-list">
            <span class="nav-icon">👥</span>
            <span class="nav-text">قائمة العملاء</span>
        </button>

        <button class="nav-btn" id="btn-add-customer">
            <span class="nav-icon">👤+</span>
            <span class="nav-text">إضافة عميل جديد</span>
        </button>

        <div class="nav-section-title">العمليات المالية</div>

        <button class="nav-btn" id="btn-installments">
            <span class="nav-icon">💰</span>
            <span class="nav-text">متابعة الأقساط</span>
        </button>

        <button class="nav-btn" id="btn-sawa-cards">
            <span class="nav-icon">📱</span>
            <span class="nav-text">بطاقات سوا</span>
        </button>

        <div class="nav-section-title">التقارير والإحصائيات</div>

        <button class="nav-btn" id="btn-reports">
            <span class="nav-icon">📊</span>
            <span class="nav-text">التقارير الختامية</span>
        </button>

        <button class="nav-btn" id="btn-stats">
            <span class="nav-icon">📈</span>
            <span class="nav-text">الإحصائيات الحية</span>
        </button>
    </nav>

    <!-- تذييل السايدبار (معلومات المدير) -->
    <div class="sidebar-footer">
        <div class="admin-badge">
            <span class="status-online"></span>
            <span class="admin-name">م. الشمري</span>
        </div>
        <!-- تصحيح مسار تسجيل الخروج للعودة لصفحة الدخول -->
        <button class="logout-link" id="btn-logout">تسجيل الخروج</button>
    </div>
</div>

<!-- ربط المنطق البرمجي الخاص بالسايدبار كـ Module -->
<script type="module" src="../js-logic/sidebar-logic.js"></script>
