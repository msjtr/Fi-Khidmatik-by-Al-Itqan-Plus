<!-- 🎨 ربط التنسيقات من المسار المصلح داخل admin-customers-suite -->
<link rel="stylesheet" href="../css-styles/hub-style.css">
<link rel="stylesheet" href="../css-styles/header-style.css">

<style>
    /* ✨ لمسة جمالية إضافية للهيدر لضمان فخامة واجهة Tera V12 */
    .itqan-header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 25px;
        background: #ffffff;
        box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        border-bottom: 1px solid rgba(197, 160, 89, 0.2);
    }
    
    .platform-name span {
        color: #c5a059; /* ذهبي الإتقان */
        font-weight: 800;
    }

    .header-clock {
        background: #001f3f;
        color: #c5a059;
        padding: 5px 15px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        margin-left: 15px;
    }

    .sep { animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
</style>

<div class="itqan-header-container">
    <!-- القسم الأيمن: شعار النظام واسم المنصة (الإتقان بلس - حائل) -->
    <div class="header-brand">
        <img src="../images/logo.svg" alt="Tera Logo" class="brand-logo-img" style="width: 45px; margin-left: 10px;"
             onerror="this.src='https://ui-avatars.com/api/?name=Tera+V12&background=001f3f&color=c5a059'">
        <div class="brand-details">
            <h1 class="platform-name" style="margin:0; font-size: 1.4rem; color: #001f3f;">TERA <span>V12</span></h1>
            <p class="organization-name" style="margin:0; font-size: 0.75rem; color: #888;">مؤسسة الإتقان بلس</p>
        </div>
    </div>

    <!-- القسم الأوسط: شريط البحث السريع (مرتبط بـ Firebase عبر list-table-logic.js) -->
    <div class="header-search">
        <div class="search-wrapper" style="position: relative;">
            <input type="text" placeholder="بحث سريع عن عميل أو فاتورة..." id="global-search" 
                   style="width: 350px; padding: 10px 40px 10px 15px; border-radius: 20px; border: 1px solid #ddd; background: #f9f9f9;">
            <i class="search-icon" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #c5a059;">🔍</i>
        </div>
    </div>

    <!-- القسم الأيسر: معلومات المدير والساعة الحية -->
    <div class="header-meta" style="display: flex; align-items: center;">
        <!-- منطقة الساعة الرقمية (تُحدث عبر clock-logic.js) -->
        <div class="header-clock">
            <div id="tera-hours">00</div>
            <span class="sep">:</span>
            <div id="tera-minutes">00</div>
            <div id="time-period" class="period" style="font-size: 0.8rem; margin-right: 5px;">--</div>
        </div>

        <div class="user-profile" style="display: flex; align-items: center; border-right: 1px solid #eee; padding-right: 15px;">
            <div class="user-info" style="text-align: left; margin-left: 10px;">
                <span class="user-name" style="display: block; font-weight: 700; color: #001f3f;">محمد الشمري</span>
                <span class="user-role" style="display: block; font-size: 0.7rem; color: #c5a059;">مدير النظام</span>
            </div>
            <div class="user-avatar">
                <img src="../images/admin-avatar.png" alt="Admin" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #c5a059;"
                     onerror="this.src='https://ui-avatars.com/api/?name=Mohamed+AlShammari&background=c5a059&color=fff'">
            </div>
            
            <button class="header-action-btn" title="الإعدادات" id="header-settings-btn" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-right: 10px;">
                ⚙️
            </button>
        </div>
    </div>
</div>

<!-- 🧠 ربط الأوامر البرمجية من المسار المصلح كـ Modules -->
<script type="module" src="../js-logic/header-logic.js"></script>
<script type="module" src="../js-logic/clock-logic.js"></script>
