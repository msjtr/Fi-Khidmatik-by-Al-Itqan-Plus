    </div>

    <!-- القسم الأيسر: الساعة وبيانات المدير -->
    <div class="header-left-section" style="display: flex; align-items: center; gap: 20px;">
        
        <!-- ويدجت الساعة الذكية -->
        <div class="header-clock-widget" style="background: #001f3f; color: #c5a059; padding: 5px 15px; border-radius: 10px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(197, 160, 89, 0.3);">
            <span style="font-size: 1.1rem; filter: drop-shadow(0 0 2px rgba(197, 160, 89, 0.5));">🕒</span>
            <div style="font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.15rem; letter-spacing: 1px;">
                <span id="header-h">00</span>:<span id="header-m">00</span><small id="header-s" style="font-size: 0.7rem; margin-right: 4px; opacity: 0.7;">00</small>
            </div>
        </div>

        <!-- معلومات المستخدم (المدير) -->
        <div class="header-user-profile" style="display: flex; align-items: center; gap: 12px; border-right: 1px solid #eee; padding-right: 20px;">
            <div style="text-align: left;">
                <p style="margin: 0; font-size: 0.9rem; font-weight: 700; color: #001f3f;">محمد الشمري</p>

            <div class="user-avatar" style="width: 40px; height: 40px; background: #c5a059; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 2px solid #001f3f;">
                M
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * منطق تحديث الساعة في الهيدر
     */
    function updateHeaderClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');

        const hElem = document.getElementById('header-h');
        const mElem = document.getElementById('header-m');
        const sElem = document.getElementById('header-s');

        if(hElem) hElem.textContent = h;
        if(mElem) mElem.textContent = m;
        if(sElem) sElem.textContent = s;
    }

    // تحديث كل ثانية
    setInterval(updateHeaderClock, 1000);
    updateHeaderClock();
</script>
