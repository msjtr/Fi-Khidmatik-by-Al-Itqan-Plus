<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قائمة العملاء - Tera V12</title>
    <!-- محرر النصوص المتقدم Quill -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .table-responsive-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tera-table { width: 100%; border-collapse: collapse; min-width: 1500px; }
        .tera-table th, .tera-table td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #eee; }
        .tera-table th { background-color: #f8f9fa; color: var(--primary-color); font-weight: 600; }
        .sticky-col { position: sticky; right: 0; background: #f8f9fa; z-index: 1; }
        .sticky-col-right { position: sticky; left: 0; background: #f8f9fa; z-index: 1; border-right: 1px solid #ddd; }
        
        /* Badges */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
        .status-active { background: #d4edda; color: #155724; }
        .status-paused { background: #fff3cd; color: #856404; }
        .status-blocked { background: #f8d7da; color: #721c24; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 1000px; max-height: 90vh; overflow-y: auto; border-radius: 12px; padding: 25px; position: relative; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-weight: bold; font-size: 0.9em; color: #555; }
        .input-group input, .input-group select { padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        
        /* Editor & Attachments */
        .editor-container { height: 200px; margin-bottom: 15px; }
        .attachments-section { border-top: 2px solid #eee; padding-top: 15px; margin-top: 20px; }
        .attachment-item { display: flex; justify-content: space-between; background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #e1e4e8; }
        
        .action-btn { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; margin-left: 5px; transition: 0.3s; }
        .edit { background: #3498db; color: white; }
        .print { background: #95a5a6; color: white; }
        .delete { background: #e74c3c; color: white; }
        .attach { background: #607d8b; color: white; }
    </style>
</head>
<body>

    <div class="page-header">
        <div class="header-titles">
            <h1>قائمة العملاء - Tera V12</h1>
            <p>إدارة الحالات، التصنيفات، الملاحظات المنسقة، والمرفقات</p>
        </div>
        <div class="stats">إجمالي العملاء: <span id="customers-count">0</span></div>
    </div>

    <div class="table-responsive-container">
        <table class="tera-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th class="sticky-col">الاسم</th>
                    <th>الجوال</th>
                    <th>البريد</th>
                    <th>الدولة/المدينة</th>
                    <th>حالة الحساب</th>
                    <th>التصنيف</th>
                    <th>سلوك العميل</th>
                    <th>تاريخ الإضافة</th>
                    <th class="sticky-col-right">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customers-tbody">
                <tr><td colspan="10" style="text-align:center;">جارِ تحميل البيانات...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- مودال التعديل الشامل -->
    <div id="edit-customer-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header" style="display:flex; justify-content:space-between;">
                <h2>تعديل ملف العميل</h2>
                <button onclick="closeEditModal()" style="border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
            </div>
            
            <form id="edit-customer-form">
                <input type="hidden" id="edit-doc-id">
                
                <div class="form-grid">
                    <div class="input-group"><label>الاسم</label><input type="text" id="edit-name"></div>
                    <div class="input-group"><label>الجوال</label><input type="text" id="edit-phone"></div>
                    <div class="input-group"><label>حالة الحساب</label>
                        <select id="edit-accountStatus">
                            <option value="جديد">جديد</option>
                            <option value="نشط">نشط</option>
                            <option value="موقوف">موقوف</option>
                            <option value="محظور">محظور</option>
                        </select>
                    </div>
                    <div class="input-group"><label>تصنيف العميل</label>
                        <select id="edit-customerCategory">
                            <option value="VIP">VIP</option>
                            <option value="مميز">مميز</option>
                            <option value="عادي">عادي</option>
                            <option value="محتمل">محتمل</option>
                        </select>
                    </div>
                    <div class="input-group"><label>ملاحظة سريعة</label>
                        <select id="edit-quickNote">
                            <option value="سريع التجاوب">سريع التجاوب</option>
                            <option value="يتأخر في الرد">يتأخر في الرد</option>
                            <option value="كثير الطلبات">كثير الطلبات</option>
                            <option value="بحاجة متابعة">بحاجة متابعة</option>
                        </select>
                    </div>
                </div>

                <!-- الملاحظات المتقدمة -->
                <div class="input-group">
                    <label>الملاحظات التفصيلية (تنسيق Word)</label>
                    <div id="editor" class="editor-container"></div>
                </div>

                <!-- قسم المرفقات -->
                <div class="attachments-section">
                    <h3>📎 المرفقات (غير محدود)</h3>
                    <div style="display:flex; gap:10px; margin-bottom:15px; background:#f0f2f5; padding:10px; border-radius:8px;">
                        <input type="text" id="new-file-name" placeholder="اسم المرفق" style="flex:1; padding:8px;">
                        <input type="file" id="new-file-input" style="flex:1;">
                        <button type="button" id="upload-btn" class="edit" style="padding:8px 20px; border-radius:5px; border:none; cursor:pointer;">رفع الملف</button>
                    </div>
                    <div id="files-list"></div>
                </div>

                <div style="margin-top:20px; text-align:left;">
                    <button type="button" onclick="closeEditModal()" style="padding:10px 20px; border-radius:5px; border:1px solid #ccc; cursor:pointer;">إلغاء</button>
                    <button type="submit" class="edit" style="padding:10px 30px; border-radius:5px; border:none; cursor:pointer; font-weight:bold;">حفظ كافة البيانات</button>
                </div>
            </form>
        </div>
    </div>

    <!-- مودال عرض المرفقات فقط -->
    <div id="view-files-modal" class="modal-overlay">
        <div class="modal-content" style="max-width:500px;">
            <h3>المرفقات الحالية</h3>
            <div id="only-files-list"></div>
            <button onclick="document.getElementById('view-files-modal').classList.remove('active')" style="margin-top:15px; width:100%; padding:10px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script type="module" src="../js-logic/customers-list.js"></script>
</body>
</html>
