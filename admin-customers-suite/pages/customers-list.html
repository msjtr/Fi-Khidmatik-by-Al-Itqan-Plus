<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قائمة العملاء - Tera V12</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; --bg-color: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); padding: 20px; }
        .tera-table { width: 100%; border-collapse: collapse; min-width: 2400px; background: white; }
        .tera-table th, .tera-table td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        .sticky-col { position: sticky; right: 0; background: #f8f9fa; z-index: 2; }
        .sticky-col-right { position: sticky; left: 0; background: #f8f9fa; z-index: 2; border-right: 1px solid #ddd; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 95%; max-width: 1100px; max-height: 90vh; overflow-y: auto; border-radius: 12px; padding: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .action-btn { border: none; padding: 7px 10px; border-radius: 5px; cursor: pointer; font-size: 1.1em; margin-left: 3px; }
        .edit { background: #3498db; color: white; }
        .attach { background: #607d8b; color: white; }
        .attachment-item { display: flex; justify-content: space-between; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; margin-bottom: 5px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>قائمة العملاء - Tera V12</h1>
        <div class="stats">إجمالي العملاء: <span id="customers-count">0</span></div>
    </div>

    <div class="table-responsive-container" style="overflow-x: auto;">
        <table class="tera-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th class="sticky-col">اسم العميل</th>
                    <th>الجوال</th>
                    <th>مفتاح الدولة</th>
                    <th>البريد الإلكتروني</th>
                    <th>الدولة</th>
                    <th>المدينة</th>
                    <th>الحي</th>
                    <th>الشارع</th>
                    <th>المبنى</th>
                    <th>الإضافي</th>
                    <th>الرمز البريدي</th>
                    <th>صندوق البريد</th>
                    <th>تاريخ الإضافة</th>
                    <th>حالة الحساب</th>
                    <th>تصنيف العميل</th>
                    <th>سلوك العميل</th>
                    <th class="sticky-col-right">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customers-tbody"></tbody>
        </table>
    </div>

    <!-- نافذة التعديل والرفع -->
    <div id="edit-customer-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:20px;">
                <h2>تعديل البيانات والمرفقات</h2>
                <button onclick="closeEditModal()" style="font-size:24px; cursor:pointer; border:none; background:none;">&times;</button>
            </div>
            
            <form id="edit-customer-form">
                <input type="hidden" id="edit-doc-id">
                <div class="form-grid">
                    <!-- الحقول الـ 13 -->
                    <div class="input-group"><label>الاسم</label><input type="text" id="edit-name"></div>
                    <div class="input-group"><label>الجوال</label><input type="text" id="edit-phone"></div>
                    <div class="input-group"><label>مفتاح الدولة</label><input type="text" id="edit-countryCode"></div>
                    <div class="input-group"><label>البريد</label><input type="email" id="edit-email"></div>
                    <div class="input-group"><label>الدولة</label><input type="text" id="edit-country"></div>
                    <div class="input-group"><label>المدينة</label><input type="text" id="edit-city"></div>
                    <div class="input-group"><label>الحي</label><input type="text" id="edit-district"></div>
                    <div class="input-group"><label>الشارع</label><input type="text" id="edit-street"></div>
                    <div class="input-group"><label>المبنى</label><input type="text" id="edit-buildingNo"></div>
                    <div class="input-group"><label>الإضافي</label><input type="text" id="edit-additionalNo"></div>
                    <div class="input-group"><label>الرمز البريدي</label><input type="text" id="edit-postalCode"></div>
                    <div class="input-group"><label>صندوق البريد</label><input type="text" id="edit-poBox"></div>
                    <div class="input-group"><label>الحالة</label>
                        <select id="edit-accountStatus">
                            <option value="جديد">جديد</option>
                            <option value="نشط">نشط</option>
                            <option value="موقوف">موقوف</option>
                        </select>
                    </div>
                    <div class="input-group"><label>التصنيف</label>
                        <select id="edit-customerCategory"><option value="عادي">عادي</option><option value="VIP">VIP</option></select>
                    </div>
                    <div class="input-group"><label>السلوك</label>
                        <select id="edit-quickNote"><option value="سريع التجاوب">سريع التجاوب</option></select>
                    </div>
                </div>

                <div style="margin-top:20px;">
                    <label>الملاحظات (Word)</label>
                    <div id="editor" style="height:150px; background:white;"></div>
                </div>

                <div style="margin-top:20px; padding:15px; background:#f9fbff; border:1px dashed #d1d9e6;">
                    <h3>📎 رفع وثيقة جديدة</h3>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input type="text" id="new-file-name" placeholder="اسم الوثيقة" style="flex:1; padding:8px;">
                        <input type="file" id="new-file-input" style="flex:1;">
                        <button type="button" id="upload-btn" class="edit" style="padding:8px 20px;">رفع الوثيقة</button>
                    </div>
                    <div id="files-list" style="margin-top:15px;"></div>
                </div>

                <div style="margin-top:25px; text-align:left;">
                    <button type="button" onclick="closeEditModal()" style="padding:10px 20px;">إغلاق</button>
                    <button type="submit" class="edit" style="padding:10px 40px;">حفظ التحديثات</button>
                </div>
            </form>
        </div>
    </div>

    <!-- مودال عرض المرفقات فقط (أيقونة 📎) -->
    <div id="view-files-modal" class="modal-overlay">
        <div class="modal-content" style="max-width:550px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3>📋 أرشيف مستندات العميل</h3>
                <button onclick="document.getElementById('view-files-modal').classList.remove('active')" style="font-size:24px; cursor:pointer; border:none; background:none;">&times;</button>
            </div>
            <div id="only-files-list"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script type="module" src="../js-logic/customers-list.js"></script>
</body>
</html>
