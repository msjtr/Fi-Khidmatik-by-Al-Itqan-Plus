<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قائمة العملاء - Tera V12</title>
    <link rel="stylesheet" href="../css-styles/customers-list.css">
    <!-- مكتبة المحرر المتقدم (Quill) -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <style>
        .editor-container { height: 200px; background: white; margin-bottom: 10px; border-radius: 8px; }
        .tag-select { padding: 5px; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="page-header">
        <div class="header-titles">
            <h2>قائمة العملاء</h2>
            <p>إدارة البيانات المتقدمة وتصنيفات الحسابات</p>
        </div>
    </div>

    <div class="table-responsive-container">
        <table class="tera-table" id="customers-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th class="sticky-col">اسم العميل</th>
                    <th>الجوال</th>
                    <th>الدولة/المدينة</th>
                    <th>حالة الحساب</th> <!-- جديد -->
                    <th>تصنيف العميل</th> <!-- جديد -->
                    <th>ملاحظة سريعة</th> <!-- جديد -->
                    <th>تاريخ الإضافة</th>
                    <th class="sticky-col-right">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customers-tbody">
                <tr><td colspan="9" class="loading-msg">جارِ جلب البيانات...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- نافذة التعديل المتقدمة -->
    <div id="edit-customer-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header">
                <h3>تعديل الملف الشخصي والتقييم</h3>
                <button class="close-btn" onclick="closeEditModal()">✖</button>
            </div>
            <form id="edit-customer-form">
                <input type="hidden" id="edit-doc-id">
                <div class="form-grid">
                    <div class="input-group"><label>الاسم</label><input type="text" id="edit-name" required></div>
                    <div class="input-group"><label>الجوال</label><input type="text" id="edit-phone" required></div>
                    
                    <!-- حالة الحساب -->
                    <div class="input-group"><label>حالة الحساب</label>
                        <select id="edit-accountStatus" class="tag-select">
                            <option value="جديد">جديد</option>
                            <option value="نشط">نشط</option>
                            <option value="موقوف">موقوف</option>
                            <option value="محظور">محظور</option>
                        </select>
                    </div>

                    <!-- تصنيف العميل -->
                    <div class="input-group"><label>تصنيف العميل</label>
                        <select id="edit-customerCategory" class="tag-select">
                            <option value="VIP">VIP</option>
                            <option value="مميز">مميز</option>
                            <option value="عادي">عادي</option>
                            <option value="محتمل">محتمل</option>
                        </select>
                    </div>

                    <!-- الملاحظات السريعة -->
                    <div class="input-group"><label>سلوك العميل</label>
                        <select id="edit-quickNote" class="tag-select">
                            <option value="سريع التجاوب">سريع التجاوب</option>
                            <option value="يتأخر في الرد">يتأخر في الرد</option>
                            <option value="كثير الطلبات">كثير الطلبات</option>
                            <option value="بحاجة متابعة">بحاجة متابعة</option>
                        </select>
                    </div>
                </div>

                <!-- محرر النصوص المتقدم (Word Style) -->
                <div class="input-group" style="margin-top:20px;">
                    <label>الملاحظات التفصيلية (محرر متقدم)</label>
                    <div id="editor" class="editor-container"></div>
                    <input type="hidden" id="edit-detailedNotes">
                </div>

                <div class="modal-footer">
                    <button type="button" class="cancel-btn" onclick="closeEditModal()">إلغاء</button>
                    <button type="submit" class="save-btn">حفظ وتحديث</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js-logic/customers-list.js"></script>
</body>
</html>
