<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- إصلاح المسار: الصعود للمجلد الأب ثم الدخول لمجلد التنسيق -->
    <link rel="stylesheet" href="../css-styles/add-cust-style.css">
    <link rel="stylesheet" href="../css-styles/buttons-theme.css">
</head>
<body>
    <div class="add-cust-container">
        <div class="form-header">
            <h3>تسجيل طلب جديد - مؤسسة الإتقان بلس</h3>
            <span class="system-tag" style="color: #c5a059; font-size: 12px;">نظام Tera V12.12.12</span>
        </div>

        <form id="addCustomerForm">
            <!-- استخدام شبكة الحقول (Grid) المبرمجة -->
            <div class="cust-form-grid">
                <div class="form-group">
                    <label for="custName">الاسم الرباعي للعميل</label>
                    <input type="text" id="custName" name="custName" placeholder="أدخل الاسم الكامل" required>
                </div>

                <div class="form-group">
                    <label for="custId">رقم الهوية الوطنية</label>
                    <input type="number" id="custId" name="custId" placeholder="10xxxxxxxx" required>
                </div>

                <div class="form-group">
                    <label for="custPhone">رقم الجوال (سوا)</label>
                    <input type="tel" id="custPhone" name="custPhone" placeholder="05xxxxxxxx" required>
                </div>

                <div class="form-group">
                    <label for="amount">مبلغ التمويل / الأقساط</label>
                    <input type="number" id="amount" name="amount" placeholder="0.00" required>
                </div>
            </div>

            <div class="form-actions">
                <!-- إضافة onclick لضمان استجابة الزر فوراً -->
                <button type="button" id="btnSave" class="btn-itqan btn-add" onclick="saveCustomerData()">
                    <span>💾</span> حفظ في قاعدة بيانات حائل
                </button>
            </div>
        </form>
    </div>

    <!-- إصلاح مسارات السكريبتات للصعود للمجلد الأب -->
    <script src="../js-logic/api-connector.js"></script>
    <script src="../js-logic/add-cust-logic.js"></script>
    
    <script>
        // دالة وسيطة للتأكد من عمل الزر ونقل البيانات لـ Firebase
        function saveCustomerData() {
            console.log("بدء عملية الحفظ في نظام الإتقان بلس...");
            if (typeof handleCustomerSubmit === "function") {
                handleCustomerSubmit(); // استدعاء الدالة الأساسية من ملف add-cust-logic.js
            } else {
                alert("خطأ: لم يتم تحميل ملف المنطق البرمجي بشكل صحيح.");
            }
        }
    </script>
</body>
</html>
