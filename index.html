<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب شراء | منصة في خدمتك</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="images/logo.svg" alt="شعار المنصة" class="logo" onerror="this.style.display='none'">
            <h1>📋 طلب شراء جديد</h1>
        </div>

        <!-- معلومات الطلب -->
        <div class="form-section">
            <div class="row">
                <div class="form-group">
                    <label>📅 التاريخ</label>
                    <input type="text" id="order_date" placeholder="مثال: 11-03-2026" value="11-03-2026">
                </div>
                <div class="form-group">
                    <label>⏰ الوقت</label>
                    <input type="time" id="order_time">
                </div>
            </div>
        </div>

        <hr>

        <!-- معلومات العميل -->
        <div class="form-section">
            <h2>👤 معلومات العميل</h2>
            <div class="row">
                <div class="form-group">
                    <input type="text" id="name" placeholder="الاسم الكامل" required>
                </div>
                <div class="form-group">
                    <input type="tel" id="phone" placeholder="رقم الجوال" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="البريد الإلكتروني">
                </div>
            </div>
        </div>

        <hr>

        <!-- العنوان -->
        <div class="form-section">
            <h2>📍 العنوان</h2>
            <div class="row">
                <div class="form-group">
                    <input type="text" id="city" placeholder="المدينة">
                </div>
                <div class="form-group">
                    <input type="text" id="district" placeholder="الحي">
                </div>
                <div class="form-group">
                    <input type="text" id="street" placeholder="الشارع">
                </div>
                <div class="form-group">
                    <input type="text" id="building" placeholder="رقم المبنى">
                </div>
                <div class="form-group">
                    <input type="text" id="extra" placeholder="الرقم الإضافي">
                </div>
                <div class="form-group">
                    <input type="text" id="postal" placeholder="الرمز البريدي">
                </div>
            </div>
        </div>

        <hr>

        <!-- إضافة منتج -->
        <div class="form-section">
            <h2>🛒 إضافة منتج</h2>
            <div class="row">
                <div class="form-group">
                    <input type="text" id="product_name" placeholder="اسم المنتج" required>
                </div>
                <div class="form-group">
                    <input type="text" id="product_desc" placeholder="وصف المنتج (اختياري)">
                </div>
                <div class="form-group">
                    <input type="number" id="product_price" placeholder="السعر (ريال)" step="0.01" required>
                </div>
                <div class="form-group">
                    <input type="number" id="product_qty" placeholder="الكمية" value="1" min="1" required>
                </div>
            </div>
            <button class="btn-add" onclick="addToCart()">➕ أضف إلى السلة</button>
        </div>

        <hr>

        <!-- سلة المشتريات -->
        <div class="form-section">
            <h2>🛍️ سلة المشتريات</h2>
            <div id="cart"></div>
        </div>

        <hr>

        <!-- معلومات الدفع والشحن -->
        <div class="form-section">
            <h2>💳 معلومات الدفع والشحن</h2>
            <div class="row">
                <div class="form-group">
                    <label>طريقة الدفع</label>
                    <select id="payment">
                        <option value="تمارا">تمارا</option>
                        <option value="تحويل بنكي">تحويل بنكي</option>
                        <option value="مدى">مدى</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="text" id="tamara_auth" placeholder="رمز الموافقة تمارا (اختياري)">
                </div>
                <div class="form-group">
                    <input type="text" id="tamara_order" placeholder="رقم طلب تمارا (اختياري)">
                </div>
                <div class="form-group">
                    <label>خدمة الشحن</label>
                    <select id="shipping">
                        <option value="لا يحتاج شحن">لا يحتاج شحن</option>
                        <option value="يحتاج شحن">يحتاج شحن</option>
                    </select>
                </div>
            </div>
        </div>

        <button class="btn-checkout" onclick="checkout()">✅ تأكيد الطلب وإنشاء الفاتورة</button>
    </div>

    <script src="js/cart.js"></script>
    <script src="js/order.js"></script>
</body>
</html>
