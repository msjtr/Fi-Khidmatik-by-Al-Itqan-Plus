<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tera Gateway | نظام إدارة التقسيط الذكي</title>
    
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css?v=12.12.6">
    <link rel="stylesheet" href="css/sidebar.css?v=12.12.6"> 
    <link rel="stylesheet" href="css/table.css?v=12.12.6">
    <link rel="stylesheet" href="css/customers.css?v=12.12.6">

    <style>
        :root { 
            --tera-orange: #f97316;
            --tera-bg: #f8fafc; 
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--tera-bg); 
            margin: 0; 
            overflow: hidden; 
        }
        .loader-box {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; background: #fff;
        }
        .spinner-tera {
            width: 50px; height: 50px; 
            border: 4px solid #f1f5f9;
            border-top: 4px solid var(--tera-orange); 
            border-radius: 50%;
            animation: spin-tera 0.8s linear infinite;
        }
        @keyframes spin-tera { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .admin-layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        .main-wrapper { display: flex; flex-direction: column; flex: 1; min-width: 0; background: var(--tera-bg); }
        .content-area { flex: 1; padding: 25px; overflow-y: auto; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="tera-gateway-v12">

    <div class="admin-layout">
        <aside id="sidebar-container"></aside>
        <main class="main-wrapper">
            <header id="header-container"></header>
            <section id="module-container" class="content-area">
                <div class="loader-box">
                    <div class="spinner-tera"></div>
                    <p style="margin-top: 20px; font-weight: 700;">جاري تشغيل محرك تيرا...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="modals-placeholder"></div>

    <script type="module">
        import { db, ensureDbReady } from './js/core/config.js';

        class TeraApp {
            constructor() {
                this.container = document.getElementById('module-container');
                this.version = "12.12.6";
                const isGithub = window.location.hostname.includes('github.io');
                this.baseUrl = isGithub ? '/fi-khidmatik' : '';
                
                this.init();
            }

            async init() {
                try {
                    await ensureDbReady();

                    // تعريف الدوال عالمياً قبل تحميل المكونات
                    window.navigateTo = (moduleName) => {
                        // إصلاح خطأ تمرير العنصر بدلاً من الاسم
                        const target = (typeof moduleName === 'string') ? moduleName : 'dashboard';
                        window.location.hash = `#${target}`;
                    };

                    // دعم التوافق مع الكود القديم
                    window.handleSidebarClick = window.navigateTo;

                    await Promise.all([
                        this.loadComponent('sidebar-container', `${this.baseUrl}/admin/components/sidebar.html`),
                        this.loadComponent('header-container', `${this.baseUrl}/admin/components/header.html`),
                        this.loadComponent('modals-placeholder', `${this.baseUrl}/admin/components/modals.html`)
                    ]);

                    window.addEventListener('hashchange', () => this.handleRouting());
                    this.handleRouting(); 

                } catch (err) {
                    console.error("Critical System Failure:", err);
                }
            }

            async loadComponent(id, path) {
                try {
                    const res = await fetch(`${path.replace(/\/+/g, '/')}?v=${this.version}`);
                    const html = await res.text();
                    const el = document.getElementById(id);
                    el.innerHTML = html;
                    this.executeInjectedScripts(el);
                } catch (e) { console.error("Load Error:", e); }
            }

            async handleRouting() {
                const hash = window.location.hash || '#dashboard';
                let moduleName = hash.replace('#', '');

                // حماية من الخطأ الذي ظهر لك: [object HTMLLIElement]
                if (typeof moduleName !== 'string' || moduleName.includes('object')) {
                    moduleName = 'dashboard';
                }
                
                const folder = (moduleName === 'dashboard') ? 'components' : 'modules';
                const targetPath = `${this.baseUrl}/admin/${folder}/${moduleName}.html`.replace(/\/+/g, '/');

                try {
                    this.container.innerHTML = '<div class="loader-box"><div class="spinner-tera"></div></div>';
                    const res = await fetch(`${targetPath}?v=${this.version}`);
                    if (!res.ok) throw new Error("Not Found");
                    this.container.innerHTML = await res.text();
                    
                    setTimeout(() => {
                        this.executeInjectedScripts(this.container);
                        this.updateSidebarUI(moduleName);
                    }, 50);
                } catch (e) {
                    this.container.innerHTML = `<div class="loader-box"><h3>القسم غير متوفر حالياً</h3></div>`;
                }
            }

            executeInjectedScripts(container) {
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (oldScript.src) {
                        newScript.src = `${oldScript.src.split('?')[0]}?v=${this.version}`;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            }

            updateSidebarUI(activeModule) {
                document.querySelectorAll('.nav-item').forEach(nav => {
                    nav.classList.toggle('active', nav.getAttribute('data-module') === activeModule);
                });
            }
        }

        window.Tera = new TeraApp();
    </script>
</body>
</html>
