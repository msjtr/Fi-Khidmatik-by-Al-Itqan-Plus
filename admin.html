<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tera Gateway | لوحة التحكم المتكاملة</title>
    
    <link rel="icon" href="/fi-khidmatik/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/fi-khidmatik/css/admin.css">
    <link rel="stylesheet" href="/fi-khidmatik/css/table.css">
    <link rel="stylesheet" href="/fi-khidmatik/css/orders.css">
    <link rel="stylesheet" href="/fi-khidmatik/css/invoice.css">

    <style>
        :root { --primary: #e67e22; --dark: #2c3e50; --bg: #f8fafc; --sidebar-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); height: 100vh; overflow: hidden; }
        
        .app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        /* الهيدر العلوي */
        .app-header {
            background: white; padding: 0 25px; display: flex; justify-content: space-between;
            align-items: center; height: 70px; box-shadow: 0 2px 15px rgba(0,0,0,0.04); z-index: 1001;
        }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .sidebar-trigger { background: #fef5e8; border: none; font-size: 1.2rem; cursor: pointer; color: var(--primary); padding: 10px; border-radius: 8px; transition: 0.3s; }
        .sidebar-trigger:hover { background: var(--primary); color: white; }
        .app-brand { font-weight: 800; font-size: 1.3rem; color: var(--dark); display: flex; align-items: center; gap: 12px; }
        .app-brand img { width: 45px; height: 45px; object-fit: contain; }
        .header-clock { font-size: 0.9rem; color: #7f8c8d; font-weight: 500; }

        /* الجسم الرئيسي */
        .app-body { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* القائمة الجانبية */
        .app-sidebar {
            width: var(--sidebar-width); background: white; border-left: 1px solid #edf2f7;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
        }
        .app-sidebar.is-closed { width: 0; transform: translateX(100%); }

        .side-nav ul { list-style: none; padding: 15px 0; }
        .nav-item {
            padding: 14px 25px; display: flex; align-items: center; gap: 15px;
            color: #64748b; text-decoration: none; font-weight: 600; transition: 0.2s;
            border-right: 4px solid transparent; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { background: #fef5e8; color: var(--primary); border-right-color: var(--primary); }
        .nav-item i { width: 22px; font-size: 1.1rem; text-align: center; }

        /* منطقة المحتوى */
        .app-content { flex: 1; overflow-y: auto; padding: 25px; background: #f8fafc; position: relative; }
        
        /* شاشة التحميل */
        #loader {
            position: absolute; inset: 0; background: rgba(255,255,255,0.8);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
            backdrop-filter: blur(2px);
        }

        @media (max-width: 768px) {
            .app-sidebar { position: fixed; height: 100%; right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
            .header-clock { display: none; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="app-header">
        <div class="header-right">
            <button id="sidebar-toggle" class="sidebar-trigger">
                <i class="fas fa-bars"></i>
            </button>
            <div class="app-brand">
                <img src="/fi-khidmatik/images/logo.svg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968322.png'" alt="Logo">
                <span>Tera Gateway</span>
            </div>
        </div>
        <div id="current-datetime" class="header-clock"></div>
    </header>

    <div class="app-body">
        <aside id="main-sidebar" class="app-sidebar">
            <nav class="side-nav">
                <div style="padding: 20px 25px 10px; font-size: 0.75rem; color: #999; font-weight: 800; letter-spacing: 1px;">القائمة الرئيسية</div>
                <ul id="admin-menu">
                    <a href="#dashboard" class="nav-item active" data-module="dashboard"><i class="fas fa-th-large"></i> <span>الرئيسية</span></a>
                    <a href="#products" class="nav-item" data-module="products"><i class="fas fa-box-open"></i> <span>المنتجات</span></a>
                    <a href="#orders" class="nav-item" data-module="orders"><i class="fas fa-file-invoice-dollar"></i> <span>طلبات التقسيط</span></a>
                    <a href="#customers" class="nav-item" data-module="customers"><i class="fas fa-user-friends"></i> <span>العملاء</span></a>
                    <a href="#settings" class="nav-item" data-module="settings"><i class="fas fa-sliders-h"></i> <span>الإعدادات</span></a>
                </ul>
            </nav>
        </aside>

        <main class="app-content">
            <div id="loader">
                <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary);"></i>
                <p style="margin-top:15px; font-weight:700; color: #4a5568;">جاري مزامنة البيانات...</p>
            </div>
            <div id="module-container">
                </div>
        </main>
    </div>
</div>

<script type="module" src="/fi-khidmatik/js/main.js"></script>

<script>
    // وظائف الواجهة الرسومية السريعة
    (function() {
        // 1. تحديث الساعة والوقت بتنسيق سعودي محلي
        function updateTime() {
            const el = document.getElementById('current-datetime');
            if (el) {
                const now = new Date();
                el.innerText = now.toLocaleDateString('ar-SA', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                });
            }
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. التحكم في القائمة الجانبية
        const toggleBtn = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('main-sidebar');
        if (toggleBtn && sidebar) {
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('is-closed');
            });
        }

        // 3. دوال مساعدة عالمية للنظام
        window.toggleLoader = function(show) {
            const loader = document.getElementById('loader');
            if (loader) loader.style.display = show ? 'flex' : 'none';
        };

        window.setActiveNavItem = function(moduleName) {
            document.querySelectorAll('#admin-menu .nav-item').forEach(item => {
                const isMatch = item.getAttribute('data-module') === moduleName;
                item.classList.toggle('active', isMatch);
            });
        };

        console.log('✅ واجهة Tera Gateway v4.0 جاهزة.');
    })();
</script>
</body>
</html>
