<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم تيرا جيت واي | Tera Gateway</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin-style.css">
    <link rel="stylesheet" href="css/customers-module.css">
</head>
<body>

    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="logo-section">
                <img src="admin/images/tera-logo.png" alt="Tera Logo">
                <span>تيرا جيت واي</span>
            </div>
            <nav class="nav-menu">
                <a href="#dashboard" class="nav-item active"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="#customers" class="nav-item"><i class="fas fa-users"></i> قاعدة العملاء</a>
                <a href="#orders" class="nav-item"><i class="fas fa-file-invoice-dollar"></i> الطلبات والفواتير</a>
                <a href="#settings" class="nav-item"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <input type="text" id="global-search" placeholder="ابحث باسم العميل، الجوال، المدينة...">
                </div>
                <div class="user-profile">
                    <span id="admin-name">مرحبًا، محمد بن صالح</span>
                    <img src="admin/images/avatar.png" class="avatar">
                </div>
            </header>

            <section id="module-container" class="content-body">
                <div class="loading-state">جاري تحميل النظام...</div>
            </section>
        </main>
    </div>

    <div id="customer-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCustomerModal()">&times;</span>
            <h2 id="modal-title">إضافة عميل جديد</h2>
            <form id="customer-form">
                <div class="form-grid">
                    <input type="text" name="name" placeholder="الاسم الكامل كما في الهوية" required>
                    <input type="text" name="phone" placeholder="رقم الجوال (05xxxxxxxx)" required>
                    <input type="text" name="city" placeholder="المدينة">
                    <input type="text" name="district" placeholder="الحي">
                    <input type="text" name="building_no" placeholder="رقم المبنى">
                    <select name="classification">
                        <option value="عادي">عميل عادي</option>
                        <option value="VIP">عميل VIP</option>
                    </select>
                </div>
                <button type="submit" class="save-btn">حفظ البيانات</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script type="module" src="js/core/firebase.js"></script>

    <script type="module" src="js/main.js"></script>

</body>
</html>
