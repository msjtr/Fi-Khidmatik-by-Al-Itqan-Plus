<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="icon" href="images/logo.png" type="image/png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">

    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
            --primary-blue: #2563eb;
            --bg-body: #f8fafc;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #sidebar-placeholder {
            width: var(--sidebar-width);
            height: 100%;
            background: #fff;
            flex-shrink: 0;
            border-left: 1px solid var(--border-color);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-body);
            position: relative;
        }

        #header-placeholder {
            height: var(--header-height);
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            z-index: 999;
        }

        #module-container {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            background: var(--bg-body);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
            transition: opacity 0.4s ease;
        }

        @media (max-width: 1024px) {
            :root { --sidebar-width: 80px; }
            .sidebar-text { display: none; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <aside id="sidebar-placeholder"></aside>

        <div class="content-area">
            <header id="header-placeholder"></header>

            <main id="module-container">
                <div class="loading-state" id="main-loader">
                    <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary-blue);"></i>
                    <p style="margin-top: 15px; font-weight: 700; color: #1e293b;">جاري تحميل نظام في خدمتك...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        /**
         * دالة تحميل المكونات الثابتة من مجلد admin/components/
         */
        async function loadStaticComponent(id, fileName) {
            const container = document.getElementById(id);
            // المسار الصحيح بناءً على صور الهيكل المرفقة
            const path = `admin/components/${fileName}`;
            
            try {
                const response = await fetch(`${path}?v=${Date.now()}`);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const html = await response.text();
                container.innerHTML = html;
                return true;
            } catch (err) {
                console.error(`❌ فشل تحميل: ${fileName}`, err);
                return false;
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات من مجلد admin/components
            await Promise.all([
                loadStaticComponent('sidebar-placeholder', 'sidebar.html'),
                loadStaticComponent('header-placeholder', 'header.html'),
                loadStaticComponent('modals-placeholder', 'modals.html')
            ]);

            const loader = document.getElementById('main-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 400);
            }
        });
    </script>

   
    <script type="module" src="js/main.js"></script>

</body>
</html>
