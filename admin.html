<body>
    <div id="app" style="display: flex; flex-direction: column; height: 100vh; overflow: hidden;">
        
        <header class="admin-header">
            <div class="header-right">
                <div class="logo-container">
                    <img src="images/logo.svg" alt="Tera" class="header-logo-img" onerror="this.src='https://placehold.jp/e67e22/ffffff/150x150.png?text=T'">
                    <span class="brand-name">تيرا جيتواي</span>
                </div>
            </div>
            <div class="header-left">
                <div id="current-datetime" class="datetime"></div>
            </div>
        </header>
        
        <div class="main-layout">
            
            <aside id="sidebar-container" class="sidebar">
                <nav class="sidebar-nav">
                    <ul>
                        <li class="active" data-module="dashboard"><i class="fas fa-th-large"></i> <span>الرئيسية</span></li>
                        <li data-module="products"><i class="fas fa-box-open"></i> <span>المنتجات</span></li>
                        <li data-module="orders"><i class="fas fa-file-invoice-dollar"></i> <span>الطلبات</span></li>
                        <li data-module="customers"><i class="fas fa-user-friends"></i> <span>العملاء</span></li>
                        <li data-module="settings"><i class="fas fa-cog"></i> <span>الإعدادات</span></li>
                    </ul>
                </nav>
            </aside>
            
            <main id="main-content" class="main-content">
                </main>
        </div>
    </div>
</body>
