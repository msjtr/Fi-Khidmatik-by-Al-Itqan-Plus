<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="icon" href="/fi-khidmatik/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/fi-khidmatik/css/admin.css">
    <link rel="stylesheet" href="/fi-khidmatik/css/table.css">
    <link rel="stylesheet" href="/fi-khidmatik/css/orders.css">
    <link rel="stylesheet" href="/fi-khidmatik/css/invoice.css">

    <style>
        #loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
        }
        .app-content { position: relative; min-height: 400px; }
        
        @media (max-width: 768px) {
            .app-sidebar.is-closed { transform: translateX(-100%); }
            .header-clock { font-size: 12px; }
            .app-brand span { display: none; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="app-header">
        <div class="header-right">
            <button id="sidebar-toggle" class="sidebar-trigger">
                <i class="fas fa-bars"></i>
            </button>
            <div class="app-brand">
                <img src="/fi-khidmatik/images/logo.svg" alt="Tera Gateway" style="width: 40px; height: 40px;">
                <span>Tera Gateway</span>
            </div>
        </div>
        <div id="current-datetime" class="header-clock"></div>
    </header>

    <div class="app-body">
        <aside id="main-sidebar" class="app-sidebar">
            <nav class="side-nav">
                <ul id="admin-menu">
                    <li class="nav-item" data-module="dashboard"><i class="fas fa-chart-line"></i> <span>الرئيسية</span></li>
                    <li class="nav-item" data-module="products"><i class="fas fa-box"></i> <span>المنتجات</span></li>
                    <li class="nav-item" data-module="orders"><i class="fas fa-receipt"></i> <span>طلبات التقسيط</span></li>
                    <li class="nav-item" data-module="customers"><i class="fas fa-users"></i> <span>العملاء</span></li>
                    <li class="nav-item" data-module="settings"><i class="fas fa-cog"></i> <span>الإعدادات</span></li>
                </ul>
            </nav>
        </aside>

        <main id="main-content" class="app-content">
            <div id="loader">
                <i class="fas fa-circle-notch fa-spin fa-2x" style="color: #e67e22;"></i>
                <p>جاري التحميل...</p>
            </div>
            <div id="module-container"></div>
        </main>
    </div>
</div>

<script type="module" src="/fi-khidmatik/js/main.js"></script>

<script>
    (function() {
        const sidebar = document.getElementById('main-sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        
        if (toggleBtn && sidebar) {
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('is-closed');
            });
        }
        
        function updateTime() {
            const el = document.getElementById('current-datetime');
            if (el) {
                el.innerText = new Date().toLocaleDateString('en-GB', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                });
            }
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        document.addEventListener('click', (e) => {
            if (window.innerWidth < 768 && sidebar && !sidebar.contains(e.target) && !toggleBtn?.contains(e.target)) {
                sidebar.classList.add('is-closed');
            }
        });
        
        window.setActiveNavItem = function(moduleName) {
            document.querySelectorAll('#admin-menu .nav-item').forEach(item => {
                if (item.getAttribute('data-module') === moduleName) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        };
        
        console.log('✅ admin.html تم تحميله');
    })();
</script>
</body>
</html>
