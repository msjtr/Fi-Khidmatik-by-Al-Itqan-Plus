<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
    
    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #sidebar-placeholder {
            width: var(--sidebar-width);
            height: 100%;
            background: #fff;
            flex-shrink: 0;
            transition: width 0.3s ease;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header-placeholder {
            height: var(--header-height);
            flex-shrink: 0;
        }

        #module-container {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            background: #f8fafc;
        }

        .loader-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }

        /* حالة تصغير القائمة الجانبية */
        .sidebar-collapsed #sidebar-placeholder {
            width: 85px;
        }
    </style>
</head>
<body class="loading">

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>

        <div class="content-area">
            <div id="header-placeholder"></div>

            <main id="module-container">
                <div class="loader-box">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                    <p style="margin-top: 15px;">جاري تحميل لوحة التحكم...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        /**
         * 1. دوال الأمان العالمية (تعمل فوراً لمنع Error 404/ReferenceError)
         */
        window.closeCustomerModal = function() {
            const modal = document.getElementById('customer-modal');
            if (modal) modal.style.display = 'none';
        };

        window.openCustomerModal = function(title = "إضافة عميل جديد") {
            const modal = document.getElementById('customer-modal');
            if (modal) {
                const titleEl = document.getElementById('modal-title');
                if (titleEl) titleEl.innerText = title;
                modal.style.display = 'flex';
            }
        };

        window.closeConfirmModal = function() {
            const modal = document.getElementById('confirm-modal');
            if (modal) modal.style.display = 'none';
        };

        /**
         * 2. دالة تحميل المكونات مع تصحيح المسارات لـ GitHub Pages
         */
        async function loadComponent(id, path) {
            try {
                // استخدام مسار نسبي لضمان التوافق مع استضافة GitHub
                const response = await fetch(path);
                if (!response.ok) throw new Error(`فشل تحميل الملف: ${response.status}`);
                
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
                console.log(`✅ تم تحميل المكون: ${path}`);
            } catch (error) {
                console.error(`❌ خطأ في تحميل ${path}:`, error);
                document.getElementById(id).innerHTML = `<div style="padding:10px; color:red;">خطأ في تحميل المكون: ${path}</div>`;
            }
        }

        /**
         * 3. تبديل الموديولات
         */
        async function loadModule(moduleName) {
            const container = document.getElementById('module-container');
            container.innerHTML = '<div class="loader-box"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>';
            
            try {
                const response = await fetch(`modules/${moduleName}.html`);
                if (!response.ok) throw new Error('الموديول غير موجود');
                
                const html = await response.text();
                container.innerHTML = html;
                
                document.title = `Tera Gateway | ${moduleName.toUpperCase()}`;
            } catch (error) {
                container.innerHTML = `
                    <div style="text-align:center; padding:50px;">
                        <i class="fas fa-exclamation-triangle fa-3x" style="color:#ef4444;"></i>
                        <h3 style="margin-top:15px;">تعذر تحميل الصفحة المطلوبة</h3>
                        <p style="color:#64748b;">المسار: modules/${moduleName}.html</p>
                    </div>`;
            }
        }

        /**
         * 4. التشغيل عند جاهزية الصفحة
         */
        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات باستخدام مسارات نسبية مباشرة
            // ملاحظة: تأكد أن المجلدات تسمى "components" و "modules" بنفس الحروف الصغيرة
            await Promise.all([
                loadComponent('sidebar-placeholder', 'components/sidebar.html'),
                loadComponent('header-placeholder', 'components/header.html'),
                loadComponent('modals-placeholder', 'components/modals.html')
            ]);

            // تحميل الموديول الافتراضي
            loadModule('dashboard');
            
            document.body.classList.remove('loading');
        });
    </script>

</body>
</html>
