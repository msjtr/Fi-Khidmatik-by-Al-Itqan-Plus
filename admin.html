<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">

    <style>
        /* تحسينات إضافية للمؤشر والتحميل */
        #loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        .app-content { position: relative; min-height: 400px; }
    </style>
</head>
<body>

    <div class="app-shell">
        <header class="app-header">
            <div class="header-right">
                <button id="sidebar-toggle" class="sidebar-trigger">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="app-brand">
                    <img src="images/logo.svg" alt="Tera" onerror="this.src='https://placehold.jp/e67e22/ffffff/50x50.png?text=T'">
                    <span>Tera Gateway</span>
                </div>
            </div>
            <div id="current-datetime" class="header-clock" style="font-family: 'Tajawal', sans-serif;"></div>
        </header>

        <div class="app-body">
            <aside id="main-sidebar" class="app-sidebar">
                <nav class="side-nav">
                    <ul id="admin-menu">
                        <li class="nav-item active" data-module="dashboard" onclick="window.executeModule('dashboard')">
                            <i class="fas fa-chart-line"></i> <span>الرئيسية</span>
                        </li>
                        <li class="nav-item" data-module="products" onclick="window.executeModule('products')">
                            <i class="fas fa-box"></i> <span>المنتجات</span>
                        </li>
                        <li class="nav-item" data-module="orders" onclick="window.executeModule('orders')">
                            <i class="fas fa-receipt"></i> <span>طلبات التقسيط</span>
                        </li>
                        <li class="nav-item" data-module="customers" onclick="window.executeModule('customers')">
                            <i class="fas fa-users"></i> <span>العملاء</span>
                        </li>
                        <li class="nav-item" data-module="settings" onclick="window.executeModule('settings')">
                            <i class="fas fa-cog"></i> <span>الإعدادات</span>
                        </li>
                    </ul>
                </nav>
            </aside>

            <main id="main-content" class="app-content">
                <div id="loader">
                    <div style="text-align: center;">
                        <i class="fas fa-circle-notch fa-spin fa-3x" style="color: #e67e22;"></i>
                        <p style="margin-top: 10px; font-weight: bold;">جاري تحميل البيانات...</p>
                    </div>
                </div>

                <div id="module-container"></div>
            </main>
        </div>
    </div>

    <script>
        // دالة تنفيذ الموديولات - حلقة الوصل بين HTML و main.js
        window.executeModule = function(moduleName) {
            console.log("إرسال أمر فتح الموديول: " + moduleName);
            
            const loader = document.getElementById('loader');
            const container = document.getElementById('module-container');

            // وظيفة المحاولة المتكررة في حال لم يجهز ملف main.js بعد
            const trySwitch = () => {
                if (typeof window.switchModule === 'function') {
                    // تحديث الرابط (Hash) لتسهيل الرجوع والتحديث
                    window.location.hash = moduleName;
                    window.switchModule(moduleName);
                } else {
                    console.warn("النظام لا يزال قيد التشغيل... انتظر ثانية");
                    loader.style.display = 'block';
                    setTimeout(trySwitch, 500); // محاولة ثانية بعد نصف ثانية
                }
            };

            trySwitch();
        };

        // إدارة القائمة الجانبية والساعة
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('main-sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle');

            // فتح وإغلاق السايدبار
            toggleBtn.onclick = (e) => {
                e.stopPropagation();
                sidebar.classList.toggle('is-closed');
            };

            // تحديث الوقت والتاريخ بالأرقام الإنجليزية بناءً على تفضيلك
            const updateTime = () => {
                const now = new Date();
                const options = { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: true
                };
                // استخدام en-GB يضمن ظهور الأرقام 123 بدلاً من ١٢٣
                document.getElementById('current-datetime').innerText = now.toLocaleDateString('en-GB', options);
            };
            
            setInterval(updateTime, 1000); 
            updateTime();

            // إغلاق القائمة تلقائياً في الجوال عند النقر خارجها
            document.addEventListener('click', () => {
                if (window.innerWidth < 768) {
                    sidebar.classList.add('is-closed');
                }
            });
        });
    </script>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
