<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيرا جيت واي | لوحة التحكم</title>
    
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/customers.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/orders.css">
</head>
<body>

    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="logo-section">
                <img src="images/logo.svg" alt="Tera Logo">
                <span>تيرا جيت واي</span>
            </div>
            <nav class="nav-menu" id="main-nav">
                <a href="#dashboard" class="nav-item active" data-route="dashboard"><i class="fas fa-chart-line"></i> الرئيسية</a>
                <a href="#customers" class="nav-item" data-route="customers"><i class="fas fa-users"></i> قاعدة العملاء</a>
                <a href="#orders" class="nav-item" data-route="orders"><i class="fas fa-file-invoice-dollar"></i> الطلبات والفواتير</a>
                <a href="#inventory" class="nav-item" data-route="inventory"><i class="fas fa-boxes"></i> المخزن</a>
                <a href="#settings" class="nav-item" data-route="settings"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="global-search" placeholder="ابحث في تيرا جيت واي...">
                </div>
                <div class="user-info">
                    <div class="user-text">
                        <span class="user-name">محمد بن صالح</span>
                        <span class="user-role">مدير النظام</span>
                    </div>
                    <img src="admin/images/default-product.png" class="avatar" alt="Admin Profile">
                </div>
            </header>

            <section id="module-container" class="content-body">
                <div class="loading-state" id="main-loader" style="text-align: center; padding: 100px;">
                    <div class="spinner"></div>
                    <p style="margin-top: 20px; font-family: 'Cairo'; font-weight: 600;">جاري مزامنة محرك تيرا جيت واي...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-placeholder"></div>

    <script type="module">
        // استيراد بالترتيب لضمان وجود window.db قبل تشغيل main.js
        import './js/core/firebase.js';
        import './js/core/config.js';
        import './js/main.js';

        // جسر الربط العالمي للوظائف التي تستدعى من HTML مباشرة
        window.closeCustomerModal = () => {
            const modal = document.querySelector('.modal-wrapper') || document.getElementById('customer-modal');
            if (modal) {
                modal.style.opacity = '0';
                setTimeout(() => modal.remove(), 300); // إزالة من الـ DOM لتحسين الأداء
            }
        };

        console.log("✅ Tera Gateway: UI Engine v12.12.1 Fully Loaded.");
    </script>

    <script type="module" src="js/utils/helpers.js" defer></script>
</body>
</html>
