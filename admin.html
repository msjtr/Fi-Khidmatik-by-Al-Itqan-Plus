<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم تيرا جيت واي | Tera Gateway</title>
    
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/customers.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/orders.css">
</head>
<body>

    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="logo-section">
                <img src="images/logo.svg" alt="Tera Logo">
                <span>تيرا جيت واي</span>
            </div>
            <nav class="nav-menu">
                <a href="#dashboard" class="nav-item active"><i class="fas fa-chart-line"></i> الرئيسية</a>
                <a href="#customers" class="nav-item"><i class="fas fa-users"></i> قاعدة العملاء</a>
                <a href="#orders" class="nav-item"><i class="fas fa-file-invoice-dollar"></i> الطلبات والفواتير</a>
                <a href="#inventory" class="nav-item"><i class="fas fa-boxes"></i> المخزن</a>
                <a href="#settings" class="nav-item"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <input type="text" id="global-search" placeholder="ابحث باسم العميل أو رقم الجوال...">
                </div>
                <div class="user-profile">
                    <span id="admin-display-name">مرحبًا، محمد بن صالح</span>
                    <img src="admin/images/default-product.png" class="avatar" alt="User">
                </div>
            </header>

            <section id="module-container" class="content-body">
                <div class="loading-overlay">
                    <div class="spinner"></div>
                    <p>جاري مزامنة بيانات تيرا...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-placeholder"></div>

    <script type="module">
        // استيراد الملفات بالترتيب لضمان حقن window.db قبل تشغيل main.js
        import './js/core/firebase.js';
        import './js/core/config.js';
        import './js/main.js';
    </script>

    <script src="js/utils/helpers.js" defer></script>
</body>
</html>
