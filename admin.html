<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم الاحترافية</title>
    
    <link rel="icon" type="image/png" href="./assets/img/logo.png">
    <link rel="apple-touch-icon" href="./assets/img/logo.png">

    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/table.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.ckeditor.com/ckeditor5/40.0.0/super-build/ckeditor.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>
        /* إعدادات إضافية لضمان عمل المحرر فوق النوافذ المنبثقة */
        :root {
            --ck-z-default: 10000;
            --ck-z-modal: 10001;
        }

        .ck-editor__editable {
            min-height: 300px;
            text-align: right !important;
            direction: rtl !important;
            background-color: white !important;
        }

        /* تنسيق الهيدر في حال لم يتم تحميله ديناميكياً بعد */
        .header-placeholder {
            height: 70px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 25px;
            border-bottom: 1px solid #f1f2f6;
        }

        .header-logo-img {
            height: 45px;
            margin-left: 15px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="app">
        <header id="header-container" class="admin-header">
            <div class="logo">
                <img src="./assets/img/logo.png" alt="Tera Logo" class="header-logo-img" onerror="this.src='https://placehold.jp/24/e67e22/ffffff/100x100.png?text=T'">
                <h2>تيرا جيتواي</h2>
            </div>
            <div class="header-tools">
                <div id="current-datetime" class="datetime"></div>
            </div>
        </header>
        
        <div class="main-layout">
            <aside id="sidebar-container" class="sidebar"></aside>
            
            <main id="main-content" class="main-content">
                <div class="loader-wrapper">
                    <img src="./assets/img/logo.png" alt="Tera Logo" class="loader-logo" onerror="this.style.display='none'">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px; font-weight: 500;">جاري تشغيل محرك تيرا جيتواي...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modal-container"></div>

    <script>
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            const dtElement = document.getElementById('current-datetime');
            if(dtElement) dtElement.innerText = now.toLocaleDateString('ar-SA', options);
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>

    <script type="module" src="js/main.js"></script>
</body>
</html>
