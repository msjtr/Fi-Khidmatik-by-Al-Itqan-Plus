<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="icon" href="/fi-khidmatik/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/fi-khidmatik/css/admin.css">
    <link rel="stylesheet" href="/fi-khidmatik/css/table.css">
    <link rel="stylesheet" href="/fi-khidmatik/css/orders.css">
    <link rel="stylesheet" href="/fi-khidmatik/css/invoice.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f5f7fb; height: 100vh; overflow: hidden; }
        
        /* الهيدر العلوي */
        .app-header {
            background: white;
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.04);
            height: 70px;
            position: relative;
            z-index: 1000;
        }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .sidebar-trigger { background: #fef5e8; border: none; font-size: 1.2rem; cursor: pointer; color: #e67e22; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .sidebar-trigger:hover { background: #e67e22; color: white; }
        .app-brand { font-weight: 800; font-size: 1.3rem; color: #2c3e50; display: flex; align-items: center; gap: 12px; }
        .app-brand img { width: 45px; height: 45px; object-fit: contain; }
        .header-clock { font-size: 0.9rem; color: #7f8c8d; font-weight: 500; text-align: left; }
        
        /* الهيكل الرئيسي */
        .app-body { display: flex; height: calc(100vh - 70px); position: relative; }
        
        /* القائمة الجانبية */
        .app-sidebar {
            width: 260px;
            background: white;
            border-left: 1px solid #edf2f7;
            overflow-y: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app-sidebar.is-closed { width: 0; transform: translateX(100%); overflow: hidden; }

        .side-nav ul { list-style: none; padding: 15px 0; }
        .nav-item {
            padding: 14px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            color: #64748b;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            border-right: 4px solid transparent;
        }
        .nav-item:hover { background: #fffcf8; color: #e67e22; }
        .nav-item.active { 
            background: #fef5e8; 
            color: #e67e22; 
            border-right-color: #e67e22;
        }
        .nav-item i { width: 22px; font-size: 1.1rem; text-align: center; }
        
        /* منطقة المحتوى */
        .app-content { flex: 1; overflow-y: auto; position: relative; padding: 20px; background: #f8fafc; }
        
        /* شاشة التحميل */
        #loader {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(248, 250, 252, 0.8);
            backdrop-filter: blur(2px);
            z-index: 500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        #module-container { min-height: 100%; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .app-sidebar { position: absolute; top: 0; bottom: 0; z-index: 99; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
            .header-clock { display: none; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="app-header">
        <div class="header-right">
            <button id="sidebar-toggle" class="sidebar-trigger">
                <i class="fas fa-bars"></i>
            </button>
            <div class="app-brand">
                <img src="/fi-khidmatik/images/logo.svg" alt="Tera Gateway">
                <span>Tera Gateway</span>
            </div>
        </div>
        <div id="current-datetime" class="header-clock"></div>
    </header>

    <div class="app-body">
        <aside id="main-sidebar" class="app-sidebar">
            <nav class="side-nav">
                <ul id="admin-menu">
                    <a href="#dashboard" class="nav-item active" data-module="dashboard"><i class="fas fa-th-large"></i> <span>الرئيسية</span></a>
                    <a href="#products" class="nav-item" data-module="products"><i class="fas fa-box-open"></i> <span>المنتجات</span></a>
                    <a href="#orders" class="nav-item" data-module="orders"><i class="fas fa-file-invoice-dollar"></i> <span>طلبات التقسيط</span></a>
                    <a href="#customers" class="nav-item" data-module="customers"><i class="fas fa-user-friends"></i> <span>العملاء</span></a>
                    <a href="#settings" class="nav-item" data-module="settings"><i class="fas fa-sliders-h"></i> <span>الإعدادات</span></a>
                </ul>
            </nav>
        </aside>

        <main class="app-content">
            <div id="loader">
                <i class="fas fa-spinner fa-spin fa-3x" style="color: #e67e22;"></i>
                <p style="font-weight: 600; color: #4a5568;">جاري جلب البيانات...</p>
            </div>
            <div id="module-container"></div>
        </main>
    </div>
</div>

<script type="module" src="/fi-khidmatik/js/main.js"></script>

<script>
    (function() {
        // 1. تحديث الساعة والوقت
        function updateTime() {
            const el = document.getElementById('current-datetime');
            if (el) {
                const now = new Date();
                el.innerText = now.toLocaleDateString('ar-SA', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                });
            }
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. التحكم في القائمة الجانبية (Sidebar)
        const toggleBtn = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('main-sidebar');
        if (toggleBtn && sidebar) {
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('is-closed');
            });
        }

        // 3. التحكم في الحالة النشطة للأزرار (Active State)
        window.setActiveNavItem = function(moduleName) {
            document.querySelectorAll('#admin-menu .nav-item').forEach(item => {
                const isMatch = item.getAttribute('data-module') === moduleName;
                item.classList.toggle('active', isMatch);
            });
        };

        // 4. إخفاء وإظهار شاشة التحميل (Loader)
        window.toggleLoader = function(show) {
            const loader = document.getElementById('loader');
            if (loader) loader.style.display = show ? 'flex' : 'none';
        };

        // إخفاء التحميل المبدئي بعد ثانية كاحتياط
        setTimeout(() => window.toggleLoader(false), 2000);

        console.log('✅ واجهة Tera Gateway جاهزة للعمل.');
    })();
</script>
</body>
</html>
