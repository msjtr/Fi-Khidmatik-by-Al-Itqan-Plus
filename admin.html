<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <script src="https://cdn.ckeditor.com/ckeditor5/40.0.0/classic/ckeditor.js"></script>
    
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-right">
                <button id="sidebar-toggle" class="sidebar-btn"><i class="fas fa-bars"></i></button>
                <div class="logo-area">
                    <img src="images/logo.svg" alt="Tera Gateway" class="logo-img" onerror="this.src='https://placehold.jp/e67e22/ffffff/50x50.png?text=T'">
                    <span class="logo-text">Tera Gateway</span>
                </div>
            </div>
            <div id="current-datetime" class="datetime-badge"></div>
        </header>

        <div class="layout-body">
            <aside id="sidebar" class="sidebar">
                <nav class="sidebar-nav">
                    <ul id="main-menu">
                        <li class="active" data-module="dashboard"><i class="fas fa-th-large"></i> <span>الرئيسية</span></li>
                        <li data-module="products"><i class="fas fa-box-open"></i> <span>المنتجات</span></li>
                        <li data-module="orders"><i class="fas fa-file-invoice-dollar"></i> <span>الطلبات</span></li>
                        <li data-module="customers"><i class="fas fa-user-friends"></i> <span>العملاء</span></li>
                        <li data-module="settings"><i class="fas fa-cog"></i> <span>الإعدادات</span></li>
                    </ul>
                </nav>
            </aside>

            <main id="main-content" class="content-area">
                </main>
        </div>
    </div>

    <script>
        // دالة الفتح والإغلاق
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        if(toggleBtn) {
            toggleBtn.onclick = () => sidebar.classList.toggle('collapsed');
        }

        // تحديث التاريخ
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('current-datetime').innerText = now.toLocaleDateString('ar-SA', options);
        }
        setInterval(updateDate, 1000); updateDate();
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
