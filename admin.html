<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن | متجرك الذكي</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="admin/css/style.css">
    <link rel="stylesheet" href="admin/css/admin.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
    <style>
        /* تخصيص بسيط للشعار */
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2c3e8f, #1a2a6c);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(44, 62, 143, 0.2);
        }
        .logo-icon i {
            font-size: 26px;
            color: white;
        }
        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2c3e8f, #f5a623);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <!-- الشريط الجانبي بشعار -->
        <aside class="w-80 bg-white shadow-2xl z-10 flex flex-col overflow-y-auto border-l border-gray-100 sidebar">
            <div class="p-6 border-b border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="logo-icon">
                        <i class="fas fa-store"></i>
                    </div>
                    <div>
                        <h1 class="logo-text">متجرك الذكي</h1>
                        <p class="text-xs text-gray-500 mt-1">نظام إدارة متكامل</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 py-4">
                <a href="admin/modules/orders.html" target="contentFrame" class="sidebar-item" data-section="orders">
                    <i class="fas fa-truck-fast w-6"></i> 
                    <span>الطلبات</span>
                </a>
                <a href="admin/modules/customers.html" target="contentFrame" class="sidebar-item" data-section="customers">
                    <i class="fas fa-users w-6"></i> 
                    <span>العملاء</span>
                </a>
                <a href="admin/modules/products.html" target="contentFrame" class="sidebar-item" data-section="products">
                    <i class="fas fa-boxes w-6"></i> 
                    <span>المنتجات</span>
                </a>
                <a href="admin/modules/inventory.html" target="contentFrame" class="sidebar-item" data-section="inventory">
                    <i class="fas fa-warehouse w-6"></i> 
                    <span>المخزون</span>
                </a>
                <a href="admin/modules/payments.html" target="contentFrame" class="sidebar-item" data-section="payments">
                    <i class="fas fa-credit-card w-6"></i> 
                    <span>طرق الدفع</span>
                </a>
                <a href="admin/modules/invoice.html" target="contentFrame" class="sidebar-item" data-section="invoice">
                    <i class="fas fa-file-invoice-dollar w-6"></i> 
                    <span>تعليمات الفاتورة</span>
                </a>
                <a href="admin/modules/general.html" target="contentFrame" class="sidebar-item" data-section="general">
                    <i class="fas fa-sliders-h w-6"></i> 
                    <span>الإعدادات العامة</span>
                </a>
            </nav>
            <div class="p-4 border-t border-gray-100 text-center text-xs text-gray-400">
                © 2025 متجرك الذكي - جميع الحقوق محفوظة
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="flex-1 overflow-y-auto p-4">
            <div class="main-content">
                <iframe name="contentFrame" id="contentFrame" src="admin/modules/orders.html" class="w-full h-full"></iframe>
            </div>
        </main>
    </div>

    <script>
        // إضافة class active للعنصر النشط
        const links = document.querySelectorAll('.sidebar-item');
        const iframe = document.getElementById('contentFrame');
        
        function setActive(section) {
            links.forEach(link => link.classList.remove('sidebar-active'));
            const activeLink = Array.from(links).find(link => link.getAttribute('data-section') === section);
            if (activeLink) activeLink.classList.add('sidebar-active');
        }
        
        iframe.addEventListener('load', () => {
            const src = iframe.contentWindow.location.pathname;
            const section = src.split('/').pop().replace('.html', '');
            setActive(section);
        });
        
        links.forEach(link => {
            link.addEventListener('click', () => {
                const section = link.getAttribute('data-section');
                setActive(section);
            });
        });
    </script>
</body>
</html>
