<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفاتورة | منصة في خدمتك</title>
    <style>
        /* نفس التنسيقات السابقة (يمكن وضعها في style.css) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px 20px; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
        .invoice-container { max-width: 1100px; margin: 0 auto; }
        .invoice { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .invoice-content { padding: 30px; }
        .top-margin { background: #1e293b; color: #e2e8f0; padding: 12px 25px; display: flex; justify-content: space-between; border-radius: 12px; margin-bottom: 25px; }
        .logo-center { text-align: center; margin-bottom: 25px; }
        .logo-center img { max-width: 100px; }
        .logo-placeholder { font-size: 24px; font-weight: bold; color: #1e3a8a; }
        .invoice-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; }
        .invoice-number { font-size: 18px; font-weight: bold; color: #1e3a8a; }
        .invoice-number span { background: #e0e7ff; padding: 4px 12px; border-radius: 20px; margin-right: 8px; }
        .invoice-date { font-size: 14px; color: #475569; }
        .invoice-parties { display: flex; gap: 25px; margin-bottom: 25px; }
        .invoice-from, .invoice-to { flex: 1; padding: 18px; border-radius: 12px; }
        .invoice-from { background: #fef9e3; border-right: 4px solid #f59e0b; }
        .invoice-to { background: #e0f2fe; border-right: 4px solid #0284c7; }
        .payment-shipping { background: #f1f5f9; padding: 12px 20px; border-radius: 10px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
        .payment-shipping span { background: white; padding: 6px 15px; border-radius: 25px; }
        .products-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        .products-table th { background: #1e3a8a; color: white; padding: 12px 8px; border: 1px solid #2e4a9a; }
        .products-table td { padding: 10px 8px; text-align: center; border: 1px solid #e2e8f0; background: white; }
        .totals-wrapper { background: #f8fafc; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 25px; }
        .grand-total { text-align: center; padding: 0 20px; border-right: 1px solid #cbd5e1; border-left: 1px solid #cbd5e1; }
        .grand-total h2 { font-size: 20px; color: #1e3a8a; }
        .contact-bar { background: #f1f5f9; padding: 12px; border-radius: 10px; display: flex; justify-content: center; gap: 30px; margin-bottom: 15px; }
        .thanks { text-align: center; padding-top: 15px; border-top: 1px solid #e2e8f0; color: #475569; }
        .buttons { text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 15px; }
        button { padding: 12px 28px; border: none; border-radius: 40px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; }
        .btn-pdf { background: #dc2626; color: white; }
        .btn-print { background: #2563eb; color: white; }
        .btn-new { background: #f59e0b; color: white; }
        .empty-state, .error-state { text-align: center; padding: 60px; background: white; border-radius: 20px; font-size: 18px; }
        .error-state { color: #dc2626; }
        @media print { .buttons, button { display: none; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="invoice-container" id="invoiceContent">
    <div class="empty-state">⏳ جاري تحميل الفاتورة...</div>
</div>
<div class="buttons">
    <button class="btn-pdf" onclick="downloadPDF()">📥 تحميل PDF</button>
    <button class="btn-print" onclick="window.print()">🖨️ طباعة</button>
    <button class="btn-new" onclick="newOrder()">🔄 طلب جديد</button>
</div>

<script>
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function downloadPDF() {
        const element = document.getElementById('invoiceToPrint');
        if (!element) { alert('لا توجد فاتورة'); return; }
        const btn = document.querySelector('.btn-pdf');
        const originalText = btn.innerHTML;
        btn.innerHTML = '⏳ جاري التحضير...';
        btn.disabled = true;
        const images = element.querySelectorAll('img');
        await Promise.all(Array.from(images).map(img => {
            if (img.complete) return Promise.resolve();
            return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
        }));
        const opt = {
            margin: [8,8,8,8],
            filename: `فاتورة_${new Date().toISOString().slice(0,10)}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 3, letterRendering: true, useCORS: false, logging: false, windowWidth: element.scrollWidth, windowHeight: element.scrollHeight },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid-all' }
        };
        try {
            await html2pdf().set(opt).from(element).save();
        } catch(err) {
            alert('حدث خطأ في إنشاء PDF، سيتم استخدام الطباعة');
            window.print();
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    function newOrder() {
        localStorage.removeItem('currentOrder');
        window.location.href = "index.html";
    }
</script>

<script type="module">
    import { getOrderFromFirebase } from './js/order.js';

    window.loadInvoice = async function() {
        let order = null;

        // 1. محاولة جلب من Firebase إذا كان هناك orderId في الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');

        if (orderId) {
            try {
                order = await getOrderFromFirebase(orderId);
                if (order) {
                    console.log('✅ تم جلب الطلب من Firebase');
                    localStorage.setItem('currentOrder', JSON.stringify(order));
                }
            } catch(e) { console.warn('فشل جلب من Firebase', e); }
        }

        // 2. إذا لم نجد، نبحث في localStorage
        if (!order) {
            const stored = localStorage.getItem('currentOrder');
            if (stored) {
                try {
                    order = JSON.parse(stored);
                    console.log('✅ تم جلب الطلب من localStorage');
                } catch(e) { console.error(e); }
            }
        }

        // 3. إذا لم توجد بيانات
        if (!order) {
            document.getElementById('invoiceContent').innerHTML = `
                <div class="error-state">
                    ❌ لا توجد بيانات للفاتورة<br><br>
                    <button onclick="window.location.href='index.html'" style="padding:10px 20px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer;">
                        إنشاء طلب جديد
                    </button>
                </div>
            `;
            return;
        }

        const items = order.cart || order.items || [];
        if (!items.length) {
            document.getElementById('invoiceContent').innerHTML = '<div class="error-state">❌ السلة فارغة</div>';
            return;
        }

        let cartRows = '', subtotal = 0, totalDiscount = 0;
        for (let item of items) {
            const price = parseFloat(item.price) || 0;
            const qty = parseInt(item.qty) || 1;
            const discount = parseFloat(item.discount) || 0;
            const itemTotal = (price * qty) - discount;
            subtotal += price * qty;
            totalDiscount += discount;
            cartRows += `
                <tr>
                    <td>${escapeHtml(item.name)}</td>
                    <td>${escapeHtml(item.code)}</td>
                    <td>${escapeHtml(item.desc)}</td>
                    <td>${qty}</td>
                    <td>${price.toFixed(2)}</td>
                    <td>${discount.toFixed(2)}</td>
                    <td>${itemTotal.toFixed(2)}</td>
                </tr>
            `;
        }
        const taxable = subtotal - totalDiscount;
        const tax = taxable * 0.15;
        const grandTotal = taxable + tax;

        let displayDate = order.date || '-';
        if (displayDate.match(/^\d{4}-\d{2}-\d{2}$/)) {
            const parts = displayDate.split('-');
            displayDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
        }
        const timeDisplay = (order.time && order.time !== '-') ? ' - ' + order.time : '';

        const html = `
            <div class="invoice" id="invoiceToPrint">
                <div class="invoice-content">
                    <div class="top-margin">
                        <div>رقم شهادة العمل الحر: FL-765735204</div>
                        <div>الرقم الضريبي: 312495447600003</div>
                    </div>
                    <div class="logo-center">
                        <img src="images/logo.svg" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'logo-placeholder\'>منصة في خدمتك</div>';">
                    </div>
                    <div class="invoice-header">
                        <div class="invoice-number">رقم الفاتورة: <span>${escapeHtml(order.orderNumber)}</span></div>
                        <div class="invoice-date">التاريخ: ${displayDate}${timeDisplay}</div>
                    </div>
                    <div class="invoice-parties">
                        <div class="invoice-from">
                            <h3>📌 مصدرة من</h3>
                            <p><strong>منصة في خدمتك</strong><br>المملكة العربية السعودية<br>حائل - حي النقرة - شارع سعد المشاط - مبنى 3085<br>الرقم الإضافي: 7718 - الرمز البريدي: 55431</p>
                        </div>
                        <div class="invoice-to">
                            <h3>📌 مصدرة إلى</h3>
                            <p><strong>${escapeHtml(order.customer)}</strong><br>المملكة العربية السعودية<br>${escapeHtml(order.city)} ${order.district ? '- ' + escapeHtml(order.district) : ''} ${order.street ? '- ' + escapeHtml(order.street) : ''} ${order.building ? '- ' + escapeHtml(order.building) : ''}<br>${order.extra ? 'الرقم الإضافي: ' + escapeHtml(order.extra) + ' - ' : ''}${order.postal ? 'الرمز البريدي: ' + escapeHtml(order.postal) : ''}<br>هاتف: ${escapeHtml(order.phone)}<br>بريد: ${escapeHtml(order.email)}</p>
                        </div>
                    </div>
                    <div class="payment-shipping">
                        <span>💳 طريقة الدفع: ${escapeHtml(order.payment)}</span>
                        ${order.payment === 'تمارا' && order.tamaraAuth ? `<span>🔑 رمز الموافقة: ${escapeHtml(order.tamaraAuth)}</span>` : ''}
                        <span>🚚 خدمة الشحن: ${escapeHtml(order.shipping)}</span>
                    </div>
                    <h3>📦 تفاصيل الطلب</h3>
                    <table class="products-table">
                        <thead><tr><th>اسم المنتج</th><th>كود المنتج</th><th>الوصف</th><th>الكمية</th><th>السعر (ريال)</th><th>الخصم (ريال)</th><th>الإجمالي (ريال)</th></tr></thead>
                        <tbody>${cartRows}</tbody>
                    </table>
                    <div class="totals-wrapper">
                        <div class="totals-labels"><p>المجموع الفرعي</p><p>الخصم الكلي</p><p>الضريبة (15%)</p></div>
                        <div class="totals-values"><p>${subtotal.toFixed(2)} ريال</p><p>${totalDiscount.toFixed(2)} ريال</p><p>${tax.toFixed(2)} ريال</p></div>
                        <div class="grand-total"><h2>الإجمالي النهائي: ${grandTotal.toFixed(2)} ريال</h2></div>
                    </div>
                    <div class="contact-bar">
                        <span>📞 +966597771565</span>
                        <span>✉️ info@fi-khidmatik.com</span>
                        <span>🌐 www.khidmatik.com</span>
                    </div>
                    <div class="thanks">شكراً لتسوقكم معنا</div>
                </div>
            </div>
        `;
        document.getElementById('invoiceContent').innerHTML = html;
    };

    window.loadInvoice();
</script>
</body>
</html>
