<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفاتورة | منصة في خدمتك</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    margin: 0;
    padding: 20px;
}

.invoice {
    background: #fff;
    max-width: 900px;
    margin: auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.logo-center {
    text-align: center;
    margin-bottom: 20px;
}

.logo-center img {
    max-width: 140px;
}

.invoice-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.invoice-parties {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.invoice-parties div {
    width: 48%;
}

.products-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

.products-table th, .products-table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

.products-table th {
    background: #2a5298;
    color: #fff;
}

.totals {
    margin-top: 20px;
    text-align: left;
}

.total-final {
    font-size: 20px;
    font-weight: bold;
    color: green;
}

.buttons {
    text-align: center;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
}

.btn-pdf { background:#4CAF50;color:#fff;}
.btn-print { background:#2196F3;color:#fff;}
.btn-new { background:#ff9800;color:#fff;}
</style>

</head>

<body>

<div id="invoiceContent"></div>

<div class="buttons">
    <button class="btn-pdf" onclick="downloadPDF()">📥 تحميل PDF</button>
    <button class="btn-print" onclick="window.print()">🖨️ طباعة</button>
    <button class="btn-new" onclick="newOrder()">🔄 طلب جديد</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="js/order.js"></script>

</body>
</html>
