<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة - نظام الفواتير</title>
    <link rel="stylesheet" href="./css/design.css">
    <link rel="stylesheet" href="./css/print.css" media="print">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="invoice-container">
    <div class="invoice">
        <div class="invoice-content" id="invoiceContent">
            <div class="error-message">جاري تحميل الفاتورة...</div>
        </div>
        <div class="buttons no-print">
            <button class="btn-print" id="printBtn">🖨️ طباعة</button>
            <button class="btn-pdf" id="pdfBtn">📄 PDF</button>
            <button class="btn-png" id="imageBtn">🖼️ صورة</button>
        </div>
    </div>
</div>

<script type="module">
    import { buildInvoiceHTML } from './js/print/template.js';
    import { printInvoice } from './js/print/print.service.js';
    import { generatePDF } from './js/print/pdf.service.js';
    import { generateImage } from './js/print/image.service.js';

    /**
     * دالة لتأمين النصوص ومنع تنفيذ الأكواد الخبيثة
     */
    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // بيانات الطلب
    const order = {
        id: "KF-2603290287",
        orderNumber: "KF-2603290287",
        orderDate: "2026-03-29",
        orderTime: "14:30",
        paymentMethod: "tamara",
        paymentMethodName: "تمارا",
        approvalCode: "14141414",
        shippingService: "سمسا",
        customer: {
            name: "محمد صالح جميعان الشمري",
            phone: "966597771565",
            email: "msjt301@gmail.com",
            address: "المملكة العربية السعودية"
        },
        items: [
            { 
                name: "منتج تجريبي", 
                barcode: "PRD-001", 
                description: "وصف المنتج التجريبي", 
                price: 1.00, 
                quantity: 1 
            }
        ]
    };

    // بناء صفوف المنتجات (تم نقل escapeHtml إلى الأعلى)
    const cartRows = order.items.map(item => `
        <tr>
            <td style="padding: 10px 8px; border: 1px solid #e2e8f0; text-align: right;">${escapeHtml(item.name)}</td>
            <td style="padding: 10px 8px; border: 1px solid #e2e8f0; text-align: center;">${escapeHtml(item.barcode || '-')}</td>
            <td style="padding: 10px 8px; border: 1px solid #e2e8f0; text-align: center;">${escapeHtml(item.description || '-')}</td>
            <td style="padding: 10px 8px; border: 1px solid #e2e8f0; text-align: center;">${item.quantity}</td>
            <td style="padding: 10px 8px; border: 1px solid #e2e8f0; text-align: left;">${item.price.toFixed(2)}</td>
            <td style="padding: 10px 8px; border: 1px solid #e2e8f0; text-align: left;">0</td>
            <td style="padding: 10px 8px; border: 1px solid #e2e8f0; text-align: left;"><strong>${(item.price * item.quantity).toFixed(2)}</strong></td>
        </tr>
    `).join('');

    // حساب الإجماليات
    const subtotal = order.items.reduce((s, i) => s + (i.price * i.quantity), 0);
    const tax = subtotal * 0.15;
    const total = subtotal + tax;

    const totals = {
        subtotal: subtotal.toFixed(2) + ' ريال',
        discount: '0 ريال',
        tax: tax.toFixed(2) + ' ريال',
        total: total.toFixed(2) + ' ريال'
    };

    // عرض الفاتورة
    const invoiceContent = document.getElementById('invoiceContent');
    try {
        invoiceContent.innerHTML = buildInvoiceHTML(order, cartRows, totals);
        document.title = `فاتورة - ${order.orderNumber}`;
    } catch (error) {
        console.error('خطأ في بناء الفاتورة:', error);
        invoiceContent.innerHTML = '<div class="error-message">❌ حدث خطأ في عرض الفاتورة</div>';
    }

    // الحصول على عنصر الفاتورة
    const invoiceElement = document.querySelector('.invoice');

    // ربط الأزرار
    document.getElementById('printBtn')?.addEventListener('click', async () => {
        try {
            await printInvoice(invoiceElement);
        } catch (error) {
            console.error('خطأ في الطباعة:', error);
            alert('حدث خطأ أثناء الطباعة');
        }
    });

    document.getElementById('pdfBtn')?.addEventListener('click', async () => {
        try {
            await generatePDF(invoiceElement, order);
        } catch (error) {
            console.error('خطأ في PDF:', error);
            alert('حدث خطأ أثناء تصدير PDF');
        }
    });

    document.getElementById('imageBtn')?.addEventListener('click', async () => {
        try {
            await generateImage(invoiceElement, order);
        } catch (error) {
            console.error('خطأ في الصورة:', error);
            alert('حدث خطأ أثناء تصدير الصورة');
        }
    });

    console.log('✅ تم تحميل الفاتورة بنجاح');
</script>
</body>
</html>
