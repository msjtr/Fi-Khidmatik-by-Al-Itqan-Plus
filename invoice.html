<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فاتورة</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="invoice" id="invoice"></div>

<div style="text-align:center;">
<button onclick="downloadPDF()">تحميل PDF</button>
<button onclick="goHome()">العودة للرئيسية</button>
</div>

<script>

// 🔥 حماية لو ما فيه بيانات
let order = JSON.parse(localStorage.getItem("currentOrder"));

if(!order){
document.getElementById("invoice").innerHTML = "<h3>لا توجد بيانات طلب</h3>";
throw new Error("No order data");
}

let subtotal = 0;
let rows = "";

// 🔥 بناء المنتجات
order.cart.forEach(p=>{

let price = parseFloat(p.price) || 0;
let total = price;

subtotal += total;

rows += `
<tr>
<td>${p.name}</td>
<td>${p.desc || "-"}</td>
<td>1</td>
<td>${price}</td>
<td>${total}</td>
</tr>
`;

});

let tax = subtotal * 0.15;
let final = subtotal + tax;

// 🔥 بناء الفاتورة
document.getElementById("invoice").innerHTML = `

<!-- الهيدر -->
<div class="header">

<div class="logo">
<img src="images/logo.svg">
</div>

<div class="center-title">
<h2>فاتورة إلكترونية</h2>
<p>منصة في خدمتك</p>
</div>

<div class="order-info">
<p><b>رقم الطلب:</b> ${order.order_number || "-"}</p>
<p><b>التاريخ:</b> ${order.date || "-"}</p>
<p><b>الوقت:</b> ${order.time || "-"}</p>
</div>

</div>

<hr>

<!-- 🔥 مصدرة من / إلى -->
<div class="row">

<div class="box">
<h4>مصدرة من</h4>

<p>منصة في خدمتك</p>
<p>المملكة العربية السعودية</p>

<p>
المنطقة: حائل - الحي: النقرة - الشارع: سعد المشاط<br>
رقم المبنى: 3085 - الرقم الفرعي: 7718<br>
الرمز البريدي: 55431
</p>

<p>رقم الهاتف: +966597771565</p>
<p>البريد الإلكتروني: info@fi-khidmatik.com</p>
<p>الموقع الإلكتروني: www.khidmatik.com</p>

<p>رقم شهادة العمل الحر: FL-765735204</p>
<p>الرقم الضريبي: 312495447600003</p>

</div>

<div class="box">
<h4>مصدرة إلى</h4>

<p><b>اسم العميل:</b> ${order.customer || "-"}</p>

<p><b>الدولة:</b> ${order.country || "-"}</p>
<p><b>المنطقة:</b> ${order.region || "-"}</p>
<p><b>الحي:</b> ${order.district || "-"}</p>
<p><b>الشارع:</b> ${order.street || "-"}</p>

<p><b>رقم المبنى:</b> ${order.building || "-"}</p>
<p><b>الرقم الإضافي:</b> ${order.extra || "-"}</p>
<p><b>الرمز البريدي:</b> ${order.postal || "-"}</p>

<p><b>رقم الهاتف:</b> ${order.phone || "-"}</p>
<p><b>البريد الإلكتروني:</b> ${order.email || "-"}</p>

</div>

</div>

<hr>

<!-- الدفع -->
<div class="section">
<p><b>طريقة الدفع:</b> ${order.payment || "-"}</p>
<p><b>رمز تمارا:</b> ${order.tamara_auth || "-"}</p>
<p><b>طلب تمارا:</b> ${order.tamara_order || "-"}</p>
<p><b>تفاصيل الشحن:</b> ${order.shipping || "-"}</p>
</div>

<!-- الجدول -->
<table>
<tr>
<th>اسم المنتج</th>
<th>الوصف</th>
<th>الكمية</th>
<th>السعر الفردي</th>
<th>الإجمالي</th>
</tr>

${rows}

</table>

<!-- الإجمالي -->
<div class="total">
<p><span>مجموع السلة</span><span>${subtotal.toFixed(2)}</span></p>
<p><span>ضريبة القيمة المضافة (15%)</span><span>${tax.toFixed(2)}</span></p>

<h3>
<span>الإجمالي النهائي</span>
<span>${final.toFixed(2)} ريال</span>
</h3>
</div>

<!-- الفوتر -->
<div class="footer">
<p>شكراً لتعاملك مع منصة في خدمتك</p>
</div>

`;

// 🔥 PDF احترافي
function downloadPDF(){

let element = document.querySelector(".invoice");

let opt = {
  margin: 5,
  filename: 'فاتورة.pdf',
  image: { type: 'jpeg', quality: 1 },
  html2canvas: { scale: 2 },
  jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
};

html2pdf().set(opt).from(element).save();

}

function goHome(){
window.location.href = "index.html";
}

</script>

</body>
</html>
