<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فاتورة ضريبية</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body {
    font-family: Tahoma;
    background: #f4f6f9;
    padding: 20px;
}

.invoice {
    background: #fff;
    max-width: 950px;
    margin: auto;
    padding: 30px;
    border-radius: 10px;
}

/* الهيدر */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo img {
    width: 110px;
}

.title {
    text-align: left;
}

/* أقسام */
.section {
    margin-top: 20px;
}

.row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.box {
    width: 48%;
}

/* جدول */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #eee;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
}

/* الإجمالي */
.total {
    margin-top: 20px;
}

.total div {
    display: flex;
    justify-content: space-between;
    margin: 5px 0;
}

h3 {
    color: #1e3a8a;
}

/* QR */
.qr {
    text-align: center;
    margin-top: 20px;
}

button {
    margin-top: 20px;
    padding: 10px;
    background: #1e3a8a;
    color: white;
    border: none;
    cursor: pointer;
}

</style>

</head>

<body>

<div class="invoice" id="invoice"></div>

<button onclick="downloadPDF()">تحميل PDF</button>

<script>

// جلب الطلب
let orders = JSON.parse(localStorage.getItem("orders"));
let index = localStorage.getItem("currentOrder");
let order = orders[index];

// الحساب
let subtotal = 0;
let rows = "";

order.cart.forEach(p => {

let qty = 1;
let total = parseFloat(p.price) * qty;

subtotal += total;

rows += `
<tr>
<td>${p.name}</td>
<td>${p.description || "-"}</td>
<td>${qty}</td>
<td>${p.price}</td>
<td>${total}</td>
</tr>
`;

});

let shipping = 0;
let discount = 0;
let tax = subtotal * 0.15;
let final = subtotal + tax + shipping - discount;

// عرض الفاتورة
document.getElementById("invoice").innerHTML = `

<!-- الهيدر -->
<div class="header">

<div class="logo">
<img src="images/logo.png">
</div>

<div class="title">
<h2>فاتورة إلكترونية</h2>
<p>منصة في خدمتك</p>
</div>

</div>

<hr>

<!-- بيانات البائع والعميل -->
<div class="row">

<div class="box">
<h4>مصدره من</h4>
<p>منصة في خدمتك</p>
<p>المملكة العربية السعودية</p>
<p>حائل - حي النقرة - شارع سعد المشاط</p>
<p>الرقم الضريبي: 312495447600003</p>
<p>رقم شهادة العمل الحر: XXXXX</p>
</div>

<div class="box">
<h4>مصدره إلى</h4>
<p>اسم العميل: ${order.customer}</p>
<p>العنوان: ${order.address}</p>
<p>رقم الجوال: ${order.phone}</p>
</div>

</div>

<hr>

<!-- بيانات الطلب -->
<div class="section">
<p>رقم الطلب: ${order.order_number}</p>
<p>التاريخ: ${order.date}</p>
<p>الوقت: ${order.time}</p>
<p>تفاصيل الشحن: ${order.shipping}</p>
</div>

<!-- جدول المنتجات -->
<table>

<tr>
<th>اسم المنتج</th>
<th>وصف المنتج</th>
<th>الكمية</th>
<th>السعر الفردي</th>
<th>السعر الإجمالي</th>
</tr>

${rows}

</table>

<!-- الحساب -->
<div class="total">

<div><span>مجموع السلة</span><span>${subtotal}</span></div>
<div><span>الشحن</span><span>${shipping}</span></div>
<div><span>الخصم</span><span>${discount}</span></div>
<div><span>رسوم الضريبة</span><span>${tax.toFixed(2)}</span></div>

<h3>
<span>الإجمالي النهائي</span>
<span>${final.toFixed(2)} ريال</span>
</h3>

</div>

<!-- QR -->
<div class="qr">
<img id="qr">
</div>

`;

// QR ضريبي (ZATCA)
let qrData = `
اسم المنشأة: منصة في خدمتك
الرقم الضريبي: 312495447600003
التاريخ: ${order.date} ${order.time}
الإجمالي: ${final}
الضريبة: ${tax}
`;

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(qrData);


// PDF
function downloadPDF(){
html2pdf().from(document.querySelector(".invoice")).save("فاتورة ضريبية.pdf");
}

</script>

</body>
</html>
