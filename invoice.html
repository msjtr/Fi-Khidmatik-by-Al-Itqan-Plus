<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة - نظام الفواتير</title>
    <link rel="stylesheet" href="./css/design.css">
    <link rel="stylesheet" href="./css/print.css" media="print">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="invoice-container">
    <div class="invoice">
        <div class="invoice-content" id="invoiceContent"></div>
        <div class="buttons no-print">
            <button class="btn-print" onclick="handlePrint()">🖨️ طباعة</button>
            <button class="btn-pdf" onclick="handlePDF()">📄 PDF</button>
            <button class="btn-png" onclick="handleImage()">🖼️ صورة</button>
        </div>
    </div>
</div>
<script type="module">
    import { buildInvoiceHTML } from './js/print/template.js';
    import { printInvoice } from './js/print/print.service.js';
    import { generatePDF } from './js/print/pdf.service.js';
    import { generateImage } from './js/print/image.service.js';

    const order = {
        id: "KF-2603290287",
        orderNumber: "KF-2603290287",
        orderDate: "2026-03-29",
        orderTime: "14:30",
        paymentMethod: "tamara",
        paymentMethodName: "تمارا",
        approvalCode: "14141414",
        shippingService: "سمسا",
        customer: {
            name: "محمد صالح جميعان الشمري",
            phone: "966597771565",
            email: "msjt301@gmail.com",
            address: "المملكة العربية السعودية"
        },
        items: [
            { name: "منتج تجريبي", barcode: "PRD-001", description: "وصف المنتج", price: 1.00, quantity: 1 }
        ]
    };

    const cartRows = order.items.map(item => `
        <tr><td>${item.name}</td><td>${item.barcode}</td><td>${item.description}</td>
        <td>${item.quantity}</td><td>${item.price.toFixed(2)}</td><td>0</td><td>${(item.price * item.quantity).toFixed(2)}</td></tr>
    `).join('');
    const subtotal = order.items.reduce((s, i) => s + i.price * i.quantity, 0);
    const tax = subtotal * 0.15;
    const totals = {
        subtotal: subtotal.toFixed(2) + ' ريال',
        discount: '0 ريال',
        tax: tax.toFixed(2) + ' ريال',
        total: (subtotal + tax).toFixed(2) + ' ريال'
    };
    document.getElementById('invoiceContent').innerHTML = buildInvoiceHTML(order, cartRows, totals);
    document.title = `فاتورة - ${order.orderNumber}`;

    window.handlePrint = async () => await printInvoice(document.querySelector('.invoice'));
    window.handlePDF = async () => await generatePDF(document.querySelector('.invoice'), order);
    window.handleImage = async () => await generateImage(document.querySelector('.invoice'), order);
</script>
</body>
</html>
