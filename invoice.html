<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفاتورة</title>

<style>
body {
    font-family: Arial;
    background: #2a5298;
    padding: 20px;
}
.invoice-box {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
}
button {
    margin: 5px;
    padding: 10px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div id="invoiceWrapper">
    <div id="invoiceContent"></div>
</div>

<br>

<button onclick="downloadPDF()">📥 PDF</button>
<button onclick="printInvoice()">🖨️ طباعة</button>
<button onclick="newOrder()">🔄 طلب جديد</button>

<script>
function loadInvoice() {

    let orderJSON = localStorage.getItem('currentOrder');

    if (!orderJSON) {
        document.getElementById('invoiceContent').innerHTML = "❌ لا يوجد طلب";
        return;
    }

    let order = JSON.parse(orderJSON);

    if (!order.items || order.items.length === 0) {
        document.getElementById('invoiceContent').innerHTML = "❌ لا توجد منتجات";
        return;
    }

    let html = `
        <div class="invoice-box">
        <h2>📄 الفاتورة</h2>

        <p>👤 ${order.customer}</p>
        <p>📱 ${order.phone}</p>
        <p>📅 ${order.date}</p>
        <hr>
    `;

    let total = 0;

    order.items.forEach(item => {
        let itemTotal = (item.price * item.qty) - item.discount;
        total += itemTotal;

        html += `
        <div>
        ${item.name} (${item.qty}) = ${itemTotal.toFixed(2)} ريال
        </div>
        `;
    });

    html += `
        <hr>
        <h3>💰 الإجمالي: ${total.toFixed(2)} ريال</h3>
        </div>
    `;

    document.getElementById('invoiceContent').innerHTML = html;
}

// طباعة
function printInvoice() {
    window.print();
}

// PDF
function downloadPDF() {
    html2pdf().from(document.getElementById('invoiceWrapper')).save();
}

// طلب جديد
function newOrder() {
    localStorage.removeItem('currentOrder');
    window.location.href = 'index.html';
}

window.onload = loadInvoice;
</script>

</body>
</html>
